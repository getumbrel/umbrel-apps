releaseNotes: >-
  This update upgrades Tailscale to v1.98.8 with fixes that improve connection reliability and stability. This includes more reliable connections after devices wake from sleep, fewer unnecessary connection retries, and improved Tailscale SSH session recording.


  Full release notes can be found at https://tailscale.com/changelog#2026-06-29-client


  Tip: You can use Tailscale to back up one Umbrel to another. When adding the backup destination, enter its Tailscale IP address shown in the Tailscale app; device names aren't currently supported.
