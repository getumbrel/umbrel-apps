releaseNotes: >-
  This update upgrades Tailscale to v1.98.9 with security fixes for Tailscale SSH, Tailscale Serve, and Tailscale Funnel. It also fixes an issue that could log a device out of Tailscale when its tag was changed from the CLI.


  Full release notes can be found at https://tailscale.com/changelog#2026-07-14-client


  Tip: You can use Tailscale to back up one Umbrel to another. When adding the backup destination, enter its Tailscale IP address shown in the Tailscale app; device names aren't currently supported.
