version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: route96_server_1
      APP_PORT: 8000
      PROXY_AUTH_ADD: "false"

  server:
    image: voidic/route96:v0.5.2@sha256:e6d424e0754ad72a119d2e90a9f861e86f25e8906f4e0d1097b142dd0ed5c2c8
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/uploads:/app/data
      - ${APP_DATA_DIR}/data/config.yaml:/app/config.yaml
    environment:
      RUST_LOG: "info"
    depends_on:
      - db

  db:
    image: mariadb:11.2.4@sha256:e9ea1dbab6783ff0281e41e3357d950a5f598b2033559b8443e03b181807910b
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "route96"
      MYSQL_USER: "route96"
      MYSQL_PASSWORD: "route96password"
      MYSQL_DATABASE: "route96"
