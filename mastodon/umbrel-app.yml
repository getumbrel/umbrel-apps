name: Mastodon
version: v4.6.3
tagline: Decentralized social networking
description: >-
  Mastodon is a free, open-source decentralized social network.


  After installing, open the app to set up your Mastodon instance through the web UI. You will be guided through creating an admin account and configuring your server's domain, email settings, and other options.


  The initial setup wizard handles database migration, secret generation, and admin account creation. Plan for ~2-3 GB of RAM usage across all services (web, streaming, sidekiq, PostgreSQL, Redis).


  Your data is stored persistently and survives app restarts and updates.

