manifestVersion: 1.1
id: mastodon
category: social
name: Mastodon
version: "4.4.1"
tagline: Self-hosted, decentralized social networking
description: >-
  Mastodon is a free, open-source social network server built on the ActivityPub
  protocol. It lets you run your own social media instance while keeping control
  of your data, moderation, and community rules.


  This Umbrel app packages the official Mastodon server with PostgreSQL, Redis,
  Sidekiq background workers, and the streaming service. It is suitable for a
  personal or small-community instance on your Umbrel.


  Note: Federation with the wider Fediverse requires your instance to be
  reachable from the public internet on a stable domain with HTTPS. For local
  testing and private use, Mastodon will work from your Umbrel's local address.
developer: Mastodon gGmbH
website: https://joinmastodon.org
dependencies: []
repo: https://github.com/mastodon/mastodon
support: https://github.com/mastodon/mastodon/discussions
port: 8078
gallery: []
path: ""
defaultUsername: "umbrel@umbrel.local"
deterministicPassword: true
submitter: poofeth
submission: https://github.com/getumbrel/umbrel-apps/pull/5657
releaseNotes: ""
