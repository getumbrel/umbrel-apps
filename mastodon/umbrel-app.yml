id: mastodon
category: social
name: Mastodon
version: "4.5.9"
tagline: Self-hosted social networking
description: >-
  Mastodon is a decentralized social networking server that uses the ActivityPub
  protocol. It lets you host your own community, publish posts, follow accounts
  on other compatible servers, and keep control of your social data.

  This Umbrel package runs the official Mastodon server with PostgreSQL, Redis,
  Sidekiq, and the streaming service. Federation and reliable email delivery
  require a public domain and SMTP configuration outside the default local
  Umbrel install.
