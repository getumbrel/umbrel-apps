version: "3.7"

x-mastodon-env: &mastodon-env
  env_file:
    - ${APP_DATA_DIR}/data/mastodon.env
  environment:
    LOCAL_DOMAIN: ${DEVICE_DOMAIN_NAME}
    WEB_DOMAIN: ${DEVICE_DOMAIN_NAME}:${APP_MASTODON_PORT}
    REDIS_HOST: mastodon_redis_1
    REDIS_PORT: 6379
    DB_HOST: mastodon_db_1
    DB_PORT: 5432
    DB_NAME: mastodon
    DB_USER: mastodon
    DB_PASS: mastodon
    ES_ENABLED: "false"
    SMTP_SERVER: ""
    SMTP_PORT: 587
    SMTP_FROM_ADDRESS: notifications@${DEVICE_DOMAIN_NAME}
    RAILS_ENV: production
    NODE_ENV: production
    RAILS_SERVE_STATIC_FILES: "true"
    BIND: 0.0.0.0

services:
  app_proxy:
    environment:
      APP_HOST: mastodon_nginx_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  nginx:
    image: nginx:1.27@sha256:124b44bfc9ccd1f3cedf4b592d4d1e8bddb78b51ec2ed5056c52d3692baebc19
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - streaming

  web:
    image: ghcr.io/mastodon/mastodon:v4.4.1@sha256:c803d839e5a65e84d848308bbf9ae75de6096b57f385082b5bdea3355975f192
    user: "991:991"
    restart: on-failure
    stop_grace_period: 1m
    command: bundle exec puma -C config/puma.rb
    <<: *mastodon-env
    volumes:
      - ${APP_DATA_DIR}/data/public/system:/mastodon/public/system
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  streaming:
    image: ghcr.io/mastodon/mastodon-streaming:v4.4.1@sha256:e4b0565e05cf95e6fc1f3b1dd9fba3cd9fa6d1257c3cc362645da2f14a154cc0
    user: "991:991"
    restart: on-failure
    stop_grace_period: 1m
    command: node ./streaming/index.js
    <<: *mastodon-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.4.1@sha256:c803d839e5a65e84d848308bbf9ae75de6096b57f385082b5bdea3355975f192
    user: "991:991"
    restart: on-failure
    stop_grace_period: 1m
    command: bundle exec sidekiq
    <<: *mastodon-env
    volumes:
      - ${APP_DATA_DIR}/data/public/system:/mastodon/public/system
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:17.9-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_USER: mastodon
      POSTGRES_PASSWORD: mastodon
      POSTGRES_DB: mastodon
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "mastodon", "-U", "mastodon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4.2-alpine@sha256:e1b6db24cb4fdd89f4bc9be09f671ea3bec92fbd7042554f76c34aa2be9b59ad
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
