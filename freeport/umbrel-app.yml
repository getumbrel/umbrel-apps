manifestVersion: 1
id: freeport
category: networking
name: Freeport
version: "0.7.0"
tagline: Self-hosted Freeport — the P2P marketplace, on your own box
description: >-
  Run all of Freeport, the decentralized peer-to-peer marketplace for rides,
  services, and goods built on Nostr — from your own Umbrel. One app, four
  jobs:


  1. The Freeport web app itself, served from your box: open the app and
  you're on Freeport with no app store and no third-party hosting.


  2. A read-only Model Context Protocol (MCP) endpoint that lets AI agents
  search Freeport's Nostr events — ride/service/goods requests and offers,
  reputation, and profiles — filtered by kind, tag, and geohash radius.


  3. A push notifier that watches the relays and pushes new matching intents
  and direct messages to subscribers over Web Push (browsers / PWA) and Expo
  Push (native iOS/Android).


  4. An embedded NIP-01 Nostr relay (port 1989) that nearby users can add to
  their relay list. It is ephemeral / in-memory: events are held while the app
  runs and are cleared when the app restarts — it's a low-latency local hop for
  your community's live traffic, not durable archival storage. Pair it with
  public relays (Freeport uses several by default) so nothing is lost.


  Running your own node makes your community independent of any central server.
  VAPID keys are generated and persisted automatically on first run.


  First-run setup: the bundled web app ships with Freeport's public defaults, so
  it works immediately. To route it through THIS box instead, open the app and,
  in Settings, set the notification service URL to your Umbrel's address and add
  your embedded relay (ws://<your-umbrel-host>:1989) to the relay list. The MCP
  endpoint for AI agents is at http://<your-umbrel-host>:1988/mcp.
