manifestVersion: 1
id: freeport-nostr-mcp
category: networking
name: Freeport Nostr MCP
version: "0.6.2"
tagline: Self-hosted Nostr MCP endpoint + push notifier for Freeport
description: >-
  Run your own node for Freeport, the decentralized peer-to-peer marketplace
  for rides, services, and goods built on Nostr.


  This app is two things in one process:


  1. A read-only Model Context Protocol (MCP) endpoint that lets AI agents
  search Freeport's Nostr events — ride/service/goods requests and offers,
  reputation, and profiles — filtered by kind, tag, and geohash radius.


  2. A push notifier that watches the relays and pushes new matching intents
  and direct messages to subscribers over Web Push (browsers / PWA) and Expo
  Push (native iOS/Android).


  Running your own makes you an independent MCP host and notification host for
  the network — no central server required. VAPID keys are generated and
  persisted automatically on first run.
