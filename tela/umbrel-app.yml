manifestVersion: 1
id: tela
category: files
name: tela
version: "0.9.0"
tagline: Markdown-native team wiki with live collaboration and first-class AI agents
description: >-
  tela is a self-hostable, markdown-native team wiki. The backend is Go +
  PostgreSQL; the editor is a React app with live Yjs collaborative editing, so
  teammates write together in real time. Every page is canonical markdown.


  Open the app after install and complete the one-time /setup wizard to create
  your admin account — no SSH, CLI, or config files needed.


  Highlights:


  - Real-time collaborative markdown editor with a rich block palette
  (callouts, tabs, collapsibles, diagrams, decks).

  - Ranked full-text search built in, plus optional semantic search and
  "ask your docs" when you point tela at an embedding/LLM endpoint.

  - A built-in MCP server so AI agents are first-class editors and readers of
  your wiki, alongside Atlas agent workflows.

  - WebDAV sync to edit pages as files from your machine, public/blog spaces,
  Slidev decks, and PDF export.

  - Email-first accounts with self-registration, granular space permissions,
  and SSO options.


  All data stays on your server in PostgreSQL. tela is open source (AGPL-3.0).
