manifestVersion: 1
id: rotki
category: finance
name: rotki
version: "1.43.1"
tagline: Portfolio tracking, analytics, accounting and tax reporting
description: >-
  rotki is an open source portfolio tracking, analytics, accounting and tax reporting tool that protects your privacy. 
  

  The mission of rotki is to bring transparency into the crypto and financial sectors through the use of open source. 
  

  Most importantly unlike virtually every other competing service which consists of closed source SaaS onto which you are forced to hand over all your financial data, with rotki your data is stored encrypted locally in your computer. 
  

  It enables you to take ownership of your financial data!
  
  
  ⚠️ IMPORTANT ⚠️ Rotki is meant to be accessed locally. Hosting it on a publicly accessible machine should be avoided at all cost, unless you know what you're doing!
backupIgnore:
  - data/logs/*
developer: Rotki
website: https://rotki.com
dependencies: []
repo: https://github.com/rotki/rotki
support: https://github.com/rotki/rotki/issues
port: 8084
releaseNotes: >-
  This patch release improves rotki's resilience for ETH staking and pricing data.


  Key highlights include:
    - Beaconcha.in data is handled more gracefully when the service is unavailable or no API key is configured
    - CryptoCompare is no longer used as a default free price source when no API key is set, while existing cached prices are preserved
    - Custom CSV imports now report unsupported exchange assets as row errors instead of crashing the whole import
    - Fixed Hyperliquid history pagination and several Monad, Hyperliquid, 1inch, Giveth, and Zerox decoding/display issues
    - Improved endpoint editing, date/time keyboard entry, and CSV export reliability


  Full release notes are found at https://github.com/rotki/rotki/releases/tag/v1.43.1
