version: '3.7'
services:
  app_proxy:
    environment:
      APP_HOST: tunnelsats_tunnelsats_1
      APP_PORT: 9739
      PROXY_AUTH_ADD: "false" # Tunnelsats has its own admin checks/dashboard
  
  tunnelsats:
    image: tunnelsats/ts-umbrel-app:v3.1.0@sha256:094e88c60b84deb93dabb08f21d8ad3f2de6a9af73cb2503e1486a2d73dc654d
    container_name: tunnelsats
    restart: on-failure
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${APP_DATA_DIR}/data:/data
      # Try to mount LN config directories to automate config insertion (graceful degradation if missing)
      - ${APP_DATA_DIR}/../lightning/data/lnd:/lightning-data/lnd
      - ${APP_DATA_DIR}/../core-lightning/data/lightningd:/lightning-data/cln
      # Required to interrogate container IPs dynamically (Umbrel 1.6+)
      - /var/run/docker.sock:/var/run/docker.sock:ro
