version: '3.7'
services:
  app_proxy:
    environment:
      APP_HOST: tunnelsats_tunnelsats_1
      APP_PORT: 9739

  tunnelsats:
    image: tunnelsats/ts-umbrel-app:v3.1.0@sha256:929b99a9ae08b2ca5b2c0a56c20cee0d6c94ce3a850ea7be3f31c25228e3b07a
    restart: on-failure
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${APP_DATA_DIR}/data:/data
      # Try to mount LN config directories to automate config insertion (graceful degradation if missing)
      - ${APP_DATA_DIR}/../lightning/data/lnd:/lightning-data/lnd
      - ${APP_DATA_DIR}/../core-lightning/data/lightningd:/lightning-data/cln
      # Required to interrogate container IPs dynamically (Umbrel 1.6+)
      - /var/run/docker.sock:/var/run/docker.sock:ro
