defaultPassword: ""
releaseNotes: >-
  Key changes in this release:
    - Fixed Electron app getting stuck on the splash screen in hwibridge mode
    - Security updates including bumps to h11, form-data, and other high-severity dependencies
    - Migrated CI/CD pipeline to GitHub Actions, retiring Cirrus and GitLab
    - Upgraded Node.js from version 12 to 18 and migrated CI images to GHCR
    - Upgraded Electron from 30.x to 39.x and PyInstaller from 5.x to 6.x
    - Various dependency updates and security fixes


  Full release notes and detailed information is available at https://github.com/cryptoadvance/specter-desktop/releases
