version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: specter-desktop_web_1
      APP_PORT: 25441

  web:
    image: ghcr.io/cryptoadvance/specter-desktop:v2.1.8@sha256:dd0118eb31c7ab62ead64d65696eaef51d330add389dbf67abc7dff649ee9bcd
    stop_signal: SIGINT
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command:
      - --host=0.0.0.0
      - --specter-data-folder=/data
    environment:
      BTC_RPC_USER: $APP_BITCOIN_RPC_USER
      BTC_RPC_PASSWORD: $APP_BITCOIN_RPC_PASS
      BTC_RPC_HOST: $APP_BITCOIN_NODE_IP
      BTC_RPC_PORT: $APP_BITCOIN_RPC_PORT
      BTC_RPC_PROTOCOL: http
