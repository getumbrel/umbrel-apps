version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: downtify_downtify_1
      APP_PORT: 8000

  downtify:
    image: ghcr.io/henriquesebastiao/downtify:2.9.0@sha256:c2b0b5921d1d73e9535ef43451fa19eed2da53a23697f7824511963aa69bf9e1
    stop_grace_period: 1m
    volumes:
      - ${UMBREL_ROOT}/data/storage/downloads/downtify:/downloads
      - ${APP_DATA_DIR}/data:/data
