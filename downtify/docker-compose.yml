version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: downtify_downtify_1
      APP_PORT: 8000

  downtify:
    image: ghcr.io/henriquesebastiao/downtify:2.9.1@sha256:4b03e99a179e9e501a5785d3a9ab74a5bac0d077d62ee1f676d4855b788cd341
    stop_grace_period: 1m
    volumes:
      - ${UMBREL_ROOT}/data/storage/downloads/downtify:/downloads
      - ${APP_DATA_DIR}/data:/data
