manifestVersion: 1
id: blackhole-axe-store-singularity-pool
category: bitcoin
name: SINGULARITY Pool
version: "1.6.11"
tagline: Zero-fee solo Bitcoin mining pool
icon: https://raw.githubusercontent.com/BlackHole-Axe/singularity-pool/main/assets/icon.svg
description: >-
  Self-hosted solo Bitcoin mining pool for Umbrel. Connects automatically to
  your Bitcoin Core node — no manual RPC configuration required.


  Zero fees: if you find a block, 100% of the reward goes to your wallet.
  Each miner can use its own Bitcoin address as the Stratum username.


  Connect your ASICs:
  URL: stratum+tcp://umbrel.local:2038
  Username: your Bitcoin address (bc1q...)
  Password: x
developer: BlackHole-Axe
website: https://github.com/BlackHole-Axe/singularity-pool
dependencies:
  - bitcoin
repo: https://github.com/BlackHole-Axe/singularity-pool
support: https://github.com/BlackHole-Axe/singularity-pool/issues
port: 3337
gallery:
  - https://raw.githubusercontent.com/BlackHole-Axe/singularity-pool/main/assets/gallery-1.png
  - https://raw.githubusercontent.com/BlackHole-Axe/singularity-pool/main/assets/gallery-2.png
  - https://raw.githubusercontent.com/BlackHole-Axe/singularity-pool/main/assets/gallery-3.png
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: BlackHole-Axe
submission: ""
releaseNotes: >-
  Unlimited SSE dashboard clients (local home pool). Mobile poll fallback,
  SSE heartbeat, ASCII header, gallery 1440x900.
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "5s"
    endpoint: "pool:3337/widget-api/stats"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Hash Rate"
          text: "825 TH/s"
        - title: "Miners"
          text: "17"
        - title: "Blocks Found"
          text: "0"
        - title: "Best Share"
          text: "868 K"
