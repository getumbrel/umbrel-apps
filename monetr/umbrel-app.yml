releaseNotes: >-
  ⚠️ This release includes a security fix for a potential server-side request forgery (SSRF) vulnerability in the Lunch Flow onboarding process, which could have allowed GET requests to be made to arbitrary URLs. Updating is recommended.


  Bug fixes in this release:
    - Fixed a potential SSRF vulnerability during Lunch Flow setup where requests could be made to arbitrary URLs
    - Fixed an issue where transactions could be held for too long
    - Fixed TOTP recovery code generation
    - Fixed filesystem storage permissions for stored files and generated certificates
    - Fixed a Plaid webhook timestamp age check
    - Fixed group membership of the monetr user inside the container
    - Added hard timeouts at the listener level for improved reliability
    - Moved security headers to be returned on all requests


  Full release notes can be found at https://github.com/monetr/monetr/releases
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
