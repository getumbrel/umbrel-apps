releaseNotes: >-
  Tightened security boundaries across transcripts, sandbox binds, inherited host
  environment, MCP stdio, browser output, Codex HTTP access, Discord moderation,
  Teams group actions, and approval timeouts.


  Improved Telegram and iMessage reliability, including safer topic routing,
  durable dispatch dedupe, better restart recovery, and stronger delivery state
  handling.


  Added OpenRouter OAuth onboarding and Claude Fable 5 adaptive thinking, while
  improving browser/MCP connectivity, existing-session CDP support, and provider
  recovery behavior.


  Reduced Control UI startup and first-reply latency with cached model metadata,
  lazy slash-command loading, and clearer slow-reply diagnostics.


  Fixed agent/session recovery, cron cancellation and no-deliver warnings,
  package Gateway restarts, plugin convergence repair, provider/Codex behavior,
  and channel delivery edge cases.


  Full release notes can be found at https://github.com/openclaw/openclaw/releases/tag/v2026.6.6
