releaseNotes: >-
  What's new in OpenClaw (v2026.5.3 → v2026.5.6):
    - ⚠️ Fixed a critical issue where the 2026.5.5 automatic repair incorrectly rewrote valid Codex OAuth routes, potentially breaking GPT setups — if affected, run `openclaw models set openai-codex/gpt-5.5` to recover
    - Fixed plugin requests failing due to symbol metadata being passed into native fetch headers
    - Fixed timed-out web fetch requests leaving Gateway tool lanes active instead of returning errors
    - Fixed debug proxy fetch replays failing due to symbol metadata in header objects
    - Improved Google Meet voice calls with Twilio dial-in, paced audio streaming, and snappier agent responses
    - Improved gateway startup performance by deferring non-essential sidecars until after readiness
    - Improved plugin install, update, and repair reliability for official external plugins
    - Improved Slack, Discord, Telegram, Feishu, Matrix, and Mattermost delivery and streaming
    - Improved Control UI responsiveness, session management, and chat history display
    - Fixed many gateway, plugin, provider, memory, channel, and security issues across all versions
    - And much more. Full details at https://github.com/openclaw/openclaw/releases
