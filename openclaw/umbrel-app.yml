releaseNotes: >-
  What's new in OpenClaw (v2026.3.8 → v2026.3.12):
    - Refreshed gateway dashboard with modular views, command palette, mobile bottom tabs, and richer chat tools
    - OpenAI GPT-5.4 and Anthropic Claude fast mode support with configurable session-level toggles
    - Ollama, vLLM, and SGLang moved to a more modular provider-plugin architecture
    - New sessions_yield tool so orchestrators can end a turn immediately and carry a follow-up into the next
    - Slack agents can now send Block Kit messages through standard outbound delivery
    - Numerous Telegram, Mattermost, and ACP reliability and delivery fixes
    - Memory improvements including post-compaction session reindexing and multimodal indexing groundwork
    - 🚨 Multiple security fixes including WebSocket origin validation, exec approval hardening, device pairing token scoping, plugin auto-load restrictions, and more


  Full details at https://github.com/openclaw/openclaw/releases
