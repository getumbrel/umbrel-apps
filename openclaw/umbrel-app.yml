releaseNotes: >-
  What's new in OpenClaw (v2026.5.7 → v2026.5.12):
    - Leaner installs by moving WhatsApp, Slack, Bedrock, Anthropic Vertex, and related dependency cones out of the core runtime
    - More resilient Telegram polling, local spooling, group-media handling, and formatted reply delivery
    - Smoother Codex/OpenAI paths with auth-profile-backed media tools, MCP projection, context rotation, and runtime fallback improvements
    - More reliable plugin installs and updates with pnpm 11 support, peer-dependency preservation, safer runtime scans, and source/git install fixes
    - Security and provenance hardening across Gateway, browser, Slack, node pairing, sandbox, and transcript handling
    - Improved Control UI/WebChat/TUI behavior, rich-only replies, session history, and streaming auto-scroll
    - And much more. Full details at https://github.com/openclaw/openclaw/releases
