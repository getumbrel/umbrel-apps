releaseNotes: >-
  What's new in OpenClaw (v2026.4.14 → v2026.4.25):
    - Voice replies upgraded with /tts latest, chat-scoped auto-TTS controls, TTS personas, and per-agent/per-account voice overrides
    - New bundled TTS providers: Azure Speech, Xiaomi MiMo, Local CLI, Inworld, Volcengine, and ElevenLabs v3
    - Google Meet added as a bundled participant plugin with personal Google auth, Chrome/Twilio realtime sessions, and attendance/artifact exports
    - Control UI gains PWA install support and Web Push notifications for Gateway chat
    - Browser automation improvements: coordinate clicks, longer action budgets, per-profile headless overrides, and safer tab handling
    - New xAI provider support for image generation, text-to-speech, and speech-to-text
    - DeepSeek V4 Flash and V4 Pro added to the bundled catalog, with V4 Flash as the new onboarding default
    - OpenTelemetry telemetry coverage expanded across model calls, token usage, tool loops, and more
    - Plugin startup significantly faster via cold persisted registry, reducing broad manifest scans
    - Cron jobs interrupted by a gateway restart now record as failed instead of silently disappearing or duplicating work
    - Fixed duplicate message delivery after WhatsApp reconnect watchdog fires mid-delivery
    - Fixed browser SSRF policy blocking sandboxed browser navigation
    - Fixed Telegram polling stall watchdog not recovering after transport rebuild
    - Fixed session daily/idle resets being blocked by heartbeat and cron bookkeeping
    - Fixed streamed TTS directives leaking as visible text before channel delivery
    - Fixed Feishu streaming cards producing duplicate output on tool-heavy replies
    - Fixed Codex thinking level mapping for modern GPT-5.x models
    - Fixed WhatsApp linked-device watchdog disconnecting quiet but healthy sessions
    - Fixed plugin runtime dependency installs writing to wrong directories on Linux
    - Multiple additional security hardening, stability, and compatibility fixes across channels, agents, and providers
    - And much more. Full details at https://github.com/openclaw/openclaw/releases
submitter: Umbrel
