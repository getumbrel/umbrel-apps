releaseNotes: >-
  Agent and Codex runtime recovery is steadier, with better workspace separation,
  safer cleanup around live OpenClaw locks, and fewer helper failures disrupting
  shared runtime state.


  Chat/channel delivery is more reliable across WhatsApp, Telegram, Slack,
  Discord, Matrix, iMessage, Google Chat, and Microsoft Teams flows, with safer
  session identity and approval handling.


  Onboarding, mobile/chat surfaces, provider discovery, browser automation,
  Cron/automation, and Gateway performance receive reliability and validation
  improvements.


  Provider and media coverage expands with Claude Opus 4.8, NVIDIA model
  catalogs, MiniMax streaming music, Fal Krea image schemas, encrypted PDF
  extraction, and GitHub Copilot agent runtime support.


  Full release notes can be found at https://github.com/openclaw/openclaw/releases/tag/v2026.5.28
