releaseNotes: >-
  🚨 Security fix: A cross-site WebSocket hijacking vulnerability has been patched that could have allowed untrusted origins to gain admin access in trusted-proxy mode. Updating is strongly recommended.


  What's new in OpenClaw (v2026.3.8 → v2026.3.11):
    - Critical WebSocket security fix enforcing browser origin validation for all connections
    - First-class Ollama setup with Local or Cloud + Local modes and curated model suggestions
    - New OpenCode Go provider with shared key setup for both OpenCode profiles
    - Multimodal image and audio indexing for memory search using Gemini embeddings
    - Hunter Alpha and Healer Alpha free stealth models added via OpenRouter
    - iOS home canvas redesigned with live agent overview and docked toolbar
    - macOS chat model picker with persistent thinking-level selections
    - ACP spawned sessions can now resume existing conversations instead of always starting fresh
    - Discord auto-created thread archiving duration is now configurable
    - Cron jobs can no longer send ad hoc notifications outside their delivery channel (breaking change — run `openclaw doctor --fix` to migrate)
    - Numerous fixes for Telegram, Feishu, Discord, Mattermost, MS Teams, Signal, and Matrix reliability
    - Security hardening across sandbox writes, secret files, archive extraction, plugin routes, and session auth
    - And much more. Full details at https://github.com/openclaw/openclaw/releases
submitter: Umbrel
