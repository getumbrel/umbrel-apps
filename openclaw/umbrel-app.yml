releaseNotes: >-
  What's new in OpenClaw (v2026.4.29 → v2026.5.3):
    - Added new bundled file-transfer plugin for binary file operations between paired nodes
    - Added NVIDIA provider support with API-key onboarding and model catalog
    - Added opt-in follow-up commitments for heartbeat-delivered reminders
    - Added people-aware memory wiki with person cards, relationship graphs, and provenance views
    - Added per-conversation Active Memory filters and partial recall on timeout
    - Added WhatsApp Channel and Newsletter outbound message targets
    - Added streaming progress drafts across Discord, Telegram, Matrix, Slack, and Microsoft Teams
    - Improved gateway startup performance with lazy-loading of plugin and runtime discovery
    - Improved plugin install, update, and repair reliability for externalized official plugins
    - Improved Slack, Discord, Telegram, Feishu, Matrix, and Microsoft Teams delivery and recovery
    - Improved web search provider discovery and configuration
    - Fixed many gateway, plugin, provider, Control UI, memory, channel, and security issues
    - And much more. Full details at https://github.com/openclaw/openclaw/releases
