releaseNotes: >-
  Improved delivery reliability across Telegram, WhatsApp, Discord, Matrix,
  Mattermost, Google Chat, iMessage, and other channels, including fewer
  misplaced replies, stuck sends, and reconnect-related message gaps.


  Improved provider and model recovery, including model setup, plugin-aware
  model selection, fallback handling, and clearer request logs.


  Fixed several cron, tool, and automation flows so scheduled jobs, long-running
  commands, document handling, and browser snapshots behave more reliably.


  Improved setup and plugin reliability, including bundled skill installation,
  plugin verification, package installs, and safer admin/doctor guidance.


  Full release notes can be found at https://github.com/openclaw/openclaw/releases/tag/v2026.6.11
