releaseNotes: >-
  Improved Telegram delivery with richer HTML/Markdown output, safer table
  rendering, better progress previews, preserved command output, and more
  reliable mention and handler routing.


  Made agent recovery more dependable across retries, interrupted turns,
  terminal outcomes, compaction, session history repair, and reply
  reconciliation.


  Added standalone official provider plugins, StepFun provider support from npm
  and ClawHub, Codex Hosted Search, automatic Codex plugin approvals, GPT-5.3
  Spark OAuth routing, and remote-node execution for Codex.


  Improved the Control UI and clients with a session workspace rail, plugin
  health status, compact cron lists, iOS Watch controls, and Android chat
  context.


  Hardened security, privacy, storage, and updates with stronger secret
  redaction, internal session protection, open-DM tool exposure checks, plugin
  ownership checks, SQLite/network-filesystem fixes, and safer update recovery.


  Full release notes can be found at https://github.com/openclaw/openclaw/releases/tag/v2026.6.9
