manifestVersion: 1
id: sure
name: Sure
tagline: The personal finance app for everyone
category: finance
version: "0.6.9"
description: >-
  Take full control of your money with Sure, the all-in-one personal finance app built for every stage of life. Link your bank accounts, stocks, crypto, and credit cards from over 10,000 institutions, or add them manually via CSV import. Everything is visualized in one place, so you always know exactly where you stand.
  
  
  Managing transactions has never been easier. Create and edit income, expenses, and transfers with custom categories, merchants, and tags. Set up automation rules to categorize spending automatically, and use powerful filters to find exactly what you need in seconds.

  
  Budgeting is simple and flexible. Set spending limits by category, monitor overages, compare trends over time, and use smart allocations to make smarter financial decisions every month.
  
  
  Sure also comes with a built-in AI assistant that can analyze your finances, forecast trends, find spending patterns, and answer any question about your money fast.
  
  
  Built on a foundation of radical transparency, Sure is fully open-source. You can review the code, contribute to its development, or even self-host it for complete control. Your data is protected with strong encryption and secure authentication, because your financial privacy matters.
developer: Sure Finances
