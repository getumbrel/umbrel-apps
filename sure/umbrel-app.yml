category: finance
tagline: Self-hosted personal finance and wealth management
description: >-
  Sure is a comprehensive self-hosted personal finance application that helps
  you track accounts, monitor investments, and analyze your overall financial
  situation. Originally forked from Maybe Finance, Sure is now community-maintained
  with active development.


  Features include investment portfolio tracking, transaction management with
  CSV/QIF imports, budget planning, AI-powered financial advisor, split
  transactions, privacy mode, and multi-currency support.


  Take control of your finances with complete data ownership and privacy.
