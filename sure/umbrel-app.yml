releaseNotes: >-
  This release comes with multiple new features and improvements:
    - Family Sharing — control what different members of your group can see, edit, or access
    - Quick Categorize Wizard — a fast, keyboard-friendly way to categorize transactions and create rules in bulk
    - Split Transactions — split a single transaction into multiple parts with different categories and amounts
    - Privacy Mode — a blur toggle to hide sensitive financial data across the entire app
    - Budget rollover — copy budget allocations from the previous month
    - QIF (Quicken Interchange Format) import support
    - File attachments for transactions
    - Duplicate transaction button
    - Add transaction fees to trades and record dividends/interest as trades
    - Binance and Sophtron provider integrations
    - CoinStats DeFi and exchange portfolio sync
    - IPv6 support
    - Currency management for families with multiple currencies
    - Budget page split into All, Over Budget, and On Track tabs
    - Appearance setting for a 2-column layout
    - Improved SimpleFIN setup UX and account relinking
    - Security fix: sanitized exception messages in API responses


  Full release notes can be found at https://github.com/we-promise/sure/releases
