manifestVersion: 1.1
id: sage-router
name: Sage Router
tagline: Intelligent multi-provider AI router with OpenClaw Codex OAuth
category: ai
version: "1.0.3"
port: 8790
description: >-
  Sage Router is a dynamic multi-provider AI router that discovers available
  LLM providers and routes requests intelligently based on intent, model
  capabilities, cost, and health.


  OpenClaw Codex OAuth: connects directly to chatgpt.com/backend-api/codex
  using the same OpenAI OAuth token stored in your OpenClaw auth-profiles.
  No gateway subprocess hop, no stale tokens.


  Auto-discovers providers from your OpenClaw auth profiles, supporting
  OpenAI, Anthropic (via Dario), Google, OpenRouter, Ollama (local + cloud),
  NVIDIA NIM, GitHub Copilot, Darkbloom, and more.


  Features:
  - Intent-aware routing (code, frontier, eco, local, agentic)
  - OpenAI Chat Completions + Anthropic Messages + Google Generative AI bridges
  - Streaming SSE for chat and code completions
  - Built-in dashboard with provider health, latency, and usage analytics
  - Per-tenant API keys with subscription tiers (free/lite/pro/max/metered)
  - Stripe billing integration
  - Tool/function calling with Codex Responses API schema translation
