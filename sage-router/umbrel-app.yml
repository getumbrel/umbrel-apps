releaseNotes: >-
  Initial Umbrel Community App Store release.


  - OpenClaw Codex OAuth routes directly to chatgpt.com/backend-api/codex
    using the OpenAI OAuth token from auth-profiles (no gateway subprocess)
  - Auto-discovers providers from OpenClaw auth-profiles.json
  - Tool/function calling support: translates Chat Completions tool schema
    to Responses API format and parses function_call output items
  - Built-in dashboard at port 8788 with provider health, latency, and
    live routing visualization
  - Streaming SSE for chat and code completions
  - Subscription/billing integration via Stripe (free/lite/pro/max/metered)
  - Dario proxy for Claude/Anthropic routing (autostartable on first request)
  - OpenRouter free-tier preferred by default
  - Ollama Cloud catalog auto-discovery
dependencies: []
