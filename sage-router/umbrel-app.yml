id: sage-router
name: Sage Router
tagline: Intelligent multi-provider AI router
category: ai
version: "1.0.4"
port: 8790
description: >-
  Sage Router is a dynamic multi-provider AI router that discovers available
  LLM providers and routes requests intelligently based on intent, model
  capabilities, cost, and health.


  On first install, the app seeds its own app data with a provider template and
  a `/config/SETUP.md` guide. The dashboard includes a built-in setup flow for
  adding OpenAI-compatible, Anthropic, Google Gemini, Ollama, or Codex
  credentials. Credentials and imported auth JSON are written only to Sage
  Router's own app data under `/config`.


  Sage Router is harness and provider agnostic. It can optionally discover a
  local Ollama service on the Umbrel host at port 11434, and it can import
  compatible provider config or Codex auth JSON into its own app data. It does
  not mount another app's private state and does not require OpenClaw or Ollama
  for authentication.


  As shipped, cloud and quota-bound providers such as Ollama Cloud,
  Anthropic/Dario, OpenRouter, NVIDIA NIM, Darkbloom, and Cyber-specific Ollama
  are disabled until the user adds healthy credentials or an explicit
  app-to-app export contract.


  Features:
  - Intent-aware routing (code, frontier, eco, local, agentic)
  - OpenAI Chat Completions + Anthropic Messages + Google Generative AI bridges
  - Streaming SSE for chat and code completions
  - Built-in dashboard with provider health, latency, and usage analytics
  - Optional client API-key enforcement via `SAGE_ROUTER_CLIENT_AUTH_REQUIRED`
  - Tool/function calling with Codex Responses API schema translation
