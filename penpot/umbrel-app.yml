name: Penpot
version: "2.16.0"
tagline: Design and prototyping platform
description: >-
  Penpot is a pioneering open-source platform for design and prototyping, tailored specifically for product teams.
  Unconstrained by operating systems, Penpot utilizes the flexibility of web-based platforms and the interoperability
  of open standards, specifically SVG. Penpot invites designers all over the world to fall in love with open source
  while getting developers excited about the design process in return.
releaseNotes: >-
  This update adds a beta WebGL rendering preference and expands design token support with token selection for numeric fields, linked-library token imports, token group management, and clearer token states.

  It also adds WOFF2 custom font support, font downloads, Find & Replace improvements, more workspace/editor actions, and fixes for WebGL text editing, LDAP schema migration, MCP scaling, and token handling.

  Full release notes can be found at https://github.com/penpot/penpot/releases/tag/2.16.0
