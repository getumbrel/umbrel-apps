manifestVersion: 1
id: penpot
category: developer
name: Penpot
version: "2.14.2"
tagline: Design and prototyping platform
description: >-
  Penpot is a pioneering open-source platform for design and prototyping, tailored specifically for product teams.
  Unconstrained by operating systems, Penpot utilizes the flexibility of web-based platforms and the interoperability
  of open standards, specifically SVG. Penpot invites designers all over the world to fall in love with open source
  while getting developers excited about the design process in return.
releaseNotes: >-
  This update includes new features and bug fixes:
    - Protection against stale JS asset cache to force reload on version mismatch
    - Normalized newsletter opt-in across different registration flows
    - Fixed PathData corruption in WASM and CLJS path handling
    - Fixed corrupted path segments being handled gracefully instead of crashing
    - Fixed non-integer row/column values in grid cell position inputs
    - Fixed infinite recursion when extracting thumbnail frame IDs
    - Fixed thumbnail frame recursion overflow
    - Fixed vector index out of bounds in viewer zoom-to-fit/fill
    - Fixed delete undo failing when sibling order was missing
    - Fixed keyboard navigation error in numeric input token dropdown


  Full release notes are found at https://github.com/penpot/penpot/releases
