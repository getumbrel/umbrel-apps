name: Penpot
version: "2.14.3"
tagline: Design and prototyping platform
description: >-
  Penpot is a pioneering open-source platform for design and prototyping, tailored specifically for product teams.
  Unconstrained by operating systems, Penpot utilizes the flexibility of web-based platforms and the interoperability
  of open standards, specifically SVG. Penpot invites designers all over the world to fall in love with open source
  while getting developers excited about the design process in return.
releaseNotes: >-
  This update includes new features and bug fixes:
    - Added webp export format support
    - Improved React portal rendering using shared singleton containers to reduce DOM growth
    - Fixed component becoming "broken" after switching variants
    - Fixed dashboard navigation tabs overlapping with project content when scrolling
    - Fixed text editor focus issues
    - Fixed highlight on frames after renaming
    - Fixed path drawing preview and PathData coordinate handling
    - Fixed error when resolving tokens interactively
    - Fixed stack overflow caused by re-entrant error handling
    - Fixed "Move to" menu incorrectly allowing the same project as target when multiple files are selected
    - Fixed crash when index query parameter is duplicated in URL
    - Fixed incorrect extremity point calculation for line-to path segments


  Full release notes are found at https://github.com/penpot/penpot/releases
