name: Penpot
version: "2.16.1"
tagline: Design and prototyping platform
description: >-
  Penpot is a pioneering open-source platform for design and prototyping, tailored specifically for product teams.
  Unconstrained by operating systems, Penpot utilizes the flexibility of web-based platforms and the interoperability
  of open standards, specifically SVG. Penpot invites designers all over the world to fall in love with open source
  while getting developers excited about the design process in return.
releaseNotes: >-
  This update improves MCP integration with a visible MCP key, connection controls, better Redis channel isolation, and fixes for MCP initialization and status persistence.

  It also batches thumbnail deletion work, improves token/font-field handling, supports comma-separated email pasting in member invites, and filters ignorable browser-extension errors.

  Full release notes can be found at https://github.com/penpot/penpot/releases/tag/2.16.1
