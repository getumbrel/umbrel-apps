id: penpot
category: developer
name: Penpot
version: "2.14.0"
tagline: Design and prototyping platform
description: >-
  Penpot is a pioneering open-source platform for design and prototyping, tailored specifically for product teams.
  Unconstrained by operating systems, Penpot utilizes the flexibility of web-based platforms and the interoperability
  of open standards, specifically SVG. Penpot invites designers all over the world to fall in love with open source
  while getting developers excited about the design process in return.
releaseNotes: >-
  This update includes new features and bug fixes:
    - Access to design tokens in Penpot Plugins
    - Remap references when renaming tokens
    - Tokens panel nested path view
    - Remove tokens path node and bulk remove tokens
    - Improved usability of lock and hide buttons in the layer panel
    - Optimized sidebar performance for deeply nested shapes
    - Fixed prototype connections lost when switching between variants
    - Fixed error message on components not closing automatically
    - Fixed incorrect handling of input values on layout gap and padding inputs
    - Fixed exception on uploading large fonts
    - Fixed boolean operators in menu for boards
    - Fixed viewer being able to update library
    - Fixed remove fill affecting a different element than selected
    - Fixed component becoming broken after variant switch
    - Fixed scroll on color picker


  Full release notes are found at https://github.com/penpot/penpot/releases
