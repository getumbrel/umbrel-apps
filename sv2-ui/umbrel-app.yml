manifestVersion: 1.1
id: sv2-ui
category: bitcoin
name: Stratum V2 UI
version: "0.1.0"
tagline: Setup and monitor Stratum V2 mining
description: >-
  Stratum V2 UI is a setup wizard and monitoring dashboard for running a
  Stratum V2 mining stack on Umbrel. It guides you through pool mining, solo
  mining, and Job Declaration flows where your Bitcoin node can provide custom
  block templates.


  The app starts and manages the required Translator Proxy and optional Job
  Declaration Client containers, helping SV1 miners connect to Stratum V2
  infrastructure. After setup, the dashboard lets you monitor pool connection
  status, total hashrate, active workers, submitted shares, and hashrate history
  from one place.
port: 8077
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: ""
dependencies:
  - bitcoin
developer: "The Stratum V2 Developers"
website: "https://stratumprotocol.org/"
repo: "https://github.com/stratum-mining/sv2-ui"
support: "https://github.com/stratum-mining/sv2-ui/issues"
submitter: "The Stratum V2 Developers"
submission: "https://github.com/getumbrel/umbrel-apps/pull/5721"
