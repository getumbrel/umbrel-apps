name: LibreDB Studio
version: "0.9.44"
tagline: MIT-licensed, AI-powered open source SQL IDE
description: >-
  LibreDB Studio is a MIT-licensed, AI-powered open source SQL IDE that
  connects to PostgreSQL, MySQL, Oracle, SQL Server, SQLite, MongoDB and
  Redis directly from the browser. On first start it creates an initial
  admin account and a regular user account, and stores its own data in a
  local SQLite file, so no external database is required to run it.


  The AI assistant (Gemini, OpenAI, or a local model you provide the key
  for) is optional and stays off unless you configure a provider.
