manifestVersion: 1
id: libredb-studio
category: developer
name: LibreDB Studio
version: "0.9.44"
tagline: Browser-based SQL IDE with an optional AI assistant
description: >-
  LibreDB Studio is a browser-based SQL IDE that connects to PostgreSQL,
  MySQL, Oracle, SQL Server, SQLite, MongoDB and Redis. On first start it
  creates an initial admin account and a regular user account, and stores
  its own data in a local SQLite file, so no external database is required
  to run it.


  An optional AI assistant (Gemini, OpenAI, or a local model you provide
  the key for) can help write and explain queries. It stays off unless you
  configure a provider.
