# Bitcoin Cash Node (node only) for Umbrel
services:
  app_proxy:
    environment:
      APP_HOST: bitcoin-cash-node_web_1
      APP_PORT: 3000

  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    environment:
      HOME: /tmp
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${APP_DATA_DIR}/data/tor:/data
    networks:
      default:
        ipv4_address: ${APP_BITCOIN_CASH_NODE_TOR_IP}

  bitcoind:
    image: mainnet/bitcoin-cash-node:v29.0.0@sha256:5144a579369cbab859119b04c86e4e078cf8ef830a1cb721be96bdc0b7498a35
    user: "1000:1000"
    restart: always
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/bitcoind:/data
    entrypoint: ["bitcoind"]
    command:
      - -datadir=/data
      - -printtoconsole
      - -server=1
      - -listen=1
      - -port=8335
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=bchn
      - -rpcpassword=bchn_local_rpc_pw_2f9c
      - -rpcworkqueue=512
      - -rpcthreads=64
      - -dbcache=512
      - -maxmempool=300
      - -txindex=1
      - -maxconnections=64
      - -zmqpubhashblock=tcp://0.0.0.0:28332
    ports:
      - 8335:8335

  web:
    image: ghcr.io/danhaus93-ops/bchn-dashboard@sha256:cc52e8f34972c5cf0a0e7b02b0cba76d2e14c3f81108eeb68a8a8c0037fc2e04
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data/bitcoind:/nodedata
    depends_on:
      - bitcoind
    environment:
      PORT: 3000
      APP_VERSION: v29.1.5
      TOR_IP: ${APP_BITCOIN_CASH_NODE_TOR_IP}
      RPC_HOST: bitcoind
      RPC_PORT: "8332"
      RPC_USER: bchn
      RPC_PASS: bchn_local_rpc_pw_2f9c
      PUBLIC_HOST: ${DEVICE_DOMAIN_NAME}
