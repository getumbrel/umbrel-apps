manifestVersion: 1
id: bitcoin-cash-node
category: networking
name: Bitcoin Cash Node
version: "29.1.34"
tagline: Run your own Bitcoin Cash full node (BCHN)
description: >-
  Run your own Bitcoin Cash full node powered by Bitcoin Cash Node (BCHN).
  Independently validate every block and transaction without relying on a
  third party.


  Use the included dashboard to follow sync progress, monitor connected peers,
  inspect network and mempool activity, manage storage, and configure Tor
  connectivity.


  This app provides the node and dashboard. Compatible apps running on your
  Umbrel can connect through its RPC and ZMQ interfaces for wallet connectivity
  and solo mining.


  Initial sync downloads the full Bitcoin Cash blockchain and may take some
  time. An SSD is strongly recommended, with NVMe offering the best performance.


  Donations are never expected. If LoneStrike Labs apps are useful to you,
  contributions help keep development going:
  bc1q6k0j7w77xftasgwx7v5nra06rs3v5txk60wgsk
