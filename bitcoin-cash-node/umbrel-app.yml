id: bitcoin-cash-node
category: networking
name: Bitcoin Cash Node
version: "29.1.17"
tagline: Run your own Bitcoin Cash full node (BCHN)
description: >-
  Run Bitcoin Cash on your own terms. Bitcoin Cash Node (BCHN) — the
  professional, miner-friendly BCH full node — validates every block and
  transaction independently and exposes JSON-RPC + ZMQ on your local network.


  This is the node only. For wallet connectivity install Fulcrum (BCH); to
  solo-mine install SoloStrike Cash. Both are in this store and depend on this node.


  First sync downloads the full chain, so use an SSD (NVMe strongly recommended).

  Donations are never expected — but if SoloStrike Labs apps are useful to you, they keep development going: bc1q6k0j7w77xftasgwx7v5nra06rs3v5txk60wgsk
releaseNotes: >-
  Important fix for anyone using Tor. The bundled Tor was three years out of
  date and could no longer connect to the Tor network, which meant onion peers
  silently never worked - and if you selected "All traffic via Tor", your node
  could lose every outbound connection and stop receiving new blocks entirely,
  with nothing on screen to tell you. Tor is updated, "All traffic via Tor" now
  refuses to apply unless Tor is genuinely reachable, and the dashboard shows a
  clear warning if your node stops receiving blocks. If you mine against this
  node, that warning matters: blocks found while the tip is stale are wasted.
