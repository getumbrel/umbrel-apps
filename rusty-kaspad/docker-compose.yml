version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: rusty-kaspad_frontend_1
      APP_PORT: 4321

  frontend:
    image: elldee/kaspa-frontend:v0.4.0@sha256:a419270a224df638d10cef7bc60edd3a930a4a08dda4c14aee1eaaf892a59ef4
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - kaspad

  kaspad:
    image: kaspanet/rusty-kaspad:v1.1.0@sha256:150ffa0c0dcc6497951f9199d1ba3e48c7d91ef958846b28c9fb5045459a2dca
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/app:/app/data
    ports:
      - 16110:16110  # GRPC
      - 16111:16111  # P2P
      - 17110:17110  # WRPC (Borsh)
      - 18110:18110  # WRPC (JSON)
