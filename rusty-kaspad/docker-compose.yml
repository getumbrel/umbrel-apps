version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: rusty-kaspad_frontend_1
      APP_PORT: 4321

  frontend:
    image: elldee/kaspa-frontend:v0.4.1@sha256:a77573dfbc706b632ba24b9087685dc0b44d588c60b5399e2c2df2a19bd38a93
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - kaspad

  kaspad:
    image: kaspanet/rusty-kaspad:v2.0.1@sha256:db36449e2f41cf33ab7c26683ce390cb71bdea9c403eefd2e740a7d5605bcd8b
    restart: on-failure
    stop_grace_period: 3m
    volumes:
      - ${APP_DATA_DIR}/data/app:/app/data
    ports:
      - 16110:16110  # GRPC
      - 16111:16111  # P2P
      - 17110:17110  # WRPC (Borsh)
      - 18110:18110  # WRPC (JSON)
