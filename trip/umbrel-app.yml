submitter: itskovacs
submission: https://github.com/getumbrel/umbrel-apps/pull/3830
releaseNotes: >-
  This update adds bookings to trip days, support for planning without times, a dog-friendly toggle, dedicated link sections, and editing/suggestions for packing lists.

  It also fixes SQLite concurrent read/write handling, translation key issues, failed-restore cleanup, and inconsistent OIDC settings.

  Full release notes can be found at https://github.com/itskovacs/trip/releases/tag/1.45.0
