manifestVersion: 1
id: trip
name: Trip
tagline: Minimalist Map Tracker and Trip Planner
category: files
version: "1.42.0"
port: 8980
description: >-
  🗺️ TRIP is a self-hostable minimalist Map tracker and Trip planner to visualize your points of interest (POI) and organize your next adventure details.


  Core Features:
    - Map and manage POIs on interactive maps
    - Plan multi-day trips with detailed itineraries
    - Collaborate and share with travel companions


  No telemetry. No tracking. No ads. Free, forever.
developer: itskovacs
website: https://itskovacs-trip.netlify.app/
repo: https://github.com/itskovacs/trip
support: https://github.com/itskovacs/trip/issues
submitter: itskovacs
submission: https://github.com/getumbrel/umbrel-apps/pull/3830
releaseNotes: >-
  ⚠️ After updating, no user is admin by default. To grant admin rights, run the following inside the app container: sqlite3 storage/trip.sqlite "UPDATE user SET is_admin = 1 WHERE username = 'your_username'; SELECT changes() as updated;"


  New Features:
    - Admin UI with user management, magic invites for disabled registration, and live configuration updates

  UI/UX Improvements:
    - Added a text and place toggle in trips
    - Removed the BETA UI modal
    - Made links clickable within trip notes
    - Categories with places are now removable

  Bug Fixes:
    - Fixed an issue where pretty print failed in shared trips
    - Fixed model cascade behaviors and completed model refactoring


  Full release notes are found at https://github.com/itskovacs/trip/releases
