manifestVersion: 1
id: trip
name: Trip
tagline: Minimalist Map Tracker and Trip Planner
category: files
version: "1.43.0"
port: 8980
description: >-
  🗺️ TRIP is a self-hostable minimalist Map tracker and Trip planner to visualize your points of interest (POI) and organize your next adventure details.


  Core Features:
    - Map and manage POIs on interactive maps
    - Plan multi-day trips with detailed itineraries
    - Collaborate and share with travel companions


  No telemetry. No tracking. No ads. Free, forever.


  ⚠️ After installing, no user is admin by default. To grant admin rights, run the following inside the app container:

  `apt update && apt install -y sqlite3`

  `sqlite3 storage/trip.sqlite "UPDATE user SET is_admin = 1 WHERE username = 'your_username'; SELECT changes() as updated;"`
developer: itskovacs
website: https://itskovacs-trip.netlify.app/
repo: https://github.com/itskovacs/trip
support: https://github.com/itskovacs/trip/issues
submitter: itskovacs
submission: https://github.com/getumbrel/umbrel-apps/pull/3830
releaseNotes: >-
  New Features:
    - Added full server backups via the admin UI
    - The first registered user is now automatically granted admin rights
    - Orphaned images are automatically removed on startup

  UI/UX Improvements:
    - Unplanned markers are now dimmed when a specific day is highlighted in trips
    - Updated backups styling in settings
    - Unified textarea appearance

  Bug Fixes:
    - Resolved all scrolling issues
    - Fixed printing on iOS and iPadOS


  Full release notes are found at https://github.com/itskovacs/trip/releases
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
