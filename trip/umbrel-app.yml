  This update adds interface translations for English and French.

  The release also introduces an occasional support dialog from the developer. The upstream release notes state that TRIP still has no telemetry, ads, or network interaction.

  Full release notes can be found at https://github.com/itskovacs/trip/releases/tag/1.44.0
