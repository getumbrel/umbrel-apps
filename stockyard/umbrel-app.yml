manifestVersion: 1.1
id: stockyard
category: developer
name: Stockyard
version: "1.1.0"
tagline: 150 self-hosted developer tools in one binary
description: >-
  Stockyard is 150 self-hosted developer tools that each run as a single Go
  binary with embedded SQLite. No external dependencies.


  Tools include bug tracking, CRM, feature flags, uptime monitoring, invoicing,
  webhook testing, secret management, web analytics, link shortening, status
  pages, internal wikis, API testing, error tracking, and 136 more.


  The platform also includes an LLM proxy with 76 middleware modules, 16
  providers, cost tracking, caching, safety filters, and failover routing.


  Every tool installs in under 30 seconds and includes a web dashboard and
  REST API. Individual tools are free. All 150 tools unlock with Complete
  at $29/mo.
developer: Stockyard
