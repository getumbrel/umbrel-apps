version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: stockyard_server_1
      APP_PORT: 4200
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/stockyard-dev/stockyard:latest
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      PORT: "4200"
      DATA_DIR: /data
