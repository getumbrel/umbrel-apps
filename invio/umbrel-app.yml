manifestVersion: 1
id: invio
category: finance
name: Invio
version: "2.0.0"
tagline: Invio is a self-hosted invoicing app without the bloat
description: >-
  Invio is a self-hosted invoicing without the bloat. A fast, minimalist, and
  privacy-friendly invoicing system built for freelancers and small teams who
  want control, not clutter.


  Create and share invoices in seconds, host your data yourself, and share
  secure, password-free links with clients. Lightweight by design, no CRM
  overhead and no SaaS lock-in.
releaseNotes: >-
  This is a major version update.


  Key Highlights:
    - WeasyPrint pdf rendering (1.4x faster, more architectures, smaller, less system resources)
    - Full account system with permission matrix
    - 2FA (TOTP)
    - Preset products
    - New frontend, sveltekit (read why {link to blog post})
    - Invoice change history
    - Many more small changes


  Full release notes can be found at https://github.com/kittendevv/Invio/releases
