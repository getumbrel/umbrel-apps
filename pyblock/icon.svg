<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600"/>
      <stop offset="50%" style="stop-color:#ff3333"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bg)"/>

  <!-- Grid lines (cyberpunk aesthetic) -->
  <g stroke="#1a3a1a" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
  </g>

  <!-- Bitcoin symbol (stylized) -->
  <g transform="translate(128,108)" fill="url(#accent)">
    <!-- B shape -->
    <rect x="-28" y="-40" width="8" height="80" rx="2"/>
    <rect x="-20" y="-40" width="32" height="8" rx="2"/>
    <rect x="-20" y="-4" width="32" height="8" rx="2"/>
    <rect x="-20" y="32" width="32" height="8" rx="2"/>
    <rect x="12" y="-32" width="8" height="28" rx="2"/>
    <rect x="16" y="4" width="8" height="28" rx="2"/>
    <!-- Vertical bars -->
    <rect x="-16" y="-48" width="6" height="12" rx="1" fill="#ff6600"/>
    <rect x="2" y="-48" width="6" height="12" rx="1" fill="#ff6600"/>
    <rect x="-16" y="40" width="6" height="12" rx="1" fill="#ff6600"/>
    <rect x="2" y="40" width="6" height="12" rx="1" fill="#ff6600"/>
  </g>

  <!-- "PyBLOCK" text -->
  <text x="128" y="195" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="24" fill="url(#green)">PyBLOCK</text>

  <!-- Decorative brackets -->
  <text x="30" y="200" font-family="monospace" font-size="28" fill="#00ff88" opacity="0.4">{</text>
  <text x="218" y="200" font-family="monospace" font-size="28" fill="#00ff88" opacity="0.4">}</text>

  <!-- Terminal cursor blink -->
  <rect x="164" y="183" width="12" height="3" fill="#00ff88" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scan line effect -->
  <rect x="0" y="0" width="256" height="256" fill="url(#green)" opacity="0.02"/>
</svg>
