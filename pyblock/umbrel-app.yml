manifestVersion: 1
id: pyblock
category: bitcoin
name: PyBLOCK
version: "4.0.0"
tagline: Cyberpunk Bitcoin & Lightning node dashboard
description: >-
  PyBLOCK is a terminal-based Bitcoin dashboard with a cyberpunk aesthetic
  that runs in your browser via a web terminal. Monitor your Bitcoin node,
  Lightning channels, mempool, and much more with a rich colorful interface.


  Features include real-time block height and BTC price display, Lightning
  Network channel management and invoicing, an interactive block visualizer
  with fee-rate treemap, mempool monitor with fee estimates, OP_RETURN message
  viewer, mining pool stats (Ocean, Braiins, CKPool), Moscow Time converter,
  Nostr console integration, ColdCore hardware wallet support, and much more.


  PyBLOCK connects directly to your Umbrel's Bitcoin Core and LND nodes.
  No additional configuration needed — just install and open.
