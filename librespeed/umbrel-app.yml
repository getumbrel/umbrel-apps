  What's new in this release:
    - Added a standalone connection-stability test with live latency metrics, packet-loss tracking, alerts, and CSV export
    - Added installable PWA support with a web app manifest and icons
    - Improved multi-server selection and fixed selected-server startup behavior
    - Docker images now accept the default 20 MiB upload chunks


