version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: librespeed_server_1
      APP_PORT: 8080

  server:
    image: ghcr.io/librespeed/speedtest:6.1.0@sha256:b6b0890047e833158370d59ed5ef289b3e67a58f4a363cd37ef5c09d170d8543
    environment:
      PUID: 1000
      PGID: 1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    restart: on-failure
