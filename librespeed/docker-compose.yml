version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: librespeed_server_1
      APP_PORT: 8080

  server:
    image: ghcr.io/librespeed/speedtest:6.2.0@sha256:199ddbb3543f7f988e99c9c3a7c4d31c1683d2adbba9597557ca4770082368ae
    environment:
      PUID: 1000
      PGID: 1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    restart: on-failure
