version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: librespeed_server_1
      APP_PORT: 8080

  server:
    image: ghcr.io/librespeed/speedtest:6.0.2@sha256:871ec7a1c908e7c9288e51e074b321088a297c37fc672a4c882b0309f61ddef7
    environment:
      PUID: 1000
      PGID: 1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    restart: on-failure
