manifestVersion: 1
id: jotty
category: files
name: Jotty
version: "1.22.0"
tagline: A simple app, for your checklists and notes
description: >-
  Tired of bloated, cloud-based to-do apps? Jotty is a lightweight alternative for managing your personal checklists and notes.


  Features:
    - Checklists: Create task lists with drag & drop reordering, progress bars, and categories. Supports both simple checklists and advanced task projects with Kanban boards and time tracking.
    - Rich Text Notes: A clean WYSIWYG editor for your notes, powered by TipTap with full Markdown support and syntax highlighting.
    - Sharing: Share checklists or notes with other users on your instance, including public sharing with shareable links.
    - File-Based: No database needed! Everything is stored in simple Markdown and JSON files in a single data directory.
    - User Management: An admin panel to create and manage user accounts with session tracking.
backupIgnore:
  - data/cache/*
developer: fccview
website: https://jotty.page
repo: https://github.com/fccview/jotty
support: https://github.com/fccview/jotty/issues
port: 8345
submitter: Kanishk Pachauri
submission: https://github.com/getumbrel/umbrel-apps/pull/3961
releaseNotes: >-
  ⚠️ Make sure to back up your data before upgrading to this release.


  Kanban refactor:
    - Tasks have been renamed and refactored into a full Kanban system with new fields including assignee, due date, priority, and reminders
    - A new calendar view shows tasks that have a due date assigned
    - Filter the Kanban board by task priority
    - In-app notifications for events such as shared items, task status updates, and expired task reminders

  New features:
    - LDAP support - users can now log in via LDAP using their Jotty username

  Bug fixes:
    - Fixed note API missing the ability to get a note by UUID
    - Fixed Kanban columns not filling the full screen when fewer than 4 statuses are present
    - Fixed subtasks getting unchecked when updating task progress
    - Fixed zoom behavior in PWA mode

  Security updates:
    - Fixed a high severity security vulnerability - updating is strongly recommended if your instance is publicly accessible
    - Updated multiple third-party dependencies to address various security vulnerabilities


  Full release notes are found at https://github.com/fccview/jotty/releases
dependencies: []
gallery:
