releaseNotes: >-
  ⚠️ This update runs an automatic Lobe Hub database migration on startup. Back up your Umbrel before updating and leave Lobe Hub running until it finishes.


  This weekly patch improves agent automation, workspace controls, provider compatibility, and chat productivity.

  Key changes:
    - Added newer model metadata and improved provider, connector, and credential routing
    - Improved worktree, Claude Code, Codex, remote agent, and scheduled-task reliability
    - Added input history, message forwarding, file drag-and-drop, and a downloads hub
    - Improved topic/sidebar consistency, fetch error states, and security hardening


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.2.10
