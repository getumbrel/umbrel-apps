releaseNotes: >-
  This release improves cross-device agent execution, connector and sandbox workflows, sharing, and desktop/CLI reliability.


  Key changes:
    - Improved agent execution across devices with working-directory controls, project skill discovery, and sub-agent suspend/resume handling
    - Expanded connector permissions, custom OAuth MCP connector onboarding, sandbox provider support, and cloud sandbox file sync
    - Refreshed topic sharing, Page sharing, and Page Editor behavior
    - Added user-scoped LobeHub model availability, Claude Fable 5, Qwen thinking preservation, and MiniMax M3 updates
    - Fixed desktop cold-start, update, and build stability, plus CLI device dispatch and skill discovery issues
    - Improved onboarding, auth-source preservation, topic UI states, and chat-input controls
    - Added SSRF validation for external URL file input and includes normal self-hosted database migrations


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.2.3
