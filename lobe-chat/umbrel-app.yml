releaseNotes: >-
  This release improves agent device workflows, connector/skill management, and chat reliability.


  Key changes:
    - Added Composio connector integration, browser device pairing, and shared desktop/CLI gateway improvements
    - Improved sub-agent, cold-replica, and run-lifecycle reliability for agent workflows
    - Added bulk topic moves, per-conversation gateway mode, and token cache-hit usage stats
    - Refined topic search/status filters, mixed-message rendering, and chat-input skill behavior
    - Added new provider/model updates, connector row actions, and fixes for pre-login device requests
    - Includes normal self-hosted database migrations


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.2.5
