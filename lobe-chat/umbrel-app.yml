releaseNotes: >-
  This release adds heterogeneous platform agents for local and remote device execution, refreshes onboarding, and improves document/chat workflows.


  Key changes:
    - Added OpenClaw/Hermes platform agents with remote dispatch, device registration, and an execution target switcher
    - Refreshed first-run onboarding with a streamlined first screen, agent picker, and improved welcome guidance
    - Improved document previews, non-markdown document rendering, document tree multi-select, and per-agent topic management
    - Added skill chips in the composer, slash-menu skill access, and project-level skill support
    - Added DeepSeek V4 and Gemini 3.5 Flash model support, plus clearer model-runtime error handling
    - Improved security and reliability, including safer credential handling, OAuth refresh-token fixes, Redis timeouts, and assistant-chain recursion guards


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.2.1
