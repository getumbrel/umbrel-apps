releaseNotes: >-
  This release expands execution-device support for local and remote agent runs, adds Claude Opus 4.8 support, introduces token-usage analytics, and adds Page sharing.


  Key changes:
    - Added Execution Devices with auto-registration, device switching, remote Claude Code runs, and recent-directory management
    - Added Claude Opus 4.8, MiniMax M3, intern-s2-preview, and step-3.7-flash model support
    - Added token-usage analytics and improved usage/cost rollups
    - Added Page sharing plus Workspace and Agent share tables
    - Improved BM25/file-backed knowledge search, editable local-file viewing, and document/agent export flows
    - Fixed reliability issues across agent runtime, chat UX, OAuth refresh/re-login flows, and streaming/tool-call state


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.2.2
