releaseNotes: >-
  This release adds the generally available Agent Task System and improves agent workflows, inline documents, and bot integrations.


  Key changes:
    - Added the Agent Task System for templates, task tracking, comments, scheduled runs, and dependency-ordered batches
    - Added inline document support for knowledge-base search and agent grounding
    - Improved heterogeneous agent execution and persistence across server replicas
    - Expanded bot platform support, including Messenger, Line, and Telegram fixes
    - Added a visual analysis tool and updated the default OSS DeepSeek model configuration


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.1.57
