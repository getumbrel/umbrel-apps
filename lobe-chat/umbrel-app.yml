releaseNotes: >-
  This release introduces the Chief Agent Operator, an agent workflow that can self-review, iterate on its own output, dispatch sub-agent teams, and pause when human input is needed.


  Key changes:
    - Added self-iteration, proposal actions, and auto-executed follow-ups for agent workflows
    - Added auto-formed sub-agent teams with monitor callbacks, breadcrumbed threads, and a thread switcher
    - Improved task scheduling, Claude Code task tools, and waiting-for-human status handling
    - Improved cloud Claude Code, GitHub token, and sandbox completion flows
    - Improved chat mode, the action bar, home recommendations, document tree updates, and MCP inspectors
    - Fixed bot identity gating issues for Slack, Discord, and device-tool activations


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.2.0
