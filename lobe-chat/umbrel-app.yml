releaseNotes: >-
  This release includes fixes from v2.1.55 and a database schema update in v2.1.56. The migration runs automatically on startup — no manual steps are required.


  Key changes:
    - Fixed an issue where sending the first message in an empty Page Agent panel would clear the newly created topic
    - Fixed sending from the Home chat input not routing to the correct new topic when the route had no warm cache
    - Fixed stale topics being carried over when switching between agents or scoped pages
    - Added two new nullable columns (`trigger`, `metadata`) and an index to the `briefs` table — existing data is unaffected


  Full release notes are available at https://github.com/lobehub/lobehub/releases
