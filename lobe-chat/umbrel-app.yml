dependencies: []
releaseNotes: >-
  ⚠️ Before updating, open Lobe Chat in your browser and export your data via Settings > Data Storage > Export. After updating to Lobe Hub, you can re-import the file via Settings > Import Data. Your local chats and knowledge bases will not be automatically migrated due to the significant architectural changes in this update.


  This big update renames the app to Lobe Hub and comes with a lot of new features and improvements.


  Key changes:
    - Updated to Lobe Hub v2.1.52
    - Added PostgreSQL with pgvector and pg_search support
    - Added Redis for caching and session-backed features
    - Added S3-compatible object storage for uploads and knowledge bases
    - Switched from the old single-container setup to the current upstream architecture


  Full release notes are available at https://github.com/lobehub/lobehub/releases
