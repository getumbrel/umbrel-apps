releaseNotes: >-
  This release improves server-side agent orchestration, device/worktree workflows, and connector reliability.


  Key changes:
    - Added server-side group orchestration so agents can call other agent members more reliably
    - Added desktop file operation and git worktree device RPC improvements for web sessions
    - Added a running-tasks dashboard and better Fleet task re-sync behavior
    - Improved connector credential preservation, cold-start loading, and chat/sidebar refresh behavior


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.2.6
