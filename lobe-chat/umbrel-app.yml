releaseNotes: >-
  This hotfix release ships the latest canary improvements for agents, onboarding, integrations, desktop/CLI workflows, and reliability.


  Key changes:
    - Improved agent tasks, self-review proposal flows, sub-agent dispatch, scheduling, and TodoList behavior
    - Polished home and onboarding flows, including daily brief links, input hints, and inline skill authorization
    - Fixed Slack, Discord, slash-command, and gateway client-tool integration issues
    - Improved desktop and CLI login/command detection, including Claude and Codex CLI handling on Windows
    - Added reliability safeguards for web crawling, image processing, database pools, and inactive OIDC access
    - Added the agent operations database table; self-hosted migrations run automatically on startup


  Full release notes are available at https://github.com/lobehub/lobehub/releases/tag/v2.1.58
