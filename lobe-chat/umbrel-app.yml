releaseNotes: >-
  This is a hotfix release addressing a navigation regression introduced in v2.1.53.


  Key changes:
    - Fixed stale chat state when switching between agents — the previous topic no longer carries over
    - Fixed conversation context isolation so the correct agent/topic/thread state loads immediately on switch
    - Fixed sidebar thread list staying expanded while viewing a subtopic
    - Fixed the header showing the correct thread title for active subtopics


  Full release notes are available at https://github.com/lobehub/lobehub/releases
