releaseNotes: >-
  This release hardens HermitStash's auth, upload, backup, and audit-log paths.


  - Sign-in domain checks, CSRF origin comparisons, session refreshes, one-time access codes, invite/two-factor time windows, and admin IP blocklist entries now fail closed and canonicalize inputs more consistently.
  - Uploaded files with mismatched magic bytes are forced to download-only handling with nosniff headers, reducing spoofed inline-preview risk.
  - Off-site backups now skip the plaintext chunk-assembly scratch directory, and decrypted audit-log exports verify encrypted archive signatures and tamper chains before returning rows.
  - Idempotency-Key replay slots are now scoped per authenticated user, and settings/path/email handling uses hardened primitives for prototype-key, traversal, and header-injection defenses.
  - Folder ZIP download links now use a query parameter for nested folder paths.
