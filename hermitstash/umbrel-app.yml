releaseNotes: >-
  Encrypts every stored object in the application before it leaves the process, and removes the old S3 direct-download mode so downloads always stream through HermitStash's encryption layer.


  Strengthens credential and backup-code checks with constant-time comparisons, atomic failed-login lockouts, and time-bound OAuth state handling.


  Improves reverse-proxy session binding, supports CIDR ranges in trusted-proxy settings, caps chunked uploads before reassembly, and includes the latest bundled framework security fixes.
