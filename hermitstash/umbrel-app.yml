releaseNotes: >-
  This release expands HermitStash's audit and upload controls.


  - Audit logs now capture richer request context, including method/path, auth type, request ID, and optional full IP/user-agent data controlled from a new Audit Log settings panel.
  - Admins can export decrypted audit logs as CSV, JSON, or CADF, and optionally archive older audit entries into encrypted, signed on-disk bundles.
  - Audit events can now be forwarded to a SIEM in real time over syslog or HTTP webhooks, with secret/PII-shaped values redacted before forwarding.
  - Per-user and per-stash upload caps now support explicit No limit overrides, and admin dialogs have improved spacing.
  - Registration and sign-in audit events now record searchable email addresses instead of unreadable encrypted blobs.
