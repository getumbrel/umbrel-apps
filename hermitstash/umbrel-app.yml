releaseNotes: >-
  Improves encrypted-session error handling and sync WebSocket hardening.


  Error responses across sync, stash, bundle, file, upload, and public-upload routes now use encrypted problem-details responses where appropriate, reducing cleartext failure details and aligning API behavior.


  The sync WebSocket channel now uses bounded JSON decoding and hardened URL parsing to safely reject oversized, deeply nested, or malformed upgrade requests.


  Clients should read the problem-details detail field, with error as a fallback for older servers, on affected routes.
