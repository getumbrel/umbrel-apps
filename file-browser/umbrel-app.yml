manifestVersion: 1
id: file-browser
category: files
name: File Browser
version: "2.63.2"
tagline: Browse and manage the files you download on your Umbrel
description: >-
  File Browser lets you upload, delete, preview, rename and edit your folders and files.


  Easily manage files in the Umbrel's storage folder where your downloads from apps like Transmission, Sonarr, Radarr, and Lidarr are currently held.
releaseNotes: >-
  Key updates in this version include:
    - Added copy operation on drag-and-drop when holding the Ctrl key
    - Fixed negative upload-length being accepted in TUS uploads
    - Fixed download permission check when sharing is enabled
    - Fixed restricted default permissions for proxy-auth auto-provisioned users
    - Fixed download permission check in resource handler
    - Fixed directory boundary enforcement in rule path matching
    - Fixed share owner permission checks on public share access


  Full release notes are available at https://github.com/filebrowser/filebrowser/releases
developer: File Browser
website: https://filebrowser.org/
dependencies: []
repo: https://github.com/filebrowser/filebrowser
support: https://github.com/filebrowser/filebrowser/issues
port: 7421
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: "/files/"
deterministicPassword: false
torOnly: false
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/pull/169
