version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lawallet-nwc_web_1
      APP_PORT: 2288
      PROXY_AUTH_ADD: "false"

  web:
    image: masize/lawallet-nwc:1.4.0@sha256:257ea2f6ea96e2d45ee10f6cd97591e3c6e4b648a9b19d30d0c6c6cb730471d7
    environment:
      DATABASE_URL: postgresql://lawallet:${APP_LAWALLET_NWC_POSTGRES_PASSWORD}@postgres:5432/lawallet
      JWT_SECRET: ${APP_LAWALLET_NWC_JWT_SECRET}
      LISTENER_URL: http://lawallet-nwc_listener_1:4100
      LISTENER_AUTH_SECRET: ${APP_LAWALLET_NWC_LISTENER_AUTH_SECRET}
      NODE_ENV: production
      PORT: 2288
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    stop_grace_period: 1m
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://$$(hostname -i):2288/api/health\" >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  listener:
    image: masize/lawallet-nwc-listener:1.4.0@sha256:f323914b5f5db3cdca602889a9cee1af73df79944ce68fd3df5d9f62dea6302a
    environment:
      DATABASE_URL: postgresql://lawallet:${APP_LAWALLET_NWC_POSTGRES_PASSWORD}@postgres:5432/lawallet
      LISTENER_PORT: 4100
      LISTENER_AUTH_SECRET: ${APP_LAWALLET_NWC_LISTENER_AUTH_SECRET}
      WEB_ORIGIN: http://lawallet-nwc_web_1:2288
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    stop_grace_period: 1m
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4100/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15.18-alpine3.24@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    environment:
      POSTGRES_DB: lawallet
      POSTGRES_USER: lawallet
      POSTGRES_PASSWORD: ${APP_LAWALLET_NWC_POSTGRES_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
