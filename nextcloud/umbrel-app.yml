manifestVersion: 1.1
id: nextcloud
category: files
name: Nextcloud
version: "34.0.1"
tagline: Productivity platform that keeps you in control
description: >-
  Nextcloud puts your data at your fingertips, under your control.
  Store your documents, calendar, contacts and photos on your Umbrel instead of
  some company's data center. Features:


  - Mobile and desktop sync 

  - Versioning and undelete 

  - Galleries and activity feed 

  - File editing and preview support for PDF, images, text files, Open Document, Word files and more. 

  - Smooth performance and easy user interface. 

  - Fine-grained control over access to data and sharing capabilities by user and by group.


  Note: After logging in to Nextcloud please change the password to something secure before sharing the address with anyone.
releaseNotes: >-
  Nextcloud 34.0.1 is a follow-up to the recent Nextcloud 34 major update. If you're updating from a pre-34 version, the upgrade may take a few minutes while Nextcloud runs its update steps; leave the app running until it comes back online.


  Highlights:
    - 📁 Fixes several Files, WebDAV, sharing, comments, previews, and versions issues
    - 🔐 Includes security hardening for crypto fallback, repair deserialization, and code-signing revocations
    - ⚙️ Improves app store, settings, theming, notifications, LDAP, and background job reliability


  If you use extra Nextcloud apps, check for app updates in Nextcloud after upgrading.


  Full release notes are found at https://github.com/nextcloud-releases/server/releases/tag/v34.0.1
developer: Nextcloud GmbH
website: https://nextcloud.com
dependencies: []
repo: https://github.com/nextcloud/server
support: https://help.nextcloud.com/categories
port: 8081
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: umbrel
deterministicPassword: true
torOnly: false
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel/commit/dcaae95daa8ee3d7e8044d55d13887d8ff353030
