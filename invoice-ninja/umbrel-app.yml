releaseNotes: >-
  This update includes various improvements and bug fixes:
    - Refactored sanitization of line item properties, public notes, terms, and footer
    - Fixed disabled input fields
    - Fixed client portal set password sessions and subscription authentication
    - Fixed bank transaction imports and Nordigen bank description handling
    - Fixed Quickbooks initial sync issues
    - Added throttle to client portal invitation routes
    - Refactored PEPPOL to support CTC countries
    - Fixed invoice invitation race condition and client contact observer
    - Fixed multiple areas of the authentication stack for route model binding
    - Updated JS dependencies


  Full release notes are available at https://github.com/invoiceninja/invoiceninja/releases
