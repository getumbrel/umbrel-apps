releaseNotes: >-
  This update includes various improvements and bug fixes:
    - Allow Quickbooks realm reconnection if token expires
    - Fixed credit double spend edge case
    - Allow client relation filters from list views
    - Query refactors for performance improvements
    - Added ACH status checks for Authorize.net
    - Fixed deadlock race condition when marking an invoice as paid from draft state
    - Minor fixes for aging interval query calculations
    - Ensure blank clients are not created when importing from CSV


  Full release notes are available at https://github.com/invoiceninja/invoiceninja/releases
