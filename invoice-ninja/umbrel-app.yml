releaseNotes: >-
  This update includes various improvements and bug fixes:
    - Added Checkout.com payment flow support
    - Added passkey authentication support
    - Fixed tax summary report issues
    - Fixed SEPA payments blocked by Stripe Radar due to missing billing country
    - Fixed AutoBill processing of invoices with zero balance
    - Added small delay in client webhooks to allow contacts to be returned
    - Fixed e-invoice notifications
    - Updated PEPPOL SE sending
    - Ensured GoCardless displays correct payment method type
    - Updated translations


  Full release notes are available at https://github.com/invoiceninja/invoiceninja/releases
