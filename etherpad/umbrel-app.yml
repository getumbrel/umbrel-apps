releaseNotes: >-
  ⚠️ Major update: Etherpad 3.0 updates its runtime to Node.js 24 and pnpm 11. Existing pads and plugins are preserved, but admins should check any installed plugins after updating.


  Highlights include native DOCX export, a JSONC settings editor, in-place pad history scrubbing, and admin tools for GDPR author erasure.


  Other improvements and fixes include:
    - A telemetry-free API docs UI powered by Scalar
    - New companion app support for desktop, mobile, and terminal clients using Etherpad's stable 3.x API
    - Improved self-update and rollback tooling for admins
    - Security and privacy hardening across the admin and pad interfaces


  Full release notes can be found at https://github.com/ether/etherpad/releases/tag/v3.0.0
