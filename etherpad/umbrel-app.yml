releaseNotes: >-
  ⚠️ Abiword has been replaced with LibreOffice for document import/export. If you were using Abiword for DOCX/ODT/PDF conversion, you will need to update your settings to point to your LibreOffice binary.


  This release includes various enhancements and fixes:
    - Accessibility improvements including corrected dialog semantics, better focus management, missing icon labels, and correct language attribute on pages
    - Chat icon now works correctly again, disabled toggles render properly, and username layout no longer overflows
    - Revision-specific exports via `/export/etherpad` now return the correct revision instead of always returning the latest
    - Undo and redo now scrolls the viewport to follow the caret so reverted edits stay in view
    - Page Down and Page Up now scroll by viewport height instead of a fixed line count
    - Typing continues in the document after changing a toolbar select instead of falling through to the toolbar
    - Admin UI translations are restored on the `/admin` page
    - Non-breaking spaces are now preserved correctly
    - Browser locale is now auto-detected instead of being hardcoded to English


  Full release notes can be found at https://github.com/ether/etherpad-lite/releases
dependencies: []
path: ""
defaultUsername: "admin"
deterministicPassword: true
