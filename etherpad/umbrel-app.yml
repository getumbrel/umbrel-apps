releaseNotes: >-
  This release adds new privacy controls including pad deletion, author erasure, HttpOnly author-token cookies, and an optional privacy banner.


  Other improvements and fixes include:
    - New Etherpad update notifications in the admin UI
    - New pad compaction tools for reclaiming database space on pads with long edit histories
    - Editor enhancements including duplicate/delete current-line shortcuts, better embed toolbar controls, easier chat mentions, and faded inactive author colors
    - Better color contrast and mobile/social metadata on pads
    - The admin plugin browser now shows plugin `disables` declarations before installation
    - Fixed duplicate authenticated author sessions incorrectly disconnecting each other
    - Fixed plugin update tooling and cache behavior across restarts of the same version
    - The official Docker image no longer includes curl, npm, or npx; use wget or pnpm inside the container for ad-hoc maintenance


  Full release notes can be found at https://github.com/ether/etherpad/releases
