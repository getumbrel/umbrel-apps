releaseNotes: >-
  This release adds an MCP section to the config web UI, plus new provider and
  channel options including Bedrock streaming, SiliconFlow, Slack webhook, and
  Gemini web search.

  It improves chat and agent workflows with code-block controls, delegate
  tooling, network retry handling, and runtime event logging. It also fixes MCP,
  gateway, media, Telegram, LINE, DeepSeek, and tool-feedback issues, and updates
  Go/runtime dependencies.

  Full release notes can be found at https://github.com/sipeed/picoclaw/releases/tag/v0.2.9
