releaseNotes: >-
  This release adds the NEAR AI Cloud provider, configurable channel settings,
  and support for configured remote cron commands.

  It improves provider/model error handling, native search handling, gateway
  startup reporting, and Brave/web search diagnostics. It also fixes Evolution
  heartbeat and file-lock handling, Telegram forum topics, Gemini thought
  signatures, media and WebSocket cleanup paths, and hardens inbound media/web
  fetch handling.

  Full release notes can be found at https://github.com/sipeed/picoclaw/releases/tag/v0.3.1
