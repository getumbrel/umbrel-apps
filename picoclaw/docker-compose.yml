version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: picoclaw_server_1
      APP_PORT: 18800

  server:
    image: docker.io/sipeed/picoclaw:v0.2.8-launcher@sha256:a0b64fac19d0bf14178da4a06b01b8440787b381ca45c692c2bb117297248b69
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      PICOCLAW_HOME: /data
