version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: picoclaw_server_1
      APP_PORT: 18800

  server:
    image: docker.io/sipeed/picoclaw:v0.3.1-launcher@sha256:ed830c6cb71f59785062433159c45c2363465cd02046f8dd2822bd24a39510c2
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      PICOCLAW_HOME: /data
