version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: fizzy_server_1
      APP_PORT: 80
      PROXY_AUTH_ADD: 'false'

  server:
    image: ghcr.io/mauricewipf/fizzy-umbrel:5f45e54@sha256:2d7a493a8933aa784b4d06cc96bd8b047beaf19173d1eec04c767e9dd7f4c28b
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data/app:/rails/storage
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${APP_SEED}
      DATABASE_ADAPTER: sqlite
      ACTIVE_STORAGE_SERVICE: local
      SOLID_QUEUE_IN_PUMA: 'true'
      FORCE_SSL: 'false'
      ASSUME_SSL: 'false'
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: on-failure
