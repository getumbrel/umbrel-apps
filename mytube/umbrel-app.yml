manifestVersion: 1
id: mytube
category: media
name: MyTube
version: "1.10.19"
tagline: Your personal video library and downloader
description: >-
  Download, organize, and watch videos from YouTube, Bilibili, Twitch, and other yt-dlp-supported sites on your Umbrel.


  MyTube supports individual and batch downloads, channel subscriptions, local uploads, collections, subtitles, and private RSS feeds. Videos and application data remain on your Umbrel.


  Create an account from MyTube's first-run setup to enable its optional password login and passkey support.
