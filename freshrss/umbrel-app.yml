manifestVersion: 1
id: freshrss
category: social
name: FreshRSS
version: "1.29.1"
tagline: A free, self-hostable aggregator for rss feeds
description: >-
  FreshRSS is an RSS aggregator and reader. It enables you to seamlessly read and follow content from multiple websites at
  a glance without the need to browse from one website to another.


  FreshRSS has a lot of features including:
  
  - RSS and Atom aggregation
  
  - Mark article as favorite if you liked it or if you want to read it later
  
  - Filter and search functionality helps to easily find articles
  
  - Statistics to show you the publishing frequency all the websites you follow
  
  - Import/export of your feeds into OPML format (more information)
  
  - and more!
releaseNotes: >-
  This FreshRSS bug-fix release improves feed imports, browser compatibility, and search behavior.


  Key highlights:
    - Added support for importing `.txt` lists of feed URLs
    - Added a CLI tool for scheduled SQLite exports with retention
    - Added more feed metadata, including last received and publication dates
    - Fixed cookie handling in some browsers and search for shared user queries with empty results
    - Improved OPML error handling and compatibility with older or simpler web browsers


  Full release notes can be found at https://github.com/FreshRSS/FreshRSS/releases/tag/1.29.1
developer: FreshRSS Org
website: https://freshrss.org/
