manifestVersion: 1
id: freshrss
category: social
name: FreshRSS
version: "1.29.0"
tagline: A free, self-hostable aggregator for rss feeds
description: >-
  FreshRSS is an RSS aggregator and reader. It enables you to seamlessly read and follow content from multiple websites at
  a glance without the need to browse from one website to another.


  FreshRSS has a lot of features including:
  
  - RSS and Atom aggregation
  
  - Mark article as favorite if you liked it or if you want to read it later
  
  - Filter and search functionality helps to easily find articles
  
  - Statistics to show you the publishing frequency all the websites you follow
  
  - Import/export of your feeds into OPML format (more information)
  
  - and more!
releaseNotes: >-
  This major FreshRSS release adds new reader and feed-management features, UI improvements, extensions, and security fixes.


  Key highlights:
    - Added sort order preferences at global, category, and feed levels
    - Added feed-provided icons and a new option to hide the sidebar by default
    - Added a Webhook extension for automated RSS notifications and an LLM Classification extension for automatic article tagging
    - Improved mobile reading layouts, themes, searches, feed problem indicators, and PHP 8.5+ support
    - Security improvements limit cURL to HTTP/HTTPS protocols and better sanitize favicon URLs


  Full release notes can be found at https://github.com/FreshRSS/FreshRSS/releases/tag/1.29.0
developer: FreshRSS Org
website: https://freshrss.org/
