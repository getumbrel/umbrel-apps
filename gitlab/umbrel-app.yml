releaseNotes: >-
  This release of GitLab comes with multiple new features and improvements.


  The GitLab UI may be unresponsive for a few minutes after the update, which is completely normal.


  Key improvements in this release:
    - SAST false positive detection with GitLab Duo Agent Platform is now generally available
    - Passwordless sign-in with passkeys using biometrics or device PIN
    - New work items list combining epics, issues, and other work items into a single unified view with saved views support
    - AI-powered secret false positive detection to reduce alert fatigue (Beta)
    - Enforce merge request title naming conventions using regex patterns
    - Custom agents can now connect to external data sources via Model Context Protocol (MCP)
    - CI/CD job-level inputs with type safety, default values, and validation support


  Full release notes are available at: https://about.gitlab.com/releases/2026/03/19/gitlab-18-10-released/
