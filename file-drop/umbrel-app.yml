manifestVersion: 1.1
id: file-drop
name: File Drop
version: "1.4.3"
tagline: "Decentralized, Anonymous, and Secure File Sharing"
category: files
description: >-
  ⚠️ Removal Notice: The Samba app has been removed from the Umbrel App Store as file sharing is now natively integrated into umbrelOS.


  File Drop is an open-source, decentralized application for anonymously sharing images, videos, and other files. It uses peer-to-peer protocols and the InterPlanetary File System (IPFS) to enable direct, serverless file transfers, enhancing privacy and security"
releaseNotes: >-
  This update improves File Drop's IPFS backend with low-power DHT routing,
  persistent IPFS data storage, and a 5 GB default upload limit. It also updates
  the bundled Node.js and IPFS runtime components.
developer: "besoeasy"
website: "https://github.com/besoeasy/file-drop"
repo: "https://github.com/besoeasy/file-drop"
support: "https://github.com/besoeasy/file-drop/issues"
port: 3232
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
dependencies: []
path: "/"
defaultUsername: ""
defaultPassword: ""
submitter: besoeasy
submission: https://github.com/getumbrel/umbrel-apps/pull/2392
disabled: true
