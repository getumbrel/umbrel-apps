version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: file-drop_app_1
      APP_PORT: 3232

  app:
    image: ghcr.io/besoeasy/file-drop:1.4.3@sha256:f46389e22243a3a3cd6a371f9b46cd8428bcfa23030c9303509110fcd899a0b2
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 5m
    environment:
      - NODE_ENV=production
      - IPFS_TELEMETRY=off
    volumes:
      - ${APP_DATA_DIR}/data:/data
