manifestVersion: 1
id: lonestrike-cash
category: crypto
name: LoneStrike Cash
version: "1.4.64"
tagline: Solo mine Bitcoin Cash with your own node
description: >-
  A zero-fee solo mining pool for Bitcoin Cash, including the first Stratum
  V2 pool for BCH, written from scratch. Point your miners at your Umbrel and
  mine against your own node -- if you find a block, the full reward pays
  directly to your address.
  
  Connects to the official Bitcoin Cash Node app using its exported RPC
  credentials. Stratum V1 miners connect on port 3383, Stratum V2 on 33333.
  The dashboard tracks workers, best shares, round effort, and found blocks --
  and celebrates when you hit one.
  Donations are never expected -- but if LoneStrike Labs apps are useful to
  you, they keep development going: qpp8hg2n60mhhlsr2apw6l60x5vrdq0vp5pq3j4gyt
