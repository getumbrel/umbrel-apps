version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: pearcircle-seeder_app_1
      APP_PORT: 8730

  app:
    image: ghcr.io/peerloomllc/pearcircle-seeder:1.0.24@sha256:3b3e0cf6068b154a7a12205da5969e4fc8151ec4e054a7dfeea0cd375f1af690
    restart: on-failure
    stop_grace_period: 1m
    security_opt:
      - no-new-privileges:true
    environment:
      SEEDER_HOST: 0.0.0.0
      SEEDER_PORT: "8730"
      SEEDER_NO_AUTH: "1"
      SEEDER_NO_UPDATE_CHECK: "1"
    volumes:
      # Seeder identity, per-circle enrollments, retention state, logs.
      - ${APP_DATA_DIR}/data:/data
