version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: pearcircle-seeder_app_1
      APP_PORT: 8730

  app:
    image: ghcr.io/peerloomllc/pearcircle-seeder:1.0.18@sha256:b1cb7ce24acbc6117980bd27d9d63f663e68d95a8fd68bbd071ba507e00ce7b2
    restart: on-failure
    stop_grace_period: 1m
    security_opt:
      - no-new-privileges:true
    environment:
      SEEDER_HOST: 0.0.0.0
      SEEDER_PORT: "8730"
      SEEDER_NO_AUTH: "1"
      SEEDER_NO_UPDATE_CHECK: "1"
    volumes:
      # Seeder identity, per-circle enrollments, retention state, logs.
      - ${APP_DATA_DIR}/data:/data
