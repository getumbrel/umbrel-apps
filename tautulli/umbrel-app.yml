  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
releaseNotes: >-
  This update includes security fixes for the newsletter custom template directory, cache deletion API, JavaScript log handling, external image hashing, anti-CSRF protection, and API login behavior.


  It also fixes Tautulli Remote App notifications, export failures for logo and square art keys, folder path browsing errors, and reconnecting to Plex after startup connection loss.


  Existing login sessions will be invalidated after the update.
submitter: Pranshu Agrawal
