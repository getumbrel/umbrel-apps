manifestVersion: 1
id: fulcrum-bch
category: crypto
name: Fulcrum (BCH)
version: "2.1.1"
tagline: Fast Electrum server for your Bitcoin Cash node
description: >-
  Fulcrum is a fast SPV server for Bitcoin Cash, indexing the blockchain of
  your Bitcoin Cash Node app so wallets and explorers can query address
  histories instantly.
  
  Connects to the official Bitcoin Cash Node app using its exported RPC
  credentials -- no configuration needed. Serves Electrum Cash protocol on TCP
  port 50021 and SSL port 50022.
