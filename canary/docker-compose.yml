version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: canary_web_1
      APP_PORT: 3000
      PROXY_AUTH_WHITELIST: "/api/*"

  backend:
    image: schjonhaug/canary-backend:v1.5.0@sha256:e2a9646e70f2aa94db8aedfe5bfdf3b25cee0043cfd29336dc893d2ad90a11a8
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      CANARY_NETWORK: mainnet
      CANARY_ELECTRUM_URL: tcp://$APP_ELECTRS_NODE_IP:$APP_ELECTRS_NODE_PORT
      CANARY_BIND_ADDRESS: 0.0.0.0:3001
      CANARY_DATA_DIR: /app/data
      CANARY_MODE: "self-hosted"
      CANARY_SYNC_INTERVAL: 60
      CANARY_MEMPOOL_PORT: ${APP_CANARY_MEMPOOL_PORT:-}
      CANARY_TX_EXPLORER_PLATFORM: umbrel
      CANARY_UMBREL_NTFY_URL: ${APP_CANARY_UMBREL_NTFY_URL:-}
      CANARY_SELF_HOSTED_ADMIN_PASSWORD: ${APP_PASSWORD}
      JWT_SECRET: ${APP_SEED}
    volumes:
      - ${APP_DATA_DIR}/data:/app/data

  web:
    image: schjonhaug/canary-frontend:v1.5.0@sha256:565d0b07d22afafb2740be98e2598e194b9811989dc501029c3fc37a7ac5dbbc
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      API_URL: http://canary_backend_1:3001
    depends_on:
      - backend
