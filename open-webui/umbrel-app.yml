releaseNotes: >-
  ⚠️ Major update: this release includes database schema migrations. Back up your Open WebUI data before upgrading.


  This update includes several security, knowledge base, and reliability improvements:
    - Adds official knowledge base sync tooling, smart directory sync, nested knowledge base folders, file renaming, and incremental upload support
    - Adds per-chat skills toggles, an emoji picker, access previews for users and groups, configurable MCP connection timeouts, OAuth wildcard role mapping, and Azure AI Foundry v1 with Entra ID support
    - Improves performance for initial page loads, tool-enabled chat completions, web search, Ollama backend connections, feedback history, and websocket disconnect cleanup
    - Fixes multiple security and access-control issues across tool servers, knowledge bases, retrieval collections, prompts, files, calendars, channels, shared chats, OAuth, URL fetching, and profile images
    - Fixes chat recovery, imports, web search providers, document processing, API chat completions, ComfyUI integrations, text-to-speech, speech-to-text, YouTube transcripts, browser/local-storage resilience, and database migrations
    - Updates translations across multiple languages


  Full release notes are found at https://github.com/open-webui/open-webui/releases/tag/v0.9.6
