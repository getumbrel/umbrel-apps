releaseNotes: >-
  Key highlights in this release include:
    - Added PaddleOCR-vl as a document content extraction engine option
    - Added Firecrawl v2 API support with improved reliability and retry logic
    - Added configurable reminder duration for calendar events
    - Added custom API key header support via the CUSTOM_API_KEY_HEADER environment variable
    - Added a +N badge on the Sources button when more than three sources are available
    - Improved model list performance by stripping large image data from paginated responses
    - Improved page load speed with earlier splash image preloading
    - Fixed interrupted MCP tool calls no longer causing CPU spikes
    - Fixed skills from persisted chats now injecting correctly into the system prompt
    - Fixed Docker ARM64 images that previously produced corrupted Python dependencies
    - Fixed rich text editor extension conflicts causing editor instability
    - Fixed OAuth discovery fallback for better compatibility with more MCP servers
    - Fixed cancelled chat generation now properly cleaning up upstream connections
    - Fixed model profile image endpoints to prevent path traversal vulnerabilities
    - Fixed browser-native message rendering to eliminate scroll jump artifacts in long conversations
    - Translation updates for Finnish, Korean, Portuguese (Brazil), and Dutch


  Full release notes are found at https://github.com/open-webui/open-webui/releases
