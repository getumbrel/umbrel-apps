releaseNotes: >-
  ⚠️ Major update: this release includes database schema migrations. Back up your Open WebUI data before upgrading; downgrading after the migration is not supported.


  This update includes major collaboration, automation, and reliability improvements:
    - Adds shared folders with read/write access controls, automatic context compaction for long chats, Open WebUI Computer agent support, external knowledge bases, system events, and outbound webhooks
    - Reworks memories, adds event functions, improves knowledge-base search performance, and adds admin controls for authentication, permissions, headers, tokenizers, and OAuth/MCP behavior
    - Changes the default tool-calling mode to Native; switch chats, models, or global defaults back to Legacy if your models depend on the previous behavior
    - Sandboxes client-side Python code execution by default and moves LDAP/OAuth settings into a dedicated Authentication page
    - Improves chat recovery, uploads, search, document processing, model settings, notifications, Ollama status display, accessibility, mobile UI, and many admin/workspace workflows
    - Fixes shared folder read-only chats incorrectly signing users out


  Full release notes are available at https://github.com/open-webui/open-webui/releases/tag/v0.10.0 and https://github.com/open-webui/open-webui/releases/tag/v0.10.1
