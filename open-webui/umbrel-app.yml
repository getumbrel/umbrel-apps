releaseNotes: >-
  Key highlights in this release include:
    - Fixed terminal server connections now proxying through the backend, preventing API key exposure and CORS errors
    - Fixed the /api/v1/files/ endpoint returning a 500 error that prevented file listing via the API
    - Fixed administrators being unable to see models when no access control is configured
    - Fixed rich UI embeds from tool calls now rendering outside collapsed groups and remaining visible
    - Fixed exceptions in middleware caused by invalid return values from terminal tools
    - Fixed missing beautifulsoup4 dependency that caused errors when starting Open WebUI
    - Fixed license data not loading correctly in the interface
    - Translation updates for Simplified Chinese, Catalan, Portuguese (Brazil), Finnish, and Lithuanian


  Full release notes are found at https://github.com/open-webui/open-webui/releases
