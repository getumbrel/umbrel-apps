releaseNotes: >-
  Open WebUI 0.10.2 is a follow-up to the recent 0.10 major update. If you're updating from a pre-0.10 version, back up your Open WebUI data first; downgrading after the 0.10 database migrations is not supported.


  Key highlights in this release:
    - Includes security and access-control fixes, including stricter web search domain filtering and more private image-generation logs
    - Adds streamed reasoning display for supported models and preserves folder structure when uploading or syncing knowledge-base folders
    - Adds admin controls for memory context, speech-to-text request formats, Ollama/OpenAI API configs, provider failure events, and evaluation arena models
    - Fixes unexpected logouts, SQLite upgrade/login issues, non-admin settings saving, model selection after refresh, tool dialog hangs, Python code execution loading, structured-output search/notifications, and config startup failures


  Full release notes are available at https://github.com/open-webui/open-webui/releases/tag/v0.10.2
