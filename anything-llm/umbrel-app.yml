releaseNotes: >-
  This release adds AnythingLLM's new Magic Features for desktop clients and improves chat, agent, embedding, and workspace behavior.


  - Introduced Magic Echo, Magic Beacon, and Magic Tab for OS-wide AI dictation, text actions, and autocomplete in supported desktop clients
  - Unlocked the chat history cap
  - Enabled intelligent tool selection by default
  - Fixed API embedding updates that could fail on Windows-style paths
  - Added query and passage prefix options for Generic OpenAI embedders


  Full release notes can be found at https://github.com/Mintplex-Labs/anything-llm/releases/tag/v1.15.0
