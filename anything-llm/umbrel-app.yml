id: anything-llm
name: AnythingLLM
tagline: AI workspace for chat, documents, and agents
category: ai
version: "1.15.0"
port: 3031
description: >-
  AnythingLLM is a self-hosted AI workspace for chatting with LLMs, building
  knowledge bases from your documents, and creating custom AI agents.


  It supports OpenAI, Anthropic, Gemini, Ollama, LocalAI, OpenRouter, and many
  other model providers, with local storage for conversations, workspaces,
  documents, vector indexes, and provider settings.
