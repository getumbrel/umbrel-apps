dependencies: []
releaseNotes: >-
  This release adds new model and voice providers, improves agent behavior, and fixes several chat and document handling issues.


  - Added Cerebras as an LLM provider
  - Added speech-to-text support for Deepgram, OpenAI, Generic OpenAI, and Lemonade providers
  - Added Kokoro TTS support
  - Improved web scraping by converting pages to Markdown for cleaner chat and research context
  - Improved Generic OpenAI support, agent summaries, tool-calling behavior, request timeouts, LaTeX rendering, and document cleanup


  Full release notes can be found at https://github.com/Mintplex-Labs/anything-llm/releases/tag/v1.14.0
