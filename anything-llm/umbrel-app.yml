dependencies: []
releaseNotes: >-
  This release adds Model Router, Scheduled Jobs, automatic memories, and agent surveys.


  - Added Model Router for routing conversations across local and cloud models based on rules you control
  - Added Scheduled Jobs for recurring agent tasks with run history
  - Added automatic workspace, user, and global memories for more personalized chats
  - Added agent surveys so agents can ask clarifying questions when enabled
  - Improved agent mode, provider support, responsive UI behavior, and workspace deletion safety


  Full release notes can be found at https://github.com/Mintplex-Labs/anything-llm/releases/tag/v1.13.0
