releaseNotes: >-
  This release improves chat, agent, transcription, and workspace behavior while removing unmaintained providers.


  - Added chat export to PDF, JSON, Markdown, and other formats
  - Re-enabled audio and video uploads in chat using the Tinyscribe engine
  - Added Developer API support for audio transcription
  - Improved long-running chat performance, agent flow variable highlighting, web-scraping and summarization stability, and API error messages
  - Removed the unmaintained DPAIS and HuggingFace providers


  Full release notes can be found at https://github.com/Mintplex-Labs/anything-llm/releases/tag/v1.14.1
