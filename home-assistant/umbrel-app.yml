releaseNotes: >-
  ⚠️ Breaking change: if you used the Labs version of purpose-specific automation triggers or conditions, a few keys were renamed and affected automations/scripts need to be re-saved or updated.


  This release brings the new purpose-specific automation triggers and conditions to everyone, a redesigned Activity logbook, an Update all workflow, new integrations, and dashboard/device-management polish.


  Key highlights:
    - Purpose-specific automation triggers and conditions are now the default, making new automations read more like "when this happens" without choosing low-level entity/state triggers
    - Rebuilt Activity/logbook into a cleaner timeline with day grouping, cause icons, and improved time display
    - Added Update all cards for integrations and apps, plus 10 new integrations including Dropbox backups, Chef iQ, Edifier Infrared, energieleser, and Helty Flow
    - Added dedicated infrared and radio-frequency panels, overhauled ZHA Zigbee device management, and improved performance across energy, history, and statistics views
    - Added UI setup for SAJ Solar Inverter, SMTP, Swisscom Internet-Box, and UniFi AP, with many integration improvements including Alexa Devices, SwitchBot, Overkiz, SMTP, Tesla Powerwall, Yoto, and Imou
    - Removed several long-broken integrations and includes backward-incompatible changes for some automation trigger/condition keys and integration entities


  Full release notes: https://www.home-assistant.io/blog/2026/07/01/release-20267/
