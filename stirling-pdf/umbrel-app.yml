releaseNotes: >-
  ⚠️ This is a large upstream update. Stirling Tools recommends backing up before upgrading.


  This release adds a new optional folder storage system with a My Files UI, upgrades the runtime to JDK 25, and reduces memory usage for merge and split operations by up to 99%.


  Other improvements include:
    - Better browser performance and caching
    - Improved merge reliability
    - Fixes for font loss in rearrange, overlay, auto-split, and OCR workflows
    - Fixes for compare tools, file selection, tab refreshes, mobile QR upload URLs, and missing icons


  Full release notes are found at https://github.com/Stirling-Tools/Stirling-PDF/releases/tag/v2.12.0
