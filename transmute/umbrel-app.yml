  - https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-transmute/2.jpg
  - https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-transmute/3.jpg
releaseNotes: >-
  This update significantly expands Transmute beyond file conversion by introducing file compression for the first time.


  Supported workflows now include images, PDFs, audio, video, and GIFs, with simple compression levels to balance quality and file size.


  The release also adds many new conversion formats, including additional Inkscape formats and 3D formats such as STL, OBJ, GLB, and 3MF.


  It also includes new language settings, Portuguese language support, video output fixes, and several dependency updates.
