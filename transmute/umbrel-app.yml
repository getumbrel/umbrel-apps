manifestVersion: 1
id: denny-transmute
name: Transmute
tagline: An efficient tool for transforming files on your Umbrel
icon: https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-transmute/logo.png
category: files & productivity
version: "2.0.0"
port: 3313
description: >-
  Transmute is a file conversion app for turning files into different formats through a clean and simple interface. It supports a wide range of file types, including images, videos, audio files, documents, structured data, spreadsheets, subtitles, fonts, and diagrams.


  The app is built for both manual conversions and automated workflows. Its API makes it possible to connect Transmute with other apps, scripts, or services, so files can be converted as part of a larger process without doing everything by hand.


  Transmute helps simplify everyday format changes, from converting media files into more compatible formats to transforming documents, data files, and diagrams for further use. It brings many different conversion tasks together in one place and makes them easy to access.
