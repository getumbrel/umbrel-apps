manifestVersion: 1.1
id: fulcrum
implements:
  - electrs
category: bitcoin
name: Fulcrum
version: "2.1.1"
tagline: A fast and nimble Electrum Server
description: >-
  Run your personal Electrum server and connect your Electrum-compatible wallet,
  including BitBoxApp, BlueWallet, Electrum Wallet (Android and Desktop), Nunchuk 
  (Desktop), Phoenix, and Sparrow Wallet to it instead of using a third-party
  Electrum server.


  Powered by Fulcrum from Calin Culianu
developer: Calin Culianu
website: https://fulcrumserver.org/
submitter: Sahil Phule
submission: https://github.com/getumbrel/umbrel-apps/pull/1531
dependencies:
  - bitcoin
repo: https://github.com/cculianu/Fulcrum
support: https://github.com/cculianu/Fulcrum/issues
port: 2109
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultPassword: ""
releaseNotes: >-
  Fulcrum 2.1.1 is a maintenance update with bug fixes and small protocol improvements.


  Key improvements:
    - Added new Electrum RPC methods for checking address and scripthash status without subscribing
    - Improved peer connection throttling to avoid excessive connection churn
    - Reduced the amount of rollback work after an unclean shutdown


  Full release notes are available at https://github.com/cculianu/Fulcrum/releases/tag/v2.1.1
backupIgnore:
  - data/fulcrum/fulc2_db
