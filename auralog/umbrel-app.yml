releaseNotes: "Fixes origin check to allow any *.local mDNS hostname (e.g. my-umbrel.local) and Tailscale CGNAT addresses (100.64.0.0/10). The previous regex only matched the literal hostname umbrel.local, causing valid save requests to 403 and silently fall back to localStorage."
