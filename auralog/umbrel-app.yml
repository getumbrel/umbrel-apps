manifestVersion: 1
id: auralog
name: AuraLog
tagline: AI-powered private journal with mood tracking and insights
category: ai
version: "1.1.1"
port: 3850
description: >-
  AuraLog is a privacy-first journaling app that runs entirely on your Umbrel.
  Your entries are stored on your device and never leave your local network —
  except when you explicitly trigger an AI feature.


  Key features:

  - Mood and energy tracking with guided writing prompts

  - Journey categories (Personal, Work, Reading, Creative, Learning, Health)

  - AI-powered reflections, weekly digests, and pattern analysis

  - Comprehensive analytics with mood trends, emotion profiles, and day-of-week patterns

  - Local-first storage on your Umbrel's filesystem

  - Export your data as JSON anytime


  AI features (optional) require an Anthropic API key. After installing, open
  AuraLog and go to Settings to enter your key. All journaling and local analytics
  work without an API key.
developer: Robert Kobatzki
website: https://github.com/nillawafa/Auralog
repo: https://github.com/nillawafa/Auralog
