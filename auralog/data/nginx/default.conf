server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s;
    set $proxy_upstream http://proxy:3851;

    location /api/ {
        # AuraLog's proxy rejects valid Umbrel hosts such as MagicDNS and custom
        # domains. Accept exact same-origin requests here, then omit the Origin
        # header so the proxy's narrower hostname allowlist does not reject them.
        set $auralog_origin_allowed 0;
        set $auralog_http_origin "http://$http_host";
        set $auralog_https_origin "https://$http_host";

        if ($http_origin = "") {
            set $auralog_origin_allowed 1;
        }
        if ($http_origin = $auralog_http_origin) {
            set $auralog_origin_allowed 1;
        }
        if ($http_origin = $auralog_https_origin) {
            set $auralog_origin_allowed 1;
        }
        if ($auralog_origin_allowed = 0) {
            return 403;
        }

        proxy_pass         $proxy_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_set_header   Authorization     "";
        proxy_set_header   x-api-key         "";
        proxy_set_header   Origin            "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:;" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
