version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: auralog_web_1
      APP_PORT: 80

  web:
    image: ghcr.io/nillawafa/auralog:v1.1.1@sha256:dcb92c73cfbcf470048aea31a5256e4553634078ba6bf5a376c18259ca1c1baa
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - proxy

  proxy:
    image: ghcr.io/nillawafa/auralog-proxy:v1.1.1@sha256:309016d41af1c45c8c505788f38c9e620b379edbac3a299f551f71ada9220ae1
    restart: on-failure
    stop_grace_period: 1m
    environment:
      - PORT=3851
      - NODE_ENV=production
      - DATA_DIR=/data
    volumes:
      - ${APP_DATA_DIR}/data:/data