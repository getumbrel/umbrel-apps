version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: auralog_web_1
      APP_PORT: 80

  web:
    image: ghcr.io/nillawafa/auralog:v1.1.0@sha256:eb561795bbe1d6e3ce4b2ef10abf8f3e513092d4db6470ab16df8f2a824ffc7a
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - proxy
    networks:
      - default

  proxy:
    image: ghcr.io/nillawafa/auralog-proxy:v1.1.0@sha256:466c58ce37fcbbd69db83fb2b198c3d634c688c4c08c7d3656cf237023900a8e
    restart: on-failure
    stop_grace_period: 1m
    environment:
      - PORT=3851
      - NODE_ENV=production
      - DATA_DIR=/data
    volumes:
      - ${APP_DATA_DIR}/data:/data
    networks:
      - default
