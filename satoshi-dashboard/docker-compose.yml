services:
  app_proxy:
    environment:
      APP_HOST: satoshi-dashboard_web_1
      APP_PORT: 8410
      PROXY_AUTH_ADD: "false"

  web:
    image: ghcr.io/satoshi-dashboard/main:v1.1.0@sha256:48b1294f1a86e97754d9945c869fe555ec23cb1f38e98564bec7a8edf01fe11f
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      SERVE_STATIC: "true"
      API_PORT: 8410
      API_HOST: 0.0.0.0
    volumes:
      - ${APP_DATA_DIR}/data:/app/server/.runtime-cache

