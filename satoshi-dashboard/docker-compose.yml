services:
  app_proxy:
    environment:
      APP_HOST: satoshi-dashboard_web_1
      APP_PORT: 8410
      PROXY_AUTH_ADD: "false"

  web:
    image: ghcr.io/satoshi-dashboard/main:v1.1.0@sha256:35ae82af78d972aeb621689e0a1e7dd76fa1c2835dca054c489179a09a279506
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      SERVE_STATIC: "true"
      API_PORT: 8410
      API_HOST: 0.0.0.0
    volumes:
      - ${APP_DATA_DIR}/data:/app/server/.runtime-cache

