<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Rounded rectangle background -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="#1A1A1A"/>

  <!--
    Staircase / bar-chart pattern
    Grid: 4 columns x 4 rows
    Block size: 120x120, gap: 16
    Grid total: 528 x 528, centered at offset (248, 248)

    Row 0 (top):    y = 248
    Row 1:          y = 384
    Row 2:          y = 520
    Row 3 (bottom): y = 656

    Col 0 (left):   x = 248
    Col 1:          x = 384
    Col 2:          x = 520
    Col 3 (right):  x = 656
  -->

  <!-- Column 4 (right) - 4 squares (all rows) -->
  <rect x="656" y="248" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>
  <rect x="656" y="384" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>
  <rect x="656" y="520" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>
  <rect x="656" y="656" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>

  <!-- Column 3 - 3 squares (bottom 3 rows) -->
  <rect x="520" y="384" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>
  <rect x="520" y="520" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>
  <rect x="520" y="656" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>

  <!-- Column 2 - 2 squares (bottom 2 rows) -->
  <rect x="384" y="520" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>
  <rect x="384" y="656" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>

  <!-- Column 1 (left) - 1 square (bottom row) -->
  <rect x="248" y="656" width="120" height="120" rx="12" ry="12" fill="#F7931A"/>
</svg>
