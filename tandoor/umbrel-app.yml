manifestVersion: 1
id: tandoor
name: Tandoor Recipes
tagline: Organize recipes, meal plans, and shopping lists
category: files
version: "2.6.12"
port: 9456
description: >-
  Tandoor Recipes is a self-hosted recipe manager for collecting and organizing your growing collection of digital recipes.


  Import recipes from thousands of websites, plan meals, build shopping lists, organize recipes with cookbooks and tags, and share recipes with family and friends.


  Tandoor is optimized for mobile use and stores your recipes, meal plans, shopping lists, cookbooks, and uploaded media on your Umbrel.
developer: Tandoor Recipes
website: https://tandoor.dev/
repo: https://github.com/TandoorRecipes/recipes
support: https://github.com/TandoorRecipes/recipes/issues
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/pull/5688
gallery:
  - 1.webp
  - 2.webp
  - 3.webp
  - 4.webp
  - 5.webp
releaseNotes: >-
  This update includes security fixes for private recipe access/API endpoints, recipe search sorting, automation regex handling, AI provider URL validation, and bookmarklet access.


  It also improves the pantry booking dialog/table, fixes another order-parameter issue, and updates translations.


  If you use custom AI backends, Tandoor now requires their URLs in AI_ALLOWED_URLS.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
backupIgnore:
  - data/staticfiles/*
