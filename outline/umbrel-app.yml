releaseNotes: >-
  New features and improvements in this release:
    - Added email subscriptions to public documents so readers can follow updates with diff notifications
    - Introduced a redesigned document history with side-by-side comparison of any two revisions
    - Added full right-to-left (RTL) layout support for languages such as Hebrew and Arabic
    - Added a command bar search to public shares with quick access to recently viewed documents
    - Long code blocks now auto-collapse to keep documents easier to scan
    - Links now show previews on hover in shared documents
    - Added keyboard access to Mermaid diagram editing
    - Added context menus to document breadcrumb items
    - Keyboard shortcuts are now displayed in menus where available
    - Copying a document now preserves the full-width property
    - Allowed replacing custom emoji images
    - Added hex color swatch previews
    - Allowed geo:, maps:, and magnet: link protocols
    - Shares must now be created explicitly; they are no longer auto-created
    - Expanded MCP capabilities including patch support, attachment creation, and richer responses
    - Fixed file upload validation for local storage
    - Fixed passkey login errors and duplicate passkey registration
    - Fixed presentation mode slide layout and navigation issues
    - Fixed mention trigger after CJK characters and during IME composition
    - Fixed being unable to search drafts without a collection
    - Various accessibility, mobile, and performance improvements


  Full release notes can be found at https://github.com/outline/outline
dependencies: []
path: ""
defaultUsername: "umbrel@umbrel.local"
deterministicPassword: true
