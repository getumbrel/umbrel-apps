version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: openreader_web_1
      APP_PORT: 3003

  web:
    image: ghcr.io/richardr1126/openreader:4.2.1@sha256:172d9ac3d8ca2595895ca1d82491446036885f0de5b6344686ccce12fbe750a6
    user: "1000:1000"
    environment:
      - API_BASE=http://kokoro_web_1:8880/v1 #Set the TTS API_BASE URL and/or API_KEY as the default for all devices. These values can also be overridden in the UI.
      - BASE_URL=http://${DEVICE_DOMAIN_NAME}:3391
      - AUTH_SECRET=${APP_SEED}
      # Allows auth requests from the primary .local URL, device hostname, Tailscale FQDNs, and host IP URLs.
      - AUTH_TRUSTED_ORIGINS=http://${DEVICE_DOMAIN_NAME}:3391,http://${DEVICE_HOSTNAME}:3391,http://*.ts.net:3391,https://*.ts.net:3391,${APP_OPENREADER_LOCAL_URLS}
      - USE_ANONYMOUS_AUTH_SESSIONS=true
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/docstore:/app/docstore
