version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: opengist_server_1
      APP_PORT: 6157
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/thomiceli/opengist:1.13.1@sha256:dddc26031d1320ebb4bc5b913b3c42a9cb84c7528192d387f99ddcbbe57b0085
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/opengist
    environment:
      UID: "1000"
      GID: "1000"