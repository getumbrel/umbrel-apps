services:
  app_proxy:
    environment:
      APP_HOST: reitti_app_1
      APP_PORT: 8080
      
  app:
    image: dedicatedcode/reitti:4.0.5@sha256:03ab9c781552f89f8c5f4b39fec5397566f873010c2fd013ff7a8ce1414a3bca
    restart: on-failure
    depends_on:
      postgis:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
      tile-cache:
        condition: service_healthy
    environment:
      POSTGIS_USER: reitti
      POSTGIS_PASSWORD: reitti
      POSTGIS_DB: reittidb
      POSTGIS_HOST: reitti_postgis_1
    volumes:
      - ${APP_DATA_DIR}/data/app:/app/data

  postgis:
    image: imresamu/postgis:17-3.5-alpine@sha256:ba5f5012ffe7a01a78e85404d3e081ed7e961013161bb09d39ff09c867ada17b
    restart: on-failure
    environment:
      POSTGRES_USER: reitti
      POSTGRES_PASSWORD: reitti
      POSTGRES_DB: reittidb
    volumes:
      - ${APP_DATA_DIR}/data/postgis:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reitti -d reittidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3-alpine@sha256:69f2c586c8a7e9cce4ae1ee9bbaf60bc4bb5f4bb3880e4ed022b1fd758a7cab9
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tile-cache:
    image: dedicatedcode/reitti-tile-cache:4.0.5@sha256:e51ec7497085db0fa0deb5aef387dfbac8938ae5cbcf0c8f543846bf42e3287c
    restart: on-failure 
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/osm/0/0/0.png"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${APP_DATA_DIR}/data/title-cache:/var/cache/nginx
