manifestVersion: 1
id: ersatztv-legacy
category: media
name: ErsatzTV Legacy
version: "26.6.0"
tagline: Build your own live TV channels
description: >-
  ErsatzTV Legacy transforms your personal media library into custom live TV channels with IPTV, XMLTV guide data, channel scheduling, and browser playback.


  Connect local media from Umbrel's Downloads folder or libraries from Plex, Jellyfin, and Emby, then create channels that can be watched from IPTV clients, media servers, or a web browser.


  Hardware acceleration can be enabled on supported devices by creating a hardware-accelerated FFmpeg profile in ErsatzTV and assigning it to your channels.


  This package uses the ErsatzTV Legacy release stream, which upstream continues to maintain for security updates while ErsatzTV Next remains an experimental rewrite.
releaseNotes: >-
  - Added channel config overlays for the Next streaming engine.
  - Added alternate date-range schedules for sequential schedules.
  - Improved subtitle handling for local libraries, Plex subtitle sync, and Next engine playback.
  - Fixed HLS Direct playback with JWT auth and cleaned up stale search/on-demand playout items.
  - Updated Intel container drivers for newer Battlemage GPUs.
developer: ErsatzTV
website: https://ersatztv.org
dependencies: []
repo: https://github.com/ErsatzTV/legacy
support: https://discuss.ersatztv.org
port: 8409
gallery:
  - 1.webp
  - 2.webp
  - 3.webp
path: ""
defaultUsername: ""
defaultPassword: ""
backupIgnore:
  - data/transcode/*
permissions:
  - STORAGE_DOWNLOADS
  - GPU
submitter: phelipebf
submission: https://github.com/getumbrel/umbrel-apps/pull/4624
