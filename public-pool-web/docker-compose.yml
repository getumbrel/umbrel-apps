services:
  app_proxy:
    environment:
      APP_HOST: public-pool-web_rails-app_1
      APP_PORT: 3000

  rails-app:
    image: martinbarilik/public-pool-web:0.2.0@sha256:f708bdea807986de548df4b2011cee47a827034786293bb7305d53a0a99f86a7
    restart: on-failure
    user: "1000:1000"
    environment:
      - RAILS_MASTER_KEY=${APP_PUBLIC_POOL_WEB_MASTER_KEY}
      - DATABASE_URL=${APP_PUBLIC_POOL_WEB_DATABASE_URL}
      - REDIS_URL=${APP_PUBLIC_POOL_WEB_REDIS_URL}
      - PUBLIC_POOL_HOST=public-pool_server_1
      - PUBLIC_POOL_PORT=2019
      - DONATE_BTC_ADDRESS=bc1qsn9x9vr9alx33687dqq9rt4cgfcldsrxz90pn4
      - DONATE_LN_ADDRESS=martinbarilik@getalby.com
    depends_on:
      db:
        condition: service_healthy
      redis: 
        condition: service_healthy
        
  db:
    image: postgres:18.4@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
    restart: on-failure
    user: "1000:1000"
    environment:
      - POSTGRES_USER=${APP_PUBLIC_POOL_WEB_POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${APP_PUBLIC_POOL_WEB_POSTGRES_PASSWORD}
      - POSTGRES_DB=${APP_PUBLIC_POOL_WEB_POSTGRES_DBNAME}
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_PUBLIC_POOL_WEB_POSTGRES_USERNAME} -d ${APP_PUBLIC_POOL_WEB_POSTGRES_DBNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:8@sha256:c6d4637d757379a2ff040148b95c85936d85a06c129eafa5fbe582f9e720e12f
    restart: on-failure
    user: "1000:1000"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sidekiq:
    image: martinbarilik/public-pool-web:0.2.0@sha256:f708bdea807986de548df4b2011cee47a827034786293bb7305d53a0a99f86a7
    restart: on-failure
    user: "1000:1000"
    environment:
      - RAILS_MASTER_KEY=${APP_PUBLIC_POOL_WEB_MASTER_KEY}
      - REDIS_URL=${APP_PUBLIC_POOL_WEB_REDIS_URL}
      - DATABASE_URL=${APP_PUBLIC_POOL_WEB_DATABASE_URL}
      - PUBLIC_POOL_HOST=public-pool_server_1
      - PUBLIC_POOL_PORT=2019
    command: bundle exec sidekiq
    depends_on:
      - redis
      - db
      - rails-app
