manifestVersion: 1
id: public-pool-web
category: bitcoin
name: Public Pool's Web
version: "0.2.0"
tagline: Modern web interface for managing your Public Pool's data
description: >
  Public Pool's Web provides a sleek, user-friendly interface for managing and monitoring
  your Public Pool's data. 


  Built with Rails 8.1 and modern web technologies, it offers
  real-time updates, detailed analytics, and comprehensive pool management features.


  Features:
    - Add user
    - Add worker
    - Change theme
    - Sidekiq web interface ( to check background jobs, usually you do not mess with it )

  This is a hobby project!
developer: martinbarilik
website: https://github.com/martinbarilik/public-pool-web
dependencies:
  - public-pool
repo: https://github.com/martinbarilik/public-pool-web
support: https://github.com/martinbarilik/public-pool-web/discussions
port: 2021
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: "/"
defaultUsername: ""
defaultPassword: ""
releaseNotes: |-
  ⚠️ BREAKING CHANGES! ⚠️
  PostgreSQL database was updated from 17 to 18 which introduced change in mount point. Please UNINSTALL before updating.

  Key highlights in this release:
    - using docker's domain names instead of IP addresses
    - block height in pool info
    - worker's temperature ( with worker's ip address setting)
    - donation page
    - tons of bug fixes, cleanups and improvements
    - PostgreSQL 18.4
    - Redis replaced by Valkey ( without persisted data, irrelevant for this app )
    - Rails 8.1, Ruby 4.0.5
submitter: "martinbarilik"
submission: https://github.com/getumbrel/umbrel-apps/pull/3159