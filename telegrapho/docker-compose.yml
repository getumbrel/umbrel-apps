version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: telegrapho_app_1
      APP_PORT: 3712

  app:
    image: ghcr.io/egzola/telegrapho:1.0.0@sha256:b1555c2e1250aeea8223c4a13ba79e4818d10ce828db9d9908345dfbe340c8f4
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PORT: 3712
    volumes:
      - ${APP_DATA_DIR}/data:/data
