manifestVersion: 1
id: hermes-workspace
name: Hermes Workspace
tagline: Your AI agent's command center
category: ai
version: "0.1.0"
port: 8601
description: >-
  Hermes Workspace is the web app for Hermes Agent. It gives you chat, terminal, files, memory, skills, and session history in one interface.

  Install Hermes Agent first, then open Hermes Workspace. The workspace connects to your local Hermes backend and reuses the same Hermes home directory, so your sessions, memory files, config, and terminal state stay in sync.

  To get started on Umbrel, open Hermes Agent first and run `hermes model` in its terminal to connect a model. After that, Hermes Workspace will use the same backend.

developer: outsourc-e
