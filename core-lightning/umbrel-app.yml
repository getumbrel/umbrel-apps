  - 3.jpg
path: ""
defaultPassword: ""
submitter: Blockstream
submission: https://github.com/getumbrel/umbrel-apps/pull/475
releaseNotes: >-
  **v25.09.3:**

  This updates cln-application to v25.07.3, lightningd to v25.09.3, and replaces the legacy c-lightning-rest service with the built-in REST interface of lightningd.


  **CLN Application v25.07.3:**
    - Proactive mitigation against npm ecosystem threats
    - Updated environment variables for improved configuration
    - Support for Commando over secure WebSocket connections
    - Updated BKPR date format to DD MMM, YYYY
    - Infinite scroll support for transactions

  **CLN v25.09.3:**
    - Bookkeeper migrated into core lightning for payment/fee visibility
    - xpay can now directly pay BIP353 addresses and simple offers
    - Better feedback when channel creation fails
    - Limiting payment split parts on xpay and askrene
    - Reckless supports modern uv package manager for Python plugins
    - Splicing improvements for Eclair compatibility
    - Security: all peers must support channel type
    - Payment secrets now mandatory in BOLT11 invoices


  **Hotfix Notes:**

  - DR Recovery scaffolding added to exports.sh (commented out by default)
  - container_name labels added for DNS stability (CLN, RTL, nostr-relay, NPM, WordPress)
  - Canonical APP_CORE_LIGHTNING_* variable exports standardized
  - clnrest plugin bound to 0.0.0.0 for internal connectivity
  - External wallet connection details corrected

backupIgnore:
  - data/lightningd/bitcoin/lightningd.sqlite3
