releaseNotes: >-
  Stabilization release for Core Lightning v25.09.3 on umbrelOS. Fixes internal CLNRest wiring left unpatched after hotfix.1, adds Provider Contract for consumer apps, and introduces startup ordering.


  **Provider Contract (exports.sh):**
    - Canonical CLNREST_HOST, CLNREST_PORT, CLNREST_URL, CLNREST_SERVER_CERT (alias CLNREST_CERT), CLNREST_CA, CLNREST_RUNE_PATH exports
    - Consumer apps (RTL, LNbits) bind to contract variables instead of reconstructing URLs
    - Backward-compatible aliases preserved for DR recovery safety


  **CLNRest bind fix (docker-compose.yml):**
    - --clnrest-host=0.0.0.0 binds to all interfaces (was defaulting to 127.0.0.1, unreachable from sibling containers)
    - --clnrest-port=2107 explicit (was implicit default)
    - --experimental-dual-fund enabled
    - --disable-plugin=bookkeeper (workaround for assertion crash on v25.09.3, resolved in v25.12)


  **Startup ordering:**
    - tor starts before lightningd (needs SOCKS proxy)
    - lightningd starts before app (CLN GUI needs CLNRest/gRPC ready)
    - app_proxy remains independent, no dependency on other services


  **Previous release notes (hotfix.1):**
    - Fixed external wallet client connections (Zeus/Tor/clearnet)

