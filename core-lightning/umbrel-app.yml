releaseNotes: >-
  Stabilization release for Core Lightning v25.09.3 on umbrelOS.


  This app-store bump formalizes Core Lightning as a provider for dependent apps
  (RTL and LNbits-CLN) and hardens CLNRest reachability for inter-app traffic.


  **Provider Contract:**
    - Canonical exports for CLNRest URL, certs, rune path, WebSocket, and gRPC
    - Consumer apps bind to exported contract variables instead of reconstructing endpoints
    - Backward-compatible aliases retained for recovery and migration safety


  **Runtime hardening:**
    - CLNRest explicitly bound and published on 2107 for sibling container access
    - Startup sequencing ensures tor -> lightningd -> app dependencies settle in order
    - `--experimental-dual-fund` enabled for modern channel workflows
    - `bookkeeper` remains disabled on v25.09.3 as a known temporary workaround
    - Forensic delta from HotFix 1: internal consumer wiring now binds to canonical `CLNREST_*` exports instead of mixed legacy host/port reconstruction


  **Upgrade track:**
    - Next validation target is CLN v25.12.1 + cln-application v26.01.2 (tracked separately)

