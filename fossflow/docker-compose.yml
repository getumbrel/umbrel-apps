version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: fossflow_web_1
      APP_PORT: "80"

  web:
    image: stnsmith/fossflow:master-4426d08@sha256:9709d727bf15c96b32860744ddeef3be693362bbea136574dc7685b61744298b
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/diagrams:/data/diagrams
    environment:
      - NODE_ENV=production
      - ENABLE_SERVER_STORAGE=true
      - STORAGE_PATH=/data/diagrams
      - ENABLE_GIT_BACKUP=false
