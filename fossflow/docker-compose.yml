version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: fossflow_web_1
      APP_PORT: "80"

  web:
    image: stnsmith/fossflow:master-0da9ff3@sha256:5554f931d6197ae1e3c12045089d436dc42181e5f94dc7cfff6dd0357a8b0089
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/diagrams:/data/diagrams
    environment:
      - NODE_ENV=production
      - ENABLE_SERVER_STORAGE=true
      - STORAGE_PATH=/data/diagrams
      - ENABLE_GIT_BACKUP=false
