manifestVersion: 1
id: wazuh
category: networking
name: Wazuh
version: "4.14.5"
tagline: Open source security platform for threat detection and response
description: >-
  Wazuh is a free and open source security platform that unifies XDR and SIEM
  capabilities to protect your workloads across on-premises, virtualized,
  containerized, and cloud environments.


  Running on your Umbrel, Wazuh becomes the central brain of your home or small
  business security: install lightweight Wazuh agents on your other machines and
  they report back here for centralized monitoring, alerting, and analysis.


  Core capabilities:

  - Intrusion detection and log data analysis

  - File integrity monitoring (FIM)

  - Vulnerability detection on monitored endpoints

  - Security configuration assessment (CIS benchmarks)

  - Threat hunting and an out-of-the-box rule set mapped to MITRE ATT&CK

  - Regulatory compliance support (PCI DSS, GDPR, HIPAA, NIST 800-53)


  This app bundles the full single-node stack — the Wazuh indexer, manager, and
  dashboard — preconfigured and ready to use.


  Wazuh agents can be installed on Linux, Windows, macOS, and more, and report
  back to your Umbrel node for centralized monitoring.


  Recommended: 4GB RAM minimum, 8GB+ for production use. The first start can
  take a few minutes while the indexer initializes.


  Default login: admin / SecretPassword (change it after first login).
