# Wazuh single-node deployment, adapted for umbrelOS.
# Based on https://github.com/wazuh/wazuh-docker (GPLv2) single-node compose.
services:
  # umbrelOS reverse proxy. Gates the dashboard behind the Umbrel password and
  # forwards to the (plain HTTP) Wazuh dashboard.
  app_proxy:
    environment:
      APP_HOST: wazuh.dashboard
      APP_PORT: 5601

  # One-shot: generate the TLS certificates on first boot only. If they already
  # exist we skip generation so the cluster keeps its identity across restarts.
  wazuh.certs-generator:
    image: wazuh/wazuh-certs-generator@sha256:369b4d58509aab074b188596870c81584f7120e653d9ef83c591f0f785dcf325
    environment:
      - CERT_TOOL_VERSION=4.14
    entrypoint: sh -c "[ -f /certificates/root-ca.pem ] && echo 'Certificates already present, skipping generation.' || /entrypoint.sh"
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs:/certificates
      - ${APP_DATA_DIR}/config/certs.yml:/config/certs.yml

  wazuh.indexer:
    image: wazuh/wazuh-indexer@sha256:d5606766ebc2398d71f2d2ef213709bf8435e22587d91f53fccf18f1114007b9
    hostname: wazuh.indexer
    restart: always
    depends_on:
      wazuh.certs-generator:
        condition: service_completed_successfully
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fks https://localhost:9200/_cluster/health -u admin:SecretPassword || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem
      - ${APP_DATA_DIR}/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - ${APP_DATA_DIR}/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml

  wazuh.manager:
    image: wazuh/wazuh-manager@sha256:9eca1f6483e7ecf53c3a00524cee8f491afe6d26d724b71064b82191ea157e99
    hostname: wazuh.manager
    restart: always
    depends_on:
      wazuh.indexer:
        condition: service_healthy
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      # Agent communication / enrollment / syslog / REST API. Exposed on the
      # host so Wazuh agents on your network can report in.
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - ${APP_DATA_DIR}/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard@sha256:3b3c1ea9843c1f2f255f682884b8ee061711cf29e6f27d1de8b81192b4f6e54f
    hostname: wazuh.dashboard
    restart: always
    depends_on:
      wazuh.indexer:
        condition: service_healthy
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ${APP_DATA_DIR}/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ${APP_DATA_DIR}/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ${APP_DATA_DIR}/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
