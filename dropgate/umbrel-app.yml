manifestVersion: 1
id: dropgate
category: files
name: Dropgate
version: "3.0.9"
tagline: Privacy-first file sharing with E2EE and P2P support
description: >-
  Dropgate is a self-hosted, privacy-first file sharing system with both hosted
  upload and direct P2P transfer capabilities.

  Features:
  - End-to-End Encryption (E2EE) - Encrypt on sender, decrypt on recipient
  - Privacy First - No analytics, no tracking, no logging of file contents
  - Direct Transfer (P2P) - Great for big files or zero-storage sharing
  - Built-in Web UI - Send and receive from a browser
releaseNotes: >-
  Initial release of Dropgate for Umbrel.

  This version includes:
  - Full Dropgate Server functionality
  - Web UI for file sharing
  - P2P transfer support
  - End-to-End Encryption support

  Default configuration:
  - P2P transfers enabled
  - Hosted uploads disabled (enable with ENABLE_UPLOAD env var)
  - Max file size: 100MB
  - Max storage: 10GB

