manifestVersion: 1
id: dropgate
category: files
name: Dropgate
version: "3.0.9"
tagline: Privacy-first file sharing with E2EE
description: >-
  Dropgate is a self-hosted, privacy-first file sharing system with hosted
  upload capabilities.

  Features:
  - End-to-End Encryption (E2EE) - Encrypt on sender, decrypt on recipient
  - Privacy First - No analytics, no tracking, no logging of file contents
  - Built-in Web UI - Send and receive from a browser
releaseNotes: >-
  Initial release of Dropgate for Umbrel.

  This version includes:
  - Full Dropgate Server functionality
  - Web UI for file sharing
  - Hosted upload support
  - End-to-End Encryption support

  Default configuration:
  - Hosted uploads enabled
  - Max file size: 100MB
  - Max storage: 10GB

developer: Diamond Digital Development
