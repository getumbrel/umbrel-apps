releaseNotes: >-
  This update adds support for multiple Discord IDs, public Seerr logos in email notifications, and server-side internationalization for notification agents.


  It also improves media availability and watchlist sync behavior, fixes request and notification edge cases, and includes UI/search polish across the app.


  Full release notes are available at https://github.com/seerr-team/seerr/releases/tag/v3.3.0
