releaseNotes: >-
  This release brings improved cloud model performance, new model support, and non-interactive task capabilities.


  Key highlights in this release:
    - Up to 2x faster speeds with Kimi-K2.5 cloud model and improved tool calling accuracy
    - Added Nemotron-3-Super, a new 122B parameter model by NVIDIA for high-performance agentic reasoning
    - New `--yes` flag for `ollama launch` to run AI assistants in non-interactive environments like scripts and CI pipelines
    - Cloud models no longer require `ollama pull` — using `:cloud` as a tag automatically connects to them
    - Up to 10x faster responses for MiniMax-M2.5 and up to 2x faster for Qwen3.5 on Ollama's cloud for North American users
    - ⚠️ This release ships with ROCm 7 for AMD GPU users — driver updates are required for continued GPU support


  Full release notes are available at https://github.com/ollama/ollama/releases
