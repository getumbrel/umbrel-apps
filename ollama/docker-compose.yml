version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: ollama_dashboard_1
      APP_PORT: 11434
      PROXY_AUTH_ADD: "false"

  dashboard:
    image: nginx:1.27.5-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    depends_on:
      - ollama
    volumes:
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${APP_DATA_DIR}/admin.html:/usr/share/nginx/html/admin/index.html:ro
    restart: on-failure

  ollama:
    image: ollama/ollama:0.30.10@sha256:bfc9c6d53cc6989aa5131a6fde6b162b2802d4d337657f3253b5f69579bddeee
    environment:
      OLLAMA_ORIGINS: "*"
      OLLAMA_CONTEXT_LENGTH: 8192
    volumes:
      - ${APP_DATA_DIR}/data:/root/.ollama
    restart: on-failure
