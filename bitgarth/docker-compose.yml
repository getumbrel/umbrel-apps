version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bitgarth_web_1
      APP_PORT: 8080

  web:
    image: bitgarth/bitgarth:0.2.0@sha256:763070f1211232ff431e15b847736e4c17f8b44d2214763036f3e4b0cc660ae0
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      BITGARTH_CHANNEL: umbrel
