version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bitgarth_web_1
      APP_PORT: 8080

  web:
    image: bitgarth/bitgarth:0.2.1@sha256:c37abd12671368af8f6bffd4be281f4f74025d10ba3f6f3ac72a0aec07c1c67c
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      BITGARTH_CHANNEL: umbrel
