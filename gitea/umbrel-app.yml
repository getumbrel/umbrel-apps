manifestVersion: 1.1
id: gitea
category: developer
name: Gitea
version: "1.25.5"
tagline: A painless self-hosted Git service
description: >-
  Gitea is a painless self-hosted Git service. It is similar to
  GitHub, Bitbucket, and GitLab. It is a community managed lightweight code
  hosting solution written in Go. Gitea's minimal requirements allow it to run
  seamlessly on inexpensive hardware like a Raspberry Pi. Features:


    - Fully self-hosted and private
    - Issue tracker
    - Account/Organization/Repository management
    - Tor support
    - Repository Git hooks/deploy keys
    - Repository issues, pull requests and wiki
    - Add/Remove repository collaborators
    - Gravatar and custom source
    - Admin panel
developer: Gitea
website: https://gitea.io/en-us/
dependencies: []
repo: https://github.com/go-gitea/gitea
support: https://discourse.gitea.io
port: 8085
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  This update includes important security fixes and several improvements:
    - Fixed redirect bypass vulnerability via backslash-encoded paths
    - Fixed release draft permission check and OAuth2 authorization code handling
    - Fixed a bug where a user could change another user's primary email
    - Fixed permission checks for pull request branch updates, track time, and org visibility
    - Added validation constraints for repository creation fields
    - Fixed forwarded proto handling for public URL detection
    - Fixed non-admins being unable to auto-merge PRs from forks
    - Fixed bugs with push mirror wiki, LFS GC, and protected branch rule conflicts
    - Fixed artifacts upload issues and CRAN package version validation
    - Various bug fixes and stability improvements


  Full release notes: https://github.com/go-gitea/gitea/releases
