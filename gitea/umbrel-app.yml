  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  This release includes security fixes and bug fixes:
    - Fixed several security issues around host filtering, LFS access, CODEOWNERS matching, OIDC organization links, and repository/package access checks
    - Updated security-sensitive dependencies, including golang.org/x/net
    - Tightened Gitea Actions fork pull request approval behavior so only merged pull requests can bypass the approval gate
    - Fixed panics in SSH LFS endpoint parsing and tracked-time API filters
    - Fixed workflow dispatch/action log handling, release-note generation for initial tags, HTTP content rendering, issue target branch selection, and stale review requests


  Full release notes: https://github.com/go-gitea/gitea/releases/tag/v1.26.3
