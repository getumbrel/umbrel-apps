manifestVersion: 1.1
id: gitea
category: developer
name: Gitea
version: "1.26.1"
tagline: A painless self-hosted Git service
description: >-
  Gitea is a painless self-hosted Git service. It is similar to
  GitHub, Bitbucket, and GitLab. It is a community managed lightweight code
  hosting solution written in Go. Gitea's minimal requirements allow it to run
  seamlessly on inexpensive hardware like a Raspberry Pi. Features:


    - Fully self-hosted and private
    - Issue tracker
    - Account/Organization/Repository management
    - Tor support
    - Repository Git hooks/deploy keys
    - Repository issues, pull requests and wiki
    - Add/Remove repository collaborators
    - Gravatar and custom source
    - Admin panel
developer: Gitea
website: https://gitea.io/en-us/
dependencies: []
repo: https://github.com/go-gitea/gitea
support: https://discourse.gitea.io
port: 8085
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  This is a bug fix release addressing issues found in v1.26.0:
    - Fixed actions concurrency groups leaking across branches
    - Fixed container auth for public instances
    - Fixed URL-related escaping for OAuth2
    - Fixed an issue where changing an organization's visibility caused problems when users had forked its repositories
    - Fixed accessing user badges
    - Fixed RPM package fallback to noarch when requested arch is missing
    - Fixed Mermaid diagrams failing when node labels contain line breaks
    - Fixed button layout shift when collapsing file tree in editor
    - Fixed org team assignee and reviewer lookups for team member permissions
    - Fixed dump with default zip type producing uncompressed zip
    - Various additional bug fixes and stability improvements


  Full release notes: https://github.com/go-gitea/gitea/releases
torOnly: false
