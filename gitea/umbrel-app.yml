path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  This release includes security fixes and bug fixes:
    - Strengthened token-scope checks for API queries, repository access, raw/media/attachment downloads, wiki Git writes, LFS token access, and packages
    - Improved OAuth security with client request binding, stricter PKCE validation, and refresh-token replay protection
    - Fixed basic auth, URL sanitization, and attachment Content-Security-Policy handling
    - Fixed pull request reviews when the files view is empty, branch comparison edge cases, merge-base display, and review submission from single-commit views
    - Fixed several Actions issues, including deadlocks, null workflow/event panics, workflow parameter validation, log transfer, and job status reporting
    - Fixed package creation conflicts, generic package download filenames, case-insensitive email handling, and invalid UTF-8 commit messages in JSON API responses


  Full release notes: https://github.com/go-gitea/gitea/releases/tag/v1.26.2
