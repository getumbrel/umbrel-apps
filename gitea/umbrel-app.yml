manifestVersion: 1.1
id: gitea
category: developer
name: Gitea
version: "1.26.0"
tagline: A painless self-hosted Git service
description: >-
  Gitea is a painless self-hosted Git service. It is similar to
  GitHub, Bitbucket, and GitLab. It is a community managed lightweight code
  hosting solution written in Go. Gitea's minimal requirements allow it to run
  seamlessly on inexpensive hardware like a Raspberry Pi. Features:


    - Fully self-hosted and private
    - Issue tracker
    - Account/Organization/Repository management
    - Tor support
    - Repository Git hooks/deploy keys
    - Repository issues, pull requests and wiki
    - Add/Remove repository collaborators
    - Gravatar and custom source
    - Admin panel
developer: Gitea
website: https://gitea.io/en-us/
dependencies: []
repo: https://github.com/go-gitea/gitea
support: https://discourse.gitea.io
port: 8085
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  This is a major feature release with new capabilities and improvements:
    - Added support for Actions concurrency syntax and workflow dependencies visualization
    - Added Terraform state registry support
    - Added instance-wide info banner and maintenance mode
    - Added support for rendering OpenAPI specs and keyboard shortcuts for code search
    - Added automatic generation of release notes for repositories
    - Added user badges, admin badge in navbar, and per-runner disable/pause controls
    - Added configurable permissions for Actions automatic tokens
    - Added ability to re-run failed jobs in Actions
    - Added support for actions and reusable workflows from private repos
    - Added "Go to file" and "Delete Directory" buttons to repo file list
    - Improved performance with async loading, render caching, and faster pagination
    - Added mermaid zoom/drag viewer controls and elk layout support
    - Added resolve/unresolve review comment API endpoints
    - Added OIDC RP-Initiated Logout support
    - Added quick approve button on PR page and commenting on expanded diff lines
    - Various bug fixes and stability improvements


  Full release notes: https://github.com/go-gitea/gitea/releases
torOnly: false
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel/commit/d62e00353917143a3a10d3b376859f51b665d150
