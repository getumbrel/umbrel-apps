version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: seafile
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  db:
    image: mariadb:10.11.6@sha256:e846701e66dcc95a3f90d161cc3dfc2e4ff96f0699ee4fb93b0bfdab94158570
    container_name: seafile-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=db_dev
      - MYSQL_LOG_CONSOLE=true
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/mysql

  memcached:
    image: memcached:1.6.42@sha256:26983a43c9181d37d0f9b0d2cf49c3ccf02e5b816afb1f8ffff7f825e65bcdad
    container_name: seafile-memcached
    entrypoint: memcached -m 256

  seafile:
    image: seafileltd/seafile-mc:13.0.24@sha256:8ecf23c68aac8c3fd05de252706e75697f506e25afce5ba5558726f8efae757a
    container_name: seafile
    volumes:
      - ${APP_DATA_DIR}/data/seafile-data:/shared
    environment:
      - DB_HOST=seafile-mysql
      - DB_ROOT_PASSWD=db_dev
      - SEAFILE_MYSQL_DB_HOST=seafile-mysql
      - SEAFILE_MYSQL_DB_PORT=3306
      - SEAFILE_MYSQL_DB_USER=root
      - SEAFILE_MYSQL_DB_PASSWORD=db_dev
      - INIT_SEAFILE_MYSQL_ROOT_PASSWORD=db_dev
      - SEAFILE_MYSQL_DB_CCNET_DB_NAME=ccnet_db
      - SEAFILE_MYSQL_DB_SEAFILE_DB_NAME=seafile_db
      - SEAFILE_MYSQL_DB_SEAHUB_DB_NAME=seahub_db
      - JWT_PRIVATE_KEY=${APP_SEED}
      - INIT_SEAFILE_ADMIN_EMAIL=umbrel
      - INIT_SEAFILE_ADMIN_PASSWORD=${APP_PASSWORD}
      - SEAFILE_SERVER_LETSENCRYPT=false
      - SEAFILE_SERVER_HOSTNAME=${DEVICE_DOMAIN_NAME}:8920
      - SEAFILE_SERVER_PROTOCOL=http
      - SITE_ROOT=/
      - ENABLE_SEADOC=true
      - SEADOC_SERVER_URL=http://${DEVICE_DOMAIN_NAME}:8921
      - CACHE_PROVIDER=memcached
      - MEMCACHED_HOST=memcached
      - MEMCACHED_PORT=11211
    depends_on:
      - db
      - memcached

  seadoc:
    image: seafileltd/sdoc-server:2.0.9@sha256:5b1bf5a8bfdb8bc5db957e7faee2220111fd6eff00795eaaf172e2f80bb999a5
    volumes:
      - ${APP_DATA_DIR}/data/seadoc-data:/shared
    ports:
      - 8921:80
    environment:
      - DB_HOST=seafile-mysql
      - DB_USER=root
      - DB_PASSWORD=db_dev
      - DB_NAME=seahub_db
      - JWT_PRIVATE_KEY=${APP_SEED}
      - SEAHUB_SERVICE_URL=http://seafile
    extra_hosts:
      - "${DEVICE_DOMAIN_NAME}:host-gateway"
    depends_on:
      - db
