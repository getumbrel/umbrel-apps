releaseNotes: >-
  This major update adds serial connections, Tailscale and WireGuard host integrations, HashiCorp Vault SSH authentication, Bitwarden SSH agent support, WebAuthn passkeys, Podman support, and a new grid-based dashboard.


  New features and improvements:
    - Added Termix ID public handles, a hosted public key resolver, and a built-in CA for issuing SSH certificates
    - Added host metrics history graphs, host temperature metrics, alerting with ntfy/webhook notifications, and app fullscreen mode
    - Added SSH agent forwarding, PuTTY PPK key support, custom tunnel endpoints, terminal theme colors, and terminal font zoom
    - Added file-manager clipboard support across hosts and safer prompts for large files and active host sessions
    - The Umbrel package now includes the required guacd service for RDP, VNC, and Telnet connections


  Bug fixes:
    - Fixed SSH port connections, jump-host proxy selection, tunnel endpoint resolution, and dashboard service link creation
    - Fixed large file uploads, missing file-manager schema migrations on upgrade, file path casing, and file downloads
    - Fixed VNC/RDP/Telnet connection issues, OIDC desktop authentication, OIDC credential sharing, and several UI/layout issues


  Full release notes can be found at https://github.com/Termix-SSH/Termix/releases/tag/release-2.5.0-tag
