releaseNotes: >-
  ⚠️ Security update: Wavelog 2.4.2 fixes a critical vulnerability affecting Wavelog 1.8 and later. Update promptly.


  This release also adds a lightweight QRZ.com search page, improves first-login and SSO behavior, and fixes bugs in bandplan handling, Notes titles, duplicate checks, Cabrillo exports, LoTW upload checks, CAT URL handling, and installer security.


  Full release notes can be found at https://github.com/wavelog/wavelog/releases/tag/2.4.2
