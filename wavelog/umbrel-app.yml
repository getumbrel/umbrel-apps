releaseNotes: >-
  This is a maintenance release fixing a number of bugs and refactoring several pages including DX-Cluster, Advanced Logbook, and JCC award.


  Key highlights include:
    - Fixed a bug in logic for ITU zone awards
    - Fixed DXCC stats not showing when propagation mode was not set
    - Fixed a bug on the visitor page that caused a 500 error
    - Fixed home QTH calculation on the DX-Cluster map
    - Added source filter to DX-Cluster band list
    - Added mode and heatmap to the Timeplotter
    - Added wrapping of CQ and ITU zones in the Advanced Logbook map
    - Fixed Quicksearch in the Advanced Logbook
    - Fixed duplicate mode issue in the Advanced Logbook filter dropdown
    - Added QSO merge functionality to the Advanced Logbook
    - Refactored JCC award with major speed increase
    - Added band slots to the DXCC summary for "All Bands" view
    - Fixed flickering local time display in logging view while changing callsigns
    - Extended filters for the get_contacts_adif API


  Full release notes can be found at https://github.com/wavelog/wavelog/releases
