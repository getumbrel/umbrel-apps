releaseNotes: >-
  Wavelog 3.0.1 is a follow-up to the recent Wavelog 3.0.0 major update. If you're updating from a pre-3.0.0 version, note that Wavelog 3.0.0 introduced a new multiuser contesting engine and QSL card designer. If you use WavelogGate, update it alongside this release.


  This bugfix release includes several fixes and security improvements, plus small refinements to contesting and the QSL card designer.


  It fixes QSL Designer upload/blank-page issues, improves contesting behavior, adds map theme and quick theme-switch options, improves ADIF station-location search and award layouts, and fixes QSL Queue, callsign lookup, mobile QSO frequency, and MySQL 8+ installation issues.


  Full release notes can be found at https://github.com/wavelog/wavelog/releases/tag/3.0.1
