releaseNotes: >-
  Wavelog 3.0.2 is a follow-up to the recent Wavelog 3.0.0 major update. If you're updating from a pre-3.0.0 version, note that Wavelog 3.0.0 introduced a new multiuser contesting engine and QSL card designer. If you use WavelogGate, update it alongside this release.


  This release adds Cronmanager "Run Now" buttons, improves Wavelog Worker websocket support and token handling, and refines the new contesting engine with QRG editing, band-based serial counters, hardware-default handling, and better legacy contest imports.


  It also improves QSL Designer image uploads, copy-template and unsaved-change handling, redesigns the QSL print queue, adds soft callsign validation for imports, fixes an OQRS vulnerability and malformed-time errors, and includes several ADIF, dashboard, Advanced Logbook, VUCC, and satellite-operation fixes.


  Full release notes can be found at https://github.com/wavelog/wavelog/releases/tag/3.0.2
