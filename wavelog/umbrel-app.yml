releaseNotes: >-
  ⚠️ Major update: Wavelog 3.0.0 introduces a new multiuser contesting engine and QSL card designer. If you use WavelogGate, update it alongside this release.


  This release adds Wavelog Worker support, refreshes award and settings pages with a card-based layout, improves Advanced Logbook label printing and duplicate checks, improves ADIF/API behavior, and fixes QSL queue, OQRS search, and map-loading issues.


  Security fixes include safer station/API handling to prevent another user's stored queries from being run and stricter station ID validation.


  Full release notes can be found at https://github.com/wavelog/wavelog/releases/tag/3.0.0
