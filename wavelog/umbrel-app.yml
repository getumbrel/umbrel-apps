releaseNotes: >-
  ⚠️ Security update: Wavelog 2.5 fixes security issues and vulnerabilities. Update promptly.


  This release adds AMSAT Rover Award tracking, DXCC band/mode/continent progress, QSL Queue improvements, refreshed dashboard/analytics/satellite pass pages, and stricter validation for QSO edits and logbook batch editing.


  It also fixes SQL compatibility issues, QSL gallery request errors, Notes controller bugs, propagation and QSL field handling, and other minor bugs.


  Full release notes can be found at https://github.com/wavelog/wavelog/releases/tag/2.5
