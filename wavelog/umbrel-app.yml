releaseNotes: >-
  ⚠️ Security update: Wavelog 2.5.1 tightens search input validation and includes additional security and performance improvements. Update promptly.


  This release redesigns the dashboard, adds dashboard cards for active DXpeditions and contests, improves login/session update performance, refreshes Global Options pages, fixes WAPC award summary totals, and adds safer QSL image delete/upload checks.


  If you use WavelogGate, update it too for the new transverter support.


  Full release notes can be found at https://github.com/wavelog/wavelog/releases/tag/2.5.1
