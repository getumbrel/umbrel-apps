releaseNotes: >-
  New features in this release:
    - Added option to auto-select the UI language based on the browser's language setting
    - Added option to automatically switch between list view and grid view depending on folder contents
    - The audio player can now play Nintendo 3DS and Wii background music files (bcstm, bfstm, brstm)
    - Added 1000-based file size units alongside the existing 1024-based units
    - Config files can now use OS environment variables in the global config section
    - Added option to specify TLS certificate and key as separate files


  Bugfixes in this release:
    - Fixed WebDAV clients being unable to use PROPFIND on a file with depth infinite
    - Fixed audio player crashing when a folder contains an m3u file and the sort order is changed during playback
    - Fixed nameless text file uploads incorrectly getting the .ssa extension instead of .txt when magic mode was enabled
    - Fixed the tail/follow function spamming the log with repeated reopen messages on some filesystems
    - Fixed audio files embedded in video files not thumbnailing correctly


  Full release notes can be found at https://github.com/9001/copyparty/releases
