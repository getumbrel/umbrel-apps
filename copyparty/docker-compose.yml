version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: copyparty_web_1
      APP_PORT: 3923

  web:
    image: ghcr.io/9001/copyparty-ac:1.20.14@sha256:d8aa87141c6fb35e9e620d477acb7f7950a0917d7fdd9c5b23cdf53de185835d
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data/config/config.conf:/cfg/config.conf:ro
      - ${APP_DATA_DIR}/data/cp_data:/cfg/hists
      - ${APP_DATA_DIR}/data/shared:/shr
      - ${APP_DATA_DIR}/data/media:/media      
    environment:
      TZ: UTC
