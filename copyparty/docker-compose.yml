version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: copyparty_web_1
      APP_PORT: 3923

  web:
    image: ghcr.io/9001/copyparty-ac:1.20.18@sha256:59fe48c65b5f527c98abf0dfb9eb59e4177923c6a97287974524a6dacc0dbea7
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data/config/config.conf:/cfg/config.conf:ro
      - ${APP_DATA_DIR}/data/cp_data:/cfg/hists
      - ${APP_DATA_DIR}/data/shared:/shr
      - ${APP_DATA_DIR}/data/media:/media      
    environment:
      TZ: UTC
