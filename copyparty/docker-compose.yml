version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: copyparty_web_1
      APP_PORT: 3923

  web:
    image: ghcr.io/9001/copyparty-ac:1.20.13@sha256:059c7e2c75a4d2402ccc23febc281b87dc80ec2ba2dcb23de1f666f0b33b9b74
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data/config/config.conf:/cfg/config.conf:ro
      - ${APP_DATA_DIR}/data/cp_data:/cfg/hists
      - ${APP_DATA_DIR}/data/shared:/shr
      - ${APP_DATA_DIR}/data/media:/media      
    environment:
      TZ: UTC
