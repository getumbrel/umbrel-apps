manifestVersion: 1
id: frigate
category: automation
name: Frigate
version: "0.17.1-1"
tagline: A complete and local NVR
description: >-
  A complete and local NVR designed for Home Assistant with AI object detection. 
  Uses OpenCV and Tensorflow to perform realtime object detection locally for IP cameras.


  🛠️ SET-UP


  - You can configure your cameras directly within the Frigate app, there is no need to manually edit the configuration files.


  - Your RTSP password (if needed) is the "default app password" that is displayed on Frigate's page in the app store (shown after install).
releaseNotes: >-
  This package revision keeps Frigate on upstream 0.17.1 and protects the web UI behind Umbrel app authentication.


  Frigate now opens through Umbrel's app-authenticated proxy instead of exposing Frigate's internal unauthenticated UI directly. The default package uses Frigate's documented reverse-proxy mode, so Umbrel remains the login layer and no separate Frigate admin password is required for the default setup.


  Full upstream release notes for Frigate 0.17.1 are available at https://github.com/blakeblackshear/frigate/releases/tag/v0.17.1
developer: Blake Blackshear
website: https://frigate.video/
repo: https://github.com/blakeblackshear/frigate
support: https://github.com/blakeblackshear/frigate/issues
port: 5004
gallery:
