manifestVersion: 1.1
id: frigate
category: automation
name: Frigate
version: "0.17.2"
tagline: A complete and local NVR
description: >-
  A complete and local NVR designed for Home Assistant with AI object detection. 
  Uses OpenCV and Tensorflow to perform realtime object detection locally for IP cameras.


  🛠️ SET-UP


  - You can configure your cameras directly within the Frigate app, there is no need to manually edit the configuration files.


  - Sign in to Frigate with username `admin` and the "default app password" displayed on Frigate's page in the app store (shown after install). The same default app password is also used as your RTSP password if needed.
releaseNotes: >-
  This maintenance release includes important security fixes, especially for publicly exposed instances and viewer-role camera access.


  It also adds optional recording segment chapters to MP4 export metadata and improves live preview performance.


  Full release notes can be found at https://github.com/blakeblackshear/frigate/releases/tag/v0.17.2
developer: Blake Blackshear
website: https://frigate.video/
repo: https://github.com/blakeblackshear/frigate
support: https://github.com/blakeblackshear/frigate/issues
port: 5004
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: "admin"
deterministicPassword: true
dependencies: []
permissions:
  - GPU
submitter: ~dibref-labter
submission: https://github.com/getumbrel/umbrel-apps/pull/843
