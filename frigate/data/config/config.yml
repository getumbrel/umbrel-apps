mqtt:
  enabled: False

# Umbrel handles access control before requests reach Frigate. The Frigate UI is
# served through its authenticated reverse-proxy port with native auth disabled
# so users don't need a separate Frigate admin password.
auth:
  enabled: False

proxy:
  default_role: admin

tls:
  enabled: False

cameras:
  name_of_your_camera: # <------ Name the camera
    ffmpeg:
      inputs:
        - path: rtsp://10.0.10.10:554/rtsp # <----- The stream you want to use for detection
          roles:
            - detect
    detect:
      enabled: False # <---- disable detection until you have a working camera feed
      width: 1280 # <---- update for your camera's resolution
      height: 720 # <---- update for your camera's resolution