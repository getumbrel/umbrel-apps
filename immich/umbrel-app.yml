manifestVersion: 1.1
id: immich
category: files
name: Immich
version: "v3.0.3"
tagline: High-performance photo and video backup solution
description: >-
  An open-source and high-performance self-hosted backup solution for the videos and photos on your mobile device


  ⚠️ Immich is under very active development. Expect bugs and changes. Do not use it as the only way to store your photos and videos!


  Features:

  - Upload and view videos and photos

  - Auto backup when the app is opened

  - Selective album(s) for backup

  - Download photos and videos to a local device

  - Multi-user support

  - Album and Shared albums

  - Scrubbable/draggable scrollbar

  - Support RAW (HEIC, HEIF, DNG, Apple ProRaw)

  - Metadata view (EXIF, map)

  - Search by metadata, objects and image tags

  - Administrative functions (user management)

  - Background backup

  - Virtual scroll

  - OAuth support

  - LivePhoto backup and playback

  - User-defined storage structure
releaseNotes: >-
  ⚠️ Immich v3 includes breaking API changes, mostly affecting third-party tools that integrate with Immich. If you're updating from a pre-v3 version, check that your mobile app and any Immich integrations are compatible with this release.


  If you're already on Immich v3, this patch release includes bug fixes and improvements. Highlights include:
    - Fixed Live Photos uploaded in the background not showing correctly
    - Added Immich's F-Droid repository for Android app releases
    - Fixed visibility issues around album ownership, locked assets, and search results
    - Fixed plugin method picker and asset viewer UI issues
    - Improved mobile widgets, timeline behavior, and media playback


  If newly uploaded Live Photos show broken thumbnails, run the missing thumbnails job or wait for the nightly thumbnail job to repair them.


  Full release notes can be found at https://github.com/immich-app/immich/releases/tag/v3.0.3
developer: Alex Tran
website: https://www.immich.app
dependencies: []
repo: https://github.com/immich-app/immich
