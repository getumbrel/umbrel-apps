manifestVersion: 1.1
id: immich
category: files
name: Immich
version: "v3.0.1"
tagline: High-performance photo and video backup solution
description: >-
  An open-source and high-performance self-hosted backup solution for the videos and photos on your mobile device


  ⚠️ Immich is under very active development. Expect bugs and changes. Do not use it as the only way to store your photos and videos!


  Features:

  - Upload and view videos and photos

  - Auto backup when the app is opened

  - Selective album(s) for backup

  - Download photos and videos to a local device

  - Multi-user support

  - Album and Shared albums

  - Scrubbable/draggable scrollbar

  - Support RAW (HEIC, HEIF, DNG, Apple ProRaw)

  - Metadata view (EXIF, map)

  - Search by metadata, objects and image tags

  - Administrative functions (user management)

  - Background backup

  - Virtual scroll

  - OAuth support

  - LivePhoto backup and playback

  - User-defined storage structure
releaseNotes: >-
  ⚠️ Major update: Immich v3 includes breaking API changes, mostly affecting third-party tools that integrate with Immich. As usual, please check that your mobile app is compatible with this release of Immich.


  This release includes new features and bug fixes. Highlights include:
    - Added Workflows preview for automating library actions
    - Added a Recently Added page and improved timeline performance for large libraries
    - Added library integrity checks
    - Added a new web video player with HLS and real-time video transcoding preview
    - Fixed albums not showing in the mobile app


  Full release notes can be found at https://github.com/immich-app/immich/releases/tag/v3.0.1
developer: Alex Tran
website: https://www.immich.app
dependencies: []
repo: https://github.com/immich-app/immich
support: https://github.com/immich-app/immich/discussions
port: 2283
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
permissions:
  - GPU
submitter: levma
submission: https://github.com/getumbrel/umbrel-apps/pull/239
