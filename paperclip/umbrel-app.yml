releaseNotes: |-
  - Added inline document annotations and comments for issue documents.
  - Added company skills catalog management, including skill install/reset/audit/export flows and board UI assignment.
  - Added a browser first-admin claim flow for fresh private self-hosted deployments.
  - Added controls to hide projects and agents from your sidebar without deleting them.
  - Improved Claude model discovery, bundled plugin visibility, workspace lifecycle handling, and plan decomposition reliability.
