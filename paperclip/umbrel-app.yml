releaseNotes: |-
  - Added built-in Hermes local and remote gateway adapters so Paperclip can run Hermes agents without a manual plugin install.
  - Added task watchdogs and an ask work mode for monitoring long-running tasks and handling question-and-answer work.
  - Added live sandbox runtime status, reusable Daytona leases, workspace file downloads, and external object references.
  - Refreshed onboarding, made the streamlined sidebar the default, and improved task status icons, colors, routines, and skill category editing.
  - Improved authorization, secret binding, sandbox restore/publishing, recovery behavior, and several agent adapter flows.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
deterministicPassword: false
