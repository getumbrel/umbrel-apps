releaseNotes: |-
  - Added a company-wide Artifacts page for browsing, uploading, and playing back files, media, and documents produced by agents.
  - Added richer issue attachments, including video previews and inline video playback.
  - Added a collapsible sidebar rail, takeover panes, and an experimental information architecture refresh for project and settings pages.
  - Added structured checkbox confirmation interactions in issue threads.
  - Improved agent recovery actions, plugin/API behavior, Claude model selection, and bundled Gemini CLI support.
