manifestVersion: 1
id: paperclip
name: Paperclip
tagline: A team of AI agents for every person
category: ai
version: "2026.609.0"
port: 8860
description: >-
  Paperclip is a self-hosted control center for running AI agents like a team.
  Create a company, set a goal, hire agents with roles and reporting lines, then
  review their plans, approve important decisions, and track their work from one
  dashboard.

  Use Paperclip to manage projects, tasks, budgets, routines, and activity history
  across different agent runtimes. It gives you an org chart, ticket system, cost
  controls, approvals, and audit logs so you can see what each agent did and why.

  Paperclip does not include an AI model by itself. To run agents, connect your own
  provider keys and tools, such as OpenAI, Anthropic/Claude, Codex, Cursor, Gemini,
  Hermes, OpenClaw, OpenCode, or other supported adapters. Provider usage may incur
  costs, so set budgets before letting agents run unattended.

  To use your Codex/ChatGPT or Claude Code subscription, you can use the OAuth login
  via umbrelOS > Settings > Advanced > Terminal > App > Paperclip. To use API keys
  instead, configure your model providers by creating secrets like `OPENAI_API_KEY`
  or `ANTHROPIC_API_KEY` with the appropriate API keys and assigning them to the
  agent or project.
developer: Paperclip Labs, Inc.
website: https://paperclip.ing/
submitter: Umbrel
