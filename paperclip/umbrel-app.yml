releaseNotes: |-
  - Added run-bound agent secret access with per-agent grants, audit logs, and activity logs.
  - Added experimental Connected Apps foundations for app browsing, setup, grants, and scoped credentials.
  - Improved secrets management with folder-style browsing for slash-named secrets and a searchable agent picker.
  - Improved local agent execution, telemetry reliability, and sandbox/Codex home syncing.
  - Fixed archived inbox items, final execution-policy approvals, Office attachments, cookie redaction, run-authored comments, terminal status preservation, invalid config warnings, and pending-approval guidance.
dependencies: []
