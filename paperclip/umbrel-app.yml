releaseNotes: |-
  - Added Skill Studio for creating, organizing, importing, and testing Paperclip skills.
  - Added Attention Queue and Decisions views for reviewing items that need input.
  - Improved search with filters, sorting, operators, and command-palette parity.
  - Added experimental MCP Tool Gateway, Cases, Decision Training, and built-in Summarizer features.
  - Improved run recovery, sandbox execution, secrets access, activity logs, adapter/Codex auth handling, and workspace reliability.
