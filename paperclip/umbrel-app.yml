id: paperclip
name: Paperclip
tagline: Open-source orchestration for autonomous AI companies
category: ai
version: "2026.403.0"
port: 8860
description: >-
  Paperclip is a self-hosted control plane for running teams of AI agents like a company.
  It gives you a browser UI for goals, org charts, tickets, budgets, governance, and audit trails,
  so you can coordinate long-running autonomous workflows from one place.

  This Umbrel package uses Paperclip's embedded local database, so everything persists inside the app's data directory without needing a separate Postgres container.
  On first launch, Paperclip generates a one-time bootstrap invite for the first admin account and prints that invite URL in the app logs.

  The UI works out of the box, but actual agent execution still requires bringing your own provider credentials and tools,
  such as OpenAI, Anthropic, Codex, Claude Code, or other adapters supported by Paperclip.
