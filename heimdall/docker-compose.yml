version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: heimdall_server_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  server:
    image: linuxserver/heimdall:2.8.0@sha256:a341bcc55dbf8e58bbb96a9ea56c931e652668c8ebf6fc4ae566de0f9df44092
    volumes:
      - ${APP_DATA_DIR}/config:/config
    environment:
      - PUID=1000
      - PGID=1000
    restart: on-failure
