manifestVersion: 1
id: gobrrr-pool
category: bitcoin
name: Go Brrr Pool
version: "1.1.0"
tagline: Bitcoin Solo Mining, Done Right!
description: >-
  Go Brrr Pool is a self-hosted solo Bitcoin mining pool powered by ckpool-solo.
  Connect your miners directly to your own node and keep 100% of block rewards.
  No third-party pool, no KYC, no fees, no middleman.

  Features a customizable real-time web dashboard with hashrate monitoring,
  worker statistics, pool-wide leaderboard, efficiency dashboard, and local
  mempool API integration. ZMQ enables instant block notifications and automatic
  difficulty adjustment accepts diff proposals from miners.

  Two stratum ports: port 21420 for standard mining, port 21422 for
  high-difficulty mode (min diff 1,000,000) suited for powerful machines and
  hashrate rentals. Workers connect using their Bitcoin address as the username —
  any block found pays out directly and entirely to the miner's own wallet.

  Built on ckpool, the same battle-tested open-source pool software powering
  solo.ckpool.org.

  This software is free as in FREEDOM!

  Homescreen widget developed by RodB.
releaseNotes: ""
developer: GoBrrr
website: https://gobrrr.me
dependencies:
  - bitcoin
  - mempool
repo: https://github.com/gobrrrme/GoBrrr-Pool
support: https://github.com/gobrrrme/GoBrrr-Pool/issues
port: 21421
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "30s"
    endpoint: "gobrrr-stats:23002/widget-api/widget/stats"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Hash Rate"
          text: "0"
          subtext: "H/s"
        - title: "Miners"
          text: "0"
          subtext: "Active"
        - title: "Best Share"
          text: "0"
          subtext: "Diff"
        - title: "Share Rate"
          text: "0.0"
          subtext: "/min"
submitter: GoBrrr
submission: "https://github.com/getumbrel/umbrel-apps/pull/5449"
