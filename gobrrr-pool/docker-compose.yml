version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: gobrrr-pool_webui_1
      APP_PORT: 21421
      PROXY_AUTH_WHITELIST: "/api/*"

  ckpool:
    image: ghcr.io/gobrrrme/gobrrr-ckpool:v1.2.1@sha256:7f255e43f4b8f27c1ad0aee1247e9534828f372929a2af9f8735418c5e44e86c
    restart: on-failure
    stop_grace_period: 1m
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/log/ckpool/ckpool.log"]
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - "21420:3333"
      - "21422:4444"
    volumes:
      - ${APP_DATA_DIR}/data/ckpool-socket:/tmp/ckpool
      - ${APP_DATA_DIR}/data/ckpool-logs:/var/log/ckpool
    environment:
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS}
      - BITCOIN_ZMQ_HASHBLOCK=tcp://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
      - POOL_SIGNATURE=GoBrrrPool_Umbrel
      - START_DIFFICULTY=10000
      - MIN_DIFFICULTY=1
      - BLOCKPOLL=50
      - UPDATE_INTERVAL=20
      - STRATUM_HIGHDIFF_PORT=4444
      - HIGHDIFF=1000000

  webui:
      image: ghcr.io/gobrrrme/gobrrr-pool-webui:v1.2.1@sha256:82512e24d816c287c6c2f2badad41656d74318fbcc5b095961656e119f02e2f1
      restart: on-failure
      stop_grace_period: 30s
      volumes:
        - ${APP_DATA_DIR}/data/ckpool-socket:/tmp/ckpool:ro
        - ${APP_DATA_DIR}/data/ckpool-logs:/var/log/ckpool:ro
        - ${APP_DATA_DIR}/data/webui:/app/data
      environment:
        - NODE_ENV=production
        - PORT=21421
        - CKPOOL_SOCKET_DIR=/tmp/ckpool
        - CKPOOL_LOGS_DIR=/var/log/ckpool
        - MEMPOOL_API_URL=${APP_GOBRRR_POOL_MEMPOOL_API_URL}
        - STRATUM_PORT=21420
        - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP}
        - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
        - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
        - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS}
      depends_on:
        - ckpool

  gobrrr-stats:
    image: rodb2008com/gobrrr-pool-api-etl:v1@sha256:bc86f35c5cd526f0a2464574e764540fbe78173dcaaaa6bafdbdc9a818501948
    restart: on-failure
    depends_on:
      ckpool:
        condition: service_healthy
    volumes:
      - ${APP_DATA_DIR}/data/ckpool-logs:/data:ro
