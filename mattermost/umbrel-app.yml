releaseNotes: >-
  Mattermost 11.8 adds managed sidebar categories, channel classification banners, improved mobile data controls, and updates to bundled plugins.


  This release also includes database migrations with no downtime expected, plus many UI, admin, performance, and bug fixes. Plugin developers using Custom Profile Attributes should update to the renamed access_control property group.


  Full release notes are available at https://docs.mattermost.com/product-overview/mattermost-v11-changelog.html#release-v11-8-feature-release
