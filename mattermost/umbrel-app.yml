releaseNotes: >-
  Mattermost 11.8.2 includes a medium-severity security fix and is recommended by upstream.


  This update also upgrades the pre-packaged Agents plugin to v2.0.5, fixes custom emoji upload size and GIF frame limits, and improves user attribute sync behavior for AD/LDAP and SAML-managed attributes.


  Mattermost 11.8.2 contains no database or functional changes.


  Full release notes can be found at https://docs.mattermost.com/product-overview/mattermost-v11-changelog.html#release-v11-8-feature-release
