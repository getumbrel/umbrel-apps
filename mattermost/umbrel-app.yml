releaseNotes: >-
  🚨 This release contains low to medium severity security fixes. Updating is recommended.


  Mattermost 11.7 adds quality-of-life improvements including ABAC for Team Admins, ABAC file permissions, Agents plugin v2, multi-window channel pop-outs, streamlined channel sharing, and Elasticsearch 9.0 support.


  This update also improves image processing performance and includes updated pre-packaged GitLab and Jira plugins.


  Full release notes are available at https://docs.mattermost.com/product-overview/mattermost-v11-changelog.html
