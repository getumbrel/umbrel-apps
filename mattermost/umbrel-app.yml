releaseNotes: >-
  Mattermost 11.8.1 includes medium-severity security fixes and is recommended by upstream.


  This update also fixes S3 file moves and copies for files larger than 5 GiB, preserves unknown permissions during downgrade migrations, and adds pre-migration setup for upgrades from Mattermost 10.11 to 11.7.


  The Mattermost 11.8 line includes database migrations with no downtime expected. Plugin developers using Custom Profile Attributes should update to the renamed access_control property group.


  Full release notes can be found at https://docs.mattermost.com/product-overview/mattermost-v11-changelog.html#release-v11-8-feature-release
