manifestVersion: 1
id: nostrudel
category: social
name: noStrudel
version: "1.1.0"
tagline: A sandbox for exploring nostr
description: >-
  noStrudel is a nostr web client that is focused on exploring the nostr network.

  The focus is on power users or any other users who want to learn the inner workings of nostr.
releaseNotes: |
  This update includes a larger noStrudel upgrade from 0.46.1 to 1.1.0.

  Highlights include refreshed feeds and notification views, support for highlights in the timeline, contacts outbox feeds, relay favorites, username search improvements, Blossom servers, NIP-29 group chat improvements, and separate direct-reply/thread-reply notification views.

  It also fixes several issues including app hangs from Capacitor modules, mobile navigation overlap, muted replies in threads, publishing to relays, user lookup behavior, and new tabs not using the last active account.

