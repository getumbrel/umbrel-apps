manifestVersion: 1
id: stash
category: ai
name: Stash
version: "1.0.1"
tagline: Hoard everything, find anything — your private on-device AI inbox
description: >-
  Stash is a private "save anything" inbox with a brain. It replaces that
  Discord channel, Telegram "Saved Messages", or notes file where you dump
  links, screenshots, code snippets, quotes, and reminders — except here
  everything you save is automatically understood, filed, and answerable.


  Paste anything and hit Enter: Stash classifies it by type (link, video,
  code, quote, reminder, image, or note), gives it a category, title,
  summary, and tags, and indexes it for semantic search. Screenshots are
  captioned by a vision model so they're searchable too. Links and YouTube
  videos get rich metadata cards fetched and cached locally.


  Switch to Ask mode and talk to your stash — "what was that article about
  ARM SVE?", "what plant do I need to water and when?" — and answers come
  from your own saved items, each source cited.


  Everything runs on-device via QVAC. No accounts, no API keys, no cloud —
  nothing you save ever leaves your Umbrel. The first run downloads ~1.3 GB
  of model weights into the app's data directory; saving and browsing work
  immediately, and AI features switch on once the models report Ready. You
  can pick lighter or heavier models any time from the in-app Settings tab.
