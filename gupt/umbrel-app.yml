version: "2026.06.22"
releaseNotes: >-
  Added message info actions with long-press/context-menu support, copy actions, and external inspection links.


  Improved chat navigation with unread counts, better message sorting, smoother scrolling, and searchable cached messages.


  Added relay health checks in Settings and reorganized settings into General, Servers, and Storage tabs.


  Improved call controls, failed-message status handling, retry behavior, light-mode styling, and donation page rendering.
tagline: Self-hosted, end-to-end encrypted messenger built on Nostr
description: >-
  Gupt is a privacy-first, self-hosted messaging app built on Nostr relays with WebRTC calls — a free and open-source alternative to Telegram, Signal, WhatsApp & Discord.


  Key features include:
    - Anonymous — no phone number, no email, no account required
    - End-to-end encrypted direct messages
    - WebRTC voice & video calls
    - Encrypted media uploads via decentralized file storage
    - Group rooms via Nostr relays
    - Local-first with offline cache (IndexedDB)
    - Installable PWA


  Gupt is fully client-side with no backend — it connects directly to public or private Nostr relays. Your keys, your messages, your privacy.
