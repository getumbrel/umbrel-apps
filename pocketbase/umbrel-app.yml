releaseNotes: >-
  ⚠️ This release includes a security fix related to a pre-hijacking OAuth2 linking vulnerability


  This release includes security fixes and several improvements:
    - Fixed a pre-hijacking OAuth2 linking vulnerability
    - Added dummy bcrypt password check to minimize enumeration timing attacks when registrations are disabled
    - Fixed SMTP IPv6 network address format
    - Fixed autocomplete selection not properly updating the underlying input value
    - Added backups list scroll container
    - Optimized record upsert and preview modals data loading to minimize layout jumps
    - Updated Bitbucket, GitHub, GitLab and Gitea/Forgejo OAuth2 providers to reflect recent API changes


  Full release notes are found at https://github.com/pocketbase/pocketbase/releases
