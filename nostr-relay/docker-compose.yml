version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: nostr-relay_admin_1
      APP_PORT: 4000
      PROXY_AUTH_ADD: "false"

  web:
    image: getumbrel/umbrel-nostr-relay:v1.1.0@sha256:21b67ab2e9d30b20e785497f19534e8e21b6da1bfe69e3ae5afe91b759f20488
    user: "1000:1000"
    restart: on-failure
    environment:
      RELAY_HOST: "nostr-relay_relay_1"
      RELAY_PORT: "8080"
      RELAY_PROXY_HOST: "nostr-relay_relay-proxy_1"
      RELAY_PROXY_PORT: "80"

  relay:
    image: atanasna/nostr-rs-relay:0.9.0-no-jemalloc@sha256:286f8f3fb40116a5ec98888b263adcad72c35b828cd180ebf2e261f555d1811d
    user: "1000:1000"
    restart: on-failure
    command: ["./nostr-rs-relay", "-c", "/app/config.toml", "-d", "/app/db"]
    volumes:
      - ${APP_DATA_DIR}/data/relay/config.toml:/app/config.toml
      - ${APP_DATA_DIR}/data/relay/db:/app/db

  relay-proxy:
    image: getumbrel/umbrel-nostr-relay-proxy:v1.1.0@sha256:6b335f4488f813475bb7c9d3bb6282fda081808e2d5447404fc8a1ffcc1279dc
    user: "1000:1000"
    restart: on-failure
    environment:
      RELAY_HOST: "nostr-relay_relay_1"
      RELAY_PORT: "8080"
    volumes:
      - ${APP_DATA_DIR}/data/relay-proxy:/app/data
      - ${APP_DATA_DIR}/data/relay-proxy/RelayManager.js:/app/RelayManager.js:ro
    depends_on:
      - relay

  admin:
    image: umbrel/nostr-relay-admin:latest
    user: "1000:1000"
    restart: on-failure
    container_name: nostr-relay_admin_1
    environment:
      RELAY_DATA_DIR: "/data"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/admin/main.py:/app/main.py:ro
    depends_on:
      - relay
