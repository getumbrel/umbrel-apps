manifestVersion: 1.1
id: nostr-relay
category: social
name: Nostr Relay
version: "0.9.1-beta"
tagline: Private Nostr relay with a full admin dashboard
description: >-
  SatWise Nostr Relay is a private relay stack for Umbrel with a built-in admin dashboard.


  Run your own relay endpoint, keep your event history under your control, and monitor activity with live NIP-aware analytics.


  Dashboard highlights:


  - Kind Breakdown grouped by NIP, including Open All / Close All controls


  - Live relay stats and recent event stream


  - In-app relay config editing (info, limits, authentication)


  - Relay-proxy identity and relay list management


  Powered by satwise/nostr-rs-relay 0.9.0 with NIP-50 full-text search, NIP-77 negentropy sync, NIP-44 versioned encryption, NIP-59 gift wrap, and NIP-17 private direct messages.
releaseNotes: >-
  New SatWise admin dashboard beta release: hierarchical Kind Breakdown grouped by NIP, default expanded view, Open All / Close All controls, and improved relay operations workflow on the app page.


  Includes satwise/nostr-rs-relay 0.9.1-beta with NIP-50 and NIP-77 support, plus ARM64 Raspberry Pi 5 compatibility fixes and container signal-handling improvements.

previousReleaseNotes: >-
  Upgraded to satwise/nostr-rs-relay 0.9.0 with NIP-50 full-text search, NIP-77 negentropy sync, NIP-44 versioned encryption, NIP-59 gift wrap, and NIP-17 private DMs. Native ARM64 image with jemalloc Pi5 fix (16KB page support).
developer: SatWise
website: https://janx.com
dependencies: []
repo: https://github.com/satwise/nostrrelay
support: https://github.com/satwise/nostrrelay/issues
port: 4848
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
deterministicPassword: false
torOnly: false
