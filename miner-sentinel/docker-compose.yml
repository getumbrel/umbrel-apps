version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: miner-sentinel_frontend_1
      APP_PORT: 80

  db:
    image: postgres:17.7@sha256:bac8128cd62a35471a1e97966861aa2ac88c8d2f408767a425ae70695a607c99
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: minersentinel
      POSTGRES_PASSWORD: minersentinel
      POSTGRES_DB: minersentinel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minersentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: dcbert/minersentinel-backend:1.0.1@sha256:d5f46aa215f181637e51d529da8a440c7f73ebdf2cf2cee763ca8afc58e20000
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - db
    environment:
      # Database configuration
      POSTGRES_HOST: miner-sentinel_db_1
      POSTGRES_PORT: 5432
      POSTGRES_DB: minersentinel
      POSTGRES_USER: minersentinel
      POSTGRES_PASSWORD: minersentinel
      # Django settings
      DJANGO_SECRET_KEY: ${APP_SEED}
      DJANGO_DEBUG: "False"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://${DEVICE_DOMAIN_NAME}:3080,http://*.ts.net:3080"
      CSRF_TRUSTED_ORIGINS: "http://${DEVICE_DOMAIN_NAME}:3080,http://*.ts.net:3080"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: $APP_PASSWORD
      DJANGO_SUPERUSER_EMAIL: "admin@umbrel.local"
      # API URL for frontend
      API_BASE_URL: "http://${DEVICE_DOMAIN_NAME}:3080"
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        (python manage.py createsuperuser --no-input ||
        echo 'Superuser already exists or created — winning!') &&
        gunicorn minersentinel.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
      "

  frontend:
    image: dcbert/minersentinel-frontend:1.0.1@sha256:b7ee9a7cc8bf797b45baa7ce56e4bd8a4635ffd085f80aa7ce4ac8832211d62d
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://${DEVICE_DOMAIN_NAME}:3080"

  data-service:
    image: dcbert/minersentinel-data-service:1.0.1@sha256:f87bbc9f4e755454718a3eb8190502c7cc65e7d7fb8b40158cf487c26a773f53
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - db
      - backend
    environment:
      # Database configuration
      POSTGRES_HOST: miner-sentinel_db_1
      POSTGRES_PORT: 5432
      POSTGRES_DB: minersentinel
      POSTGRES_USER: minersentinel
      POSTGRES_PASSWORD: minersentinel
      # Backend API
      BACKEND_URL: "http://miner-sentinel_backend_1:8000"
      # Polling intervals (in seconds)
      BITAXE_POLL_INTERVAL: 60
      AVALON_POLL_INTERVAL: 60
      POOL_POLL_INTERVAL: 300
      # Telegram notifications (optional - configure via Django admin)
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
