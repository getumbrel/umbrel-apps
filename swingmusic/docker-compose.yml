version: "3.9"

services:
  app_proxy:
    environment:
      APP_HOST: swingmusic_app_1
      APP_PORT: 1970
      PROXY_AUTH_ADD: "false"

  app:
    image: ghcr.io/swingmx/swingmusic:v3.0.0@sha256:a49155d1809bc6ad09d87d76cc91648c149fc80146b5e10260e70fe1cfa78175
    restart: on-failure
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${APP_DATA_DIR}/data/music:/music:rw
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
