manifestVersion: 1
id: swingmusic
name: Swing Music
tagline: Self-hosted music streaming
category: media
version: "3.0.0"
port: 1970
description: >-
  🎵 Swing Music is a self-hosted music streaming app — modern, clean, and powerful.

  It lets you create your own private Spotify-like service at home.


  🧑‍💻 Built with privacy in mind.


  Swing Music keeps your data local. Host your music library, stream from any browser, and enjoy full control.
developer: Mungai Njoroge
website: https://github.com/swingmx/swingmusic
submitter: panie18
submission: https://github.com/getumbrel/umbrel-apps/pull/3412
repo: https://github.com/swingmx/swingmusic
support: https://github.com/swingmx/swingmusic/issues
dependencies: []
permissions:
  - STORAGE_DOWNLOADS
releaseNotes: >-
  Important for existing users:
    - This update does not change your existing Swing Music login.
    - If you have not changed the old default login, you can still sign in with username "admin" and password "admin".
    - After this update, Umbrel will no longer show those old default credentials, so we recommend changing the password in Swing Music after you sign in.


  What's new in this release:
    - Redesigned the Now Playing and Lyrics screens
    - Added natural and article-aware sorting for folders, artists, and other sortable views
    - Added BlurHash support for the web client; rescan your library to start using it
    - Fresh installs now use Swing Music's first-run setup flow to create the admin account
    - Fixed duplicate recently played items, multiple root folder errors, and playlist lookup by name in folder view
    - Mixes are now a premium feature


  Full release notes can be found at https://github.com/swingmx/swingmusic/releases/tag/v3.0.0
