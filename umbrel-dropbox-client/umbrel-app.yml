manifestVersion: 1
id: umbrel-dropbox-client
name: Dropbox Client
tagline: Safe, scoped Dropbox sync for Umbrel with dry-run defaults
icon: https://raw.githubusercontent.com/earlvanze/umbrel-dropbox-client/master/data/icons/icon.svg
category: files
version: "1.2.1"
description: >-
  A Linux-first Dropbox sync daemon for Umbrel. Keeps your Dropbox files in sync
  with a local folder, with a built-in web dashboard for status, conflicts, and
  health checks. Features a rich single-page dashboard with file manager
  (upload, download, delete, create folders), settings configuration, sync
  controls, conflict resolution, and an interactive setup wizard. Ships with
  dry-run mode enabled by default so you can preview every action before any
  file is touched. Live transfers require explicit opt-in via environment
  variables, making it safe to install from the app store.
developer: Earl Co
website: https://github.com/earlvanze/umbrel-dropbox-client
repo: https://github.com/earlvanze/umbrel-dropbox-client
support: https://github.com/earlvanze/umbrel-dropbox-client/issues
port: 8477
gallery:
  - 1.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  CPU and idle-cost fixes. v1.2.1 ships the watch-debounce path repairs that
  make incremental scans actually fire on large trees: a root-only change now
  scans only the root directory, the dirty-dir split keeps single-segment
  subdirs from collapsing to the empty root, and missing-file detection is
  scoped to the dirty prefixes. The 158k file soak holds at 0% idle CPU and
  a single touch in a subdir scans only the dirty subtree. The previous
  rich dashboard with file manager, settings, and conflict resolution is
  retained, with a panic-recover safety net in the incremental cycle so a
  transient scan error can no longer silently kill the daemon.
dependencies: []
submitter: Earl Co
submission: https://github.com/earlvanze/umbrel-dropbox-client
