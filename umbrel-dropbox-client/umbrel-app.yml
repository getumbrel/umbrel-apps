manifestVersion: 1
id: umbrel-dropbox-client
name: Dropbox Client
tagline: Safe, scoped Dropbox sync for Umbrel with dry-run defaults
category: files
version: "1.2.1"
description: >-
  A Linux-first Dropbox sync daemon for Umbrel. Keeps your Dropbox files in sync
  with a local folder, with a built-in web dashboard for status, conflicts, and
  health checks. Features a rich single-page dashboard with file manager
  (upload, download, delete, create folders), settings configuration, sync
  controls, conflict resolution, and an interactive setup wizard. Ships with
  dry-run mode enabled by default so you can preview every action before any
  file is touched. Live transfers require explicit opt-in via environment
  variables, making it safe to install from the app store.
developer: Earl Co
website: https://github.com/earlvanze/umbrel-dropbox-client
