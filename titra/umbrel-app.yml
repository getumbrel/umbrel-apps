id: titra
name: Titra
tagline: A simple time tracker for teams
category: files
version: "1.0.10"
port: 3471
description: >-
  ⏱️ Titra is a modern, open-source time tracking application designed for freelancers, small businesses, and teams that need a simple way to record and manage working hours. Its project-based approach allows you to quickly assign tracked time to customers, projects, tasks, or internal activities without complicated configuration or unnecessary distractions.


  Start and stop timers in just a few clicks, add descriptions to your entries, and use intelligent autocomplete to speed up recurring tasks. Titra also supports absence projects, making it possible to record holidays, sick leave, and other non-working periods alongside regular project hours.


  Real-time reports provide a clear overview of how time is being spent across projects and team members. Tracked hours can be reviewed through tabular or graphical reports and exported for further processing, invoicing, payroll, or internal analysis. A clean interface and built-in dark mode make Titra comfortable to use throughout the working day.


  By running Titra on your Umbrel, your time-tracking data remains stored on infrastructure you control. This makes it a privacy-friendly alternative to externally hosted time-tracking services while still providing convenient access through a modern web interface.


  Whether you are tracking billable client work, managing several internal projects, or simply want a better overview of your daily working time, Titra provides a focused and straightforward solution without unnecessary complexity.
