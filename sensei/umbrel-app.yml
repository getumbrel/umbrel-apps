manifestVersion: 1
id: sensei
category: bitcoin
name: Sensei
version: "0.2.2-beta2"
tagline: Run a self-custodial Lightning node powered by LDK
description: >-
  Sensei is a Lightning node implementation built with Bitcoin Development Kit
  and Lightning Development Kit. It focuses on making Lightning onboarding
  approachable while still giving users direct control over their node.


  This Umbrel app connects Sensei to your Umbrel Bitcoin node, stores Sensei
  state in your app data directory, and exposes the bundled web admin for
  creating and managing nodes.
developer: L2 Technology
website: https://l2.technology/sensei
dependencies:
  - bitcoin
repo: https://github.com/L2-Technology/sensei
support: https://github.com/L2-Technology/sensei/issues
port: 5401
gallery: []
path: /admin/nodes
defaultUsername: ""
defaultPassword: ""
submitter: L2 Technology
submission: https://github.com/getumbrel/umbrel-apps/pull/5635
