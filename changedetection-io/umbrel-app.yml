manifestVersion: 1
id: changedetection-io
name: changedetection.io
category: automation
version: "0.55.8"
tagline: Website change detection and alerts
description: >-
  Never miss an important change on the web again. changedetection.io watches websites, pages, JSON APIs,
  and PDFs for you and sends an alert the moment something changes.


  Track price drops and restocks on product pages, monitor release notes and changelogs,
  watch status pages for outages, follow legal or policy document updates, or keep an eye
  on any page that matters to you. Set a check interval, define what to watch for, and let it run quietly in the background.
developer: dgtlmoon
website: https://changedetection.io/
repo: https://github.com/dgtlmoon/changedetection.io
support: https://github.com/dgtlmoon/changedetection.io/issues
port: 5037
path: ""
gallery:
  - 1.webp
  - 2.webp
  - 3.webp
  - 4.webp
  - 5.webp
defaultUsername: ""
defaultPassword: ""
dependencies: []
submitter: al-lac
releaseNotes: >-
  This update improves page title detection for pages with large head sections,
  fixes watch errors for invalid JSON responses and URLs containing "|" in
  fragments, fixes password-protected tag RSS feeds, and includes translation
  and restock notification improvements.
submission: https://github.com/getumbrel/umbrel-apps/pull/5704
