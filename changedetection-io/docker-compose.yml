version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: changedetection-io_app_1
      APP_PORT: 5000

  app:
    image: ghcr.io/dgtlmoon/changedetection.io:0.55.7@sha256:736331d2787f94d3201b64aa641e090f67e28577ba505bd7ba5d7c1841e1e0ca
    restart: on-failure
    stop_grace_period: 1m
    environment:
      BASE_URL: http://${DEVICE_DOMAIN_NAME}:5037
      USE_X_SETTINGS: "1"
      HIDE_REFERER: "true"
      TZ: "Etc/UTC"
      DISABLE_VERSION_CHECK: "true"
    volumes:
      - ${APP_DATA_DIR}/data:/datastore
