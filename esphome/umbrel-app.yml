releaseNotes: >-
  ⚠️ Major update: ESPHome 2026.5.0 includes breaking YAML/API changes. Before updating, review the upstream checklist if you use Modbus server mode, more than 5 concurrent API connections, multiple ESPHome OTA ports, custom audio/WAV playback, long throttle_average periods, or external components/lambdas.

  This release adds major runtime, scheduler, and watchdog optimizations; expanded OTA features including partition-table and bootloader updates; the public beta foundation for the new ESPHome Device Builder; new Sendspin multi-room audio and radio-frequency components; expanded Zigbee, nRF52, and Zephyr support; and faster CLI/config validation.

  It also improves BLE proxy reliability for long-lived Bluetooth connections and includes many new hardware/display integrations.

  Full release notes can be found at https://esphome.io/changelog/2026.5.0/
