releaseNotes: >-
  ESPHome 2026.6.1 is a follow-up to the recent 2026.6.0 major update. If you're updating from a pre-2026.6 version, set `wifi.min_auth_mode: WPA` before updating if you have ESP8266 devices on WPA-only/TKIP Wi-Fi, and review the upstream upgrade checklist if you use DSMR `electricity_switch_position`, Nextion `dump_device_info`, custom components, Home Assistant time zones, or advanced lambdas.

  If you're already on ESPHome 2026.6.0, this update improves Device Builder, restores the uptime timestamp sensor device class, fixes logger task-buffer recursion handling, improves ESP32 IDE data/native ESP-IDF tooling, and avoids overwriting PlatformIO's `factory.bin`.

  Full release notes can be found at https://github.com/esphome/esphome/releases/tag/2026.6.1
