releaseNotes: >-
  This is a patch release with bug fixes across multiple components:
    - Fixed app state status bits being clobbered for non-looping components
    - Fixed swapped offset width and height in st7789v display model presets
    - Fixed frequency precision loss in sx126x and sx127x radio components
    - Fixed RTC validity check incorrectly rejecting valid times
    - Fixed substitutions include file regression
    - Fixed LVGL crashes including snow effect on rotated displays and arc angle rendering
    - Fixed image byte order handling and RGB order in runtime images
    - Fixed display buffer null pointer crash when memory allocation fails
    - Fixed DelayAction compile error with non-const reference arguments
    - Fixed watchdog timer not being fed in empty configurations, preventing panics
    - Fixed Ethernet SPI3 host default breaking compilation on some ESP32 variants
    - Improved error messages for package includes with full include stack traces
    - Added runtime stats tracking for main loop active time and overhead reporting


  Full release notes can be found at https://esphome.io/changelog/2026.4.1/
