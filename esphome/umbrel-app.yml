  This is a patch release with bug fixes and improvements across multiple components:
    - Added an opt-in toggle for the new ESPHome Device Builder in the Home Assistant add-on
    - Fixed bundled project exports so quoted !secret keys include secrets.yaml
    - Fixed sibling references inside dict-valued substitutions
    - Fixed Wi-Fi connection behavior in safe mode
    - Fixed Nextion text sensor state updates from string responses


