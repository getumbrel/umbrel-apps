releaseNotes: >-
  This release includes bug fixes and stability improvements from versions 2026.2.3 and 2026.2.4:
    - ⚠️ Removed broken ESP8266 SSL fingerprints option from MQTT (breaking change for affected users)
    - Fixed millis overflow and underflow bugs in sprinkler component
    - Fixed reliable state changes in CC1101 by transitioning through IDLE
    - Fixed codegen ordering for Zigbee basic/identify attribute lists
    - Fixed UART0 default pin workarounds reverted after ESP-IDF 5.5.2 fix
    - Fixed Waveshare P4 7B board config in MIPI DSI
    - Fixed entity automation codegen to prevent sibling ID deadlocks
    - Fixed WiFi scan filtering in improv_serial
    - Fixed flow_control_pin inverted flag being ignored on ESP-IDF


  Full release notes can be found at https://esphome.io/changelog/2026.2.4/
