releaseNotes: >-
  ESPHome 2026.7.2 is a follow-up to the recent 2026.7 major update. If you're updating from a pre-2026.7 version, review the upstream upgrade checklist first: ESP32 and nRF52 builds now default to native ESP-IDF/nRF Connect SDK toolchains unless `toolchain: platformio` is set, ESP32 Zigbee devices need to be re-joined and reconfigured, and several `web_server`, `packages`, `hub75`, `modbus`, LN882H, and lambda/API settings changed.

  This patch release updates the bundled ESPHome Device Builder, adds a SEN5x model override option, fixes MIPI SPI partial updates, and remaps absolute paths when compiling extracted bundles.

  It also updates aioesphomeapi and sendspin dependencies used by ESPHome.

  Full release notes can be found at https://github.com/esphome/esphome/releases/tag/2026.7.2
