releaseNotes: >-
  This is a patch release with bug fixes across multiple components:
    - Fixed codegen type for component resume update interval
    - Rejected unsupported interrupt pin options in MCP23xxx
    - Fixed PlatformIO subprocess path handling on Windows
    - Replaced stack buffer in ESP32 printf wraps for improved stability
    - Fixed LVGL meter line indicator value clamping
    - Fixed API service array argument ownership after delays
    - Improved API log output safety and fixed bytes representation fallback


  Full release notes can be found at https://esphome.io/changelog/2026.4.4/
