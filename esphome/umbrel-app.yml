releaseNotes: >-
  This release focuses on performance, stability, and expanded hardware capabilities across ESPHome:
    - Further performance improvements across core components and networking stack
    - Improved WiFi reliability and connection handling for more stable devices
    - Reduced memory usage across multiple components, enabling larger configurations
    - Faster and more efficient event handling for sensors, BLE, and automations
    - Expanded hardware support with new sensors and components
    - Improvements to ESP32, RP2040, and nRF platforms for better feature parity
    - Fixes for edge cases, crashes, and long-standing bugs across many components
    - Enhanced logging, diagnostics, and error handling for easier debugging
    - Continued optimizations to flash usage and build size
    - ⚠️ Some components may require minor config updates due to internal changes


  Full release notes can be found at https://esphome.io/changelog/2026.4.0/
