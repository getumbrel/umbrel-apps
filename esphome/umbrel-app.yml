releaseNotes: >-
  This release is a major performance and reliability overhaul across the entire ESPHome stack:
    - Main loop socket polling up to 99x faster on ESP32 via direct LwIP reads replacing lwip_select()
    - GPIO and UART wake-on-RX now triggers instantly via ISR instead of waiting up to 16ms
    - millis() is 2-2.5x faster; new millis_64() provides native 64-bit uptime on all platforms
    - Light gamma correction 8-10x faster, API/protobuf encoding 6-12x faster
    - RP2040/RP2350 reaches first-class support: pico-sdk 2.0, GCC 14, 143+ board definitions, BLE foundation, captive portal, crash handler, and BOOTSEL upload via picotool
    - Long-standing LWIP use-after-free bug causing heap corruption crashes on ESP8266 and RP2040 finally fixed
    - LibreTiny (BK72xx/RTL87xx): ~26KB RAM freed via lwIP buffer tuning, loop stalls fixed by raising task priority
    - nRF52 gains BLE/serial OTA via MCUmgr, early boot crash logging, and bidirectional BLE UART
    - ESP32 now captures crash backtraces across reboots and reports them over the API — no serial cable needed
    - 86-fix correctness sweep across 100+ components: buffer overflows, millis() rollover bugs, uninitialized variables, and logic errors
    - New media player architecture with pluggable sources, playlists, and Ogg Opus support
    - New components: SEN6x environmental sensor, HDC302x temperature/humidity, dew point sensor, serial proxy (experimental)
    - 11-20KB+ flash savings via printf wrapping, scanf removal, timezone refactoring, and devirtualization
    - ⚠️ opentherm: rename opentherm_version to opentherm_version_controller
    - ⚠️ sgp30: expect up to 12h recalibration after update due to serial number fix
    - ⚠️ RP2040 external components using old pico-sdk APIs may need updates (e.g. padsbank0_hw renamed)


  Full release notes can be found at https://esphome.io/changelog/2026.3.0/
