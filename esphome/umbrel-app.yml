releaseNotes: >-
  ESPHome 2026.5.3 is a patch release for the 2026.5 series. It fixes RC5 remote decoding at either receive polarity, restores ESP-IDF version handling on logs/upload fast paths and clean rebuilds after framework changes, fixes RP2040 Windows path handling, and avoids duplicate BLE Device Information Services when string UUIDs are used.

  If you are upgrading from a version before 2026.5.0, review the 2026.5 breaking-change checklist before updating.

  Full release notes can be found at https://github.com/esphome/esphome/releases/tag/2026.5.3
