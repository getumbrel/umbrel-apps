releaseNotes: >-
  This is a patch release with bug fixes across multiple components:
    - Fixed LVGL triggers on tabview tabs
    - Fixed Windows EINVAL error when validating POSIX timezone strings
    - Fixed deep sleep duration code generation type
    - Fixed stale WiFi connected state after state transitions
    - Fixed templatable integer field types in rotary encoder and AT581x components
    - Fixed bootloop and WiFi connection issues when NVS partition is missing or has a non-default label
    - Fixed RGB565+alpha rendering for multi-frame animations
    - Unified Nextion TFT upload acknowledgement timeout to 5000ms
    - Added watchdog timer feeding in ESP32 touch component


  Full release notes can be found at https://esphome.io/changelog/2026.4.3/
