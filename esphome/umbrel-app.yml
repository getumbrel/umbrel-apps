releaseNotes: >-
  ESPHome 2026.7.1 is a follow-up to the recent 2026.7 major update. If you're updating from a pre-2026.7 version, review the upstream upgrade checklist first: ESP32 and nRF52 builds now default to native ESP-IDF/nRF Connect SDK toolchains unless `toolchain: platformio` is set, ESP32 Zigbee devices need to be re-joined and reconfigured, and several `web_server`, `packages`, `hub75`, `modbus`, LN882H, and lambda/API settings changed.

  This patch release fixes several component issues, including temperature reporting for EMC2101 and Haier devices, AS3935 I2C register reads, SH1106/SH1107 display offsets, HTTP request handling, and ESP-IDF web server digest auth builds.

  It also improves framework/toolchain downloads, PlatformIO and Git cache recovery, deep-sleep log reconnects, and updates the bundled ESPHome Device Builder.

  Full release notes can be found at https://github.com/esphome/esphome/releases/tag/2026.7.1
