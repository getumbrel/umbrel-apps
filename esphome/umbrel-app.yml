releaseNotes: >-
  ESPHome 2026.6.2 is a follow-up to the recent 2026.6.0 major update. If you're updating from a pre-2026.6 version, set `wifi.min_auth_mode: WPA` before updating if you have ESP8266 devices on WPA-only/TKIP Wi-Fi, and review the upstream upgrade checklist if you use DSMR `electricity_switch_position`, Nextion `dump_device_info`, custom components, Home Assistant time zones, or advanced lambdas.

  If you're already on ESPHome 2026.6.x, this update bumps Device Builder, fixes ESP-IDF tooling path normalization warnings, resolves a FastLED RMT5 interrupt priority conflict, and marks packet transport encryption keys as sensitive in validation output.

  Full release notes can be found at https://github.com/esphome/esphome/releases/tag/2026.6.2
