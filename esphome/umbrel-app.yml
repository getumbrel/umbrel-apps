releaseNotes: >-
  ⚠️ Major update: ESPHome 2026.6.0 replaces the legacy dashboard with the new ESPHome Device Builder. If you have ESP8266 devices on WPA-only/TKIP Wi-Fi, set `wifi.min_auth_mode: WPA` before updating. Also review the upstream upgrade checklist if you use DSMR `electricity_switch_position`, Nextion `dump_device_info`, custom components, Home Assistant time zones, or advanced lambdas.

  The new Device Builder adds a visual component and automation builder, a CodeMirror YAML editor, device labels and areas, firmware job history, cross-config search, settings, and a command palette.

  This release also improves Wi-Fi and Ethernet memory handling when disabled at boot, speeds up LVGL config validation, modernizes the audio stack, expands DLMS meter support, and adds new IMU, USB-serial, audio DAC, pressure sensor, display, and tooling features.

  Full release notes can be found at https://esphome.io/changelog/2026.6.0.html
