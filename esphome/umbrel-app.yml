releaseNotes: >-
  ESPHome 2026.7.0 is a major monthly release. Before updating, review the upstream upgrade checklist: ESP32 and nRF52 builds now default to the native ESP-IDF/nRF Connect SDK toolchains unless `toolchain: platformio` is set, ESP32 Zigbee devices need to be re-joined and reconfigured, and several `web_server`, `packages`, `hub75`, `modbus`, LN882H, and lambda/API settings changed.

  ESPHome Device Builder adds easier remote build-server pairing, queued offline/deep-sleep updates, a guided quickstart tour, and clearer YAML error explanations with auto-fixes.

  This release also adds NVS encryption, OTA downgrade protection, a new provisioning component, new hardware support, and performance/memory improvements across many components.

  Full release notes can be found at https://github.com/esphome/esphome/releases/tag/2026.7.0
