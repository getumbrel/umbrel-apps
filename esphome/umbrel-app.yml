releaseNotes: >-
  This release includes bug fixes and stability improvements:
    - Fixed BLE RSSI sensor reporting the same value for all clients
    - Fixed HTTP request component launching duplicate update tasks
    - Fixed ESP8266 crash at VERY_VERBOSE log level
    - Fixed UART0 default pin IOMUX loopback on ESP32
    - Fixed timezone offset functions always returning UTC
    - Fixed light constant_brightness broken by gamma LUT refactor
    - Fixed gamma LUT quantizing small brightness values to zero
    - Fixed SHT4x heater causing measurement jitter
    - Fixed MQTT rate-limiting to prevent watchdog resets on reconnect
    - Fixed ultrasonic sensor ISR edge detection with debounce
    - Fixed web server task stack size to prevent stack overflow
    - ⚠️ WiFi power_save_mode LIGHT/HIGH were swapped on ESP8266 — check your config if you use this setting


  Full release notes can be found at https://esphome.io/changelog/2026.3.1/
