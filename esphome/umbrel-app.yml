releaseNotes: >-
  ESPHome 2026.5.2 is a patch release for the 2026.5 series. It fixes ESP32 crash decoding, cleans builds when the toolchain changes, fixes an API crash loop for Voice Assistant configuration requests, improves RTL8710B flashing and SX126x image calibration, fixes Windows git package symlink handling, and persists ESPHome area metadata.

  If you are upgrading from a version before 2026.5.0, review the 2026.5 breaking-change checklist before updating.

  Full release notes can be found at https://github.com/esphome/esphome/releases/tag/2026.5.2
