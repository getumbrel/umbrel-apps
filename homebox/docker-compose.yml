version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: homebox_web_1
      APP_PORT: 7745
    
  web:
    image: ghcr.io/sysadminsmedia/homebox:0.24.0@sha256:799be9851a0d5fd9a885d026ba64e27622b98e3501bdbcf93a60e342462c1bf4
    restart: on-failure
    user: 1000:1000
    environment:
      - HBOX_LOG_LEVEL=info
      - HBOX_LOG_FORMAT=text
      - HBOX_WEB_MAX_UPLOAD_SIZE=10
    volumes:
      - ${APP_DATA_DIR}/data:/data/
