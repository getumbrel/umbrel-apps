releaseNotes: >-
  ⚠️ It is highly recommended to keep backups of your database and stored attachments before updating.


  🚨 This release includes 3 security vulnerability patches with CVE scores ranging from 4.6 to 7.4. Updating is strongly recommended.


  New features and improvements in this release:
    - Added skip-first-labels and location-row toggle options to the label generator
    - Added configurable security options for generic notifiers
    - Added new field types to template fields
    - Added show/hide items toggle for the locations tree
    - Fixed export download URLs missing tenant information
    - Fixed hardcoded frontend strings
    - Fixed mobile image popup sizing
    - Fixed CLP currency decimals to comply with ISO 4217


  Full release notes can be found at https://github.com/sysadminsmedia/homebox/releases
