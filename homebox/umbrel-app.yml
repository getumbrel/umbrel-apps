releaseNotes: >-
  HomeBox 0.26.2 is a follow-up to the recent 0.26 major update. If you're updating from a pre-0.26 version, back up your HomeBox database and files first because 0.26 introduced a significant database rework for the new entity model.


  If you're already on 0.26.1, this update fixes various bugs introduced in the new 0.26 release line.


  Developer note: integrations using the old /v1/items* or /v1/locations* API endpoints must migrate to /v1/entities*.


  Full release notes can be found at https://github.com/sysadminsmedia/homebox/releases/tag/v0.26.2
