releaseNotes: >-
  ⚠️ Major update: back up your HomeBox database and files before updating. This release includes a significant database rework for the new entity model.


  Highlights in this release:
    - Items and locations now use a shared entity model, enabling shared custom fields, attachments, entity types, and templates
    - API keys, password resets, experimental full-collection export/import, and an AR QR-code scanner were added
    - Search and Docker attachment regressions from 0.26.0 were fixed in 0.26.1
    - Several security fixes are included


  Developer note: integrations using the old /v1/items* or /v1/locations* API endpoints must migrate to /v1/entities*.


  Full release notes can be found at https://github.com/sysadminsmedia/homebox/releases/tag/v0.26.1
