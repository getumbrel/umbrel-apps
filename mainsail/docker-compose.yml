version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mainsail_web_1
      APP_PORT: 80
  web:
    image: ghcr.io/mainsail-crew/mainsail:v2.18.1@sha256:16f8b66efe7c66550ea9b1ac46a5c8a192ad6cb77622b413ea982636dfc54d87
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/config.json:/usr/share/nginx/html/config.json:ro
