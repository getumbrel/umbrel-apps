version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mainsail_web_1
      APP_PORT: 80
  web:
    image: ghcr.io/mainsail-crew/mainsail:sha-3783e07@sha256:c125fbc0de775cd97a526ca5e39deaa531f1c718f3a90253073c14a82cbe7acc
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/config.json:/usr/share/nginx/html/config.json:ro
