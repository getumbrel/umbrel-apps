version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mainsail_web_1
      APP_PORT: 80
  web:
    image: ghcr.io/mainsail-crew/mainsail:v2.18.0@sha256:222ff8c42610ae8b062d7bdae11dd2c760df45a9033e0186073332b5b0754a14
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/config.json:/usr/share/nginx/html/config.json:ro
