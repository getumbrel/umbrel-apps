name: Mainsail
version: "2.18.0"
tagline: Control and monitor your printer from everywhere, from any device
description: >-
  🖨️ A modern and responsive user interface for Klipper. Control and monitor your printer from everywhere, from any device.


  **Easy to use.** The focus lies on both anticipating what users may need to do and ensuring that the user interface contains elements that are easily accessible, understandable, and user-friendly to make those actions easier.


  **Always one step ahead.** We work closely with developers of other projects so that functions can already be implemented early on.


  **100% open source.** Anyone can join, anyone can contribute.
releaseNotes: >-
  New features and improvements:
    - Added more HappyHare and AFC multi-material controls, including multi-gate espooler display support, MMU heater/climate footer details, and improved Spoolman lane information
    - Added YAML support and Klipper documentation links to the editor
    - Added executable update support in the update manager
    - Improved webcam layout on smaller screens


  Bug fixes and improvements:
    - Improved job queue handling, thumbnails, temperature input formatting, selected-file downloads, and thumbnail URL escaping
    - Excluded temporary data from Mainsail settings backup and restore
    - Updated translations and dependencies, including security-related Vite/esbuild, form-data, tmp, and js-yaml updates


  Full release notes can be found at https://github.com/mainsail-crew/mainsail/releases/tag/v2.18.0
