releaseNotes: >-
  This release adds the ability to unarchive completed submissions from the submission page dropdown, adds font settings for radio group fields, and includes performance optimizations.


  This update includes an automatic database migration on first boot. It may take 1-2 minutes for very large installs with around 1M submissions; smaller installs should complete in a few seconds.


  Full release notes can be found at https://github.com/docusealco/docuseal/releases/tag/3.1.3
