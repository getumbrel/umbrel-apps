releaseNotes: >-
  This release allows editing email messages for up to 10 parties, adds context-menu toggles for required and read-only fields, and adds official API wrapper libraries for C#, Java, and Go.


  If you are upgrading from a version before 3.1.3, the database migration introduced in 3.1.3 may still run on first boot. It should complete quickly for small installs and may take 1-2 minutes for very large installs.


  Full release notes can be found at https://github.com/docusealco/docuseal/releases/tag/3.1.5
