manifestVersion: 1
id: qq-ai-bot
category: ai
name: qq-ai-bot
version: "0.1.4"
tagline: Self-hosted QQ ↔ AI bridge with NapCat and ACP-compatible agents
description: >-
  qq-ai-bot is a self-hosted QQ ↔ AI bridge for OneBot 11 / NapCat / LLOneBot
  and ACP-compatible agents.


  This Umbrel package opens directly into NapCat WebUI, bundles the qq-ai-bot
  bridge service, and starts with the repository's mock ACP agent so you can
  verify the full QQ → OneBot11 → ACP flow before wiring your own agent.


  On first launch, open NapCat WebUI, use the password shown by Umbrel as the
  WebUI token, sign in QQ with the QR code, and then send `/ping` or `/status`
  to the logged-in account to verify the stack.


  The bundled bridge keeps persistent sessions and streams progress updates back
  into QQ. Advanced users can later replace the mock ACP agent with their own
  ACP-compatible runtime.
