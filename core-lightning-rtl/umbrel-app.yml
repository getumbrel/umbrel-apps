  - 2.jpg
  - 3.jpg
path: ""
deterministicPassword: true
releaseNotes: >-
  RTL bump to v0.15.8-beta-boltz with provider-contract integration for Core Lightning.


  **What changed:**
    - Upgraded RTL to v0.15.8-beta-boltz
    - Upgraded boltz-client to v2.10.2
    - Switched CLN connection wiring to exported provider-contract variables:
      `LN_SERVER_URL=${CLNREST_URL}` and `RUNE_PATH=${CLNREST_RUNE_PATH}`


  **Why this matters:**
    - Reduces endpoint drift between Core Lightning and RTL during restarts/upgrades
    - Keeps TLS+rune material aligned with Core Lightning contract exports
    - Improves consistency for recovery testing and future CLN upgrade validation
    - Forensic delta from HotFix 1: replaces `APP_CORE_LIGHTNING_REST_HOST + CORE_LIGHTNING_REST_PORT` URL reconstruction with direct `CLNREST_URL` contract consumption


  **Operator references:**
    - Recovery and reboot validation guidance: `docs/DR-RUNBOOK.md`
    - Operational sequencing and grace-window guidance: `docs/HA.md`
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/pull/7
