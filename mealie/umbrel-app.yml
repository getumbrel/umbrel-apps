manifestVersion: 1
id: mealie
category: files
name: Mealie
version: "3.13.1"
tagline: A Place for All Your Recipes
description: >-
  Mealie is a self hosted recipe manager and meal planner. Easily add recipes by providing
  the url and Mealie will automatically import the relevant data or add a family recipe with the UI editor. Mealie also
  provides an API for interactions from 3rd party applications.


  Key Features:
  
  - Recipe imports: Create recipes, by importing from a URL or entering data manually

  - Meal Planner: Use the Meal Planner to plan your what you'll cook for the next week

  - Shopping List: Put the necessary ingredients on your Shopping List, organised into sections of your local supermarket

  - Cookbooks: Group recipes into Cookbooks based on your own criteria

  - Localisation: Translations for 35+ languages
developer: Hayden
website: https://docs.mealie.io/
dependencies: []
repo: https://github.com/hay-kot/mealie
support: https://github.com/hay-kot/mealie/issues
port: 9925
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/pull/608
releaseNotes: >-
  This update includes new features, bug fixes, and improvements across multiple versions.


  Highlights:
    - Import recipes from YouTube, TikTok, Instagram, and other video sources using OpenAI
    - Unit standardization and conversion support (e.g. "1 pint" converts to "2 cups")
    - Improved website scraper for more consistent recipe imports
    - Recipe import progress indicator
    - Shopping list now automatically merges ingredients with compatible units


  Bug fixes:
    - Fixed 500 internal server error when patching recipe tags
    - Fixed recipe description being overwritten during import
    - Fixed HTTP error handling to stop parsing recipes with failed requests
    - Fixed stale app shell caused by cached index.html


  Full release notes are found at https://github.com/mealie-recipes/mealie/releases
