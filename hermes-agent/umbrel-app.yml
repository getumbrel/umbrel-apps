releaseNotes: >-
  This update makes Hermes Agent feel much faster, with first responses starting sooner and reasoning output streaming live by default.


  It also adds terminal-based subscription management, Bitwarden and 1Password secret sources, smarter command approvals, live subagent transcripts, and more durable response delivery if the gateway restarts.


  Full release notes can be found at https://github.com/NousResearch/hermes-agent/releases/tag/v2026.7.20
