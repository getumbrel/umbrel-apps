releaseNotes: >-
  What's new in Hermes Agent (2026.4.23):
    - Adds a new interactive terminal UI (TUI) with a sticky composer, live streaming, clipboard support, git branch display, and per-turn elapsed time
    - Adds native AWS Bedrock support via the Converse API with a new pluggable transport architecture
    - Adds five new AI inference providers: NVIDIA NIM, Arcee AI, Step Plan, Google Gemini CLI OAuth, and Vercel ai-gateway
    - Adds GPT-5.5 access via ChatGPT Codex OAuth with live model discovery in the model picker
    - Adds QQBot as the 17th supported messaging platform with QR scan setup
    - Adds /steer command to nudge a running agent mid-task without interrupting it
    - Adds shell hooks so any shell script can be wired as an agent lifecycle hook without writing a plugin
    - Adds webhook direct-delivery mode for zero-LLM push notifications and alerting
    - Expands the plugin system with slash command registration, tool dispatch, tool veto, result rewriting, and custom dashboard tabs
    - Adds smarter subagent delegation with an orchestrator role, configurable spawn depth, and cross-agent file coordination
    - Adds dashboard plugin system and live theme switching without a page reload
    - Adds i18n support (English and Chinese), mobile-responsive layout, and real per-session API call tracking to the dashboard
    - Adds Discord forum channel support, role-based access control, and native GIF playback
    - Adds Feishu document comment replies, DingTalk AI Cards streaming, WhatsApp voice messages, and Signal media delivery
    - Adds Slack per-thread sessions for DMs by default
    - Adds Google Gemini TTS, xAI Grok STT, xAI TTS, and KittenTTS local voice providers
    - Adds support for Kimi K2.6, Xiaomi MiMo v2.5, Claude Opus 4.7, and other new models
    - Adds many new skills including concept-diagrams, pixel-art, baoyu-comic, drug-discovery, and page-agent
    - Includes 482+ bug fixes across the agent core, gateway, CLI, tool system, and messaging platforms


  Full details at https://github.com/NousResearch/hermes-agent/releases
