releaseNotes: >-
  What's new in Hermes Agent (2026.4.30):
    - Adds an autonomous Curator that runs in the background to grade, consolidate, and prune your skill library on a regular schedule
    - Substantially upgrades the self-improvement loop so the agent better decides what memories and skills to save after each session
    - Adds LM Studio as a first-class inference provider with dedicated setup, health checks, and live model listing
    - Adds four new inference providers: GMI Cloud, Azure AI Foundry, MiniMax OAuth, and Tencent Tokenhub
    - Adds Microsoft Teams as a new messaging platform (via plugin) and Tencent Yuanbao as a native platform, bringing the total to 19 supported platforms
    - Adds native Spotify integration with 7 tools, PKCE OAuth setup wizard, and cron support
    - Adds a Google Meet plugin for joining calls, transcribing, and following up
    - Adds a Models dashboard tab for per-model analytics and switching main and auxiliary models from the browser
    - Moves ComfyUI v5 and TouchDesigner-MCP from optional to built-in by default
    - Cuts TUI visible cold start time by approximately 57% via lazy loading
    - Adds `hermes -z` for non-interactive one-shot prompts from the command line
    - Adds native multi-image sending across Telegram, Discord, Slack, Mattermost, Email, and Signal
    - Adds Piper as a native local text-to-speech provider
    - Improves the TUI with LaTeX rendering, .env hot-reload, pluggable busy indicators, auto-resume, session delete, and voice mode parity
    - Includes many more fixes and improvements across the agent core, dashboard, CLI, gateway, and integrations


  Full details at https://github.com/NousResearch/hermes-agent/releases
