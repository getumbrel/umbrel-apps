manifestVersion: 1.2
id: hermes-agent
name: Hermes Agent
tagline: Run Hermes on your Umbrel as a private local agent backend
category: ai
version: "2026.4.3"
port: 8600
description: >-
  Hermes Agent is Nous Research's local agent runtime for the terminal, app integrations, and API workflows.

  This Umbrel package runs Hermes as a standalone backend and includes a dashboard page with the two main ways to use it.

  Open umbrelOS -> Settings -> Advanced Settings -> Terminal -> App, select Hermes Agent, run `hermes model` to connect your model, then run `hermes` for the CLI experience.

  Or install Hermes Workspace and connect to the same local Hermes backend through a web UI.

  If you need API access, configure it from inside Hermes for your own setup.
