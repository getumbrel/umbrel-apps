manifestVersion: 1.2
id: hermes-agent
name: Hermes Agent
category: ai
version: "2026.4.3"
tagline: A local runtime for AI agents, tools, and app workflows
port: 8600
description: >-
  Hermes Agent is Nous Research's runtime for AI agents that work from the terminal, connect to apps, and expose an API when you need one.

  Use it as your local Hermes backend, connect a model, and keep working from the CLI or from Hermes Workspace against the same running agent.

  To get started on Umbrel, open Settings -> Advanced Settings -> Terminal -> App, select Hermes Agent, run `hermes model` to connect your model, then run `hermes` to start chatting.

  If you prefer a UI, install Hermes Workspace and point it at this same local backend.

  Hermes starts private on your local app network. If you need external API access, configure it inside Hermes for your setup.
