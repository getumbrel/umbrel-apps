releaseNotes: >-
  ⚠️ Secret redaction is now ON by default — this closes a security issue where fake secret-shaped strings could corrupt tool outputs. If you previously relied on redaction being off, you can opt out via `redaction.enabled: false` in your config


  What's new in Hermes Agent (2026.5.7):
    - Adds multi-agent Kanban boards with heartbeats, zombie detection, per-task retries, and a hallucination gate so AI workers actually complete tasks
    - Adds `/goal` to keep the agent locked on a target across turns without losing focus
    - Adds a `video_analyze` tool for native video understanding on Gemini and compatible models
    - Adds voice cloning support via xAI Custom Voices as a new TTS provider
    - Adds Google Chat as the 20th supported messaging platform
    - Sessions now auto-resume after a gateway restart or update — interrupted conversations pick up where they left off
    - Closes 8 high-priority security issues including Discord role-allowlists now scoped to the originating guild, WhatsApp rejecting strangers by default, and TOCTOU windows closed in credential writers
    - Adds Checkpoints v2 with real pruning and disk guardrails replacing the old orphan-prone system
    - Adds post-write lint on `write_file` and `patch` for Python, JSON, YAML, and TOML so syntax errors surface immediately
    - Adds a `no_agent` cron mode for script-only watchdog jobs that skip the AI entirely
    - Adds platform allowlists across Slack, Telegram, Mattermost, Matrix, and DingTalk
    - Adds SearXNG as a native search backend with per-capability backend selection
    - Adds MCP SSE transport support with OAuth forwarding and stale-pipe retries
    - Adds a Plugins management page and a Profiles management page to the dashboard
    - Adds 7 new i18n locales: Chinese, Japanese, German, Spanish, French, Ukrainian, and Turkish
    - Adds 6 new optional skills: Shopify, here.now, shop-app, Anthropic financial-services bundle, kanban-video-orchestrator, and searxng-search
    - Adds new models including deepseek-v4-pro, grok-4.3, and tencent/hy3-preview
    - Adds 100 new CLI startup tips covering cron, kanban, curator, plugins, and lesser-known flags
    - Improves the TUI with a revamped `/model` picker, collapsible startup banner sections, and a context compression counter in the status bar
    - Includes many more fixes across the agent core, gateway, MCP, cron, dashboard, and messaging platforms


  Full details at https://github.com/NousResearch/hermes-agent/releases
