releaseNotes: >-
  Good news: this update fixes the OpenAI Codex OAuth issues users have been waiting on, so Hermes can connect and respond correctly again.

  Hermes Agent 0.15.0 is the Velocity Release, with faster startup and runtime performance, a major core-agent refactor, expanded Kanban multi-agent workflows, faster session search, promptware and memory hardening, Bitwarden Secrets Manager support, new and improved gateway integrations including ntfy, and dashboard, TUI, Docker, and provider fixes.

  Full release notes can be found at https://github.com/NousResearch/hermes-agent/releases/tag/v2026.5.28
