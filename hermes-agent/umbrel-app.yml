releaseNotes: >-
  What's new in Hermes Agent (2026.5.16):
    - Adds xAI Grok via SuperGrok OAuth, including support for the larger grok-4.3 context window
    - Adds an OpenAI-compatible local proxy so OAuth-backed providers can be used from tools that expect an OpenAI API endpoint
    - Adds first-class X/Twitter search, Microsoft Teams support, LINE, and SimpleX Chat integrations
    - Makes installs lighter with lazy dependency installation and improves cold-start performance
    - Adds faster browser automation, native button prompts on Telegram and Discord, and live `/handoff` session transfer
    - Adds native Windows beta support, new optional skills, new model/router options, and many fixes across the agent, gateway, dashboard, and messaging platforms


  Full details at https://github.com/NousResearch/hermes-agent/releases/tag/v2026.5.16
