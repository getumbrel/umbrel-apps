version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: hermes-agent_web_1
      APP_PORT: 8080

  server:
    image: ghcr.io/aidencole98/hermes-agent-umbrel:v2026.4.3@sha256:ef75435acd68c20294cbc8e62d8f38c87ce388681b6344b20163cc3d71d629f3
    command: gateway run
    user: "1000:1000"
    restart: on-failure
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
    volumes:
      - ${APP_DATA_DIR}/data/hermes:/opt/data
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - |
          import sys, urllib.request
          urllib.request.urlopen("http://127.0.0.1:8642/health", timeout=10)
          sys.exit(0)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    image: nginxinc/nginx-unprivileged:1.27@sha256:f9dfa9c20b2b0b7c5cc830374f22f23dee3f750b6c5291ca7e0330b5c88e6403
    restart: on-failure
    depends_on:
      - server
    volumes:
      - ${APP_DATA_DIR}/data/www:/usr/share/nginx/html:ro
