version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: hermes-agent_web_1
      APP_PORT: 9119

  server:
    image: nousresearch/hermes-agent:latest@sha256:ae4aca3179c38ce14cd480dd150d299dbcf6ac9317ae371bc77c3acb37253c6a
    command:
      - gateway
      - run
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/hermes:/opt/data

  web:
    image: nousresearch/hermes-agent:latest@sha256:ae4aca3179c38ce14cd480dd150d299dbcf6ac9317ae371bc77c3acb37253c6a
    command:
      - dashboard
      - --host
      - 0.0.0.0
      - --port
      - "9119"
      - --no-open
    restart: on-failure
    depends_on:
      - server
    volumes:
      - ${APP_DATA_DIR}/data/hermes:/opt/data
