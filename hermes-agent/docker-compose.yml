version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: hermes-agent_web_1
      APP_PORT: 8080

  server:
    image: ghcr.io/aidencole98/hermes-agent-umbrel:v2026.4.3@sha256:ef75435acd68c20294cbc8e62d8f38c87ce388681b6344b20163cc3d71d629f3
    command: gateway run
    user: "1000:1000"
    restart: on-failure
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
    volumes:
      - ${APP_DATA_DIR}/data/hermes:/opt/data

  web:
    image: ghcr.io/aidencole98/hermes-agent-web-ui:v2026.4.3@sha256:d25d119f95a540c672bd74bd0da0ddfa86284a8fe33607e332cd346aaef73036
    user: "1000:1000"
    restart: on-failure
    depends_on:
      - server
