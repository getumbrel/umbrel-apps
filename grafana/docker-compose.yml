version: "3.7"

services:
  
  app_proxy:
    environment:
      APP_HOST: grafana_web_1
      APP_PORT: 3000
      PROXY_AUTH_WHITELIST: "/api/*"
      
  web:
    image: grafana/grafana:13.1.1@sha256:1c1bd67c54c5fcf6e759897852b5a584191bd6796e8d328a5ace457799801261
    user: 1000:1000
    environment:
      GF_PLUGINS_PREINSTALL_AUTO_UPDATE: "false"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/grafana
