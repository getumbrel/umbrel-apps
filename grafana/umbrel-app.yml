releaseNotes: >-
  ⚠️ If you're updating from before Grafana 13.1, Prometheus Azure/SigV4 authentication and the Zipkin core plugin were removed from Grafana core. Review the upstream notes if you use those integrations.


  Grafana 13.1.1 updates Grafana's Go runtime and improves provisioning behavior, including clearer GitHub connection form errors and a configurable sync write timeout.


  This release also fixes stale data in chained dashboard datasource panels, makes GitHub webhook creation idempotent for unhealthy repositories, and improves accessibility announcements.


  Full release notes can be found at https://github.com/grafana/grafana/releases/tag/v13.1.1
