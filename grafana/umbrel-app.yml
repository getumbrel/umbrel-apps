releaseNotes: >-
  This release includes security fixes for multiple vulnerabilities, including CVE-2026-9029, CVE-2026-33382, CVE-2026-42127, CVE-2026-42129, CVE-2026-10601, CVE-2026-8609, and CVE-2026-8595.


  It also improves dashboard, homepage, library panel, provisioning, Jaeger, PostgreSQL, and Kubernetes dashboard behavior.


  Full release notes are available at https://github.com/grafana/grafana/releases/tag/v13.0.2
