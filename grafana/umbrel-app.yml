releaseNotes: >-
  ⚠️ Breaking change: Prometheus Azure/SigV4 authentication and the Zipkin core plugin were removed from Grafana core. Review the upstream notes if you use those integrations.


  Grafana 13.1 adds dashboard, alerting, and accessibility improvements, including better alert activity filtering, dashboard browse updates, and colorblind-safe line styles.


  This release also fixes dashboard, alerting, datasource, provisioning, trace-view, and migration issues, and includes May 2026 security patches.


  Full release notes can be found at https://github.com/grafana/grafana/releases/tag/v13.1.0
