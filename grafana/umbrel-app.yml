releaseNotes: >-
  This release improves dashboard provisioning by writing folder metadata when dashboards are created or moved into new folders.


  It also fixes datasource UID validation, provisioning PR comments and links, connection deletion validation, and a MySQL datasource type migration.


  Full release notes are available at https://github.com/grafana/grafana/releases/tag/v13.0.3
