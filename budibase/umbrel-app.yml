releaseNotes: >-
  Key improvements in this release include:
    - Secured user-provided fetch requests
    - Added configurable login button on public pages
    - Added min-length validation option for password fields
    - Fixed custom role regressions
    - OIDC authentication configuration fixes
    - Added ability to reinstate workspace duplication
    - Show automation errors on the home screen
    - Fixed italic not displaying in markdown editor
    - Fixed SQL query bindings disappearing while editing query text
    - Fixed issue with processing dates in a relationship
    - Enforced outbound blacklist in webhook automation steps
    - Fixed channel chats (Discord, etc.) showing incorrectly in the chat window
    - Allowed view or download access when fields are set to read-only
    - Renamed import app to import workspace


  Full release notes are found at https://github.com/Budibase/budibase/releases
