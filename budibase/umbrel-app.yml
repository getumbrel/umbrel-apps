releaseNotes: >-
  Key improvements in this release include:
    - Adds Projects foundations, including workspace home UI, project import/export, and assignment controls
    - Adds agent escalations and improves automation scheduling, log refresh, and empty branch conditions
    - Improves builder fields and query handling, including S3 upload options, field sizing, Snowflake bindings, and operation request summaries
    - Fixes app scope validation, object-store path handling, Budibase AI agent steps without a key, and Update Field Value action persistence


  Full release notes can be found at https://github.com/Budibase/budibase/releases/tag/3.39.24
