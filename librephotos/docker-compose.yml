version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: librephotos_proxy_1
      APP_PORT: 80

  proxy:
    image: reallibrephotos/librephotos-proxy:2026w10@sha256:ecd81749290b3935869bc4482d2b092fd9d07a4fc884d99bfccbe1caf506b75e
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/photos:/data
      - ${APP_DATA_DIR}/data/protected_media:/protected_media
    expose:
      - "80"
    depends_on:
      - backend
      - frontend

  db:
    image: pgautoupgrade/pgautoupgrade:17-alpine3.22@sha256:2ec008ae5f0a2e5dd8f4d2475df41cf3ccc9562acf49bd668fcc0c061944b9bf
    restart: on-failure
    environment:
      POSTGRES_USER: librephotos
      POSTGRES_PASSWORD: librephotos
      POSTGRES_DB: librephotos
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "psql", "-U", "librephotos", "-d", "librephotos", "-c", "SELECT 1;"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: reallibrephotos/librephotos-frontend:2026w10@sha256:0126388cb7e6dcbea0ecffd2e4e156463a9f184d40ca79e7fcd8b060840ef396
    restart: on-failure

  backend:
    image: reallibrephotos/librephotos:2026w10@sha256:511c63ed17b0125b43ea167986c1be9920067e32b4fda2194105959be29a716c
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/photos:/data
      - ${APP_DATA_DIR}/data/protected_media:/protected_media
      - ${APP_DATA_DIR}/data/logs:/logs
      - ${APP_DATA_DIR}/data/cache:/root/.cache
    environment:
      SECRET_KEY: ${APP_SEED}
      BACKEND_HOST: backend
      ADMIN_EMAIL: admin@admin.com
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${APP_PASSWORD}
      DB_BACKEND: postgresql
      DB_NAME: librephotos
      DB_USER: librephotos
      DB_PASS: librephotos
      DB_HOST: librephotos_db_1
      DB_PORT: 5432
      MAPBOX_API_KEY: ""
      WEB_CONCURRENCY: 2
      HEAVYWEIGHT_PROCESS: 1
      FIXPERMISSIONS: "true"
      SKIP_PATTERNS: ""
      ALLOW_UPLOAD: "true"
      CSRF_TRUSTED_ORIGINS: ""
      DEBUG: "0"
    depends_on:
      db:
        condition: service_healthy
