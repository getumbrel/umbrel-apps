id: sikka
category: crypto
name: Sikka
version: "0.2.0"
tagline: Feeless, quantum-safe cryptocurrency node
description: >-
  Sikka Crypto is a feeless, quantum-safe cryptocurrency built for the modern internet, with a lightweight node that is simple to run and fast to sync.


  The network uses a DAG instead of blocks for parallel scaling, includes built-in post-quantum signatures, and uses Tor-native peer connectivity with HTTP federation.


  The node ships with browser-based wallet support and persists its chain data, peers, and identity across restarts.
releaseNotes: >-
  This update upgrades Sikka to 0.2.0 with protocol version 2 and storage format version 2.


  It adds witness stripping, spent UTXO purging, and weight index compaction to reduce disk usage and improve wallet balance and UTXO query performance.


  It also includes the 0.1.3 wallet tip panel and Tor network health parsing improvements.
