version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sikka_web_1
      APP_PORT: 8080

  web:
    image: besoeasy/sikka:0.0.27@sha256:628d02df12dfe8295caebed97aa09d46b817ae70cf18af659adf0cd34c40f0e4
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/home/sikka/data
