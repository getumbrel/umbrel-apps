version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sikka_web_1
      APP_PORT: 64552

  web:
    image: besoeasy/sikka:0.1.2@sha256:bd812b6f3953f9671fed0de14922b4a15af3b93f05e3b4e9d9379e3f63e08535
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/home/sikka/data
