version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sikka_web_1
      APP_PORT: 8080

  web:
    image: besoeasy/sikka:0.1.1@sha256:6cf8286a35c98c7e1ecf415dd74f3fa676cbf3feb8cfc802822e52af93c3fa93
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/home/sikka/data
