version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sikka_web_1
      APP_PORT: 64552

  web:
    image: ghcr.io/sikkalabs/sikka:0.1.3@sha256:4ebdd6fce7836eda7319aa76e2507e1f233ad7b1d417b41df4c41d2af339b0c6
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/home/sikka/data
