manifestVersion: 1
id: grocy
name: Grocy
tagline: Track groceries, chores, recipes, and household tasks
category: files
version: "4.6.0"
port: 9283
description: >-
  Grocy is a self-hosted groceries and household management app for tracking what you have, what you need, and what needs doing at home.


  Important: On first launch, sign in with username `admin` and password `admin`, then change the password from the user menu.


  Manage pantry stock, shopping lists, recipes, meal plans, chores, tasks, batteries, equipment, and more from one web interface. Grocy stores your household data on your Umbrel so it stays under your control.
developer: Grocy
website: https://grocy.info/
repo: https://github.com/grocy/grocy
support: https://github.com/grocy/grocy/issues
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/pull/5689
gallery:
  - 1.webp
  - 2.webp
  - 3.webp
  - 4.webp
  - 5.webp
releaseNotes: ""
dependencies: []
path: ""
defaultUsername: "admin"
defaultPassword: "admin"
deterministicPassword: false
backupIgnore:
  - data/config/log/*
