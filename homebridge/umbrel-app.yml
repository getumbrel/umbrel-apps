manifestVersion: 1
id: homebridge
category: automation
name: Homebridge
version: "2.0.1-2026-05-06"
tagline: "HomeKit support for the impatient"
description: >-
  Bringing HomeKit support where there is none. Homebridge allows you to integrate with smart home devices that do not natively support HomeKit.
  There are over 2000 Homebridge plugins supporting thousands of different smart accessories.


  Some of the most popular plugins include:
  
  - Ring
  
  - Nest & Nest Cameras
  
  - TP-Link Kasa Smart Home
  
  - Hue / deCONZ (Zigbee)
  
  - Belkin Wemo
  
  - myQ
  
  - UniFi Protect
developer: Homebridge
website: https://homebridge.io/
dependencies: []
repo: https://github.com/homebridge/homebridge
support: https://github.com/homebridge/homebridge/issues
port: 8581
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - GPU
releaseNotes: >-
  This major update upgrades Homebridge to version 2.0.1, Homebridge UI to version 5.22.0, and Node.js to version 24.15.0.


  Homebridge 2 adds Matter support and child bridge improvements. Before updating, make sure your installed plugins are compatible with Homebridge 2.


  Full release notes can be found at https://github.com/homebridge/homebridge/releases
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/pull/606
