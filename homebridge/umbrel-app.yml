manifestVersion: 1
id: homebridge
category: automation
name: Homebridge
version: "2.0.1-2026-05-06"
tagline: "HomeKit support for the impatient"
description: >-
  Bringing HomeKit support where there is none. Homebridge allows you to integrate with smart home devices that do not natively support HomeKit.
  There are over 2000 Homebridge plugins supporting thousands of different smart accessories.


  Some of the most popular plugins include:
  
  - Ring
  
  - Nest & Nest Cameras
  
  - TP-Link Kasa Smart Home
  
  - Hue / deCONZ (Zigbee)
  
  - Belkin Wemo
  
  - myQ
  
  - UniFi Protect
developer: Homebridge
website: https://homebridge.io/
dependencies: []
repo: https://github.com/homebridge/homebridge
support: https://github.com/homebridge/homebridge/issues
port: 8581
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - GPU
releaseNotes: >-
  ⚠️ Major update: Check Homebridge's plugin readiness indicators and update any outdated plugins before upgrading to Homebridge 2. Most plugins should continue to work, but older plugins that use removed Homebridge or HAP-NodeJS APIs may fail until updated.


  If an incompatible plugin is running outside a child bridge, Homebridge may restart until that plugin is disabled or updated. Plugins in child bridges are isolated, so the Homebridge UI should remain accessible while the affected child bridge restarts.


  Homebridge 2 changes the default mDNS advertiser to Avahi when available. If your HomeKit devices show "No Response" after updating, open Homebridge Settings → mDNS Advertiser and switch back to Bonjour HAP.


  This release also adds Matter support, child bridge improvements, Homebridge UI 5.22.0, and Node.js 24.15.0.


  Full release notes can be found at https://github.com/homebridge/homebridge/releases
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/pull/606
