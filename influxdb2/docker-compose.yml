services:
  app_proxy:
    environment:
      APP_HOST: influxdb2_app_1
      APP_PORT: 8086
      PROXY_AUTH_WHITELIST: "/api/*,/api/v2/*"
      
  app:
    image: influxdb:2.9.0-alpine@sha256:20c190638610b37cf296e4c2751d276862adaeb76909529ebe5f49b44008ac4b
    user: 1000:1000
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/data:/var/lib/influxdb2
      - ${APP_DATA_DIR}/data/config:/etc/influxdb2
