services:
  app_proxy:
    environment:
      APP_HOST: influxdb2_app_1
      APP_PORT: 8086
      PROXY_AUTH_WHITELIST: "/api/*,/api/v2/*"
      
  app:
    image: influxdb:2.8.0-alpine@sha256:f15dfc604753f53b180364a331b46c2f4bc5c08a665d025982b301efa69bc2f7
    user: 1000:1000
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/data:/var/lib/influxdb2
      - ${APP_DATA_DIR}/data/config:/etc/influxdb2
