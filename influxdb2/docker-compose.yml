services:
  app_proxy:
    environment:
      APP_HOST: influxdb2_app_1
      APP_PORT: 8086
      PROXY_AUTH_WHITELIST: "/api/*,/api/v2/*"
      
  app:
    image: influxdb:2.9.1-alpine@sha256:1cb8fa92ff9d13518d8198dae872b7ea523757a03c655d12a67175b1ab7a72f0
    user: 1000:1000
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/data:/var/lib/influxdb2
      - ${APP_DATA_DIR}/data/config:/etc/influxdb2
