releaseNotes: >-
  Adds global variable model overrides.

  Improves telemetry handling, session auth-token validation, trace cleanup, and Python 3.14 package resolution.

  Includes security hardening for default superuser credentials, user-scoped FAISS/vector-store persistence, public code-execution agents, file and directory path validation, log access, MCP stdio environment handling, and Python interpreter traversal.
