releaseNotes: >-
  Adds native v2 workflow endpoints, A2A protocol support, and new extension bundles for providers and vector stores.

  Improves the flow editor, assistant, starter projects, accessibility, API keys, traces, and model provider setup.

  Includes security and isolation hardening for RBAC permissions, multi-tenant surfaces, SSRF checks, MCP stdio, code execution, and file/path validation.
