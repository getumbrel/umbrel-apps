releaseNotes: >-
  Adds first-class local model support for the Langflow Assistant.

  Improves agent tool-calling, IBM WatsonX model selection, Loop and SQL components, URL handling, and browser autofill behavior in component configuration fields.

  Includes security fixes for public flows, registration, auto-login tokens, custom code execution, SSRF protections, CORS handling, MCP server configuration, and dependency updates.
