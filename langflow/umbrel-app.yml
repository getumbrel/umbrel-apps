releaseNotes: >-
  Adds Memory Base APIs and UI improvements, named flow snapshots, and a built-in Calculator tool for agents.

  Improves MCP behavior, including authenticated streamable connections, configurable tool-call timeouts, and more reliable reconnect/session handling.

  Includes security fixes for public flow builds, login rate limiting, forwarded-IP handling, and dependency updates.
