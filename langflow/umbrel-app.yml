manifestVersion: 1
id: langflow
name: Langflow
tagline: Build AI agents and workflows visually
category: ai
version: "1.9.5"
port: 8862
description: >-
  Langflow is a visual platform for building and deploying AI-powered agents and workflows.
  It gives developers a drag-and-drop authoring experience, source-code access for custom Python components,
  an interactive playground for testing flows, and built-in API and MCP servers that turn workflows into tools for other applications.


  Use Langflow to prototype multi-agent systems, retrieval workflows,
  automations, and LLM applications with support for major model providers,
  vector databases, observability integrations, and a growing library of AI tools.
