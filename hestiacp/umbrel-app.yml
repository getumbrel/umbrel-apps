manifestVersion: 1
id: hestiacp
name: Hestia Control Panel
tagline: Open-source web hosting control panel
category: networking
version: "1.9.6"
port: 9083
description: >-
  Hestia Control Panel (HestiaCP) is a free, open-source web hosting control
  panel: manage websites, databases, DNS and more from a clean web UI, the kind
  of panel you'd normally run on a dedicated server, now on your Umbrel.


  This package runs a purpose-built, non-privileged, multi-architecture image
  (ghcr.io/ptrinh/hestiacp): systemd is replaced with a systemctl shim, and the
  privilege-requiring features (firewall, fail2ban, disk quota) are disabled, so
  it runs with no privileged mode and no extra Linux capabilities. It is scoped
  to the parts of the panel that work well on Umbrel: web hosting (Nginx +
  Apache with PHP-FPM), databases (MariaDB + PostgreSQL, with phpMyAdmin and
  phpPgAdmin built into the panel), the File Manager, cron jobs and backups.
  Mail, DNS and FTP services are not included in this build.


  Notes:

  - Log in with username "admin" and the password shown on this page (set on
    first start).

  - HestiaCP does not claim Umbrel's ports 80/443. Hosted websites are published
    on alternate host ports: HTTP on 9088 and HTTPS on 9448.

  - Network-level protection (firewall/fail2ban) is handled by Umbrel/your
    router rather than inside the panel.

  - For a user's SSH Access shell use "bash" (or sh/dash/rbash); "jailbash" is
    not supported on this unprivileged build (its bubblewrap sandbox needs
    privileges the container does not have) and would lock that user out.
developer: HestiaCP
website: https://hestiacp.com
submitter: ptrinh
submission: https://github.com/getumbrel/umbrel-apps/pull/5773
repo: https://github.com/ptrinh/hestiacp-docker
support: https://forum.hestiacp.com
gallery: []
releaseNotes: ""
dependencies: []
path: ""
deterministicPassword: true
defaultUsername: admin
defaultPassword: ${APP_PASSWORD}
