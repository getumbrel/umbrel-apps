version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: privatebin_server_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: privatebin/nginx-fpm-alpine:2.0.5@sha256:91e3adf17da1c9e2715cb57ff22940a6644252a5488d9819a64eebbaf64cc58a
    user: "1000:1000"
    read_only: true
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/privatebin-data:/srv/data
