path: ""
defaultPassword: ""
releaseNotes: >-
  This release adds PDF to DOCX conversion support and includes an important security fix.


  Key highlights include:
    - Added PDF to DOCX conversions using LibreOffice
    - Fixed a path traversal vulnerability in the conversion API
    - Fixed 3D model conversions where the output format does not match the filename extension
    - Added support for configuring the server port with an environment variable


  Full release notes can be found at https://github.com/C4illin/ConvertX/releases/tag/v0.18.0
