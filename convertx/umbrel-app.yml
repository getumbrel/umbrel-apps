manifestVersion: 1
id: convertx
category: files
name: ConvertX
version: "0.18.0"
tagline: Self-hosted online file converter
description: >
  ConvertX is a self-hosted file converter. Supports over a thousand different formats.


  Features:
    - Convert files to different formats.
    - Process multiple files at once
    - Password protection
    - Multiple accounts
