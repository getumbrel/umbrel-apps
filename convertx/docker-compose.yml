services:
  app_proxy:
    environment:
      APP_HOST: convertx_server_1
      APP_PORT: 3000

  server:
    image: c4illin/convertx:v0.18.0@sha256:b515b04bfd25298a5cdc775b2fcd48b9399bab658ce13e2598b65df1b16098c8
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    environment:
      - HTTP_ALLOWED=true
      - ACCOUNT_REGISTRATION=true
    volumes:
      - ${APP_DATA_DIR}/data/app:/app/data
