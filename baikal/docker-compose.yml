version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: baikal_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"
  web:
    image: ghcr.io/aalmenar/baikal:0.11.1-nginx@sha256:f83c70831ebe2ca9ba84ba7b60927f25941f0fba88bdea6bbebe1d0464bb2aa7
    # aalmenar/baikal-docker is a maintained fork of ckulka/baikal-docker that publishes upstream Baikal 0.11.1.
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/var/www/baikal/config
      - ${APP_DATA_DIR}/data/Specific:/var/www/baikal/Specific
