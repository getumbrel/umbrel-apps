manifestVersion: 1
id: dvb-warppool
category: bitcoin
name: dvb-WarpPool
version: "1.13.0"
tagline: Self-hosted Bitcoin solo mining pool — Stratum V1 + V2, full operator UI
description: >-
  dvb-WarpPool is a from-scratch, open-source solo Bitcoin mining pool you run
  on your own node. The block reward flows straight to your wallet via the
  coinbase — the pool never holds, forwards, or aggregates your sats. No
  accounts, no custody, no fees, no middleman.


  On umbrelOS it wires up to your Bitcoin node automatically (RPC + ZMQ). On
  first launch a browser-based setup wizard asks for your payout address and
  confirms the node connection — then point your miners at the pool and mine.


  Built for mixed home hardware — a NerdMiner next to a Bitaxe next to an
  Avalon Q:

  - Stratum V1 (plain + TLS) and a native Stratum V2 server (NOISE-encrypted,
    extended + standard channels), enabled out of the box.

  - Standards-compliant block construction: BIP34 coinbase height, SegWit
    witness commitment and BIP310 version-rolling (overt ASICBoost), plus a
    BIP54-forward-compatible coinbase locktime — valid under today's rules and
    ready for the Consensus Cleanup soft fork ahead of activation.

  - Persisted, EMA-smoothed per-worker variable difficulty with a Poisson
    significance gate that filters share-rate noise — fewer difficulty changes,
    so ESP32 miner displays stay calm. Survives miner reconnects and pool
    restarts.

  - Live operator PWA: real-time SSE dashboard, 24-hour hashrate chart with
    best-share peaks, per-worker breakdown, all-time leaderboard, coinbase
    decoder for the current job, plus a full-screen kiosk / wall screensaver.

  - Per-miner vendor telemetry (temperature / power / fan / hashrate) for 12
    miner families, with mDNS discovery.

  - Energy + solar dashboard: tracks electricity cost (kWh x tariff) and,
    with a PV source (Anker Solix or any generic HTTP endpoint), how much of
    your mining is powered by solar surplus.

  - Operator security: Argon2id admin login, optional TOTP 2FA, scoped API
    tokens, an audit log, plus auto-ban + rate limiting.

  - Hardware-aware profiles (Small … Enterprise), Prometheus /metrics,
    notifications (ntfy, Telegram, Discord, Slack, email, web-push) plus
    generic outbound webhooks.

  - Operator UI in 8 languages. Signed, reproducible, multi-arch builds.


  If your miners find a block, the entire reward is yours the moment Bitcoin
  Core accepts it. Mine independently and help strengthen Bitcoin's
  decentralization.
releaseNotes: >-
  v1.13.0 — access controls for your Stratum endpoint, in-pool backups, and
  explorer links.


  - **Lock down who can mine.** New, all-optional and off by default: a payout-
    address allowlist (only your own addresses may mine), an IP allow/deny gate
    (CIDR ranges), a per-IP connection limit, and an automatic ban for a worker
    that keeps sending rejected shares. Your local network and the pool UI are
    never affected.


  - **Built-in scheduled backups.** The pool can now write its own periodic
    backups on a schedule (with a retention count) — no external cron needed.
    Off by default; enable it under `[backup]`.


  - **One-click block lookups.** Found-block hashes and heights now link
    straight to a block explorer (mempool.space by default, configurable).
