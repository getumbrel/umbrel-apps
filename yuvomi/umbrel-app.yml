name: Yuvomi
version: "0.77.6"
tagline: Self-hosted family planner — calendar, tasks, shopping, meals & budget
description: >-
  Yuvomi is a self-hosted, privacy-focused family planner that bundles everything
  a household needs into a single fast PWA — no cloud, no tracking, no ads.


  Everything runs on your Umbrel and stays on your Umbrel.


  ✨ FEATURES


  - Shared family calendar with recurring events, reminders and birthdays

  - CalDAV / Google Calendar / Apple iCloud / ICS subscription sync

  - Tasks with multi-assignment and due dates

  - Shopping lists and a kitchen/meal planner

  - Notes, contacts (CardDAV) and a household budget with recurring entries &
    split expenses

  - Housekeeping: staff, chores and supplies

  - Weather widget (Open-Meteo, no API key needed)

  - Optional single sign-on via OIDC

  - Full-text search across every module

  - Installable PWA, mobile-first, dark mode, multi-language


  🔒 PRIVACY


  Yuvomi keeps all data in a local SQLite database (optionally encrypted with
  SQLCipher). Nothing leaves your device unless you explicitly enable a calendar
  or contacts sync to a provider you choose.


  🛠️ SET-UP


  Open Yuvomi from your Umbrel dashboard and create the first account — that
  account becomes the family admin and can invite the rest of the household.
releaseNotes: >-
  This update fixes Yuvomi's dashboard widgets and a few UI details.


  Upcoming birthdays on the dashboard now include birthdays from all household
  users, and personal Open-Meteo locations can power the weather widget even
  when no household weather provider is configured.


  It also fixes translation fallback text in personal weather and assignment
  settings, and makes date navigation arrows visible in dark mode for Meals and
  Calendar.
