version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: yuvomi_web_1
      APP_PORT: 3000

  web:
    image: ghcr.io/ulsklyc/yuvomi:0.74.4@sha256:e109b2f00fd898ac6428bf0d38f5a0a7087f0c7371ff68f28ff9609644e51b58
    restart: on-failure
    stop_grace_period: 1m
    # No `user:` override: the image entrypoint starts as root only to chown the
    # app data and backup volumes, then drops to the unprivileged `node` user via gosu.
    volumes:
      - ${APP_DATA_DIR}/data/app:/data
      - ${APP_DATA_DIR}/data/backups:/backups
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/yuvomi.db
      - BACKUP_DIR=/backups
      # SESSION_SECRET is required; Umbrel injects a deterministic per-app secret.
      - SESSION_SECRET=${APP_SEED}
      # Umbrel serves apps over plain HTTP on the LAN, so secure cookies stay off.
      - SESSION_SECURE=false
