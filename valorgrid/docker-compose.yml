services:
  app_proxy:
    environment:
      APP_HOST: valorgrid_app_1
      APP_PORT: 1325

  app:
    image: ghcr.io/aivm23/valorgrid:v3.33.1@sha256:b622d66b74f5625a3499c5fdb23a2ad90325b1a020e256e0db745067316e87dc
    restart: on-failure
    environment:
      HOST: 0.0.0.0
      PORT: 1325
      PORTFOLIO_DB_PATH: /data/portfolio.sqlite
      VALORGRID_BACKUP_DIR: /data/backups
      VALORGRID_AUTH_USER: valorgrid
      VALORGRID_AUTH_PASSWORD: ""
      VALORGRID_ALPHA_VANTAGE_API_KEY: ""
    volumes:
      - ${APP_DATA_DIR}/data:/data
