      type: "four-stats"
      link: ""
      items:
        - title: "Pool Hashrate"
          text: "542.8"
          subtext: "GH/s"
        - title: "Workers"
          text: "3"
        - title: "Blocks Found"
          text: "0"
        - title: "Best Diff"
          text: "1.2B"
