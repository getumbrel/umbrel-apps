manifestVersion: 1
id: meshchatx
name: MeshChatX
category: social
version: "4.6.2"
port: 8985
tagline: The future of off-grid communication. Secure, decentralized, and unstoppable
description: >-
  A Reticulum Network-based communication application with the goal of providing everything you need for Reticulum, LXMF, and LXST in one beautiful and feature-rich application. 


  This project is separate from the original Reticulum MeshChat project, and is not affiliated with the original project.


  Features:
    - Full LXST support
    - Custom voicemail
    - Phonebook
    - Contact sharing
    - Ringtone support
    - Multi-identity handling
    - Modern UI/UX
    - Offline documentation
    - Expanded tools
    - Page archiving
    - Integrated maps
    - Improved application security
developer: Quad4
website: https://quad4.io
repo: https://github.com/Quad4-Software/MeshChatX
support: https://github.com/Quad4-Software/MeshChatX/issues
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
  - 4.jpg
  - 5.jpg
releaseNotes: >-
  This update fixes propagation sync getting stuck on unreachable nodes, improves chat previews for image-only, voice-note, and file-attachment messages, and avoids broken pending-image preview requests.


  It also improves config parsing, conversation cleanup, call handling, docs routing, and browser warning logs.


  If you use LXST DND or "only allow calls from contacts," re-toggle those settings after updating so they register correctly.


  Full release notes can be found at https://github.com/Quad4-Software/MeshChatX/releases/tag/v4.6.2
