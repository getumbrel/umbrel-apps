manifestVersion: 1
id: meshchatx
name: MeshChatX
category: social
version: "4.7.1"
port: 8985
tagline: The future of off-grid communication. Secure, decentralized, and unstoppable
description: >-
  A Reticulum Network-based communication application with the goal of providing everything you need for Reticulum, LXMF, and LXST in one beautiful and feature-rich application. 


  This project is separate from the original Reticulum MeshChat project, and is not affiliated with the original project.


  Features:
    - Full LXST support
    - Custom voicemail
    - Phonebook
    - Contact sharing
    - Ringtone support
    - Multi-identity handling
    - Modern UI/UX
    - Offline documentation
    - Expanded tools
    - Page archiving
    - Integrated maps
    - Improved application security
developer: Quad4
website: https://quad4.io
repo: https://github.com/Quad4-Software/MeshChatX
support: https://github.com/Quad4-Software/MeshChatX/issues
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
  - 4.jpg
  - 5.jpg
releaseNotes: >-
  This update adds Reticulum Relay Chat (RRC), RNSh remote shell tools, LXMF reactions and replies, cancel-send controls, transfer progress, and pathfinding/maintenance tools.


  It also adds web UI security controls such as IP allowlisting, CSRF protection, and a message blocklist, plus backup/restore, database concurrency, download, map, interface discovery, and network visualiser improvements.


  Fixes include conversation ordering and deduplication, propagation node startup, RNode TX power validation, storage/identity handling, and multiple UI/download reliability issues.


  Full release notes can be found at https://github.com/Quad4-Software/MeshChatX/releases/tag/v4.7.1
