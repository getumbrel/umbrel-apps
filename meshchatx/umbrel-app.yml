  - 3.jpg
  - 4.jpg
  - 5.jpg
releaseNotes: >-
  This update fixes link handling across the Micron editor, archives, RNCP, conversations, Electron, and Android so external links open safely and in-app mesh links stay in MeshChatX.


  It also fixes interface status reporting, Add to Contacts from stranger banners, RNSh startup, QR scanning on Android, database backup creation, notification refreshes, and several UI/sidebar/crash-recovery issues.


  New additions include image download controls in conversations, a disabled location/telemetry setting for new installs, and updated in-app documentation.


  Full release notes can be found at https://github.com/Quad4-Software/MeshChatX/releases/tag/v4.7.2
