version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: alpi_server_1
      APP_PORT: 8080

  server:
    image: satoshiltd/alpi-umbrel:0.4.2@sha256:7e85e0cdd6496d7342132e93b7a9779b1226067451f86ed15e158224fbda1c36
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    environment:
      HOME: /data
      ALPI_PLATFORM: umbrel
      ALPI_TTYD_PORT: 8080
    volumes:
      - ${APP_DATA_DIR}/data:/data
