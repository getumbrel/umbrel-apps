manifestVersion: 1.1
id: umbrel-lnbits-cln
category: bitcoin
name: LNbits (CLN)
version: "1.5.0"
tagline: Multi-user wallet management system for Core Lightning
description: >-
  LNbits is a simple multi-user and account system for Lightning
  Network that can be used for creating separate Lightning wallets for friends
  and family members. You can also create multiple accounts for yourself to
  mitigate the risk of exposing applications to your full balance via unique API
  keys for each wallet.


  LNbits is packaged with tools to help manage funds, such as a table of transactions, line chart of spending, export to CSV, and more to come. It provides an extendable platform for expanding Lightning Network functionality via LNbits extension framework, and can also be used as a fallback wallet for the LNURL scheme.


  This variant defaults to Core Lightning REST plugin (CLNRestWallet) with fine-grained runes and mTLS certs for least-privilege access. Operators can switch to CoreLightningWallet (JSON-RPC socket) from the admin UI as a fallback path.
developer: LNbits
website: https://lnbits.com
dependencies:
  - core-lightning
repo: https://github.com/lnbits/lnbits
support: https://t.me/lnbits
port: 3009
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  Initial app-store release of LNbits (CLN) on Umbrel with dual-backend support and reboot-safe startup behavior.


  **Default backend:**
    - CLNRestWallet (Core Lightning REST plugin) with mTLS certs + fine-grained runes


  **Operator fallback path:**
    - CoreLightningWallet (unix socket) remains available from LNbits admin funding-source selection


  **Reliability hardening in this release:**
    - Startup gate waits for the selected backend to become ready before launching LNbits
    - Fail-fast retry behavior prevents silent boot on an unavailable backend
    - Persisted funding-source selection survives app restart and full OS reboot
    - CoreLightning RPC path is normalized to `/cln/<network>/lightning-rpc` for consistency


  **Operational note:**
    - After OS reboot, app-proxy may take a short warm-up window before UI becomes reachable while dependencies settle
submitter: satwise
submission: https://github.com/getumbrel/umbrel-apps/pull/5014
