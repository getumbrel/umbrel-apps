version: "3.7"

services:
  server:
    image: ghcr.io/ownbee/hass-otbr-docker:v0.3.0@sha256:5ca7008462e94d4c937aca8c1c9a60e709d6d300625363c161b946683032d5b1
    network_mode: host
    privileged: true
    restart: unless-stopped
    stop_grace_period: 1m
    env_file:
      - ${APP_DATA_DIR}/data/settings.env
    volumes:
      - ${APP_DATA_DIR}/data/thread:/data/thread
      - /dev:/dev
    entrypoint:
      - /bin/bash
      - -c
      - |
        find / -type f -name app.js -path '*frontend/res/js/*' 2>/dev/null \
          | xargs -r sed -i "s/restServerPort = '8081'/restServerPort = '$${OTBR_REST_PORT:-8081}'/"
        exec /init
