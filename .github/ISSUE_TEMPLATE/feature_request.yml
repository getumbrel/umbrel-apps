name: Feature Request
description: Suggest a new app, enhancement, or LSP capability
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: dropdown
    id: domain
    attributes:
      label: LSP Domain
      description: Which domain does this relate to?
      options:
        - D1 - Node Operations
        - D2 - Liquidity Management
        - D3 - Payment Processing
        - D4 - Identity / Nostr
        - D5 - Analytics / Monitoring
        - Infrastructure / DevOps
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What do you want to accomplish?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this is done?
      placeholder: |
        - [ ] App installs successfully via Umbrel
        - [ ] Port consistency verified
        - [ ] exports.sh provides correct variables

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical - Funds at risk or stack down
        - High - Affects LSP operations
        - Medium - Normal priority
        - Low - Nice to have
