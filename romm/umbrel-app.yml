path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  Note for users with custom RomM config.yml changes: RomM 4.9 updates the gamelist.xml export setting. If you manually enabled gamelist exports, follow RomM's official config docs to update that setting: https://docs.romm.app/4.9.0/reference/configuration-file/#scangamelistexport


  Key highlights in RomM 4.9.0 include:
    - Added the save sync engine for clients/devices to coordinate save files and conflict state
    - Added play session tracking for client devices
    - Added Libretro thumbnails as a first-class artwork source
    - Added Pegasus metadata export support
    - Improved metadata matching, hashing, scan performance, uploads, EmulatorJS/RuffleRS behavior, and registration redirects
    - Fixed multiple ROM list, download, metadata, migration, and scan edge cases


  Full release notes can be found at https://github.com/rommapp/romm/releases/tag/4.9.0
