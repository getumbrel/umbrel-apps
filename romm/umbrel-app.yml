dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  RomM 5.0 is a major update with a redesigned, more responsive UI and a new granular user/group permission system. If you share your library with other users, review permissions after upgrading.


  Highlights include:
    - Added shared saves/savestates, server-side ROM patching, QR code pairing, real-time logs, controller debugging, and a music player
    - Added interactive 3D boxart and CRT display mode
    - Improved scanning, metadata handling, manual/media display, collection downloads, EmulatorJS state/save handling, and many ROM/file edge cases


  If you're updating from a pre-4.9 version and manually enabled gamelist exports in config.yml, follow RomM's official config docs to update that setting: https://docs.romm.app/4.9.0/reference/configuration-file/#scangamelistexport


  Full release notes can be found at https://github.com/rommapp/romm/releases/tag/5.0.0
