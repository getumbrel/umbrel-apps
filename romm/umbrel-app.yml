dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  RomM 4.9.1 is a follow-up to the recent RomM 4.9 update. If you're updating from a pre-4.9 version and manually enabled gamelist exports in config.yml, follow RomM's official config docs to update that setting: https://docs.romm.app/4.9.0/reference/configuration-file/#scangamelistexport


  Key fixes in RomM 4.9.1 include:
    - Fixed library detection priority for different folder structures
    - Fixed config.yml serialization for folder-to-platform mappings
    - Fixed autologin initialization behavior
    - Updated frontend and backend dependencies


  Full release notes can be found at https://github.com/rommapp/romm/releases/tag/4.9.1
