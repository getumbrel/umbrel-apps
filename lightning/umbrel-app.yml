manifestVersion: 1.1
id: lightning
category: bitcoin
name: Lightning Node
version: "0.21.1-beta"
tagline: Run your personal Lightning Network node
description: >-
  Run your personal Lightning Network node, and join the future of Bitcoin today.


  The Lightning Network allows ultra cheap and almost instant Bitcoin transactions. By running a Lightning node, you can not only self-custody your Bitcoin on Lightning, but also earn sats by routing payments on the network.


  Connect Zeus Wallet, Zap, or any other wallet that supports lndconnect to remotely manage and access your node from anywhere.


  With the Advanced Settings feature, you can take control of your node and customize it to your needs. Personalize it with a name, enable larger channels, limit channel sizes, set your routing fees, optimize your routing strategy, add watchtower services, fine-tune its performance, and much more.


  Powered by LND.


  An official app from Umbrel.
releaseNotes: >-
  ⚠️ Important for users who manually changed LND protocol settings: if you previously added `protocol.custom-nodeann=39` or `protocol.custom-init=39` for BOLT 12/LNDK integrations, remove those lines before updating. LND v0.21.1-beta now advertises onion messaging itself, and leaving those custom feature-bit settings in place can prevent LND from starting.


  This update includes LND v0.21.1-beta along with the latest improvements to the Lightning Node app experience on Umbrel.


  LND v0.21.1-beta adds onion messaging support, production taproot channel support, safer channel-close confirmation handling, and performance improvements.


  Lightning Node on Umbrel now includes dark mode, a fiat currency selector for balances, improved QR code scanning in dark mode, improved automatic backup and channel recovery handling, plus bug fixes and improvements.


  Power users: LND v0.21.1-beta removes deprecated payment RPCs and rejects manually configured Tor v2 onion addresses. Lightning Node on Umbrel already uses Tor v3 by default. Review the upstream release notes if you use custom scripts, external integrations, or custom LND advanced settings.


  Full LND release notes can be found at https://github.com/lightningnetwork/lnd/blob/v0.21.1-beta/docs/release-notes/release-notes-0.21.1.md
developer: Umbrel
website: https://umbrel.com
dependencies:
  - bitcoin
repo: https://github.com/getumbrel/umbrel-lightning
support: https://community.getumbrel.com/c/bitcoin-and-lightning
port: 2101
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
  - 4.jpg
  - 5.jpg
path: ""
defaultPassword: ""
widgets:
  - id: "bitcoin-wallet"
    type: "text-with-buttons"
    refresh: "5s"
    endpoint: "app:3006/v1/lnd/widgets/bitcoin-wallet"
    link: ""
    example:
      type: "text-with-buttons"
      link: ""
      title: "Bitcoin Wallet"
      text: "1,845,894"
      subtext: "sats"
      buttons:
        - text: "Withdraw"
          icon: "arrow-up-right"
          link: "?action=send-bitcoin"
        - text: "Deposit"
          icon: "arrow-down-right"
          link: "?action=receive-bitcoin"
  - id: "lightning-wallet"
    type: "text-with-buttons"
    refresh: "2s"
    endpoint: "app:3006/v1/lnd/widgets/lightning-wallet"
    link: ""
    example:
      type: "text-with-buttons"
      link: ""
      title: "Lightning Wallet"
      text: "762,248"
      subtext: "sats"
      buttons:
        - text: "Send"
          icon: "arrow-up-right"
          link: "?action=send-lightning"
        - text: "Receive"
          icon: "arrow-down-right"
          link: "?action=receive-lightning"
  - id: "lightning-stats"
    type: "four-stats"
    refresh: "5s"
    endpoint: "app:3006/v1/lnd/widgets/lightning-stats"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Connections"
          text: "5"
          subtext: "peers"
        - title: "Active channels"
          text: "3"
          subtext: "channels"
        - title: "Max send"
          text: "90K"
          subtext: "sats"
        - title: "Max receive"
          text: "45K"
          subtext: "sats"
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/commit/576ecd2bef8d625abceed0f67ec9c487da9b2b1b
backupIgnore:
  - data/lnd/data/graph/*/channel.db
  - data/lnd/data/graph/*/wtclient.db
  - data/lnd/data/watchtower/*/*/watchtower.db
