version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: $APP_NAMECOIN_WEB_IP
      APP_PORT: 18080

  namecoind:
    image: ghcr.io/mstrofnone/namecoin-core-umbrel:30.2@sha256:25a08de7cd6afdc638f6295099635fc5c0bb57002ac1af4df1bcca28fc6517bd
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 15m30s
    # Expose P2P and RPC ports for external connections to namecoind
    ports:
      - "${APP_NAMECOIN_P2P_PORT}:${APP_NAMECOIN_P2P_PORT}"
      - "${APP_NAMECOIN_RPC_PORT}:${APP_NAMECOIN_RPC_PORT}"
    volumes:
      - ${APP_DATA_DIR}/data/namecoind:/data/.namecoin
    environment:
      NAMECOIN_RPC_USER: "${APP_NAMECOIN_RPC_USER}"
      NAMECOIN_RPC_PASS: "${APP_NAMECOIN_RPC_PASS}"
      # Network settings
      NAMECOIND_IP: "${APP_NAMECOIN_NODE_IP}"
      P2P_PORT: "${APP_NAMECOIN_P2P_PORT}"
      P2P_WHITEBIND_PORT: "${APP_NAMECOIN_P2P_WHITEBIND_PORT}"
      RPC_PORT: "${APP_NAMECOIN_RPC_PORT}"
      TOR_PORT: "${APP_NAMECOIN_TOR_PORT}"
      APPS_SUBNET: "${NETWORK_IP}/16"
      # Tor proxy settings
      TOR_HOST: "${APP_NAMECOIN_TOR_PROXY_IP}"
      TOR_SOCKS_PORT: "9050"
      TOR_CONTROL_PORT: "9051"
      TOR_CONTROL_PASSWORD: "moneyprintergobrrr"
      # I2P settings
      I2P_HOST: "${APP_NAMECOIN_I2P_DAEMON_IP}"
      I2P_SAM_PORT: "7656"
      # ZMQ settings
      ZMQ_RAWBLOCK_PORT: "${APP_NAMECOIN_ZMQ_RAWBLOCK_PORT}"
      ZMQ_RAWTX_PORT: "${APP_NAMECOIN_ZMQ_RAWTX_PORT}"
      ZMQ_HASHBLOCK_PORT: "${APP_NAMECOIN_ZMQ_HASHBLOCK_PORT}"
      ZMQ_SEQUENCE_PORT: "${APP_NAMECOIN_ZMQ_SEQUENCE_PORT}"
      ZMQ_HASHTX_PORT: "${APP_NAMECOIN_ZMQ_HASHTX_PORT}"
      # Hidden services
      P2P_HIDDEN_SERVICE: "${APP_NAMECOIN_P2P_HIDDEN_SERVICE}"
      RPC_HIDDEN_SERVICE: "${APP_NAMECOIN_RPC_HIDDEN_SERVICE}"
    networks:
      default:
        ipv4_address: $APP_NAMECOIN_NODE_IP

  web:
    image: ghcr.io/mstrofnone/namecoin-core-umbrel-web:30.2@sha256:8cb6e2dcbd82d2d5bb3ede22c6c6274cc27ddd836bc01a4743f2315619e4426f
    user: "1000:1000"
    restart: on-failure
    environment:
      NAMECOIND_HOST: $APP_NAMECOIN_NODE_IP
      NAMECOIND_RPC_PORT: "${APP_NAMECOIN_RPC_PORT}"
      NAMECOIND_RPC_USER: "${APP_NAMECOIN_RPC_USER}"
      NAMECOIND_RPC_PASS: "${APP_NAMECOIN_RPC_PASS}"
      PORT: 18080
      P2P_PORT: "${APP_NAMECOIN_P2P_PORT}"
      P2P_HIDDEN_SERVICE: "${APP_NAMECOIN_P2P_HIDDEN_SERVICE}"
      RPC_HIDDEN_SERVICE: "${APP_NAMECOIN_RPC_HIDDEN_SERVICE}"
      DEVICE_DOMAIN_NAME: "${DEVICE_DOMAIN_NAME}"
    depends_on:
      - namecoind
    networks:
      default:
        ipv4_address: $APP_NAMECOIN_WEB_IP

  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"
    networks:
      default:
        ipv4_address: "${APP_NAMECOIN_TOR_PROXY_IP}"

  i2pd_daemon:
    image: purplei2p/i2pd:release-2.44.0@sha256:d154a599793c393cf9c91f8549ba7ece0bb40e5728e1813aa6dd4c210aa606f6
    user: "root"
    command: --sam.enabled=true --sam.address=0.0.0.0 --sam.port=7656 --loglevel=error
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/i2pd:/home/i2pd/data
    networks:
      default:
        ipv4_address: "${APP_NAMECOIN_I2P_DAEMON_IP}"
