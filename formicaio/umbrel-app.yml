releaseNotes: >-
  The interface was redesigned with a fresh visual style, and a range of new
  features were added to give users more visibility and control over their
  nodes, earnings, and AI tooling:

  - Redesigned look and feel with an updated GUI visual style
  - Nodes view now supports both tile and list layouts, togglable by the user
  - Disk usage reported per node and in aggregate, with a configurable polling frequency
  - Rewards addresses panel on the dashboard listing each address and its balance
  - Earnings analytics on the dashboard showing rewards payments and totals per period,
    with a toggle to enable/disable monitoring
  - New AI section with an MCP server status page, activation instructions, and a
    dedicated Agent page for interacting with an LLM agent that can manage your nodes
  - Agent chat displays formatted tool output and responses, with its own settings
    and background autonomous task support
  - Nodes can be sorted by binary version
  - Single-node actions applied directly, bypassing the batch queue
  - Batch failures stay in the queue until dismissed, with more detail on in-progress failures
  - Persistent notifications history so users can review past notifications at any time
  - Log level option when adding new nodes
  - Clicking the "total nodes" dashboard card navigates to the nodes list
  - Charts show an empty-state message when switching nodes instead of stale data
  - Placeholder cards show a title while nodes are being created
  - Various icon and styling fixes across light and dark themes
  - A new metric collection mode can be used which doesn't rely on the node's metrics HTTP endpoint.
  - Allow user to configure a custom node binary full download URL.
