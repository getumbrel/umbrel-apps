version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: velix-api_server_1
      APP_PORT: 8080

  server:
    image: ghcr.io/paulolinder/velix-api:0.1.0@sha256:0c855dd6290918359ba2bbc008389844db8316fc3a882a50857a12caf8f54bcd
    restart: on-failure
    environment:
      DATABASE_URL: postgres://postgres:velix-umbrel@velix-api_db_1:5432/velix?sslmode=disable
      REDIS_URL: redis://velix-api_redis_1:6379
      JWT_SECRET: ${APP_SEED}-velix-jwt-secret-key-do-not-share
      HTTP_PORT: "8080"
      APP_ENV: production
      LOG_LEVEL: info
      MEDIA_STORAGE_PATH: /data/media
      ENGINE_STORE_PATH: /data/instances
      ENGINE_AUTO_RECONNECT: "true"
      ENGINE_MAX_INSTANCES: "200"
      REGISTRATION_ENABLED: "true"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    restart: on-failure
    environment:
      POSTGRES_DB: velix
      POSTGRES_PASSWORD: velix-umbrel
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/redis:/data
