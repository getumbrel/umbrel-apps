manifestVersion: 1
id: velix-api
category: social
name: Velix API
version: "0.1.0"
tagline: Self-hosted WhatsApp API with multi-instance support
description: >-
  Velix is a self-hosted WhatsApp API built in Go. Connect multiple WhatsApp
  numbers, send and receive messages via REST, get real-time webhooks, and
  integrate with n8n and Chatwoot out of the box. Features a web admin panel
  with QR code pairing, per-instance API keys, and automatic media download.
developer: Paulo Linder
website: https://velix.dev
