support: https://github.com/paulolinder/velix-api/issues
port: 8080
gallery:
  - https://raw.githubusercontent.com/paulolinder/velix-api/master/docs/screenshot.png
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  Initial release with multi-instance WhatsApp support, full REST API,
  webhooks, n8n community node, and Chatwoot integration.
submitter: Paulo Linder
