version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: opencode_app_1
      APP_PORT: 4096

  app:
    image: ghcr.io/anomalyco/opencode:1.15.7@sha256:45c17cf374d2df6e7a7256bff29d1d82c7bc39bd5adcb093918569e4bcb1141f
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
    restart: on-failure
    user: "1000:1000"
    environment:
      HOME: /home/opencode
    volumes:
      - ${APP_DATA_DIR}/data/opencode:/home/opencode/
