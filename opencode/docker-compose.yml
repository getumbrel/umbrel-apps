version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: opencode_app_1
      APP_PORT: 4096

  app:
    image: ghcr.io/anomalyco/opencode:1.15.13@sha256:e489a29c90fbbfc11b88f8ce4f4c0d2c0484eeb7ad8e4cb2c0032de7a33380fa
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
    restart: on-failure
    user: "1000:1000"
    environment:
      HOME: /home/opencode
    volumes:
      - ${APP_DATA_DIR}/data/opencode:/home/opencode/
