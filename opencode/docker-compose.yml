version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: opencode_app_1
      APP_PORT: 4096

  app:
    image: ghcr.io/anomalyco/opencode:1.17.9@sha256:6a2fd8fb5aaddb7fc4eba3ebb2e9bc5a0253d24a989706435df4b6679b05a835
    command: ["serve", "--hostname", "0.0.0.0", "--port", "4096"]
    restart: on-failure
    user: "1000:1000"
    environment:
      HOME: /home/opencode
    volumes:
      - ${APP_DATA_DIR}/data/opencode:/home/opencode/
