version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: opencode_app_1
      APP_PORT: 4096

  app:
    image: ghcr.io/anomalyco/opencode:1.15.12@sha256:31a54f52ee5a70bb4bed6ef6bad411325f21190a0617c6aafcf35c7cd05e0574
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
    restart: on-failure
    user: "1000:1000"
    environment:
      HOME: /home/opencode
    volumes:
      - ${APP_DATA_DIR}/data/opencode:/home/opencode/
