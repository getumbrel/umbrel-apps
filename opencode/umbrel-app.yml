releaseNotes: >-
  This update fixes a desktop crash introduced in OpenCode 1.17.2 and includes the 1.17.1/1.17.2 fixes for MCP timeout handling, Anthropic fallback responses, remote config re-auth, and subagent permissions.


  It also improves reference metadata handling and the new desktop session flow.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.3
