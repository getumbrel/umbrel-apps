releaseNotes: >-
  This update improves the OpenCode home page with smoother scrolling, better sticky headers, and command palette search that can find and open sessions.


  It also fixes custom agent selector visibility, improves startup readiness detection for WSL server loading, removes an inactive Help button, and adds an Up Arrow shortcut for closing the subagent picker.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.18.3
