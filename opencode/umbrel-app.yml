releaseNotes: >-
  This update adds managed workspace cloning that preserves dirty and untracked files, moving sessions between workspaces and directories, skill discovery, file-based agent loading, and interactive session replay with run --replay.


  It also improves startup time, adds desktop color themes and settings improvements, and fixes shell cancellation races, OpenAI websocket sessions getting stuck idle, migrated storage path handling on Windows, and prompt corruption when pasting near wide characters.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.16.0
