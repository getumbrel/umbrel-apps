releaseNotes: >-
  This update improves reliability for OpenAI-compatible reasoning models and GitHub Copilot follow-up requests.


  Desktop fixes keep question prompts, draft state, pending requests, and session page failures scoped correctly, while the v2 UI gets improved markdown/message layout, a searchable model picker, tab hover previews, and smoother WSL server setup.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.13
