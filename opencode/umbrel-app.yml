releaseNotes: >-
  This update improves Grok/xAI model support, including reasoning effort variants, prompt cache routing, and PDF file support for Responses models.


  It also adds an "Open containing folder" action, improves the composer add menu, remembers review panel state, adds inline file browser tabs, and fixes several desktop navigation, command palette, side panel, and large diff review issues.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.16
