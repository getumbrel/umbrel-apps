releaseNotes: >-
  This release brings new features, fixes, and improvements.


  Core improvements:
    - Fixed custom agents in plugins not loading
    - Sessions now keep a relative workspace path
    - Shell cancellations now finish cleanly instead of leaving commands in a bad state
    - Added Mistral Medium 3.5 with reasoning support
    - Made instruction precedence more predictable by applying global instructions first
    - Fixed forked sessions so compacted history stays intact
    - Unsupported image formats now fall back to text reads instead of being sent as image attachments
    - Fixed Bedrock sessions that include reasoning content when switching models
    - Azure setup now prompts for the resource name when needed and saves it with the API key
    - Fixed HTTP API workspace adapters losing instance context


  TUI improvements:
    - Added a quick toggle for paste summaries
    - Invalid custom themes no longer crash the TUI on startup
    - Pressing Enter in dialogs now triggers the dialog instead of leaking through
    - File context is clearer, can be turned off, and clears after sending


  Desktop improvements:
    - Per-workspace icon overrides now stay applied for subdirectories in the same repo
    - Sync state loading is more reliable for MCP, LSP, and workspace refreshes
    - Restoring saved messages no longer crashes the app when a model is missing


  Full release notes can be found at https://github.com/anomalyco/opencode/releases
