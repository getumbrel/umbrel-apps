releaseNotes: >-
  This release includes reliability improvements and bug fixes across OpenCode's web server, sessions, TUI, desktop app, and extensions.


  Highlights:
    - Improved authenticated terminal/websocket handling and embedded web UI serving.
    - Fixed web proxy, CSP, CORS, and server network option issues that affected browser clients.
    - Improved session warping, rendering, cancellation, compaction summaries, and error handling.
    - Restored formatter output handling, custom provider setup in /connect, and web terminal CSP allowances.
    - Added support for .well-known/opencode remote configs and improved model/provider handling.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases
