releaseNotes: >-
  This update improves MCP and provider handling with more reliable OAuth flows, refreshed remote skills, preserved resource paths, better default small models, and adaptive thinking support for Claude Sonnet 5.


  It adds yolo mode for auto-approving permissions in the TUI, passes ServerAuth headers through external served TUI connections, and improves desktop workflows with MCP resource autocomplete, workspace controls, and token/cost totals in session context.


  Other fixes keep desktop prompts, selected models, sessions, tabs, and provider dialogs in sync, while SDK updates restore live event streams, session runtime operations, paged history, and permission request APIs.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.12
