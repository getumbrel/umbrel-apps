releaseNotes: >-
  This update speeds up file search in large projects, adds Cohere North model support, and improves vLLM reasoning configuration.


  It also makes MCP setup and status handling more reliable, improves session recovery after provider context-overflow errors, fixes directory-filtered session lists, and improves Bedrock API key and region handling.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.0
