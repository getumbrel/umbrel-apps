releaseNotes: >-
  This update fixes several agent and provider issues, including configured step limits now ending with a final text response instead of failing mid-run, Devstral model detection with mixed-case provider IDs, and custom headers for Copilot model requests.


  It also adds high and max thinking variants for GLM-5.2 across supported providers, improves prompt caching for follow-up messages, and fixes when the TUI shows the background subagent shortcut.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.9
