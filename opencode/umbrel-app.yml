releaseNotes: >-
  This update improves config handling when directories are unavailable and better classifies Z.ai context-window overflow errors so oversized requests surface the right failure mode.


  It also restores model details tooltips in the desktop model picker, refreshes the v2 command palette, and improves terminal shortcuts, unread tab state, session tab titles, theme selection, and macOS titlebar rendering.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.15
