releaseNotes: >-
  This update adds Grok OAuth sign-in, new TUI review tools, desktop UI improvements, and reliability fixes across OpenCode's APIs, providers, and sessions.


  Key highlights include:
    - Added Grok OAuth sign-in with device-code login and PDF attachment support for Grok
    - Added a TUI diff viewer, shell mode for run prompts, and improved diff navigation
    - Improved V2 API error handling with safer responses and log reference IDs
    - Restored native OpenAI OAuth requests and reasoning streams, and deduped Codex OAuth refreshes
    - Improved the desktop home/tabs experience, titlebar actions, log export, and provider refresh behavior


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.15.7
