releaseNotes: >-
  This update adds interactive session replay controls and includes reliability fixes across OpenCode's tools, event updates, workspace file references, and desktop UI.


  Key highlights include:
    - Added replay controls for resuming recent interactive history
    - Fixed plugin tools using ask so tool calls complete correctly
    - Reduced missed event updates caused by a subscription race
    - Kept file references scoped to the current workspace
    - Improved large desktop session timelines and notification support


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.15.5
