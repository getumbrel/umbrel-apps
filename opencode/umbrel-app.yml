releaseNotes: >-
  This release brings new features, fixes, and improvements.


  Core improvements:
    - Fixed issue with opencode upgrade failing for bun installs
    - Added a configurable default shell for terminals and agent shell commands
    - Fixed config parsing to preserve permission rule order
    - Fixed OpenRouter DeepSeek reasoning output handling
    - Added Zed editor selection support for editor context
    - Fixed permission config preserving rule order with full IntelliSense for tool permission keys
    - LSP permission prompts now include request details like the operation, file, and cursor position
    - Added Roslyn LSP support for Razor, .cshtml, and C# script files
    - Fixed DeepSeek assistant messages so reasoning is always included
    - Added experimental HTTP API endpoints to list files, read file contents, and check project file status
    - Respected custom .npmrc registry settings when checking package versions


  TUI improvements:
    - Added Zed editor selection support for editor context
    - Show a /connect tip when no models are configured
    - Restored the default toast timeout when no custom duration is provided
    - Hid provider connection checks until onboarding is complete


  Desktop improvements:
    - Added a configurable default shell setting
    - Fixed session views not getting stuck with stale state when switching between sessions


  Full release notes can be found at https://github.com/anomalyco/opencode/releases
