releaseNotes: >-
  This update includes reliability fixes for large-file handling, npm installation recovery, and project-scoped events.


  Key highlights include:
    - Reduced wasted work when reading very large files after output truncation
    - Fixed npm installs so the CLI can recover and fetch the correct native binary on more setups
    - Fixed sync events for project-scoped subscribers in injected instances
    - Fixed async commands that could break agent generation and GitHub-driven runs
    - Added pinned sessions and an expandable collapsed thinking view in the TUI


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.15.3
