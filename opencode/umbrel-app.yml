releaseNotes: >-
  This update improves Meta model support, including reasoning variants, provider requests, and a model-specific system prompt for Meta Muse Spark.


  It also fixes GitHub Copilot model pricing data when a zero billing batch size is returned, adds refreshed desktop UI elements for tabs, sub-agent tasks, restore actions, and free-model selection, and fixes clipped model selector labels.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.18
