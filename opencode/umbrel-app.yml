releaseNotes: >-
  This update improves session timelines so they load faster without flicker or scroll jumps.


  It also fixes several MCP/provider issues, including OpenAI-compatible MCP tool schema validation, Cloudflare AI Gateway API key handling, progress-aware timeouts for long-running MCP tools, clearer MCP tool errors, and MCP OAuth callback cleanup.


  Desktop users also get a Home tab toggle and a faster file and folder picker in the v2 layout.


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.17.8
