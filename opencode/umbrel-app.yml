releaseNotes: >-
  This update refreshes the diff viewer, improves error handling across APIs and tools, and adds small TUI and desktop usability refinements.


  Key highlights include:
    - Redesigned the diff viewer with a file tree, refreshed layout, improved empty states, and default enablement
    - Added clearer errors for invalid default models, missing PTY sessions, failed upgrades, missing projects, MCP servers, and busy sessions
    - Improved MCP OAuth callback/scopes handling and Vertex Anthropic multi-region endpoints
    - Added a command-palette action to copy the current worktree path
    - Refined desktop tab/titlebar navigation and reduced session page churn from VCS refreshes


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.15.9
