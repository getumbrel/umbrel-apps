releaseNotes: >-
  This update includes core reliability improvements, desktop UI polish, and SDK fixes.


  Key highlights include:
    - Added a new core event system for more complete event delivery across sessions and integrations
    - Fixed custom tool loading when modules include invalid exports
    - Fixed project instruction lookup errors so sessions keep loading even if instruction discovery fails
    - Fixed JavaScript SDK event types for session and message events
    - Auto-hides the desktop menu bar on Linux and Windows


  Full release notes can be found at https://github.com/anomalyco/opencode/releases/tag/v1.15.0
