version: "3.7"

services:
  server:
    image: sunfounder/pironman5:max-1.3.11@sha256:134e61ba23297b9a7e9f75f1622757a01e2e6104a0b03c042323509d8b26286d
    restart: on-failure
    network_mode: host
    pid: host
    privileged: true
    environment:
      CONFIG_PATH: /data/config.json
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - /:/host:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
