version: "3.7"

services:
  server:
    image: sunfounder/pironman5:max-1.3.11@sha256:f6aca0335a3c0ca53667d1bbb8d63ad71d52f6e6d98b455418998ed7a21f4a46
    restart: on-failure
    network_mode: host
    pid: host
    privileged: true
    environment:
      CONFIG_PATH: /data/config.json
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - /:/host:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
