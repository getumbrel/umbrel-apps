name: Pironman 5 Max
version: "1.3.9"
tagline: High-end aluminum case with dual NVMe, tower cooling, OLED & RGB for Pi 5
description: |-
  High-end aluminum case for Raspberry Pi 5 with dual NVMe SSD slots, tower cooler with RGB fans, 0.96" OLED display, and addressable RGB LEDs.

  Key features:
  - Dual NVMe PCIe slots supporting SSDs or AI accelerators (Hailo-8/8L)
  - 0.96" OLED display for real-time system monitoring
  - Tower cooler with PWM fan plus two RGB fans
  - WS2812 addressable RGB LEDs with programmable effects
  - Metal power button with graceful shutdown on Pi 5
  - RAID 0/1 NAS support or SSD + AI combo
  - Web dashboard on port 34001
  - Real-time data logging with InfluxDB
