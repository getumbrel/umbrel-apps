id: zennotes
name: ZenNotes
tagline: A keyboard-first Markdown workspace for notes
category: files
version: "2.13.1"
port: 7879
description: >-
  📝 ZenNotes is a powerful note-taking application for creating, editing, and organizing Markdown notes. It helps users build structured knowledge collections, connect related ideas, and quickly find information through full-text search.


  Notes can be organized with tags, task lists, Wikilinks, and backlinks. Links in the [[Note Name]] format connect related notes, while backlinks show which other notes reference the currently opened page. Daily and weekly notes make it easy to record tasks, events, ideas, and recurring information.


  ZenNotes provides extensive keyboard navigation with Vim commands, customizable shortcuts, macros, and registers. Multiple notes can be opened side by side in split views, while frequently used notes can be pinned and kept visible for quick reference.


  The application supports mathematical formulas, diagrams, and graphical visualizations. KaTeX can be used to display equations, while Mermaid, TikZ, JSXGraph, and function plots allow users to create flowcharts, technical drawings, mathematical illustrations, and interactive graphics.


  An integrated preview renders formatted text, tables, task lists, formulas, and diagrams directly within the application. Existing Markdown collections and Obsidian vaults can also be used, preserving current folder structures, Wikilinks, and connected notes.


  ZenNotes also includes a command-line tool for searching, opening, creating, and processing notes. Its integrated MCP server allows compatible AI assistants to search, summarize, connect, and help edit information stored within the note collection.
