releaseNotes: >-
  This release adds Heatmaps, expands Session Replay controls, and improves reporting across events, sessions, and revenue.


  Some of the key highlights in this release include:
    - New click and scroll Heatmaps for understanding where visitors interact with each page
    - Session Replay improvements including better filters, chunked replay payloads, and more reliable playback
    - Richer event and session property reports with new charts, filters, pivot tables, and numeric/boolean/date support
    - Revenue report improvements with cumulative charts, metrics tables, and faster focused APIs
    - DataGrid and table improvements including sorting, horizontal scrolling, and a manual table/card toggle
    - Tracker, API, and sharing improvements including SPA pageview controls and more flexible share options
    - Security hardening for sessions, API responses, share tokens, SSO redirects, CSV exports, and team permissions


  This update includes automatic database schema migrations for Heatmaps and event/session data pivot support.


  Full release notes are found at https://github.com/umami-software/umami/releases/tag/v3.2.0
path: "/dashboard"
