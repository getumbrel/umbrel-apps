version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: metube_metube_1
      APP_PORT: 8081

  metube:
    image: ghcr.io/alexta69/metube:2026.04.21@sha256:8f0f1bf7b47b001ba596f18a61c0c6da1bba1e8270e9bf68f549ac0fcfeb4b61
    restart: on-failure
    volumes:
      - ${UMBREL_ROOT}/data/storage/downloads/metube:/downloads
    environment:
      - DELETE_FILE_ON_TRASHCAN=true
