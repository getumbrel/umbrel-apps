version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: metube_metube_1
      APP_PORT: 8081

  metube:
    image: ghcr.io/alexta69/metube:2026.07.16@sha256:03695ec518f7421a3b41c300e5dd117b724b8ab35e5dd0cdfd2c8d98e45e6e4f
    restart: on-failure
    volumes:
      - ${UMBREL_ROOT}/data/storage/downloads/metube:/downloads
    environment:
      - DELETE_FILE_ON_TRASHCAN=true
