manifestVersion: 1
id: metube
category: media
name: MeTube
version: "2026.07.21"
tagline: Download videos from YouTube
description: >-
  Download videos from YouTube (and dozens of other sites) directly to your Umbrel.
developer: Alex Shnitman
dependencies: []
permissions:
  - STORAGE_DOWNLOADS
repo: https://github.com/alexta69/metube
port: 3700
releaseNotes: >-
  Key highlights:
    - Adds an option for users who need to allow downloads from private network addresses
    - Hardens SSRF protections by re-validating outbound connections at fetch time and failing closed when guarded hosts cannot be resolved
    - Enforces download directory containment when resolving output paths


  Full release notes can be found at https://github.com/alexta69/metube/releases/tag/2026.07.21
support: https://github.com/alexta69/metube/issues
website: https://github.com/alexta69/metube
