manifestVersion: 1.1
id: namecoin-electrumx
category: bitcoin
name: Namecoin ElectrumX
version: "1.4.3"
tagline: An Electrum server for Namecoin with name script indexing and Protocol v1.4.3 support
description: >-
  Namecoin ElectrumX is a high-performance Electrum protocol server for the Namecoin blockchain.
  It connects to your Namecoin Core full node and indexes the blockchain into an efficient
  database, allowing Electrum-NMC wallet clients to connect and query transaction history,
  balances, and name data without running a full node themselves.


  This release implements Electrum Protocol v1.4.3, which introduces 1-block name update
  confirmation via scriptSig chaining. Name updates now take effect in roughly 10 minutes
  instead of the previous 2 hours, significantly improving the user experience for .bit
  domain management.


  Key features:


  - Full Electrum protocol server for Namecoin (TCP and SSL)

  - Name script indexing for .bit domain lookups

  - AuxPoW support with checkpointed truncation for efficient sync

  - Protocol v1.4.3 with 1-block name update confirmation

  - LevelDB database engine for fast indexing

  - Tor hidden service for private remote access

  - Low resource usage once synced


  Requires a running Namecoin Core node with transaction index enabled and pruning disabled.
releaseNotes: ""
