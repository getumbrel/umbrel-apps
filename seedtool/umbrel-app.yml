manifestVersion: 1
id: denny-seedtool
name: Bitcoin Seed Tool
tagline: A toolkit for generating, verifying, and recovering Bitcoin seeds
icon: https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-seedtool/logo.png
category: bitcoin
version: "2.3.0"
port: 8147
description: >-
  🔏 Bitcoin Seed Tool is an educational tool for exploring how Bitcoin seed phrases are created, validated and used. It helps users experiment with entropy, BIP39 mnemonics, checksums, passphrases and other seed-related wallet concepts. The app is designed for learning, testing and understanding Bitcoin wallet generation in a clear and interactive way.


  Features include:

    - BIP39 seed phrase generation and validation
    - Entropy experiments using different randomness sources
    - Checksum inspection and verification
    - Passphrase testing
    - Seed and mnemonic conversion tools
    - Address and wallet-related seed utilities
    - Educational explanations for Bitcoin seed handling
developer: BitcoinQnA
website: https://bitcoiner.guide/seed/
submitter: dennysubke
submission: https://github.com/getumbrel/umbrel-apps/pull/
repo: https://github.com/BitcoinQnA/seedtool
support: https://github.com/BitcoinQnA/seedtool/issues
gallery:
  - https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-seedtool/1.jpg
  - https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-seedtool/2.jpg
  - https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-seedtool/3.jpg
releaseNotes: >-
  Version 2.3.0 significantly expands Seed Tool with new standalone Bitcoin utilities, including PSBT Inspector, Lightning Decoder, Miniscript Lab, BIP-353 Helper, Silent Payments, Shamir Secret Sharing, and BIP-329 Wallet Labels.


  The update also improves the UI and educational sections with search, demo data, better usability, and accessibility enhancements. The release signing key was also rotated, with verification steps documented.
