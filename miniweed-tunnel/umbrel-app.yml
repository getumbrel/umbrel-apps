# Manifest for the OFFICIAL Umbrel App Store submission (getumbrel/umbrel-apps).
# This is NOT the community-store manifest (that one lives in ../../umbrel-app.yml
# and keeps the 1.6.x version line for update continuity on existing installs).
# For the official store this app starts fresh at 1.0.0.
manifestVersion: 1
id: miniweed-tunnel
category: networking
name: Tunnel
version: "1.0.0"
tagline: Expose your services to the world without touching your router
description: >-
  Connect your Umbrel to your own VPS and expose services to the internet without
  opening ports on your router. A 100% self-hosted alternative to Cloudflare Tunnel.
  Works behind CGNAT. Uses WireGuard for end-to-end encryption and Caddy for
  automatic HTTPS with Let's Encrypt.
releaseNotes: ""
developer: miniweed
website: https://github.com/miniweed/umbrel-app-store
dependencies: []
repo: https://github.com/miniweed/umbrel-app-store
support: https://github.com/miniweed/umbrel-app-store/issues
port: 3016
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: miniweed
submission: https://github.com/getumbrel/umbrel-apps/pull/5758
