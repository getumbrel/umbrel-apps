version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: miniweed-tunnel_web_1
      APP_PORT: 3016
      PROXY_AUTH_ADD: "true"

  web:
    image: ghcr.io/miniweed/umbrel-tunnel-web:1.6.49@sha256:984ba28eb543e0f8c9d506fc3166c5220e40ebca890536b92bcfb8698b7b7b68
    restart: on-failure
    stop_grace_period: 30s
    cap_drop:
      - ALL
    cap_add:
      # Mounted data dirs are owned by 1000:1000 on umbrelOS while the process
      # runs as root with all caps dropped; without this it cannot write to them.
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/caddy/data:/caddy-data
    environment:
      - DATA_DIR=/data
      - CADDYFILE_PATH=/caddy-data/Caddyfile
      - WG_API_HOST=wg
      - WG_API_TOKEN=${TUNNEL_WG_TOKEN}
      - PORT=3016
      - APP_SEED=${APP_SEED}

  caddy:
    image: caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    restart: on-failure
    stop_grace_period: 30s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      # Same as web: mounted dirs are 1000:1000 and Caddy runs as root.
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    network_mode: "service:wg"
    depends_on:
      - wg
    volumes:
      - ${APP_DATA_DIR}/caddy/data:/data/caddy
      - ${APP_DATA_DIR}/caddy/config:/config
    environment:
      - XDG_DATA_HOME=/data/caddy
      - WG_API_TOKEN=${TUNNEL_WG_TOKEN}
    command:
      - sh
      - -c
      - |
        until [ -s /data/caddy/Caddyfile ] && wget -q --header="x-wg-api-token: $$WG_API_TOKEN" -O - http://127.0.0.1:8080/status >/dev/null 2>&1; do
          echo "[caddy] Waiting for Caddyfile and WireGuard API..."
          sleep 2
        done
        exec caddy run --config /data/caddy/Caddyfile --adapter caddyfile --watch

  wg:
    image: ghcr.io/miniweed/umbrel-tunnel-wg:1.0.6@sha256:22fbcbc01c31ec70c623ac670f195353c5fa37525ccecb18be86d9df2ed87469
    restart: on-failure
    stop_grace_period: 30s
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      # Only the subdir holding the generated wg0.conf: wg does not need to see
      # config.json/app-seed/etc.
      - ${APP_DATA_DIR}/data/wg:/data:ro
    environment:
      - WG_API_TOKEN=${TUNNEL_WG_TOKEN}
