releaseNotes: >-
  Agent Zero v2.4 is a follow-up to the recent v2.0 major update. If you're updating from a pre-v2.0 version, Agent Zero recommends creating a backup from Settings > Check for Updates > Backup & Restore before upgrading, then checking chats, projects, memory, settings, and plugins after the update.


  This release includes:
    - Adds crash-safe chat persistence to reduce the risk of corrupted chat data after interrupted saves
    - Adds a configurable circuit breaker for repeated or malformed model outputs to stop runaway response loops
    - Adds Gemini CLI support for the Orchestrator and NVIDIA NIM provider support for chat and embedding models
    - Adds mobile and desktop interface visibility settings for the project selector, clock, connection status, and right canvas rail
    - Improves multiline terminal command handling, built-in slash command management, preset editor stability, and provider switching cleanup
    - Refreshes Codex CLI during self-update and updates the default utility model to Gemini 3.1 Flash Lite on OpenRouter


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v2.4
