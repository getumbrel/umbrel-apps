releaseNotes: >-
  This release improves Agent Zero's document handling, attachments, OAuth setup, remote control, and editor workflows:
    - Reuses document_query indexes within the same chat context to avoid repeated parsing and embedding work
    - Adds folder attachments in the chat composer with clearer Attach files and Attach folder actions
    - Replays long page-connector histories in smaller WebSocket frames for more reliable chat continuity
    - Allows OAuth model slots to use different connected providers and improves device-code polling for GitHub Copilot
    - Fixes Tailscale Remote Control CSRF/origin handling and secure post-login redirects
    - Improves manual Editor launch behavior, toolbar controls, and editable file browser paths


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v1.20
