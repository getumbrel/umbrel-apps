releaseNotes: >-
  Agent Zero v2.5 is a follow-up to the recent v2.0 major update. If you're updating from a pre-v2.0 version, Agent Zero recommends creating a backup from Settings > Check for Updates > Backup & Restore before upgrading, then checking chats, projects, memory, settings, and plugins after the update.


  Important changes in this release:
    - Moves model presets to one global collection and migrates existing scope configs to reference presets by name
    - Updates the default model presets and adds LaTeX rendering in chat messages
    - Adds A0 Launcher host gateway integration, with host access controls now managed through A0 Launcher or the A0 CLI
    - Improves the document editor, safe archive extraction, desktop session reliability, notifications, browser settings, and MCP tool aliases
    - Removes legacy per-process HTML logs under /a0/logs; use Docker logs for debugging output


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v2.5
