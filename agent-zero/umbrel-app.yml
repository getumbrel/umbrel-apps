releaseNotes: >-
  This release improves Agent Zero's remote control, document handling, desktop tooling, and onboarding workflows:
    - Renames Remote Link to Remote Control with Cloudflare Tunnel, Microsoft Dev Tunnels, Serveo, and Tailscale provider options
    - Extracts document_query into a standalone plugin with LiteParse, improved OCR handling, and expanded parser settings
    - Keeps browser, desktop, computer-use, and vision screenshots as durable chat artifacts
    - Adds shared OAuth account management and provider-aware onboarding for account-backed model slots
    - Improves coding-agent verification guidance, memory extraction quality, and skills selector layout
    - Fixes per-subagent model configs and document_query prompt spelling


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v1.19
