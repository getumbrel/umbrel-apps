releaseNotes: >-
  Agent Zero v2.2 is a follow-up to the recent v2.0 major update. If you're updating from a pre-v2.0 version, Agent Zero recommends creating a backup from Settings > Check for Updates > Backup & Restore before upgrading, then checking chats, projects, memory, settings, and plugins after the update.


  This release includes:
    - Moves missing-model setup into the chat thread so pending prompts are preserved while users configure a model
    - Unifies Cloud, Account, and Local provider onboarding into one flow with explicit Utility Model selection
    - Improves LiteLLM and OpenAI-compatible fallback handling for streaming tool calls
    - Prunes deleted saved chats from the sidebar and normalizes memory search limits from model calls
    - Adds Markdown-backed code blocks in the chat composer and fixes file-browser action menu clipping
    - Masks Settings secrets as text inputs to avoid browser password-manager prompts


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v2.2
