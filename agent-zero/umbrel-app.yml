releaseNotes: >-
  Agent Zero v2.1 is a follow-up to the recent v2.0 major update. If you're updating from a pre-v2.0 version, Agent Zero recommends creating a backup from Settings > Check for Updates > Backup & Restore before upgrading, then checking chats, projects, memory, settings, and plugins after the update.


  This release includes:
    - Improves fallback handling for OpenAI-compatible providers that reject Responses API payloads
    - Saves MCP image attachments as scoped artifact files with real file paths while keeping them visible to models
    - Normalizes tool schemas for stricter OpenAI-compatible validators
    - Fixes plain Responses completions and message replay ordering in the WebUI
    - Removes the backup file count cap so large agent directories are archived completely
    - Improves Skills tooling compatibility and frontmatter warnings


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v2.1
