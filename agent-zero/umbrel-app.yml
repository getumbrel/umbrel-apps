releaseNotes: >-
  This release contains various bug fixes and improvements:
    - ODF documents are now the default for Writer, Spreadsheet, and Presentation artifacts, with OOXML still available as an explicit compatibility option
    - Office canvas controls are unified with active-file headers, a shared New menu, inline Save, and document rename/close actions
    - Desktop sessions now persist across canvas, modal, and keepalive hosts, with clearer shutdown/restart handling
    - Browser modal switching, Focus mode, screenshots, and form actions have been improved
    - Chat input now supports Bash-style Up/Down history navigation
    - Docker builds are more reliable with pyreqwest-impersonate pinned to avoid source-only build failures


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v1.13
