dependencies: []
releaseNotes: >-
  Bug fixes and reliability improvements in v1.12:
    - Fixed PTY file descriptor leaks in code execution, preventing descriptor exhaustion under sustained use
    - Browser runtime now recovers cleanly from stale Playwright contexts instead of failing
    - Clicking URLs in the Desktop environment now opens them in the Agent Zero Browser
    - Self-update no longer fails when broken symlinks exist in the workspace
    - Desktop environment now starts on-demand instead of eagerly at startup, improving load times
    - ARM64 users no longer see spurious startup warnings about missing Xpra codec packages
