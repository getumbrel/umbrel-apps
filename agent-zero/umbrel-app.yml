releaseNotes: >-
  This release contains various bug fixes and improvements:
    - Added guided first-run onboarding for provider selection, account connection, model picking, and ready-state setup
    - Added Ollama Cloud and Nebius Token Factory provider support
    - Added host browser routing through the A0 CLI connector, plus browser runtime selection controls
    - Split Desktop into a focused plugin and simplified Office around document ownership and persistence
    - Improved browser tools, document artifacts, model configuration controls, settings navigation, and project setup
    - Fixed a path-containment bypass in /api/image_get


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v1.14
