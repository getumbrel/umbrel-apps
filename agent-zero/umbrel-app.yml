releaseNotes: >-
  This release improves Agent Zero's skills, MCP, and browser automation workflows:
    - Adds a configurable maximum for active skills in plugin settings and the UI
    - Preserves MCP image, audio, and resource tool results instead of collapsing them to empty text responses
    - Improves browser interaction with iframe and shadow DOM content
    - Fixes chat composer overflow issues
    - Skips transient SSH agent sockets during Desktop profile self-updates to avoid upgrade failures
    - Refines skills modal toggle styling


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v1.18
