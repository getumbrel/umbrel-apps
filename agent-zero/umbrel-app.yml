releaseNotes: >-
  Agent Zero v2.6 is a follow-up to the recent v2.0 major update. If you're updating from a pre-v2.0 version, Agent Zero recommends creating a backup from Settings > Check for Updates > Backup & Restore before upgrading, then checking chats, projects, memory, settings, and plugins after the update.


  Important changes in this release:
    - Consolidates the goal tools into one multi-action goal workflow while preserving existing slash command, API, and active-goal behavior
    - Adds resumable, secret-safe chat compaction that preserves pending work, evidence, loaded skills, and secret references
    - Improves runtime secret redaction so normal settings do not get over-masked while credentials stay protected
    - Handles terminated local, SSH, and TTY shells as completed commands and improves task cleanup after completion or cancellation
    - Fixes Chrome extension installs and improves internal Docker browser rendering reliability


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v2.6
