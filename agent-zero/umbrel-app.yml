releaseNotes: >-
  ⚠️ Major update: Agent Zero v2.0 starts a new major release line. Agent Zero recommends creating a backup from Settings > Check for Updates > Backup & Restore before upgrading, then checking chats, projects, memory, settings, and plugins after the update.


  This release includes:
    - Adds the native OpenAI Responses API transport with provider-state continuation and chat-completions fallback
    - Adds parallel tool calls and a revamped MCP server settings UI with search, per-tool controls, and stronger runtime handling
    - Adds Docker-friendly local provider defaults for oMLX, llama.cpp, vLLM, LM Studio, and Ollama
    - Promotes Files into the shared canvas rail and refreshes the welcome screen, settings, editor, and mobile UI flows
    - Includes security and dependency updates for LiteLLM, the OpenAI SDK, and Starlette


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v2.0
