tagline: A personal, organic agentic framework that grows and learns with you
category: ai
version: "v1.19"
port: 3015
description: >-
  Agent Zero is a personal, organic agentic framework that grows and learns with you.
  It is fully Dockerized and includes features like Speech-to-Text and TTS.


  **Key Features:**
    - **General Purpose Assistant:** Can handle various tasks.
    - **Computer Use:** Can use the computer (in the container).
    - **Coding:** Can write and execute code.
    - **Memory:** Learns from interactions.


  **Getting Started:**
    1. Launch Agent Zero.
    2. Configure your models in the settings.


  ⚠️ **Warning:** Agent Zero can execute code. Run with caution.
