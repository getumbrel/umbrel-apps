releaseNotes: >-
  This release contains various bug fixes and improvements:
    - Fixed an XSS vulnerability in chat markdown rendering
    - Added a dedicated Markdown editor plugin with source editing, rendered previews, tabs, toolbar/file actions, search, task-list checkboxes, and rich rendering for code blocks, tables, math, images, links, and footnotes
    - Slimmed down the Office surface now that Markdown documents route through the new editor
    - Improved remote execution reset handling, connector queue WebSocket support, and Browser address-bar navigation


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v1.15
