releaseNotes: >-
  Agent Zero v2.3 is a follow-up to the recent v2.0 major update. If you're updating from a pre-v2.0 version, Agent Zero recommends creating a backup from Settings > Check for Updates > Backup & Restore before upgrading, then checking chats, projects, memory, settings, and plugins after the update.


  This release includes:
    - Improves browser viewer streaming, frame sizing, and input handling after stream restarts
    - Adds Browser settings for per-chat tab scope, tab limits, and bring-your-own-browser endpoint selection
    - Moves skill and AGENTS.md guidance into the chat/protocol flow instead of legacy prompt injection
    - Adds built-in Orchestrator, Slash Commands, and Goal Management plugins
    - Improves Venice, local, and OpenAI-compatible provider defaults and Responses-provider compaction handling
    - Fixes MCP command parsing, PTY reset hangs, frontend loading, and Time Travel snapshot noise


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v2.3
