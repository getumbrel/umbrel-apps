releaseNotes: >-
  This release improves Agent Zero's remote computer-use tooling and visual verification workflows:
    - Added the `computer_use_remote` tool for supported host desktop-control backends
    - Requires fresh screenshot verification after desktop actions so agents can visually confirm the result
    - Adds platform-specific host computer-use guidance for macOS, Windows, and Linux backends
    - Improves multimodal screenshot handling, token accounting, and Codex OAuth proxy support for vision inputs
    - Updates host vs. internal desktop routing so explicit Agent Zero Desktop requests still target the Docker/Xpra environment


  Full release notes can be found at https://github.com/agent0ai/agent-zero/releases/tag/v1.17
