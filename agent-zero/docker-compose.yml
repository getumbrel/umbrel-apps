version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: agent-zero_web_1
      APP_PORT: 80

  web:
    image: agent0ai/agent-zero:v1.18@sha256:78315e70269ad5bd654b717d0376bc349acd4c2702c9d813e9c0444283bd3f93
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/usr:/a0/usr
    environment:
      - ALLOWED_ORIGINS=http://${DEVICE_DOMAIN_NAME}:${APP_AGENTZERO_PORT},http://${DEVICE_HOSTNAME}:${APP_AGENTZERO_PORT},${APP_AGENTZERO_LOCAL_URLS}
