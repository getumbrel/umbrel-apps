version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: agent-zero_web_1
      APP_PORT: 80

  web:
    image: agent0ai/agent-zero:v1.19@sha256:79f4bfe501cc71f052a8a84808b60cc872370222c1615d69090f98e06e6ef380
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/usr:/a0/usr
    environment:
      - ALLOWED_ORIGINS=http://${DEVICE_DOMAIN_NAME}:${APP_AGENTZERO_PORT},http://${DEVICE_HOSTNAME}:${APP_AGENTZERO_PORT},${APP_AGENTZERO_LOCAL_URLS}
