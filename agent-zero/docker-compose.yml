version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: agent-zero_web_1
      APP_PORT: 80

  web:
    image: agent0ai/agent-zero:v1.17@sha256:ae3bf615afc5505bd5910fca69f599ada8d9d7fd36ff20686818809702616306
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/usr:/a0/usr
    environment:
      - ALLOWED_ORIGINS=http://${DEVICE_DOMAIN_NAME}:${APP_AGENTZERO_PORT},http://${DEVICE_HOSTNAME}:${APP_AGENTZERO_PORT},${APP_AGENTZERO_LOCAL_URLS}
