description: >-
  ⚠️ OneDev requires at least 2 GB of RAM. Its first launch may take a few minutes, especially on lower-powered devices.


  OneDev is a Git and DevOps platform that combines repository hosting, CI/CD pipelines, Kanban boards, and package management in one clean workspace. It helps you manage code, automate builds, track tasks, and ship projects from a single interface.


  It brings the core tools for modern software development together in one clean workspace, including:

    🔍 Version control: It provides built-in Git support, allowing code management directly within the platform.

    📦 CI/CD (Continuous Integration / Continuous Delivery): OneDev enables you to create build and deployment pipelines for continuously testing and delivering code changes.

    🐞 Issue tracking: It offers a task management system to organize projects and track progress.

    👩‍💻 Code review: Developers can perform code reviews directly on the platform to ensure quality.

    📝 Kanban boards: OneDev includes flexible boards to help manage tasks and workflows.

    🔗 Third-party integration: It supports the integration of external services and tools.

  The tool is especially appealing for teams that prefer a complete DevOps solution in a single, self-hosted system without relying on external cloud services.
