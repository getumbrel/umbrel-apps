version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lubelogger_app_1
      APP_PORT: 8080

  app:
    image: ghcr.io/hargata/lubelogger:v1.6.6@sha256:40c10ab59e4709294f91196a170214cc0df506d9b9f9e8f85d8d2962eda978c2
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/app:/App/data
      - ${APP_DATA_DIR}/data/keys:/root/.aspnet/DataProtection-Keys
