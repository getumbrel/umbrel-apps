version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lubelogger_app_1
      APP_PORT: 8080

  app:
    image: ghcr.io/hargata/lubelogger:v1.7.0@sha256:01bdb486af71e641c3ae41499e0412a21f2e04fa31b25c5c6531b42c112938e5
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/app:/App/data
      - ${APP_DATA_DIR}/data/keys:/root/.aspnet/DataProtection-Keys
