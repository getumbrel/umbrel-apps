version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lubelogger_app_1
      APP_PORT: 8080

  app:
    image: ghcr.io/hargata/lubelogger:v1.6.9@sha256:c8f0bfd48b62be4757f03c94267d74f11c79bb0a76595fe4d02dc97ea9b8b5fa
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/app:/App/data
      - ${APP_DATA_DIR}/data/keys:/root/.aspnet/DataProtection-Keys
