releaseNotes: |-
  Poznote 6.37.0 builds on the new Diary and improves note cards:

  - Diary entries can now be opened or created from the mini calendar, and renaming a diary entry to a new date moves it to the right day and folder automatically.
  - Dashboard and Diary cards can show the first image from a note, preserve line breaks in excerpts, and switch between grid/list layouts and card sizes per page.
  - Diary root folders are now localized for several languages, while existing Diary folders keep working.
  - The Diary header works better on mobile, and the mini calendar remains stable after a sidebar refresh.

  If you're updating from before Poznote 6.21.0, existing Excalidraw diagrams may need to be opened, slightly modified, and saved again before their generated images match the current dark/light theme.

  Full release notes can be found at https://github.com/timothepoznanski/poznote/releases/tag/6.37.0
