releaseNotes: >-
  What's new in this release:
    - Fixed an issue causing the tags sort bar to not appear in desktop view
    - Removed live Markdown formatting due to unintended side effects
    - Fixed the search bar when scrolling
    - Improved Markdown table insertion with the ability to press Enter to create a new row
    - Added attachment display and improved media handling in public notes
    - Added ability to align text in table columns to the left, right, or center
    - Added a new Markdown syntax help page with live search and filtering
    - Added OIDC Bearer JWT support for the REST API with automatic user provisioning
    - Added a selector to filter notes by type in the Note Manager
    - Fixed various UI bugs and Markdown rendering issues


  Full release notes can be found at https://github.com/timothepoznanski/poznote
dependencies: []
