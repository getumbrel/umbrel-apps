version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: poznote_app_1
      APP_PORT: 80

  app:
    image: ghcr.io/timothepoznanski/poznote:6.12.0@sha256:2980c30cff1a68c936e82daedc97aa4e07cf6f9ac161b0850a96b3fd756d2e8c
    restart: on-failure
    environment:
      SQLITE_DATABASE: /var/www/html/data/database/poznote.db
      HTTP_WEB_PORT: 80
    volumes:
      - ${APP_DATA_DIR}/data:/var/www/html/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--timeout=5", "-O", "/dev/null", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp:
    image: ghcr.io/timothepoznanski/poznote-mcp:6.12.0@sha256:bc9a8f555b102dc824db6c3647fb7f778c3f8289cfc1b82defa51d8542f29337
    restart: on-failure
    environment:
      POZNOTE_API_URL: http://poznote_app_1:80/api/v1
      POZNOTE_DEBUG: ${POZNOTE_DEBUG:-false}
    ports:
      - "8340:8045"
    volumes:
      - "${APP_DATA_DIR}/data:/var/www/html/data:ro"
    depends_on:
      - app
