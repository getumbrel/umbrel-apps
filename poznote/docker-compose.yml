version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: poznote_app_1
      APP_PORT: 80

  app:
    image: ghcr.io/timothepoznanski/poznote:6.18.0@sha256:fb33dd324b4b84ab6fb97c8700108c9029ce0e71cf52356b860447b2b19b73db
    restart: on-failure
    environment:
      SQLITE_DATABASE: /var/www/html/data/database/poznote.db
      HTTP_WEB_PORT: 80
    volumes:
      - ${APP_DATA_DIR}/data:/var/www/html/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--timeout=5", "-O", "/dev/null", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp:
    image: ghcr.io/timothepoznanski/poznote-mcp:6.18.0@sha256:329d2de348ed63ab723a6e96312e37ba2ecf05add30a15b64a524f41d05fa8c5
    restart: on-failure
    environment:
      POZNOTE_API_URL: http://poznote_app_1:80/api/v1
      POZNOTE_DEBUG: ${POZNOTE_DEBUG:-false}
    ports:
      - "8340:8045"
    volumes:
      - "${APP_DATA_DIR}/data:/var/www/html/data:ro"
    depends_on:
      - app
