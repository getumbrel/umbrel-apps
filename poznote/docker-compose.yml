version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: poznote_app_1
      APP_PORT: 80

  app:
    image: ghcr.io/timothepoznanski/poznote:6.38.0@sha256:0406be70e8c401f6f2b8be91dff2467df058cc34667a5a939d53b265be163036
    restart: on-failure
    environment:
      SQLITE_DATABASE: /var/www/html/data/database/poznote.db
      HTTP_WEB_PORT: 80
    volumes:
      - ${APP_DATA_DIR}/data:/var/www/html/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--timeout=5", "-O", "/dev/null", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp:
    image: ghcr.io/timothepoznanski/poznote-mcp:6.38.0@sha256:05e6b57ef0ac2d38b72c8e1c1012d3d05928a3ac8750cb9ce0156552921f10fb
    restart: on-failure
    environment:
      POZNOTE_API_URL: http://poznote_app_1:80/api/v1
      POZNOTE_DEBUG: ${POZNOTE_DEBUG:-false}
    ports:
      - "8340:8045"
    volumes:
      - "${APP_DATA_DIR}/data:/var/www/html/data:ro"
    depends_on:
      - app
