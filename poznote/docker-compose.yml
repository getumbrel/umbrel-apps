version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: poznote_app_1
      APP_PORT: 80

  app:
    image: ghcr.io/timothepoznanski/poznote:6.30.0@sha256:e872ae9585688f8bfc05bbd1bdd68a4579b783522e6d8501fae1c00655dccfcb
    restart: on-failure
    environment:
      SQLITE_DATABASE: /var/www/html/data/database/poznote.db
      HTTP_WEB_PORT: 80
    volumes:
      - ${APP_DATA_DIR}/data:/var/www/html/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--timeout=5", "-O", "/dev/null", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp:
    image: ghcr.io/timothepoznanski/poznote-mcp:6.30.0@sha256:2240ff865552e3e9ffd125ee832a5dd951ce647f2dbbbf3ec47550395265dfde
    restart: on-failure
    environment:
      POZNOTE_API_URL: http://poznote_app_1:80/api/v1
      POZNOTE_DEBUG: ${POZNOTE_DEBUG:-false}
    ports:
      - "8340:8045"
    volumes:
      - "${APP_DATA_DIR}/data:/var/www/html/data:ro"
    depends_on:
      - app
