manifestVersion: "1"
id: pironman5-pro-max
category: utilities
name: Pironman 5 Pro Max
version: "1.3.9"
tagline: Ultimate aluminum case with dual NVMe, touchscreen, speakers & RGB for Pi 5
description: >-
  Premium aluminum chassis for Raspberry Pi 5 with dual NVMe slots, 4.3"
  touchscreen, 0.96" OLED, stereo speakers, and comprehensive RGB lighting.


  Key features:
  - 4.3" DSI touchscreen (800x480) for dashboards or desktop use
  - 0.96" OLED display for real-time system monitoring
  - Dual NVMe PCIe slots for SSDs or AI accelerators (Hailo-8/8L)
  - Tower cooler with PWM fan plus three RGB fans
  - WS2812 addressable RGB LEDs with programmable effects
  - Stereo 3W speakers and 5MP camera support
  - Metal power button with graceful shutdown on Pi 5
  - RAID 0/1 support
  - Web dashboard on port 34001
  - Real-time data logging with InfluxDB
