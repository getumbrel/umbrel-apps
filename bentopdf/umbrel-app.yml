releaseNotes: >-
  This update brings a major rewrite of the Compare PDFs tool, turning it into a full semantic comparison engine, along with a rotation fix and new language support.


  ✨ New features and improvements:
    - Compare PDFs now detects word-level text differences with precise highlighting on both documents
    - Moved paragraphs are detected and shown as a single "Moved" change instead of separate add/remove entries
    - Style changes such as font family and font size differences are now detected
    - Changes are automatically categorized into Text, Image, Header/Footer, Annotation, Formatting, and Background
    - Smart page pairing correctly handles inserted or deleted pages between document versions
    - OCR support added for scanned documents in the comparison tool
    - Filter changes by type (Modified, Added, Deleted, Moved, Style Changed) or content category
    - Export comparison results in four modes: Split View, Alternating Pages, Left Only, or Right Only
    - Korean language translation added


  🐛 Bug fixes:
    - Fixed PDF page rotation functionality


  Full release notes are found at https://github.com/alam00000/bentopdf/releases
