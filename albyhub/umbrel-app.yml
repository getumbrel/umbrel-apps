releaseNotes: >-
  Key changes in this release:
    - Updated to Alby's new branding
    - Added initial support for stablecoins and crypto onramps/offramps (can be hidden via "Maxi Mode" in settings)
    - Added a second relay to the default relay configuration for improved connection quality
    - Simpler swaps and on-chain receive experience
    - Multiple relay support
    - Better presets for creating connections
    - Simpler unit display and more accessible keyboard navigation
    - Updated LDK dependency to fix a channel disconnection issue with eclair node peers
    - Added custom message support for subwallet transfers
    - Added new apps to the app store: Alby CLI, PPQ, and LNVPS
    - Various bugfixes and minor improvements


  Full release notes are found at https://github.com/getAlby/hub/releases
