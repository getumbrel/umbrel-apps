manifestVersion: "1"
id: pironman5-mini
category: utilities
name: Pironman 5 Mini
version: "1.3.9"
tagline: Compact aluminum case with NVMe, RGB & active cooling for Raspberry Pi 5
description: |-
  Compact aluminum case for Raspberry Pi 5 with NVMe SSD expansion, active cooler with RGB fan, WS2812 RGB LEDs, and GPIO extender.

  Key features:
  - WS2812 addressable RGB LEDs with programmable effects
  - GPIO fan control with LED indicator
  - Active cooler plus side RGB fan for optimal airflow
  - Metal power button with convenient control
  - NVMe SSD storage expansion and monitoring
  - Built-in RTC battery
  - Web dashboard on port 34001
  - Real-time data logging with InfluxDB
