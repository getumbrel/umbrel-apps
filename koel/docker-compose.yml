version: "3.7"
services:
  app_proxy:
    depends_on:
      web:
        condition: service_healthy
    environment:
      APP_HOST: koel_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"
  web:
    image: phanan/koel:9.11.0@sha256:4bbbd448cdca2d9bd9b9dcf7788a20073ebc3105c3c82ca91e3b499ddb590aa7
    restart: on-failure
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: koel
      DB_PASSWORD: ${APP_SEED}
      DB_DATABASE: koel
      APP_KEY: base64:Ni5+ZF4mJrGc6BQ1ErQ1s9QmpF0j/3e5LzhGkyz9fOE=
      APP_ENV: production
      APP_DEBUG: "false"
      OPTIMIZE_CONFIG: "true"
    entrypoint:
      - /bin/sh
      - -c
      - |
        touch /var/www/html/.env
        sed -i '/LoadModule xsendfile_module/d' /etc/apache2/sites-available/000-default.conf
        grep -q '^ServerName ' /etc/apache2/apache2.conf || printf '\nServerName localhost\n' >> /etc/apache2/apache2.conf
        exec /usr/local/bin/koel-entrypoint apache2-foreground
    volumes:
      - ${UMBREL_ROOT}/data/storage/downloads/music:/music
      - ${APP_DATA_DIR}/data/images:/var/www/html/storage/app/public/images
      - ${APP_DATA_DIR}/data/search-indexes:/var/www/html/storage/search-indexes
    healthcheck:
      test:
        - CMD-SHELL
        - test -s /var/run/apache2/apache2.pid
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
  database:
    image: postgres:14@sha256:a698d240380a51147281b62c2ad9daff51ae29c781d6d783c0adfd8e48ef4b1e
    restart: on-failure
    environment:
      POSTGRES_DB: koel
      POSTGRES_USER: koel
      POSTGRES_PASSWORD: ${APP_SEED}
      POSTGRES_INITDB_ARGS: "--auth-local=md5 --auth-host=md5"
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --username=koel --dbname=koel
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    command:
      - postgres
      - -c
      - log_min_messages=warning
