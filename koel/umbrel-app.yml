name: Koel
tagline: An API-enabled audio server for private music streaming
category: media
version: "9.11.0"
port: 8337
description: >-
  🎵 Koel is a personal music streaming application for organizing, browsing, searching, and playing a private music collection through a modern web interface. Music can be explored by artist, album, genre, or song, while playlists and favorites make it easy to create and revisit personal collections.


  Koel includes queue management, album artwork, lyrics, listening history, music uploads, and a responsive interface that works across desktop and mobile devices. It also supports compatible third-party music clients through its Subsonic-compatible API.
