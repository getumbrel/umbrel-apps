version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: emby_server_1
      APP_PORT: 8096
      PROXY_AUTH_ADD: "false"

  server:
    image: linuxserver/emby:version-4.9.5.0@sha256:3a06a04c7e2e3ad1cef5fb11bea83b1d6ec64e3bb9ac7c0763b38a6b934ad24b
    environment:
      TZ: Europe/Berlin
      UID: 1000
      GID: 1000
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/config:rw
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
