releaseNotes: >-
  Arcane 2.4.0 adds support for Docker override files, restarts dependent services when project services are restarted, raises the maximum session timeout to one year, and localizes timezones based on the current locale.

  This release also fixes project backup scoping and file-tree loading, stale workspace editor content after saves, registry rate-limit handling for image updates, SMTP auth without complete credentials, Azure DevOps Git clone failures, HTTPS links on the container list, GitOps sync/env handling, scheduler shutdown, external `.env` symlink preservation, dashboard action focus/tooltips, and frontend cache/session isolation.

  If you're updating from a pre-2.0 version, back up your Arcane data first and review the v2 migration guide if you use OIDC, API keys/automation, Edge mTLS remote environments, Apprise notifications, or deprecated prune/GitOps settings.

  Full release notes can be found at https://github.com/getarcaneapp/arcane/releases/tag/v2.4.0
