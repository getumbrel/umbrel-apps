manifestVersion: 1
id: podfetch
category: media
name: PodFetch
version: "5.2.2"
tagline: Sleek podcast server with GPodder sync for AntennaPod
description: >-
  PodFetch is a sleek and efficient self-hosted podcast manager. It
  automatically downloads new episodes of your favorite podcasts and lets you
  listen to them online through a clean web UI.


  Features:

  - Automatic episode downloads on a configurable polling interval

  - Search and add podcasts via iTunes or Podindex

  - GPodder-compatible sync API: keep using podcast apps like AntennaPod and
  sync subscriptions, episode actions, and playback position across devices

  - Multi-user support with invites and roles

  - Playlists, favorites, and playback position tracking in the web player

  - OPML import and export

  - RSS feed export of your library

  - Available in English, German, French, Spanish, Polish, and more


  To connect AntennaPod, create a user via the web UI (User Administration >
  Invites) and use it with the GPodder.net synchronization provider pointed at
  your PodFetch URL.
