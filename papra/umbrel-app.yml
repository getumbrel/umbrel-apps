releaseNotes: >-
  ⚠️ Webhook URLs pointing at private or reserved IP addresses are now blocked by default unless explicitly allowlisted in Papra's configuration.


  This update also adds a PDF viewer, custom document properties, new search and tag filters, improved content extraction for PDFs, XLSX, and ODS files, and security fixes for webhook URL validation and API key handling.


  Full release notes can be found at https://github.com/papra-hq/papra/releases/tag/%40papra/app%4026.4.0
