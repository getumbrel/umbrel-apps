releaseNotes: >-
  This update adds saved search views, document sharing links with optional password/expiration controls, document notes, and batch document selection for tag management or deletion.


  It also improves PDF previews, adds API-key permissions for custom properties, fixes the two-factor authentication regression from 26.4.1, and includes security fixes for tag authorization, webhook SSRF/redirect handling, and authentication/database dependencies.


  Full release notes can be found at https://github.com/papra-hq/papra/releases/tag/%40papra/app%4026.5.0
