releaseNotes: >-
  This update improves document update and deletion performance in the search index, especially for large document collections.


  It also adds a loading state to the rename document modal, fixes auto-tagging configuration validation, improves AI provider auto-tagging compatibility, and adds better logging for structured data generation errors.


  Full release notes can be found at https://github.com/papra-hq/papra/releases/tag/%40papra/app%4026.6.1
