services:
  app_proxy:
    environment:
      APP_HOST: papra_server_1
      APP_PORT: 1221
      PROXY_AUTH_WHITELIST: "/api/*"

  server:
    image: ghcr.io/papra-hq/papra:26.5.0-rootless@sha256:feb8c6e03bbbd1a730bc606fe3fb5a0fe13a71edb4f7d44b7f8f6940cca76a3a
    user: 1000:1000
    restart: on-failure
    environment:
      - AUTH_SECRET=${APP_SEED}
      - APP_BASE_URL=http://${DEVICE_DOMAIN_NAME}:8112
    volumes:
      - ${APP_DATA_DIR}/data:/app/app-data
