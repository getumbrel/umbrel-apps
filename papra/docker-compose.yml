services:
  app_proxy:
    environment:
      APP_HOST: papra_server_1
      APP_PORT: 1221
      PROXY_AUTH_WHITELIST: "/api/*"

  server:
    image: ghcr.io/papra-hq/papra:26.6.1-rootless@sha256:a7a42e228f73f229d1e2dcd53de7b67503f1756d1aa3a894ab175dba8030c0e8
    user: 1000:1000
    restart: on-failure
    environment:
      - AUTH_SECRET=${APP_SEED}
      - APP_BASE_URL=http://${DEVICE_DOMAIN_NAME}:8112
    volumes:
      - ${APP_DATA_DIR}/data:/app/app-data
