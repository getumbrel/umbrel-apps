manifestVersion: 1
id: btcpay-server
category: bitcoin
name: BTCPay Server
version: "2.4.1"
tagline: Accept Bitcoin payments with 0 fees & no 3rd party
description: >-
  BTCPay Server is a payment processor that allows you to receive
  payments in Bitcoin (and altcoins) directly, with no fees, transaction cost or
  a middleman. It is a non-custodial invoicing system which eliminates the
  involvement of a third-party.


  Payments with BTCPay Server go directly to your wallet, which increases the privacy and security. Your private keys are never uploaded to your Umbrel. There is no address re-use, since each invoice generates a new address deriving from your xpubkey.


  You can not only attach an unlimited number of stores and use the Lightning Network but also become a payment processor for others. Thanks to the apps built on top of it, you can use BTCPay to receive donations, start a crowdfunding campaign or have an in-store Point of Sale.


  Please note: Due to your BTCPay instance running on your local network connecting remote applications, such as Shopify or WordPress for example, will fail to connect, unless you configure the dynamic DNS feature (see: https://docs.btcpayserver.org/Deployment/DynamicDNS).
developer: BTCPay Server Foundation
website: https://btcpayserver.org
dependencies:
  - bitcoin
  - lightning
repo: https://github.com/btcpayserver/btcpayserver
support: https://chat.btcpayserver.org
port: 3003
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  This release comes with lots of new features, bug fixes, and improvements.

  New features:
    - Plugins: Improve the plugin directory page
    - Wallet: Add BIP-329 label import
    - Invoices: Add editable invoice comments, including Greenfield API and report export support
    - Email Rules: Add a new trigger for invoice refunds
    - Allow time zone configuration in date range selectors

  Bug fixes:
    - Fix Boltcard payments that stopped working
    - Fix LNDHub not being enabled by default
    - Fix server admins unable to view a user's store
    - Wallet: Allow recommended fees below 1 sat/vbyte on the send screen
    - Wallet: Refresh label filter dropdown after adding labels inline
    - Fix Custom Range formatting in the date range selector
    - Fix Boltcards payments
    - Fix the Mark as seen button in the notification list
    - Fix incorrect date range filtering across DST boundaries

  Miscellaneous:
    - Use the browser's preferred hour format in the date time picker
    - Add a Manage Labels link to Bitcoin Wallet labels
    - Unify reports' page time range selection
    - Add tooltips to global navigation icons
    - Standardize topbar dropdown menus
    - Improve topbar visual separation
    - Remove misleading error logs on the first installation
    - Make global search more forgiving
    - Update default global search bar suggestions

  Full BTCPay Server release notes can be found at https://github.com/btcpayserver/btcpayserver/releases/tag/v2.4.1
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel/pull/353
