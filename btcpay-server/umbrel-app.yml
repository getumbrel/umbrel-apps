releaseNotes: >-
  BTCPay Server 2.4.1 is a follow-up to the recent 2.4 major update. If you're updating from a pre-2.4 version and use the Boltcards Extension or Shopify v2 plugins, upgrade those plugins to their latest versions for BTCPay Server 2.4 compatibility.


  If you're already on BTCPay Server 2.4.0, this update improves the plugin directory, adds BIP-329 wallet label imports, editable invoice comments, refund email rule triggers, date range and time zone controls, and right-to-left language support.


  It also fixes Boltcard payments, LNDHub defaults, admin access to user stores, NBXplorer error rendering, wallet label and fee handling, Core Lightning compatibility, and updates the NBXplorer companion image.


  Full BTCPay Server release notes can be found at https://github.com/btcpayserver/btcpayserver/releases/tag/v2.4.1
submitter: Umbrel
