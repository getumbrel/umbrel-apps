manifestVersion: 1
id: hashboard
category: bitcoin
name: Hashboard
version: "0.5.1"
tagline: Run your ASIC miner as a space heater
description: >-
  Hashboard turns a Bitcoin ASIC miner into an ordinary household appliance:
  open it on your phone, see how much heat it is making, and slide the power
  up or down. It is built for the people you share a home with — no mining
  knowledge required.

  One slider sets the miner's power (and heat). The maximum is captured from
  the miner's own power target on first connect and locked, so nobody can
  push the machine harder than it was set up for. Pause and resume with one
  tap, watch live hashrate, wattage, chip temperature and fan speed, and find
  miners on your network automatically with the built-in LAN scan.

  Miner communication is handled by the 256 Foundation's open asic-rs
  library, so monitoring works across Antminer (stock), Whatsminer, Avalon,
  BraiinsOS+, LuxOS, Vnish, ePIC, Marathon, Bitaxe and more, with power
  control wherever the firmware exposes it.
