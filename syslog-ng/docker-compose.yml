version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: syslog-ng_web_1
      APP_PORT: 8080

  syslog:
    image: linuxserver/syslog-ng:4.10.2@sha256:b77c32d93b9e9b84f4fdd9261d7dd1db3b8a6f90391459b1ca51c82af9828bf8
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    ports:
      - "514:5514/udp"
      - "601:6601/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${APP_DATA_DIR}/data/logs:/var/log
    # Logdy expands /data/*.log once at startup, so create the first matching
    # log file before the web service starts on fresh installs.
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/log/messages-kv.log || touch /var/log/messages-kv.log"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    image: rickraven/logdy:0.17.1@sha256:a1438c758ed3735e9b06205168a3c63e39bd0895bc5f0cd1adf4ed2270ae66cb
    user: "1000:1000"
    restart: on-failure
    environment:
      LOGDY_MODE: "follow"
      LOGDY_FOLLOW_FILES: "/data/*.log"
      LOGDY_PASS: ${APP_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/data/logs:/data:ro
    depends_on:
      syslog:
        condition: service_healthy
