manifestVersion: 1.1
id: navidrome
category: media
name: Navidrome
version: "0.62.0"
tagline: Your personal streaming service
description: >-
  Navidrome is an open source web-based music collection server and streamer.
  It gives you freedom to listen to your music collection from any browser or mobile device. It's like your personal Spotify!


  Features:

  - Handles very large music collections

  - Streams virtually any audio format available

  - Reads and uses all your beautifully curated metadata

  - Great support for compilations (Various Artists albums) and box sets (multi-disc albums)

  - Multi-user, each user has their own play counts, playlists, favourites, etc...

  - Very low resource usage

  - Multi-platform, runs on macOS, Linux and Windows. Docker images are also provided

  - Ready to use binaries for all major platforms, including Raspberry Pi

  - Automatically monitors your library for changes, importing new files and reloading new metadata

  - Themeable, modern and responsive Web interface based on Material UI

  - Compatible with all Subsonic/Madsonic/Airsonic clients

  - Transcoding on the fly. Can be set per user/player. Opus encoding is supported

  - Translated to various languages

developer: Navidrome
website: https://www.navidrome.org/
dependencies: []
repo: https://github.com/navidrome/navidrome
support: https://github.com/navidrome/discussions
port: 4533
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
permissions:
  - STORAGE_DOWNLOADS
releaseNotes: >-
  This release includes several security fixes for shares, player ownership, Last.fm callbacks, public share streams, transcoding configuration access, and internet radio management.


  Key improvements include:
    - Added OpenSubsonic sonicSimilarity support for plugin-powered audio similarity recommendations
    - Redesigned the Now Playing experience with the new OpenSubsonic playbackReport extension
    - Added concurrent transcoding limits to help protect servers from ffmpeg-based denial of service
    - Added ReplayGain fields and new isMissing/isPresent operators for smart playlists
    - Added five new UI themes and multiple scanner, artwork, transcoding, and Subsonic API fixes
    - Added new configuration options and deprecated a few older option names in favor of their new Transcoding and Matcher settings


  Full release notes can be found at https://github.com/navidrome/navidrome/releases/tag/v0.62.0
submitter: owmsoton
submission: https://github.com/getumbrel/umbrel-apps/pull/1232
