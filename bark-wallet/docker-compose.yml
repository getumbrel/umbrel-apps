version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bark-wallet_web_1
      APP_PORT: 8080

  web:
    image: secondark/bark-web:0.2.0@sha256:8b45a3b6ea18df9540cc1a90080fbf3bf994209b64fd50fde585f7aa9b44589b
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - api
      - barkd

  api:
    image: secondark/bark-web-api:0.2.0@sha256:48392a767d93ec1307ed2287ca7d02eb491e0999482094b1d77a9411bbc1bfcf
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/wallet:/wallet-data:ro
    environment:
      PORT: 4001
      WALLET_DIR: /wallet-data/.bark
      # We usually use the full Umbrel container name here, but the web image's bundled nginx config also proxies to barkd.
      BARKD_URL: http://barkd:4000
      ARK_SERVER: https://ark.second.tech
      CHAIN_SOURCE: https://mempool.second.tech/api
      BARK_NETWORK: mainnet
    depends_on:
      - barkd

  barkd:
    image: secondark/bark:0.2.3@sha256:a46447faad5508a97c0d2d1a8987c256cf437e0ebea09749c587657ee83926ba
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    command: sh -c "mkdir -p /data/.bark && exec /usr/local/bin/barkd --port 4000 --host 0.0.0.0 --datadir /data/.bark"
    volumes:
      - ${APP_DATA_DIR}/data/wallet:/data
