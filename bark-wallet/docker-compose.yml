version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bark-wallet_web_1
      APP_PORT: 8080

  web:
    image: secondark/bark-web:0.3.0@sha256:d00308ef6739243ea7d5187dffe250851857deb88aa93acc9527dd23d1288ef2
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - api
      - barkd

  api:
    image: secondark/bark-web-api:0.3.0@sha256:846086e4507ea1827de51aa91a8fd22ddbb93816aff6c182c704f22fd0af720a
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data/wallet:/wallet-data:ro
    environment:
      PORT: 4001
      WALLET_DIR: /wallet-data/.bark
      WALLET_DATA_PATH: /Apps/bark-wallet/data/wallet/.bark/
      # We usually use the full Umbrel container name here, but the web image's bundled nginx config also proxies to barkd.
      BARKD_URL: http://barkd:4000
      ARK_SERVER: https://ark.second.tech
      CHAIN_SOURCE: https://mempool.second.tech/api
      BARK_NETWORK: mainnet
    depends_on:
      - barkd

  barkd:
    image: secondark/bark:0.3.0@sha256:4cfa73136f8098af164283aa2d5a79f1d46005ea7568fff8c6ae130abfd9c599
    # Fix bind mount ownership, then drop to UID 1000 so the API can read barkd's auth token.
    user: "0:0"
    restart: on-failure
    stop_grace_period: 1m
    command: >
      sh -c "mkdir -p /data/.bark
      && chown -R 1000:1000 /data
      && exec setpriv --reuid 1000 --regid 1000 --clear-groups /usr/local/bin/barkd --port 4000 --host 0.0.0.0 --datadir /data/.bark"
    volumes:
      - ${APP_DATA_DIR}/data/wallet:/data
