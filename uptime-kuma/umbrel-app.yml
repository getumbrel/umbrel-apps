manifestVersion: 1
id: uptime-kuma
category: networking
name: Uptime Kuma
version: "2.3.2"
tagline: Self-hosted uptime monitoring tool
description: >
  Uptime Kuma is a self-hosted monitoring tool like Uptime Robot.


  Features:


  - Monitoring uptime for HTTP(s) / TCP / HTTP(s) Keyword / Ping / DNS Record / Push / Steam Game Server.

  - Fancy, Reactive, Fast UI/UX.

  - Notifications via Telegram, Discord, Gotify, Slack, Pushover, Email (SMTP), and 70+ notification services.

  - 20 second intervals.

  - Multi Languages

  - Simple Status Page

  - Ping Chart

  - Certificate Info
developer: Louis Lam
website: https://uptime.kuma.pet
dependencies: []
repo: https://github.com/louislam/uptime-kuma
support: https://github.com/louislam/uptime-kuma/issues
port: 8385
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultPassword: ""
releaseNotes: >
  New features:
    - Added Telnyx, VK, and MAX messenger notification providers
    - Added OracleDB monitor support
    - Added collapsible groups to status pages
    - Added custom message template support for Evolution notification provider
    - Added websocket authentication support


  Bug fixes:
    - Fixed SQLite database locking issues (reverted to single connection by default)
    - Fixed uptime ratio and average response time missing from Prometheus metrics
    - Fixed domain expiry not updating correctly
    - Fixed monitor graph gaps for sub-millisecond TCP pings
    - Fixed Prometheus metrics showing duplicate series for monitors with tags


  Full release notes can be found at https://github.com/louislam/uptime-kuma/releases
submitter: Philipp Haussleiter
submission: https://github.com/getumbrel/umbrel/pull/1148
