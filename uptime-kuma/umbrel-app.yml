manifestVersion: 1
id: uptime-kuma
category: networking
name: Uptime Kuma
version: "2.4.0"
tagline: Self-hosted uptime monitoring tool
description: >
  Uptime Kuma is a self-hosted monitoring tool like Uptime Robot.


  Features:


  - Monitoring uptime for HTTP(s) / TCP / HTTP(s) Keyword / Ping / DNS Record / Push / Steam Game Server.

  - Fancy, Reactive, Fast UI/UX.

  - Notifications via Telegram, Discord, Gotify, Slack, Pushover, Email (SMTP), and 70+ notification services.

  - 20 second intervals.

  - Multi Languages

  - Simple Status Page

  - Ping Chart

  - Certificate Info
developer: Louis Lam
website: https://uptime.kuma.pet
dependencies: []
repo: https://github.com/louislam/uptime-kuma
support: https://github.com/louislam/uptime-kuma/issues
port: 8385
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
defaultPassword: ""
releaseNotes: >
  New features:
    - Added incidents to RSS feeds
    - Added EgoSMS and VKTeams notification providers
    - Added optional tokens for GameDig monitors and bearer-token support for WebSocket monitors


  Bug fixes and security:
    - Fixed plain-HTTP NTLM monitors returning 400 Bad Request
    - Fixed npm handling in the Docker image
    - Includes an admin/authenticated-path security fix for an upstream dependency vulnerability


  Full release notes can be found at https://github.com/louislam/uptime-kuma/releases/tag/2.4.0
submitter: Philipp Haussleiter
submission: https://github.com/getumbrel/umbrel/pull/1148
