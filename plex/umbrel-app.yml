manifestVersion: 1
id: plex
category: media
name: Plex
version: "1.43.2.10687"
tagline: Stream Movies & TV Shows
description: >-
  Stream movies and TV shows, plus 300+ channels of live TV, instantly, without a subscription. Watch live TV and movies anywhere, from any device, with Plex.


  Plex uses a server to house your media library and player apps to playback the media. Add, access, and share all the entertainment that matters to you, on almost any device.


  ⚠️ If you encounter a "not authorized error" when attempting to access your Plex app, please follow the steps in this guide: https://community.umbrel.com/t/fixing-plexs-not-authorized-error/10523
developer: Plex
website: https://www.plex.tv/
dependencies: []
repo: ""
support: https://www.plex.tv/
port: 32400
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: /web
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
  - GPU
releaseNotes: >-
  This update includes several improvements and bug fixes:
    - Added new filters for Atmos, audio layout, and media codecs.
    - Improved NFO metadata parsing for Rotten Tomatoes ratings, Dolby Atmos, collection tags, studio values, leading-zero episodes, genres, and release types.
    - Fixed related collection hubs not respecting label restrictions.
    - Improved MKV language tag handling and track artist detection in m4a files.
    - Fixed Linux hardware transcoding and tone-mapping issues on Intel Tiger Lake, Rocket Lake, and Arrow Lake GPUs.
    - Enforced TLS certificate verification on all retry attempts, addressing CVE-2026-42619.

  Full release notes are available at https://www.videohelp.com/software/Plex
submitter: Umbrel
