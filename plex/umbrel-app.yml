manifestVersion: 1
id: plex
category: media
name: Plex
version: "1.43.1.10611"
tagline: Stream Movies & TV Shows
description: >-
  Stream movies and TV shows, plus 300+ channels of live TV, instantly, without a subscription. Watch live TV and movies anywhere, from any device, with Plex.


  Plex uses a server to house your media library and player apps to playback the media. Add, access, and share all the entertainment that matters to you, on almost any device.


  ⚠️ If you encounter a "not authorized error" when attempting to access your Plex app, please follow the steps in this guide: https://community.umbrel.com/t/fixing-plexs-not-authorized-error/10523
developer: Plex
website: https://www.plex.tv/
dependencies: []
repo: ""
support: https://www.plex.tv/
port: 32400
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: /web
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
  - GPU
releaseNotes: >-
  This update includes several improvements and bug fixes:
    - Add support for decoding AV1 files on Windows using Intel devices.
    - Added support for battlemage GPUs.
    - Updated Web to 4.159.0.
    - Force detection when manually triggering an analyze operation.
    - DiskFull and AccessDenied errors are no longer treated as recoverable.
    - The ‘Other Editions of’ hub could return incorrect items for non-Plex metadata agents.
    - Cinema Trailers would fail to play on some clients.
    - Collections promoted to hubs on home and library section would not obey label restrictions for visibility.
    - The “Recently Added” TV Show hubs could potentially skip shows or seasons.
    - Server could crash when matching music.
    - RPM package could fail to install in some specific scenarios.
    - Addressed various issues with live-tv playback.
    - Local assets can sometimes be ignored when folder paths contain unicode characters.
    - Add ratings support to NFO parser.
    - Alternate collection image options were not being returned.
    - Critic and audience ratings lower than 10% were not being saved to the database.
    - Embedded thumbnails in episodes were being ignored.
    - Refreshing an item will set its logo again when it has been explicitly unset.
    - Requests for alternate images may return incomplete results if called quickly in succession.
    - Season and episode thumbnails for custom metadata agents would get removed when cleaning bundles.
    - Support spanning episodes in NFO parser.
    - When using the NFO Series provider, running a metadata refresh can get stuck.
    - Correctly tagged albums with more than 20 discs would fail matching all tracks.
    - Ignore QNAP specific hidden paths when watching for file changes.
    - Newly created libraries would not immediately be visible on “Grant Library Access” page.
    - Fixes sync issue when transcoding subtitles to webvtt.
    - Thumbnails were incorrectly generated for videos with rotation.
    - Transcoding files with an aac audio track could fail with an iOS client.
    - Error message was unclear when all transcoder slots were used.
    - Burning in subtitles produced a green border for some videos.
    - Allow manual analyze to force detection on previously failed attempts.
    - Detection could fail in some instances.


  Full release notes are available at https://www.videohelp.com/software/Plex
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/commit/60878f278d544b204d8e7c96240c797f43a9b319
