releaseNotes: >-
  This release includes a fix for a high-severity security issue.


  Other improvements include:
    - Fixes for duplicate number generation in customers, projects, and activities
    - New invoice template variables and a user filter for the invoice archive
    - Better logging for failed image downloads in invoice and export templates
    - JavaScript and layout fixes for forms, modals, and delete confirmations
    - Translation updates


  For full release notes, visit https://github.com/kimai/kimai/releases/tag/2.59.0
