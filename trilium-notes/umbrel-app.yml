releaseNotes: >-
  ⚠️ Major update: this release disables backend scripting and SQL console access by default for safer server operation. If you rely on backend scripts or SQL console, review Trilium's security documentation before upgrading.


  Highlights:
    - Adds redesigned setup and login flows
    - Adds importers for OneNote, Notion, Google Keep, Anytype, and Obsidian
    - Improves import/export performance and adds XLSX/CSV import and export for spreadsheets
    - Adds Claude Code subscription support for LLM integrations
    - Adds multi-state TODO lists, collapsible blocks, link previews, dashboard collections, and more editor improvements
    - Includes 16 security fixes and many bug fixes across notes, sharing, imports, exports, authentication, mobile, and the editor


  Full release notes are available at https://github.com/TriliumNext/Trilium/releases/tag/v0.104.0
