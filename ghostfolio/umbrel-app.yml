manifestVersion: 1
id: ghostfolio
category: finance
name: Ghostfolio
version: "3.30.0"
tagline: Manage your wealth like a boss
description: >-
  Ghostfolio is a privacy-first, open source dashboard for your personal finances.
  

  Break down your asset allocation, know your net worth and make solid, data-driven
  investment decisions.


  Protect your assets. Refine your personal investment strategy.

  
  Ghostfolio empowers busy people to keep track of stocks, ETFs or cryptocurrencies
  without being tracked.
backupIgnore:
  - data/redis/*
developer: Ghostfolio
website: https://ghostfol.io/
dependencies: []
repo: https://github.com/ghostfolio/ghostfolio
support: https://github.com/ghostfolio/ghostfolio/discussions
port: 3334
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  This release includes improvements and fixes:
    - Added support for the Fear & Greed Index market mood in self-hosted environments
    - Added support for converting asset profiles to the manual data source from the admin asset profile details dialog
    - Improved copy-to-clipboard feedback and German localization
    - Restricted the symbol data endpoint to authenticated users and removed the deprecated GET security-token login endpoint
    - Fixed the delete button in tag selectors


  Full release notes can be found at https://github.com/ghostfolio/ghostfolio/releases/tag/3.30.0
submitter: BeauAgst
submission: https://github.com/getumbrel/umbrel-apps/pull/396
