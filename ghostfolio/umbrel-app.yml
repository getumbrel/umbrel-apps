  - data/redis/*
developer: Ghostfolio
website: https://ghostfol.io/
dependencies: []
repo: https://github.com/ghostfolio/ghostfolio
support: https://github.com/ghostfolio/ghostfolio/discussions
port: 3334
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  This release includes improvements and fixes:
    - Added support for routing outgoing requests through per-domain proxies
    - Improved activity API query handling and German/Japanese localization
    - Fixed asset profile data source validation and single-value field validation across endpoints


  Full release notes can be found at https://github.com/ghostfolio/ghostfolio/releases/tag/3.19.0
submitter: BeauAgst
