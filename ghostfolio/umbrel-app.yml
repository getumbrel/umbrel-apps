manifestVersion: 1
id: ghostfolio
category: finance
name: Ghostfolio
version: "3.11.0"
tagline: Manage your wealth like a boss
description: >-
  Ghostfolio is a privacy-first, open source dashboard for your personal finances.
  

  Break down your asset allocation, know your net worth and make solid, data-driven
  investment decisions.


  Protect your assets. Refine your personal investment strategy.

  
  Ghostfolio empowers busy people to keep track of stocks, ETFs or cryptocurrencies
  without being tracked.
backupIgnore:
  - data/redis/*
developer: Ghostfolio
website: https://ghostfol.io/
dependencies: []
repo: https://github.com/ghostfolio/ghostfolio
support: https://github.com/ghostfolio/ghostfolio/discussions
port: 3334
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  This release includes improvements and fixes:
    - Added support for click handlers in page tabs
    - Improved tab styling across dialogs and the desktop page tabs component
    - Enabled the experimental Bull Dashboard tab in the admin control panel
    - Improved mobile numerical precision in account and holding details
    - Optimized portfolio holding endpoint processing for historical market data
    - Fixed issues in dividend imports, currency detection, admin user request dates, and X-ray rule threshold loading
    - Improved Spanish localization


  Full release notes can be found at https://github.com/ghostfolio/ghostfolio/releases/tag/3.11.0
submitter: BeauAgst
submission: https://github.com/getumbrel/umbrel-apps/pull/396
