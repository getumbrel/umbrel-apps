manifestVersion: 1
id: ghostfolio
category: finance
name: Ghostfolio
version: "3.28.0"
tagline: Manage your wealth like a boss
description: >-
  Ghostfolio is a privacy-first, open source dashboard for your personal finances.
  

  Break down your asset allocation, know your net worth and make solid, data-driven
  investment decisions.


  Protect your assets. Refine your personal investment strategy.

  
  Ghostfolio empowers busy people to keep track of stocks, ETFs or cryptocurrencies
  without being tracked.
backupIgnore:
  - data/redis/*
developer: Ghostfolio
website: https://ghostfol.io/
dependencies: []
repo: https://github.com/ghostfolio/ghostfolio
support: https://github.com/ghostfolio/ghostfolio/discussions
port: 3334
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  This release includes improvements and fixes:
    - Moved the clone, create, and edit activity dialogs to dedicated routes
    - Improved localization in the admin historical market data table and tag management
    - Added validation for tags when creating or updating activities and holdings
    - Fixed activity tags being lost when an activity update fails
    - Fixed portfolio calculations for asset profiles without market data
    - Fixed removing linked accounts from buy, sell, and dividend activities


  Full release notes can be found at https://github.com/ghostfolio/ghostfolio/releases/tag/3.28.0
submitter: BeauAgst
submission: https://github.com/getumbrel/umbrel-apps/pull/396
