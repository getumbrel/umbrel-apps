manifestVersion: 1
id: ghostfolio
category: finance
name: Ghostfolio
version: "3.9.0"
tagline: Manage your wealth like a boss
description: >-
  Ghostfolio is a privacy-first, open source dashboard for your personal finances.
  

  Break down your asset allocation, know your net worth and make solid, data-driven
  investment decisions.


  Protect your assets. Refine your personal investment strategy.

  
  Ghostfolio empowers busy people to keep track of stocks, ETFs or cryptocurrencies
  without being tracked.
backupIgnore:
  - data/redis/*
developer: Ghostfolio
website: https://ghostfol.io/
dependencies: []
repo: https://github.com/ghostfolio/ghostfolio
support: https://github.com/ghostfolio/ghostfolio/discussions
port: 3334
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  This release includes improvements and fixes:
    - Added a public API endpoint for updating asset profile data
    - Added support for using a dedicated OpenRouter model with the web fetch tool
    - Improved account balance management by pre-filling the current cash balance and preventing future dates
    - Grouped commodities, cryptocurrencies, and activities without an account into the unknown bucket in allocation charts
    - Moved assistant support for calendar year date ranges out of experimental status
    - Improved Korean localization


  Full release notes can be found at https://github.com/ghostfolio/ghostfolio/releases/tag/3.9.0
submitter: BeauAgst
submission: https://github.com/getumbrel/umbrel-apps/pull/396
