  - 1.jpg
  - 2.jpg
  - 3.jpg
path: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  This release includes improvements and fixes:
    - Improved error message styling in the import activities dialog
    - Improved shared portfolio access table grantee display
    - Improved country mapping for data providers
    - Updated admin queue job table header alignment


  Full release notes can be found at https://github.com/ghostfolio/ghostfolio/releases/tag/3.17.0
