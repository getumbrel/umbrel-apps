releaseNotes: >-
  Key highlights in this release:
    - Added a new Admin API for listing quarantined media changes with pagination
    - Added support for re-signing local events with a new signing key
    - Added Admin API endpoints to list, fetch, and delete user reports
    - Reduced database disk space usage by pruning old rows from device list changes
    - Fixed a bug where a non-admin could bypass admin checks for downloading remote quarantined media
    - Fixed database migrations failing on macOS due to SQLite defensive configuration
    - Fixed rejection of null device keys in key upload requests to match the spec


  Full release notes are found at https://github.com/element-hq/synapse/releases
