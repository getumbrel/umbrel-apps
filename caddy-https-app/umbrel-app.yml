manifestVersion: 1.1
id: caddy-https-proxy
category: networking
name: Caddy HTTPS Proxy
version: "1.0.0"
tagline: Add HTTPS support to your Umbrel apps
description: >-
  Caddy HTTPS Proxy provides automatic HTTPS encryption for your Umbrel server.
  It acts as a reverse proxy that sits in front of your apps, encrypting all
  traffic between your devices and your Umbrel server.
  
  Features:
  
  - Automatic self-signed certificate generation
  - HTTP to HTTPS redirect
  - Dynamic app routing
  - Security headers (HSTS, X-Frame-Options, etc.)
  - No configuration required - works out of the box
  
  Once installed, access your apps securely via:
  https://umbrel.local:8443/
  
  Note: This app uses self-signed certificates. Your browser will show a
  warning on first access, which is expected. You can safely proceed or
  trust the certificate to eliminate warnings.
developer: Umbrel Community
website: https://umbrel.com
dependencies: []
repo: https://github.com/getumbrel/umbrel-apps
support: https://github.com/getumbrel/umbrel-apps/issues
port: 8080
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Umbrel Community
submission: "https://github.com/getumbrel/umbrel-apps/pull/5530"
