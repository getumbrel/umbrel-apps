version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: wallos_server_1
      APP_PORT: 80

  server:
    image: bellamy/wallos:5.1.1@sha256:350d8fe7f963477ed92b6ff96c8b220ed5bfb6c3b9eb8d3229025d132701c04e
    restart: on-failure
    stop_grace_period: 1m
    environment:
      TZ: Etc/UTC
      PUID: 1000
      PGID: 1000
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/www/html/db
      - ${APP_DATA_DIR}/data/logos:/var/www/html/images/uploads/logos
