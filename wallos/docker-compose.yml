version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: wallos_server_1
      APP_PORT: 80

  server:
    image: bellamy/wallos:4.9.5@sha256:11ed4975912a014e2ec53d5270acfdde8eb928f59b56ad9ba136a2e69bbec019
    restart: on-failure
    stop_grace_period: 1m
    environment:
      TZ: Etc/UTC
      PUID: 1000
      PGID: 1000
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/www/html/db
      - ${APP_DATA_DIR}/data/logos:/var/www/html/images/uploads/logos
