version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: wallos_server_1
      APP_PORT: 80

  server:
    image: bellamy/wallos:4.9.3@sha256:5e6f10fe495e78bcd3c92db572923ed23d16f5c62d8721e8664faa7119e798f5
    restart: on-failure
    stop_grace_period: 1m
    environment:
      TZ: Etc/UTC
      PUID: 1000
      PGID: 1000
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/www/html/db
      - ${APP_DATA_DIR}/data/logos:/var/www/html/images/uploads/logos
