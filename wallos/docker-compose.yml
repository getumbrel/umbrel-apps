version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: wallos_server_1
      APP_PORT: 80

  server:
    image: bellamy/wallos:5.0.0@sha256:8ebde07dbdd34eb671ef40560fd9503c5f995d4594c169a08cf93288d5a1b8e9
    restart: on-failure
    stop_grace_period: 1m
    environment:
      TZ: Etc/UTC
      PUID: 1000
      PGID: 1000
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/www/html/db
      - ${APP_DATA_DIR}/data/logos:/var/www/html/images/uploads/logos
