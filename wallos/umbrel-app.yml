releaseNotes: >-
  This major update includes a complete UI overhaul and several new ways to manage subscriptions:

    - Redesigned login, registration, dashboard, subscription, and statistics views
    - Added grid view, subscription detail popups, dashboard icon search, and Sunday-start calendar support
    - Added declarative OIDC settings and v2 API write endpoints
    - Fixed calendar/payment calculations and strengthened iCal, logo search, SMTP, and cron endpoint security

  Full release notes are available at https://github.com/ellite/Wallos/releases/tag/v5.0.0
