id: wallos
name: Wallos
tagline: Track your recurring subscriptions and expenses
category: finance
version: "5.0.0"
port: 8282
description: >-
  Wallos is a self-hosted personal subscription tracker for managing recurring expenses, upcoming payments, categories, payment methods, and household budgets.


  It helps you keep subscription costs visible, organize payments across multiple currencies, and review your spending from dashboards, statistics, and calendar views while keeping your financial data on your Umbrel.
