releaseNotes: >-
  This release patches Duplicati 2.3.0.1 with reliability fixes and backend improvements.


  New in 2.3.0.3:
    - Optimized synthetic filelist creation and added extra validation checks for more reliable backups
    - Fixed remote file locking issues and corrected S3 lock mode configuration values
    - Fixed SMB file/folder handling and OneDrive timeout behavior
    - Deprecated the older OneDrive for Business and SharePoint backends in favor of Microsoft Graph
    - Added Duplicati storage backend support and improved restore messages, hidden-file selection, schedules, and backup list loading


  Full release notes can be found at https://github.com/duplicati/duplicati/releases/tag/v2.3.0.3_stable_2026-06-10
