releaseNotes: >-
  This release patches Duplicati 2.3.0.3 with stability, security, and backend fixes.


  New in 2.3.0.4:
    - Improved privacy handling for filtered paths and reported log data
    - Fixed backup crashes caused by metadata errors and a macOS Photos memory leak
    - Added backend authentication timeouts and retry handling for transient HTTP failures
    - Fixed MSSQL default instance handling, S3 lock mode option values, and several remote-source edge cases
    - Improved secret provider loading, licensing flexibility, KDE libsecret support, rclone, and ngclient browser/filter behavior


  Full release notes can be found at https://github.com/duplicati/duplicati/releases/tag/v2.3.0.4_stable_2026-07-09
