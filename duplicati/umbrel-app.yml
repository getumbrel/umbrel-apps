releaseNotes: >-
  This is a major new release for Duplicati 2.3, introducing powerful new features and important improvements.


  Key highlights:
    - Multiple backup destinations now supported in a single job, enabling a full 3-2-1 backup strategy
    - Remote sources now support Box, Dropbox, OneDrive, and Google Drive
    - Remote file locking support for S3, Azure Blob, Backblaze B2, iDrive e2, and Google Cloud Storage
    - New templating engine for customizing backup report emails
    - Soft delete support to rename files instead of deleting them, allowing lifecycle rules to handle cleanup
    - SSH-Agent support for the SSH backend
    - New languages added: Hungarian, Czech, and Polish
    - Now runs on .NET 10 for improved performance
    - Linux AppImage builds now available


  Notable bugfixes:
    - Fixed index file corruption where index files could become incomplete over time
    - Fixed restore flow to reduce temporary space usage
    - Fixed dry-run to strictly not touch data
    - Fixed purge operation size calculation


  Full release notes can be found at https://github.com/duplicati/duplicati/releases
