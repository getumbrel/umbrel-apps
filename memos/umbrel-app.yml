manifestVersion: 1
id: memos
category: files
name: Memos
version: "0.27.1"
tagline: Easily capture and share your great thoughts
description: >-
  A privacy-first, lightweight note-taking service.
  Easily capture and share your great thoughts.

  - Open source and free forever. Embrace a future where creativity knows no boundaries with our open-source solution – free today, tomorrow, and always.

  - Self-hosting with Docker in just seconds. Enjoy the flexibility, scalability, and ease of setup that Docker provides, allowing you to have full control over your data and privacy.

  - Pure text with added Markdown support. Say goodbye to the overwhelming mental burden of rich formatting and embrace a minimalist approach.

  - Customize and share your notes effortlessly. With our intuitive sharing features, you can easily collaborate and distribute your notes with others.

  - RESTful API for third-party services. Embrace the power of integration and unleash new possibilities with our RESTful API support.
releaseNotes: >-
  This release includes new features and bug fixes:
    - Added MCP server with PAT authentication and full tool capabilities
    - Added live refresh via Server-Sent Events (SSE) with a visual indicator
    - Added AI-powered audio transcription (BYOK) with Gemini support
    - Added voice note recording to the memo composer
    - Added memo mention parsing, notifications, and rendering
    - Added Live Photo and Motion Photo support for attachments
    - Added outline navigation to memo detail sidebar
    - Added share links for private memos and image sharing in detail view
    - Added per-user and instance-level tag metadata settings
    - Added notification transport and canonical tag metadata settings
    - Added inline comment preview in list view
    - Extracted title from first H1 heading into memo property
    - Changed default storage type to local filesystem
    - Fixed mixed-case user resource names
    - Fixed access token refresh and cross-tab token sync
    - Fixed archived memo access restricted to creator only
    - Fixed audio attachments rendered as inline players
    - Fixed SVG attachment previews
    - Fixed KaTeX and Mermaid error handling and overflow
    - Fixed memo content iframe and HTML sanitization
    - Fixed chunk load errors after redeployment with auto-reload
    - Fixed draft content preservation when tab is suspended or editor remounts
    - Fixed local attachment uploads overwriting existing files
    - Various UI improvements and bug fixes


  Full release notes are available at https://github.com/usememos/memos/releases
