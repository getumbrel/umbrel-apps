version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: originless_app_1
      APP_PORT: 3232

  app:
    image: ghcr.io/besoeasy/originless:0.1.32@sha256:a63f2b29212ee36fe9416e438fafe25a2d910d1e87ff81ef7708436927d1e808
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 5m
    ports:
      - "4003:4001/tcp"
      - "4003:4001/udp"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      - NODE_ENV=production
      - STORAGE_MAX=${STORAGE_MAX:-20GB}
