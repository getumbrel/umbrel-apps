version: "3.7"

services:
  server:
    image: sunfounder/pironman5:base-1.3.10@sha256:a08b6a04be0feee30276501fb9d6447c06958a60f54634b925bddeb649b0a757
    restart: on-failure
    network_mode: host
    pid: host
    privileged: true
    environment:
      CONFIG_PATH: /data/config.json
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - /:/host:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
