version: "3.7"

services:
  server:
    image: sunfounder/pironman5:base-1.3.11@sha256:116b397b2bd857ba4664b97a43b1ccf8c47f0b9533c067517c88197f0c4589d6
    restart: on-failure
    network_mode: host
    pid: host
    privileged: true
    environment:
      CONFIG_PATH: /data/config.json
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - /:/host:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
