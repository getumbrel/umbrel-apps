version: "3.7"

services:
  server:
    image: sunfounder/pironman5:base-1.3.11@sha256:d41ed29228851443c0873b8c8ac4492db58c14db8161835841812fe8dacfb9b2
    restart: on-failure
    network_mode: host
    pid: host
    privileged: true
    environment:
      CONFIG_PATH: /data/config.json
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - /:/host:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
