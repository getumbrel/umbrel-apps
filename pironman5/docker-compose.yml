version: "3.7"

services:
  server:
    image: sunfounder/pironman5:base-1.3.11@sha256:5bfabe95ba344013e5e79cb473af401be21a298b4552a910da5300341b03f8bb
    restart: on-failure
    network_mode: host
    pid: host
    privileged: true
    environment:
      CONFIG_PATH: /data/config.json
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - /:/host:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
