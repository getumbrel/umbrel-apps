version: "3.7"

services:
  server:
    image: sunfounder/pironman5:base-1.3.11@sha256:5e84053d5a6cc791e30fe60ac6820043a25d57fb5be559f022cf289464518f36
    restart: on-failure
    network_mode: host
    pid: host
    privileged: true
    environment:
      CONFIG_PATH: /data/config.json
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /dev:/dev
      - /lib/modules:/lib/modules:ro
      - /:/host:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
