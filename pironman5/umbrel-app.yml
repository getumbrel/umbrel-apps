manifestVersion: "1"
id: pironman5
category: utilities
name: Pironman 5
version: "1.3.9"
tagline: Premium aluminum case with smart cooling, OLED display & RGB for Raspberry Pi 5
description: >-
  Pironman 5 series are premium aluminum cases for Raspberry Pi 5, featuring
  NVMe SSD expansion, tower cooling with PWM fans, addressable RGB LEDs, and
  a 0.96" OLED display for real-time system monitoring.


  Supports all models: Pironman 5, 5 Mini, 5 Max, and 5 Pro Max.


  Key features:
  - OLED display showing CPU, RAM, temperature, storage, and IP address
  - PWM/GPIO fan control with customizable temperature curves
  - WS2812 addressable RGB LEDs with multiple effects
  - Metal power button with graceful shutdown on Pi 5
  - NVMe SSD storage monitoring
  - Web dashboard accessible on port 34001
  - Optional PiPower5 UPS battery monitoring
  - Real-time data logging with InfluxDB
