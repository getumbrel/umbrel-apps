name: Pironman 5
version: "1.3.11"
tagline: Premium aluminum case with tower cooling, OLED & RGB for Raspberry Pi 5
description: |-
  Premium aluminum case for Raspberry Pi 5 with a tower cooler, dual RGB fans, 0.96" OLED display, addressable RGB LEDs, and NVMe SSD expansion.

  Key features:
  - 0.96" OLED display for real-time CPU, RAM, temperature, and IP monitoring
  - PWM fan control with customizable temperature curves
  - WS2812 addressable RGB LEDs with programmable effects
  - Metal power button with graceful shutdown on Pi 5
  - NVMe SSD storage expansion and monitoring
  - Web dashboard on port 34001
  - Real-time data logging with InfluxDB
