version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: localai_api_1
      APP_PORT: 8080
      PROXY_AUTH_WHITELIST: "/v1/*"
  api:
    image: localai/localai:v4.2.6@sha256:c41d534c4cae8f2e51b99e6dae48a221f2c3d9e0cefd02736283dbce2fc63dcd
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 1m
      timeout: 20m
      retries: 5
    environment:
      - MODELS_PATH=/models
    volumes:
      - ${APP_DATA_DIR}/data/models:/models:cached
      - ${APP_DATA_DIR}/data/backends:/backends:cached
      - ${APP_DATA_DIR}/data/data:/data:cached
      - ${APP_DATA_DIR}/data/configuration:/configuration:cached
      - ${APP_DATA_DIR}/data/images/:/tmp/generated/images/
