manifestVersion: 1
id: localai
category: ai
name: LocalAI
version: "v4.2.6"
tagline: Drop-in OpenAI replacement
description: >-
  LocalAI is the free, Open Source OpenAI alternative. LocalAI act as a drop-in replacement REST API that's compatible with OpenAI API specifications for local inferencing.
  
  
  It allows you to run LLMs, generate images, audio locally with consumer grade hardware, supporting multiple model families and architectures.


  ⚠️ Note

  Before running a model, make sure your device has enough free RAM to support it. Attempting to run a model that exceeds your available memory could cause your device to crash or become unresponsive. Always check the model requirements before downloading or starting it.
releaseNotes: >-
  Runtime-downloaded backends are now persisted across restarts and future updates. If you installed a backend in an older LocalAI version, you may need to reinstall it once after this update.


  This release updates LocalAI with llama.cpp MTP defaults, backend updates, and dependency improvements.


  Key highlights include:
    - Bumped llama-cpp to the MTP-merge SHA and automatically set MTP defaults
    - Updated the ds4, ik_llama.cpp, and stable-diffusion.cpp backend dependencies
    - Includes the improvements from the v4.2.x series, including DeepSeek V4 Flash backend support and improved Ollama-compatible model metadata


  Full release notes can be found at https://github.com/mudler/LocalAI/releases/tag/v4.2.6
backupIgnore:
  - data/models/*
  - data/backends/*
