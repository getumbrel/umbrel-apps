manifestVersion: 1.1
id: localai
category: ai
name: LocalAI
version: "v4.3.3"
tagline: Drop-in OpenAI replacement
description: >-
  LocalAI is the free, Open Source OpenAI alternative. LocalAI act as a drop-in replacement REST API that's compatible with OpenAI API specifications for local inferencing.
  
  
  It allows you to run LLMs, generate images, audio locally with consumer grade hardware, supporting multiple model families and architectures.


  ⚠️ Note

  Before running a model, make sure your device has enough free RAM to support it. Attempting to run a model that exceeds your available memory could cause your device to crash or become unresponsive. Always check the model requirements before downloading or starting it.
releaseNotes: >-
  If you installed a backend in a LocalAI version before backend persistence was added, you may need to reinstall it once after updating.


  This update adds model routing, PII filtering, cloud model proxy support, a "Fits in my GPU" model-install filter, and LTX 2.3 video generation improvements.


  It also fixes Open Responses content handling, Intel VRAM detection, reasoning/tool-streaming edge cases, distributed load persistence/cache sync, and ASR/timestamp handling while updating core inference backends including llama.cpp, whisper.cpp, stable-diffusion.cpp, ik_llama.cpp, and ds4.


  The Umbrel package now preloads the CPU llama.cpp backend so freshly installed models can be used immediately.


  Full release notes can be found at https://github.com/mudler/LocalAI/releases/tag/v4.3.3
backupIgnore:
  - data/models/*
  - data/backends/*
developer: Ettore Di Giacinto
