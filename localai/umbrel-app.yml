manifestVersion: 1.1
id: localai
category: ai
name: LocalAI
version: "v4.3.0"
tagline: Drop-in OpenAI replacement
description: >-
  LocalAI is the free, Open Source OpenAI alternative. LocalAI act as a drop-in replacement REST API that's compatible with OpenAI API specifications for local inferencing.
  
  
  It allows you to run LLMs, generate images, audio locally with consumer grade hardware, supporting multiple model families and architectures.


  ⚠️ Note

  Before running a model, make sure your device has enough free RAM to support it. Attempting to run a model that exceeds your available memory could cause your device to crash or become unresponsive. Always check the model requirements before downloading or starting it.
releaseNotes: >-
  Runtime-downloaded backends are persisted across restarts and future updates. If you installed a backend in an older LocalAI version, you may need to reinstall it once after this update.


  This release improves backend trust, performance defaults, and admin visibility.


  Key highlights include:
    - Backend OCI images now include keyless cosign signatures with opt-in strict verification
    - llama.cpp prompt caching is enabled by default for faster repeated prompts
    - Usage tracking now includes per-API-key and per-user source views
    - Distributed mode includes routing, backend-install progress, and trace UI improvements


  Full release notes can be found at https://github.com/mudler/LocalAI/releases/tag/v4.3.0
backupIgnore:
  - data/models/*
  - data/backends/*
developer: Ettore Di Giacinto
website: https://localai.io/
