version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: gitea-mirror_web_1
      APP_PORT: 4321

  web:
    image: ghcr.io/raylabshq/gitea-mirror:v3.15.4@sha256:b52877da50b2d430301ae6747897770dcafccc1856ad47c7d045379a0e9ba083
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      BETTER_AUTH_SECRET: ${APP_SEED}
      BETTER_AUTH_URL: http://${DEVICE_DOMAIN_NAME}:${APP_GITEA_MIRROR_PORT}
      BETTER_AUTH_TRUSTED_ORIGINS: "*"
      NODE_ENV: production
      DATABASE_URL: file:data/gitea-mirror.db
      HOST: 0.0.0.0
      PORT: "4321"
      PUBLIC_BETTER_AUTH_URL: http://${DEVICE_DOMAIN_NAME}:${APP_GITEA_MIRROR_PORT}
      MIRROR_ISSUE_CONCURRENCY: "3"
      MIRROR_PULL_REQUEST_CONCURRENCY: "5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
