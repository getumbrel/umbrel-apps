releaseNotes: >-
  Gitea Mirror 3.17.1 is a follow-up to the recent 3.17.0 update. If you're updating from a pre-3.17 version and use OAuth provider clients registered in Gitea Mirror, rotate the client secret for each client after upgrading because OAuth application secrets are stored hashed after migration.


  This release fixes a crash loop that could occur after upgrading to 3.17.0 when the SAML provider migration detected columns that already existed but had not been recorded as migrated.


  Affected instances now repair that migration automatically on startup, preserving SAML provider configuration. Fresh installs, clean upgrades, and already-migrated databases are unchanged.


  Full release notes can be found at https://github.com/RayLabsHQ/gitea-mirror/releases/tag/v3.17.1
