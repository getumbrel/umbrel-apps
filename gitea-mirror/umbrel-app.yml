releaseNotes: >-
  Gitea Mirror 3.20.2 fixes release creation on Gitea/Forgejo instances where a mirrored Git tag has not finished syncing yet. The app now waits for the tag to appear and retries on the next sync instead of creating the release from a target branch, avoiding "The target couldn't be found" failures.


  Skipped releases are now reported in the logs, and release assets continue to self-heal on later syncs.


  If you're updating from a pre-3.17 version and use OAuth provider clients registered in Gitea Mirror, rotate the client secret for each client after upgrading because OAuth application secrets are stored hashed after migration.


  Full release notes can be found at https://github.com/RayLabsHQ/gitea-mirror/releases/tag/v3.20.2
