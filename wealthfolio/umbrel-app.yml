releaseNotes: >-
  Wealthfolio 3.6.2 is a correctness release for portfolio returns, tax, split, dividend, and Health Center calculations.


  Holding returns now exclude FX movement, split-adjusted valuations are shared across accounts, and tax/fee activity balances handle more cash activity types correctly.


  MarketData.app dividend-adjusted history no longer double-counts separately booked dividend cash activities. If you use MarketData.app, run a full market-data backfill to correct stored history.


  Add-on sandbox storage/import handling, localization, non-Latin category creation, price precision, symbol search, and market-data API key entry also received fixes.


  Full release notes can be found at https://github.com/wealthfolio/wealthfolio/releases/tag/v3.6.2
