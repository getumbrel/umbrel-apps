releaseNotes: >-
  Wealthfolio 3.6.1 improves add-on sandbox loading, theme handling, and the add-on sidebar icon set.


  Provider quotes are now prioritized over broker fallbacks for more accurate pricing, and stale-price Health Center warnings have been relaxed to reduce false alerts.


  Health Center issues now use localized titles and messages, and MCP asset classification updates received a new write scope with safer audit redaction.


  Full release notes can be found at https://github.com/wealthfolio/wealthfolio/releases/tag/v3.6.1
