releaseNotes: >-
  Wealthfolio now supports English, French, German, Spanish, and Simplified Chinese, with language selection during onboarding and in Settings.


  AI Agent Access adds a Model Context Protocol server with scoped personal access tokens and audited portfolio tools.


  Self-hosters can optionally enable OIDC single sign-on, and portfolio tracking now supports short positions, activity-level taxes, reimbursements, split transactions, and improved rebalancing.


  The Health Center, add-on navigation, holdings, performance, activity forms, broker sync, import handling, quote-unit currencies, charts, and mobile views received improvements and fixes.


  Full release notes can be found at https://github.com/wealthfolio/wealthfolio/releases/tag/v3.6.0
