releaseNotes: >-
  This release adds an Activities tab to account detail pages, with inline editing, deletion, pagination, and an account-filtered Explore activities link.


  Holdings data export is now available from Settings > Exports.


  Allocation and rebalancing views now support hybrid drift bands and fixed-income classification for cash accounts.


  Dashboard, net worth, holdings history, performance, FX, CSV import, custom provider, spending, budget, and mobile workflows received multiple fixes and speed improvements.
