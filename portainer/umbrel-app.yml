releaseNotes: >-
  Portainer 2.39.5 LTS includes reliability fixes for Docker and Edge environments, plus security dependency updates. This package keeps the Docker runtime rollback from 2.39.4-1 that fixes a networking issue affecting other Umbrel apps.


  Highlights include:
    - Fixed Git stack deployments that use relative env_file paths from repository subdirectories
    - Improved Edge tunnel reliability on high-latency connections
    - Fixed team visibility in access control selectors and Swarm image deletion across nodes
    - Prevented long Docker stack deployments from staying stuck in "Deploying" after timeout
    - Updated Alpine and containerd dependencies to address CVEs


  Full release notes can be found at https://github.com/portainer/portainer/releases/tag/2.39.5.
