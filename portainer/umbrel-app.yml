releaseNotes: >-
  This release keeps Portainer at version 2.39.4 but reverts the bundled Docker runtime to a known-good version after the previous update caused containers to fail to start on some setups.


  Release notes for version 2.39.4 remain the same. Portainer 2.39.4 LTS includes security fixes, stack management fixes, and reliability improvements.


  Highlights include:
    - Fixed an issue where users without environment access could enumerate Kubernetes resources
    - Fixed restore behavior that could allow admin takeover of uninitialized Portainer instances
    - Fixed stack redeploy and registry image deletion permissions for standard users
    - Fixed an Amazon ECR token pre-validation warning and a blank volume-label dropdown
    - Updated Go and go-git dependencies to resolve multiple CVEs


  Full release notes can be found at https://github.com/portainer/portainer/releases/tag/2.39.4.
