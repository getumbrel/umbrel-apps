manifestVersion: 1
id: foldergram
name: Foldergram
tagline: A private Instagram-style feed for your memories
category: files
version: "1.2.2"
port: 4141
description: >-
  Foldergram turns a collection of photos and videos into a clean, modern media gallery. It scans folders, organizes the discovered media, and presents everything in a visual interface designed for browsing, rediscovering, and managing personal image and video collections.


  The app creates album views from folder structures and makes it easy to move through large libraries without manually sorting every file. Photos and videos can be viewed in a timeline style feed, opened individually, explored through recent and random views, or revisited through rediscovery features that bring older memories back into focus.


  Foldergram supports browsing media by albums, collections, places, and library sections. It generates previews and thumbnails so that galleries feel fast and visually organized, even when the media library contains many files. Videos can be watched directly in the interface, while photo collections can be explored in a smooth, gallery focused layout.


  The app also includes tools for organizing and maintaining a media library. Items can be moved to trash, collections can be used to group selected media, and the library view helps keep photos and videos accessible without changing the original folder based structure. Foldergram is designed to make existing media folders feel like a polished personal photo app, with a focus on simple browsing, visual discovery, and easy navigation through personal memories.
