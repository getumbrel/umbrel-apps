version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bitbalance_app_1
      APP_PORT: 3710

  app:
    image: ghcr.io/egzola/bitbalance:1.0.16
    restart: on-failure
    stop_grace_period: 1m

    environment:
      PORT: 3710
      ELECTRUM_HOST: $APP_ELECTRS_NODE_IP
      ELECTRUM_PORT: $APP_ELECTRS_NODE_PORT

    volumes:
      - ${APP_DATA_DIR}/data:/data

    networks:
      - umbrel_main_network

networks:
  umbrel_main_network:
    external: true
