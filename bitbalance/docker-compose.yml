services:

  app:
    container_name: bitbalance
    build: .
    restart: on-failure

    ports:
      - "3710:3710"

    environment:
      - PORT=3710
      - ELECTRUM_HOST=electrs
      - ELECTRUM_PORT=50001

    volumes:
      - ${APP_DATA_DIR}/data:/app/data

    networks:
      - umbrel_main_network

networks:
  umbrel_main_network:
    external: true
