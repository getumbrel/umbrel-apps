version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: spacebot_server_1
      APP_PORT: 19898

  server:
    image: ghcr.io/spacedriveapp/spacebot:v0.5.0@sha256:ccd9411f72def62b192e44aed23446b94e6e4774d55d7100a94de1531029f6ed
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      - TZ=${TZ:-UTC}
