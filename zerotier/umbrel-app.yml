manifestVersion: 1
id: zerotier
category: networking
name: ZeroTier
version: "1.14.2"
tagline: Peer-to-peer mesh VPN to connect your Umbrel to your networks
description: >-
  ZeroTier is an open-source, peer-to-peer mesh VPN that joins your Umbrel
  to your private ZeroTier networks. Devices on the same network can reach
  each other directly with end-to-end encryption, even across NATs and
  firewalls, as if they were on the same LAN.


  After installing, open the app to see your node ID, then join any
  ZeroTier network by pasting its 16-character network ID. Authorise your
  Umbrel from my.zerotier.com (or your self-hosted controller) and you're
  on the network.


  ZeroTier uses an elegant peer-to-peer protocol with strong cryptography
  and works on every platform, so you can reach your Umbrel from your
  laptop, phone, or another server, anywhere in the world.
developer: ZeroTier, Inc.
