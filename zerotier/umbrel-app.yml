manifestVersion: 1
id: zerotier
category: networking
name: ZeroTier
version: "1.14.2"
tagline: Access your Umbrel from anywhere with a peer-to-peer mesh VPN
description: >-
  ZeroTier is an open-source, peer-to-peer mesh VPN that connects your Umbrel
  to your private ZeroTier networks. Once connected, you can access your
  Umbrel dashboard and apps from other authorized devices using your Umbrel's
  ZeroTier IP address.


  After installing, open the app to see your node ID, then join any
  ZeroTier network by pasting its 16-character network ID. Authorize your
  Umbrel from ZeroTier Central (or your self-hosted controller), and you're
  on the network.


  ZeroTier works across NATs and firewalls, using end-to-end encryption so
  your devices can communicate securely as if they were on the same LAN.
developer: ZeroTier, Inc.
