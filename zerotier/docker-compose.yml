version: "3.7"

services:
  app_proxy:
    environment:
      # web shares zerotier's network namespace, so reach it via the zerotier container
      APP_HOST: zerotier_zerotier_1
      APP_PORT: 8080

  zerotier:
    # Requires root: NET_ADMIN cap and /dev/net/tun device access for VPN tunnel management.
    image: zerotier/zerotier:1.14.2@sha256:575d150a0e09fbee1a7580625b361040a7f78f46cbfbe5016effe812abe202ff
    restart: on-failure
    stop_grace_period: 1m
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    # 9993/udp is ZeroTier's P2P protocol port. Without it the node falls back
    # to relay-only mode (higher latency, no direct peer connections).
    ports:
      - "9993:9993/udp"
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/zerotier-one

  web:
    # Built from github.com/andrijdavid/umbrel-zerotier-web (FastAPI + uvicorn).
    # Entrypoint reads authtoken.secret as root then drops to PUID:PGID via su-exec.
    image: ghcr.io/andrijdavid/umbrel-zerotier-web:0.1.0@sha256:8ffbc680f777f758429afa3becc9b59b26d646756132c0e2c20ce8a06961ea98
    restart: on-failure
    # Share zerotier's net namespace so the daemon's 127.0.0.1:9993 control plane is reachable.
    network_mode: "service:zerotier"
    depends_on:
      - zerotier
    environment:
      ZT_HOST: "127.0.0.1"
      ZT_PORT: "9993"
      ZT_AUTHTOKEN_PATH: /zerotier-data/authtoken.secret
      PUID: "1000"
      PGID: "1000"
    volumes:
      - ${APP_DATA_DIR}/data:/zerotier-data:ro
