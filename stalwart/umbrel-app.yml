releaseNotes: >-
  ⚠️ If updating from Stalwart v0.15.x or earlier, make sure to have a backup before updating. Umbrel runs the v0.16 migration automatically, but it's recommended to review the upgrading guide: https://github.com/stalwartlabs/stalwart/blob/main/UPGRADING/v0_16.md


  Changes since v0.16.10 include:
    - Adds encryption-at-rest support for AES-256-GCM and ChaCha20-Poly1305 S/MIME data
    - Adds Redis Sentinel support for in-memory store and cluster coordinator backends
    - Adds an option to allow S3 endpoints with invalid TLS certificates
    - Fixes DANE TLSA validation, file-backed certificate index updates, JMAP Principal/query filters, and duplicate webhook event IDs


  Full release notes can be found at https://github.com/stalwartlabs/stalwart/releases/tag/v0.16.11
dependencies: []
path: "/admin"
deterministicPassword: true
defaultUsername: admin
