releaseNotes: >-
  ⚠️ This version includes multiple breaking changes. If you are upgrading from v0.15.x and below, make sure to read the upgrading guide before updating: https://github.com/stalwartlabs/stalwart/blob/main/UPGRADING/v0_16.md


  Key highlights in this release:
    - Completely rewritten Web UI and CLI using the JMAP management API with a refreshed design
    - Automatic DNS management for MX, TXT, CNAME, SRV, CAA, and TLSA records
    - Automatic DKIM key generation, rotation, and DNS management
    - New security features: password strength enforcement, password expiration policies, app passwords with limited access, and API keys
    - Auto-ban improvements including expiration after a configurable time period
    - New ACME/TLS features: renew certificates on demand, DNS-PERSIST-01 challenge support, and CAA record support
    - OIDC/OAuth enhancements including PKCE support, groups support, and audience claim validation
    - Domain aliases and per-domain directory backends
    - Automatic email, calendar, and contact server settings discovery
    - Outbound MTA clustering role support


  Full release notes can be found at https://github.com/stalwartlabs/stalwart/releases
dependencies: []
path: ""
deterministicPassword: true
defaultUsername: admin
