releaseNotes: >-
  ⚠️ If updating from Stalwart v0.15.x or earlier, make sure to have a backup before updating. Umbrel runs the v0.16 migration automatically, but it's recommended to review the upgrading guide: https://github.com/stalwartlabs/stalwart/blob/main/UPGRADING/v0_16.md


  Changes since v0.16.13 include:
    - Adds VAPID support for JMAP Web Push
    - Fixes IMAP object quota enforcement and pipelined STORE/EXPUNGE ordering
    - Fixes JMAP Web Push payloads, subscription verification, Email import notifications, and calendar event state handling
    - Fixes CalDAV calendar-query responses, DMARC checks, MTA rate limiter variables, calendar recurrence expansion, uppercase MAILTO addresses, and shared calendar scheduling
    - Fixes recovery-mode HTTP endpoint handling and telemetry task storage


  Full release notes can be found at https://github.com/stalwartlabs/stalwart/releases/tag/v0.16.14
dependencies: []
path: "/admin"
deterministicPassword: true
defaultUsername: admin
