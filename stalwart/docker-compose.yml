version: "3.9"

services:
  app_proxy:
    environment:
      APP_HOST: stalwart_server_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: stalwartlabs/stalwart:v0.16.8@sha256:154dc1f2895ba8d319817fb37c3c26bac3f3e36e2eb338edcf789a79717a5d49
    user: "1000:1000"
    environment:
      - STALWART_RECOVERY_ADMIN=admin:${APP_PASSWORD}
      - STALWART_PUBLIC_URL=http://${DEVICE_DOMAIN_NAME}:8745
    ports:
      - 10443:443  # HTTPS
      - 10025:25   # SMTP
      - 10465:465  # SMTPS
      - 10587:587  # SMTP Submission
      - 10143:143  # IMAP
      - 10993:993  # IMAPS
      - 14190:4190 # Sieve
      - 10110:110  # POP3
      - 10995:995  # POP3S
    volumes:
      - ${APP_DATA_DIR}/data/etc:/etc/stalwart
      - ${APP_DATA_DIR}/data/server:/var/lib/stalwart
    restart: on-failure
