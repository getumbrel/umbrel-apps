manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "2.5.0"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow 2.5.0 improves sync reliability for large and multi-account setups,
  including more robust IMAP delta sync, paced startup connections, and faster
  read/star synchronization on large mailboxes.


  Microsoft personal Outlook.com/Hotmail device-code accounts now keep syncing
  past token refreshes, Gmail archiving falls back to All Mail when needed, and
  CardDAV contacts handle larger address books and field formatting more reliably.


  This update also improves live cross-device updates, message opening speed,
  folder/search behavior, archive flow, inline images in sent messages, message
  previews, snoozed-message restores, keyboard-shortcut handling, and High
  Contrast theme readability.
