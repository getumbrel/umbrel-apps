manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "1.7.0"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow now lets admins run inbox rules on existing messages, adds arrow-key
  message navigation, remembers compose window size, auto-saves closed compose
  windows to Drafts, and warns about empty subjects or missing attachments before
  sending.


  Fixes improve IMAP sync, draft deletion, message bold/read state, and inbox
  rule processing on large mailboxes.


  Security update: nodemailer, ws, express, and qs were upgraded to resolve
  several high and moderate CVEs.
