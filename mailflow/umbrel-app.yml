manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "1.9.2"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow now includes two-factor authentication options, Todoist integration,
  composer font groups, email priority settings, and an improved mobile compose
  experience.


  This update also improves mobile message handling, fixes Todoist task creation
  and links, and adds automatic database migrations for integrations and 2FA
  device trust.
