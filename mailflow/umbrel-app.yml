manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "2.6.0"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow 2.6.0 adds an optional server-enforced screen lock with PIN and
  auto-lock support, plus drag-and-drop reordering for filter rules.


  This release also adds an opt-in GTD workflow backed by real IMAP folders,
  local/self-hosted fonts, new-release notifications, and clearer collapsed
  sidebar labels.


  It also fixes compose tab navigation, AI Assistant settings layout, sidebar
  collapse styling, and read/star sync consistency across devices.
