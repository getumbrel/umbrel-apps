manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "2.3.1"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow 2.3.1 improves mail delivery reliability by recovering stale IMAP
  connections more quickly, handling large uncached mailboxes more conservatively,
  and retrying read/unread or starred changes until the mail server confirms
  them.


  This release also adds duplicate-send protection, reports when sent messages
  cannot be saved to the Sent folder, fixes search pagination/deleted-message
  behavior, improves reply recipient formatting, and fixes mobile swipe-to-
  archive causing browser reloads.
