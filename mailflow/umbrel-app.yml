manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "2.7.0"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow 2.7.0 adds folder-structure sync, including configurable sync
  frequency, manual sync actions, and per-account sync controls.


  This release also adds optional sender avatars and Markdown rendering for AI
  operation results, with rich-text or source-copy options.


  It improves message preview cleanup, search stability, drafts on unstable
  connections, provider backoff, snoozed reply chains, archived message sync,
  durable message deep links, and GTD sidebar interactions.


  No manual upgrade steps are required.
