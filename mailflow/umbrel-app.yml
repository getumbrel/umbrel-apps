manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "2.1.0"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow 2.1 is a follow-up to the recent 2.0 major update. If you're
  updating from MailFlow 1.x, 2.0 added email categorization inbox tabs,
  newsletter unsubscribe actions, a beta AI assistant for OpenAI-compatible
  providers, spam feedback, password recovery, rich-text compose improvements,
  and auth/security hardening.


  This release adds OIDC group-claim admin role mapping, custom CSS in
  Appearance settings, configurable mark-as-read behavior, and sender avatars
  from CardDAV-synced contact photos. It also fixes the missing desktop
  bulk-select button, improves inbox refresh behavior after deleting messages,
  and shows a clearer hint when an AI provider base URL points to a private IP.
