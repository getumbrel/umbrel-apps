manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "2.2.1"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow 2.2 adds smarter message search, including folder-scoped search by
  default, an in:all operator for searching across every folder, negative search
  terms, and a device-level Search all folders preference.


  This release also adds a resizable message list, a folder search box in the
  move-message dialog, and mobile compose improvements for AI options. It fixes
  a blank-screen issue for users with removed layout presets, move-picker title
  display, mobile swipe-back handling, and an email rendering scroll issue.
