manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "1.6.0"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  No action is required for existing standard mail accounts.


  MailFlow now gives admins controls for self-hosted mail setups. In Settings >
  Security, admins can choose whether to allow private/local mail server
  addresses, self-signed certificates, and non-standard IMAP/SMTP ports.


  This update also adds drag-to-folder, a movable and resizable compose window,
  folder results in search, a lock screen, advanced inbox rules, and improved
  move-to-folder controls.


  Fixes improve inbox rules, moving multiple messages, SSL/STARTTLS on port 465,
  compose window dragging, lock-screen state, external links, and other mail and
  folder behavior.


  Security update: Vite was upgraded to resolve two high-severity CVEs.
