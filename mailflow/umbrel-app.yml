manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "1.7.3"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow now includes a highlight color picker in the compose toolbar, shows
  sent replies inline in conversation threads without refreshing, and improves
  recipient autocomplete by learning contacts you email.


  This update also improves the mobile compose and message-header layouts, and
  fixes nesting for INBOX subfolders in the sidebar.
developer: maathimself
