manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "2.3.0"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.


  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  MailFlow 2.3 adds custom AI actions, persistent AI results per device,
  CardDAV contact sync, editable compose recipients, and a read/unread condition
  for inbox rules.


  This release also improves the login theme, SSO email-verification handling,
  layout preset safety, and includes security and reliability hardening for
  outbound fetches, rate limiting, sessions, CardDAV, Microsoft OAuth, inbox
  rules, and email HTML sanitization.
