manifestVersion: 1
id: mailflow
category: networking
name: MailFlow
version: "1.4.0"
tagline: Unified self-hosted webmail client
description: >-
  MailFlow is a self-hosted unified webmail client. Connect multiple IMAP/SMTP
  accounts such as Gmail, iCloud, Outlook, or custom mail servers and read them
  in one web interface.

  It includes a unified inbox, search, compose/reply/forward, folder navigation,
  multiple themes, user management, SSO/OIDC support, and Microsoft 365 OAuth2
  support.
releaseNotes: >-
  New features:
    - Resizable sidebar with width synced across devices
    - Configurable default reply action (Reply vs Reply All) in Settings

  Fixes:
    - Compose From field now defaults to the selected account
    - Favorites context menu fixed on mobile and desktop
    - Mobile toolbar no longer cuts off icons at narrow viewports
    - Swipe gesture vertical drift reduced
    - Preference sync corrected for server-side persistence
