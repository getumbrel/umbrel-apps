<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B72EA"/>
      <stop offset="100%" stop-color="#5538C8"/>
    </linearGradient>
    <clipPath id="env-clip">
      <rect x="32" y="68" width="192" height="122" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="54" fill="url(#bg)"/>

  <!-- Envelope body -->
  <rect x="32" y="68" width="192" height="122" rx="7" fill="white"/>

  <!-- Bottom-left fold shadow -->
  <line x1="32" y1="190" x2="104" y2="148" stroke="#C2BCEE" stroke-width="3" stroke-linecap="round" clip-path="url(#env-clip)"/>
  <!-- Bottom-right fold shadow -->
  <line x1="224" y1="190" x2="152" y2="148" stroke="#C2BCEE" stroke-width="3" stroke-linecap="round" clip-path="url(#env-clip)"/>

  <!-- Top flap (light fill to show the fold) -->
  <path d="M32 68 L128 140 L224 68 Z" fill="#E8E4F8" clip-path="url(#env-clip)"/>

  <!-- Flap fold left shadow -->
  <line x1="32" y1="68" x2="128" y2="140" stroke="#C2BCEE" stroke-width="3" stroke-linecap="round" clip-path="url(#env-clip)"/>
  <!-- Flap fold right shadow -->
  <line x1="224" y1="68" x2="128" y2="140" stroke="#C2BCEE" stroke-width="3" stroke-linecap="round" clip-path="url(#env-clip)"/>
</svg>
