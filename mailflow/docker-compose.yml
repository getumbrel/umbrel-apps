version: '3.7'
services:
  app_proxy:
    environment:
      APP_HOST: mailflow_frontend_1
      APP_PORT: 80

  frontend:
    image: ghcr.io/maathimself/mailflow-frontend:1.4.0@sha256:a143fa899a211ba2fe7fc6664d4e1b19b26b68f238319a773950934c369ac065
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ${APP_DATA_DIR}/data/certs:/etc/nginx/ssl
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    image: ghcr.io/maathimself/mailflow-backend:1.4.0@sha256:29ddfe5c1511543820581498fd1696a0e052b8d1e186c8322b54d875cfcbb56b
    restart: on-failure
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: "http://${DEVICE_DOMAIN_NAME}:3395"
      FRONTEND_URL: "http://${DEVICE_DOMAIN_NAME}:3395"
      SESSION_SECRET: "${APP_SEED}"
      ENCRYPTION_KEY: "${APP_SEED}"
      DB_HOST: mailflow_postgres_1
      DB_NAME: mailflow
      DB_USER: mailflow
      DB_PASSWORD: mailflow
      REDIS_URL: redis://mailflow_redis_1:6379
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      VAPID_PUBLIC_KEY: ""
      VAPID_PRIVATE_KEY: ""
      VAPID_SUBJECT: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    user: "1000:1000"
    restart: on-failure
    environment:
      POSTGRES_DB: mailflow
      POSTGRES_USER: mailflow
      POSTGRES_PASSWORD: mailflow
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailflow -d mailflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    user: "1000:1000"
    restart: on-failure
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
