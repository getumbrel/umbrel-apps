manifestVersion: 1.1
id: elements
category: bitcoin
name: Elements Core
version: "23.3.3"
tagline: Liquid Network full node
description: >-
  Elements is an open source full node implementation to run the Liquid
  Network, a Bitcoin layer-2 solution enabling the fast, confidential settlement and
  issuance of digital assets, such as stablecoins, security tokens, and other financial
  instruments, on top of the Bitcoin timechain.


  This app has the potential to use up to 6GB of RAM. It's important to confirm that your device meets the necessary hardware requirements before installing and running the app.
releaseNotes: >-
  This release updates Elements Core from version 23.3.0 to 23.3.3. It includes Liquid node and wallet fixes, optional peg-in subsidy/minimum peg-in support, asset issuance improvements, QR URI fixes, Simplicity updates, and peer/logging hardening.


  Note: the tweakfedpegscript RPC now returns both p2wsh and p2shwsh addresses.


  Full release notes can be found at https://github.com/ElementsProject/elements/releases/tag/elements-23.3.3
