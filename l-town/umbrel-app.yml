description: >-
  L-Town is an open source multiplayer first-person shooter that runs entirely in the browser — no download or account required. Just open a URL and play.


  Built with Node.js, WebSockets, and Three.js, L-Town supports up to 300 players per server on a procedurally generated 750×750 arena that regenerates each match. Matches last 10 minutes and the top 3 players win.


  Choose from 11 unique playable characters:

  - ⚡ Telepotu — Swap positions with a random enemy (60s cooldown)

  - 👻 Chumantr — Go invisible for 10s, can't shoot (30s cooldown)

  - 🔥 Denja — Passive: 2× speed, max 75% HP

  - 💊 Mednix — Restore 1–50 HP (20s cooldown)

  - 🛡 Tank — Passive: 2× HP, half speed

  - ⚓ Anchor — Passive: SUPER and SHIELD cost 50% less HP

  - 🌀 Surge — Drain 30 HP from the nearest enemy within 40 units (25s cooldown)

  - 💀 Jinx — Passive: Death Curse — killer loses 80 HP when you die

  - 🎲 Gambler — Roll the dice: +200 HP, land on enemy, or instant death (45s cooldown)

  - 🧫 Parasite — Passive: Drain 3 HP/s from every enemy within 15 units

  - 🔴 Berserker — Passive: Speed and damage scale up to 2.5× as HP drops


  Controls: WASD to move, Mouse to aim, Left Click to shoot, Q for ability, R for shield, E for super, Space for super jump, C to crouch, F for scoreboard.


  Perfect for LAN parties — just share your Umbrel URL with anyone on the same network and start playing instantly.
