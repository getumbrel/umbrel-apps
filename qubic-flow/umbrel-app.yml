manifestVersion: 1
id: qubic-flow
name: QubicFlow
tagline: Self-hosted Qubic wallet tracker and tax reporting tool
icon: https://raw.githubusercontent.com/AndyQus/qubicflow-umbrel-store/main/qfstore-qubicflow/icon.svg
category: finance
version: "0.1.7"
port: 8080

description: >-
  QubicFlow is a self-hosted wallet tracker and tax reporting tool for the Qubic
  blockchain network. Run it entirely on your Umbrel — no accounts, no cloud,
  no third-party access to your financial data.


  LIVE DASHBOARD

  Monitor all your Qubic wallets in one place. See incoming and outgoing events
  by hour, day, epoch, month and year. Transactions appear in real time as new
  ticks are confirmed on the network.


  MULTI-WALLET SUPPORT

  Add unlimited wallets and label them as Private or Business. Organise by owner
  and function, and filter any view to a specific wallet or group.


  TAX REPORTING ENGINE

  Generate accurate tax reports for 14 countries including Germany, Austria,
  Switzerland, USA, UK, Australia and more. Choose your cost-basis method —
  FIFO, LIFO, HIFO or AVCO — and let QubicFlow calculate taxable gains,
  tax-free gains, and income automatically. Holding-period exemptions (such as
  the German 1-year rule) are applied automatically.


  EXPORT FORMATS

  Export your transaction history as CoinTracking CSV or tax advisor CSV, or
  generate a PDF tax report directly on your device.


  PRIVACY BY DESIGN

  All data stays on your Umbrel. Wallet addresses are masked in the UI by
  default. No telemetry, no external accounts required.

