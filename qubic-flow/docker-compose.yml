version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: qubic-flow_frontend_1
      APP_PORT: 80

  backend:
    image: andyqus/qubicflow-backend:0.1.7@sha256:f0b1e801a74d97fdadf8eed814af9143f746531748c093ae16d6a82f42a73190
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: andyqus/qubicflow-frontend:0.1.7@sha256:7a403923c202a4aee9f6b39ce2e5d35bce09b1d47a0ab9c4def46fd1295f0d1a
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - backend
