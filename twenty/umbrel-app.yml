releaseNotes: >-
  ⚠️ Major update: Twenty now encrypts connected-account settings and changes permission flags. If you use external email or calendar integrations, check them after updating.


  This release includes CRM, workflow, admin, and security improvements:
    - Added Fireflies and Slack workflow integrations, AI Chat navigation, and partner app/directory improvements
    - Added custom index management in Settings and text field widget editor mode
    - Improved app installation, file-storage behavior, API key refresh, onboarding, workflow filters, and IMAP/SMTP message handling
    - Added security and encryption updates for connected account secrets, signing keys, and dependencies
    - Fixed 2.8 upgrade issues, restored channel association metadata, improved index cache computation, and addressed other patch-release bugs


  Full changelog can be found at https://github.com/twentyhq/twenty/compare/v2.6.0...v2.8.3
dependencies: []
