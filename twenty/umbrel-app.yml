releaseNotes: >-
  This big release introduces improvements across AI, record page layouts, apps infrastructure, workflows, and security:
    - AI chat enhancements including file attachment support, message compaction, web search via Exa, and improved streaming with resumable support
    - Record page layout improvements including fields widget draft view, tab widget frontend, reset to default, and deactivated field hiding
    - Pre-installed apps infrastructure and improved app management with SDK config as single source of truth
    - Workflow improvements including cron efficiency, credit cap enforcement, and AI workflow tool fixes
    - Send email from UI with inline reply composer and email attachment support
    - Admin panel enhancements including billing tab, workspace detail page, and chat viewer
    - Security fixes including stored XSS prevention via unsafe URL protocols, socket.io binary attachment limit, and various dependency vulnerability fixes
    - Performance improvements including faster deep-equal comparisons and optimized database queries
    - Various bug fixes for navigation, board view, permissions, and UI rendering


  umbrelOS specific:
    - Possibility to access the app via multiple hostnames


  Full release notes can be found at https://github.com/twentyhq/twenty/releases/
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
