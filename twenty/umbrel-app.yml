releaseNotes: >-
  This update improves self-hosted upgrade reliability, onboarding, and CRM/workflow behavior.


  - Improves workspace activation/onboarding cleanup and makes marketplace app registration more reliable

  - Adds data-model hints for mostly-empty fields and new dashboard widget layouts for Kanban, calendar, and grouped table views

  - Fixes Microsoft Graph 401 handling, token-renewal sign-outs, API-key creation permissions, multi-select filters, workflow backfills, and workspace metadata cache refreshes

  - Updates the bundled curl package to address upstream CVEs

  Full release notes can be found at https://github.com/twentyhq/twenty/releases/tag/twenty/v2.23.2
