version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bitboard_app_1
      APP_PORT: 3711

  app:
    image: ghcr.io/egzola/bitboard:1.0.0@sha256:b79372523fd1a3e37c8161ab51490f94b637783993907f79b38f40ef53691f9c
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PORT: 3711
    volumes:
      - ${APP_DATA_DIR}/data:/data