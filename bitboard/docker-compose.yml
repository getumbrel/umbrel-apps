version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bitboard_app_1
      APP_PORT: 3711

  app:
    image: ghcr.io/egzola/bitboard:1.0.0@sha256:6a76ef4857f33384a7fe233c59202b7e7a92c811395da4abba7c7e71a6152358
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PORT: 3711
    volumes:
      - ${APP_DATA_DIR}/data:/data
