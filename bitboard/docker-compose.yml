version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bitboard_app_1
      APP_PORT: 3711

  app:
    image: ghcr.io/egzola/bitboard:1.0.0@sha256:810d296d9d4adb7757843bcfb6a21f115c2bd5bc54eebddc4a2b96b55bb6b326
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PORT: 3711
    volumes:
      - ${APP_DATA_DIR}/data:/data
