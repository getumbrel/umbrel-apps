manifestVersion: 1
id: mempool
category: bitcoin
name: mempool
version: "3.3.1"
tagline: Be your own explorer
description: >-
  Run your own instance of The Mempool Open Source Project and trust no one.

  
  Use your own node to beautifully visualize data about the Bitcoin network, transactions, blockchain, mempool, and more.


  This product includes GeoLite2 data created by MaxMind, available from https://www.maxmind.com
releaseNotes: >-
  This release upgrades mempool from 3.2.1 to 3.3.1, including the 3.3.0 feature release.


  Highlights:
    - Preview coinbase transactions from Stratum jobs
    - Taproot script tree visualization
    - Sighash icons & highlighting
    - Stale block comparisons & visualizations
    - Annex goggles support & labeling
    - Sub-1-Sat/vB support
    - Ephemeral dust support
    - Display signatures in PSBT previews
    - Simplicity support (Liquid)
    - /api/tx/:txId/merkle-proof API endpoint for non-esplora backends
    - Angular 16 -> 20 upgrade
    - Decimal fee recommendations
    - Taproot witness annotations
    - Miscellaneous bugfixes and improvements
    - Regtest support

  Full release notes are found at https://github.com/mempool/mempool/releases
developer: Mempool Holdings S.A. de C.V.
website: https://mempool.space/about
dependencies:
  - bitcoin
  - electrs
repo: https://github.com/mempool/mempool
support: https://mempool.space/sponsor
port: 3006
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
  - 4.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "5s"
    endpoint: "widget-server:3000/widgets/fees"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "No priority"
          text: "2"
          subtext: "sat/vB"
        - title: "Low priority"
          text: "6"
          subtext: "sat/vB"
        - title: "Medium priority"
          text: "18"
          subtext: "sat/vB"
        - title: "High priority"
          text: "27"
          subtext: "sat/vB"
submitter: Mempool Holdings S.A. de C.V.
submission: https://github.com/getumbrel/umbrel/pull/470
