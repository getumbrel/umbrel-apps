name: Moltis
version: "20260430.01"
tagline: Personal AI gateway — one binary, multiple LLM providers
description: >-
  Moltis is a secure personal agent server written in Rust. It connects to
  multiple LLM providers (OpenAI, Anthropic, Google, Ollama, and more) through
  a single self-hosted gateway. Your API keys never leave your machine.


  Features include a web chat UI with voice input/output, persistent memory,
  cross-session recall, MCP server support, browser automation, sandboxed
  command execution, and messaging channels (Telegram, Signal, Discord, SSH).


  Runs on a Raspberry Pi, a Mac Mini, or any server you own. One Rust binary,
  no Node.js, no npm, no runtime dependencies.


  To connect Moltis to Ollama running on your Umbrel, set the Ollama base URL
  in Moltis settings to http://ollama_ollama_1:11434.
