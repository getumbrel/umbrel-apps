      MONGO_INITDB_DATABASE: "appwrite"
      MONGO_INITDB_USERNAME: "appwrite"
      MONGO_INITDB_PASSWORD: "appwrite-user-MongoDB-F4h8Mq2Xt9La"
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        KEYFILE_PATH="/data/keyfile/mongo-keyfile"
        INIT_FLAG="/data/db/.mongodb_initialized"
        if [ ! -f "$$KEYFILE_PATH" ]; then
          mkdir -p /data/keyfile
          openssl rand -base64 756 > "$$KEYFILE_PATH"
        fi
        chmod 400 "$$KEYFILE_PATH"
        chown mongodb:mongodb "$$KEYFILE_PATH" 2>/dev/null || chown 999:999 "$$KEYFILE_PATH"
        if [ ! -f "$$INIT_FLAG" ]; then
          mongod --replSet rs0 --bind_ip_all --fork --logpath /var/log/mongodb/mongod.log --dbpath /data/db
          sleep 5
          mongosh --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]})"
          sleep 5
          mongosh admin --eval "db.createUser({user: '$$MONGO_INITDB_ROOT_USERNAME', pwd: '$$MONGO_INITDB_ROOT_PASSWORD', roles: ['root']})"
          mongosh admin --eval "db.createUser({user: '$$MONGO_INITDB_USERNAME', pwd: '$$MONGO_INITDB_PASSWORD', roles: [{role: 'readWrite', db: '$$MONGO_INITDB_DATABASE'}]})"
          mongod --dbpath /data/db --shutdown
          touch "$$INIT_FLAG"
        fi
        exec mongod --replSet rs0 --bind_ip_all --auth --keyFile "$$KEYFILE_PATH"
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u root -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --quiet --eval \"rs.status().ok\" | grep -q 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7.4.7-alpine@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    <<: *logging
    restart: on-failure
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 5
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data:rw
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

