services:
  app_proxy:
    environment:
      APP_HOST: appwrite_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  docker:
    image: docker:27.2.0-dind@sha256:f9f72ad901a78f27be922b2d320bbc263174f12919c1b37e6a01f828fa904565
    privileged: true
    network_mode: host
    stop_grace_period: 1m
    restart: on-failure
    environment:
      DOCKER_ENSURE_BRIDGE: "appwrite-dind0:10.33.0.1/16"
    entrypoint: /entrypoint.sh
    command: >
      dockerd
      --bridge appwrite-dind0
      --data-root /data/data
      --exec-root /data/exec
      --host unix:///data/docker.sock
      --pidfile /data/docker.pid
    volumes:
      - ${APP_DATA_DIR}/entrypoint.sh:/entrypoint.sh
      - ${APP_DATA_DIR}/data/docker:/data
      - ${APP_DATA_DIR}/data/builds:/storage/builds:rw
      - ${APP_DATA_DIR}/data/functions:/storage/functions:rw
      - ${APP_DATA_DIR}/data/sites:/storage/sites:rw
      - ${APP_DATA_DIR}/data/tmp:/tmp:rw

  web:
    image: nginx:alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    <<: *logging
    restart: on-failure
    depends_on:
      - appwrite
      - console
      - realtime
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        map $$http_upgrade $$connection_upgrade {
          default upgrade;
          '' close;
        }

        server {
          listen 80;
          server_name _;
          client_max_body_size 0;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
          proxy_buffering off;

          location /v1/realtime {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection $$connection_upgrade;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_pass http://realtime;
          }

          location /console {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection $$connection_upgrade;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_pass http://console;
          }

          location / {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection $$connection_upgrade;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_pass http://appwrite;
          }
        }
        EOF
        nginx -g 'daemon off;'

  appwrite:
    image: appwrite/appwrite:1.9.5@sha256:6ff3a9b006981911ba0190b364d4945f10c106d16f5916df5634c206462d2684
    <<: *logging
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ${APP_DATA_DIR}/data/uploads:/storage/uploads:rw
      - ${APP_DATA_DIR}/data/imports:/storage/imports:rw
      - ${APP_DATA_DIR}/data/cache:/storage/cache:rw
      - ${APP_DATA_DIR}/data/config:/storage/config:rw
      - ${APP_DATA_DIR}/data/certificates:/storage/certificates:rw
      - ${APP_DATA_DIR}/data/functions:/storage/functions:rw
