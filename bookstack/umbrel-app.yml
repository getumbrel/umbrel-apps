manifestVersion: 1
id: bookstack
name: BookStack
tagline: A simple, self-hosted platform for organizing documentation
category: files
version: "26.05"
port: 6875
description: >-
  BookStack is a free and open source platform for creating and organizing documentation. It provides a familiar book, chapter, and page structure that makes it easy to build wikis, knowledge bases, manuals, and internal documentation.


  Important: On first launch, sign in with the default credentials shown by Umbrel, then change the admin email address and password in BookStack.


  The editor is designed for everyday writing, while permissions, shelves, search, diagrams, attachments, comments, and revision history help teams keep information organized and useful over time.


  BookStack is self-hosted and stores your content on your Umbrel, so your documentation remains under your control.
developer: BookStack
website: https://www.bookstackapp.com/
repo: https://github.com/BookStackApp/BookStack
support: https://www.bookstackapp.com/docs/admin/
submitter: Umbrel
submission: https://github.com/getumbrel/umbrel-apps/pull/5687
gallery:
  - 1.webp
  - 2.webp
  - 3.webp
  - 4.webp
  - 5.webp
releaseNotes: >-
  BookStack 26.05 adds a page contents view to the page editor, new API endpoints for browsing tags, an in-app option to reset user multi-factor authentication methods, and inline code support for comments and descriptions.


  ⚠️ Revision access is now controlled separately from page access. After updating, some users may need role permissions updated before they can view revisions again.


  If PDF exports show font-related errors after updating, ensure the storage/fonts folder remains writable by the app.


  Full release notes can be found at https://github.com/BookStackApp/BookStack/releases/tag/v26.05
dependencies: []
path: ""
defaultUsername: "admin@admin.com"
defaultPassword: "password"
backupIgnore:
  - data/config/log/*
