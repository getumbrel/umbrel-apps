manifestVersion: 1.1
id: canary-mining
category: bitcoin
name: Canary Mining
version: "1.0.0"
tagline: Native Stratum V2 solo mining with your Bitcoin node
description: >-
  Canary Mining is a self-hosted native Stratum V2 solo mining server for Bitcoin Core IPC.


  It connects to the official Umbrel Bitcoin Node app, receives mining templates through Bitcoin Core's IPC interface, and exposes a dashboard plus a native Stratum V2 endpoint for compatible miners.


  To mine, install and sync the official Bitcoin Node app, enable Bitcoin Core IPC in Bitcoin Node settings, then point native Stratum V2 miners at your Umbrel on port 3335. Use a valid Bitcoin payout address as the miner username or user identity, optionally followed by a worker suffix.


  Bitcoin Knots is not supported in this release because its Umbrel package does not currently expose Bitcoin Core's IPC mining socket to dependent apps.


  If IPC is not enabled yet, Canary Mining will still open and show its dashboard, but mining will remain paused until the IPC socket is available.
