manifestVersion: 1.1
id: canary-mining
category: bitcoin
name: Canary Mining
version: "1.0.0"
tagline: Native Stratum V2 solo mining with your Bitcoin node
description: >-
  Canary Mining is a self-hosted native Stratum V2 solo mining server for Bitcoin Core IPC.


  It connects to your Umbrel Bitcoin Node, receives mining templates through Bitcoin Core's IPC interface, and exposes a dashboard plus a native Stratum V2 endpoint for compatible miners.


  To mine, install and sync Bitcoin Node, enable Bitcoin Core IPC in Bitcoin Node settings, then point native Stratum V2 miners at your Umbrel on port 3335. Use a valid Bitcoin payout address as the miner username or user identity, optionally followed by a worker suffix.


  If IPC is not enabled yet, Canary Mining will still open and show its dashboard, but mining will remain paused until the IPC socket is available.
