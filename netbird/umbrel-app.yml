releaseNotes: >-
  Some of the key highlights in this release include:
    - Suppressed ICE signaling to reduce unnecessary network traffic
    - Improved DNS resolution by preferring systemd-resolved stub over file mode
    - Added TTL-based refresh to the management DNS cache for more reliable name resolution
    - Trusted the WireGuard interface in firewalld to bypass owner-flagged chains
    - Increased gRPC health check timeout for improved stability
    - Added changeable PAT rate limiting in management
    - Excluded already expired peers from the expiration job to reduce unnecessary processing
    - Set session cookie path to root in the proxy
    - Added reverse proxy retention fields to the combined self-hosted YAML configuration


  Full release notes can be found at https://github.com/netbirdio/netbird/releases
