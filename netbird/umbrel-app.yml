releaseNotes: >-
  Some of the key highlights in this release include:
    - Added CrowdSec IP reputation integration for the reverse proxy to block malicious traffic based on IP reputation
    - Added PCP protocol support to improve peer-to-peer connectivity rates
    - Added a --disable-networks flag to block network selection for users
    - Fixed clearing service environment variables with --service-env ""
    - Fixed an SSH client config issue combining Host and Match directives incorrectly
    - Fixed a deadlock in WGIface.Close when the DNS filter hook re-enters GetDevice
    - Reconnected the conntrack netlink listener on error
    - Enforced peer or peer group requirements for network routers
    - Added direct redirect to SSO in the proxy


  Full release notes can be found at https://github.com/netbirdio/netbird/releases
