name: n8n
version: "2.11.3"
releaseNotes: >-
  This release includes various bug fixes and improvements:
    - Added suggested prompts support in the Chat Trigger Node
    - Added workflow history version comparison in the editor
    - Added ability to search and sort data table overviews
    - Added support for external secrets in projects
    - Fixed file uploads being blocked on Chat hub when not permitted by the chat trigger
    - Fixed CSV export downloading the wrong table
    - Fixed grid alignment issues on Safari 18.6
    - Fixed project assignment when duplicating a workflow from the overview
    - Fixed community node installation for admin users
    - Fixed XML Node invalid attributes handling
    - Fixed Microsoft Teams link preview service triggering sendAndWait approvals
    - Fixed form rendering consistency in the Form Node
    - Fixed log streaming configuration to work correctly with a proxy
    - Fixed entity import failing in Kubernetes due to ZIP self-inclusion issues
    - Fixed segfault in arm64 image due to missing native addon
    - Replaced jsonpath with jsonpath-plus to resolve a security vulnerability


  Full release notes are found at https://github.com/n8n-io/n8n/releases
tagline: Build complex workflows, really fast
description: >-
  n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, 
  be available to self-host, and allow you to add your own custom functions, logic and apps. 
  n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.


  n8n (pronounced n-eight-n) helps you to connect any app with an API with any other, and manipulate its data with little or no code.


  Customizable: highly flexible workflows and the option to build custom nodes.


  Privacy-focused: self-host n8n for privacy and security.
