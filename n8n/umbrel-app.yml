name: n8n
version: "2.18.4"
releaseNotes: >-
  This release includes new features, bug fixes, and improvements:
    - Added new Alibaba Cloud Chat Model and Model Studio nodes
    - Added new Moonshot Kimi and MiniMax Chat Model nodes
    - Added AI Gateway support for AI nodes
    - Added favoriting for projects, folders, workflows, and data tables
    - Added OAuth support for Notion Node
    - Added Pipedrive Node v2 with API v2 migration
    - Added expression-based role mapping strategy
    - Added community package management via Public API
    - Added ability to enable instance owner setup via environment variables
    - Added support for npm registry token authentication for private community node packages
    - Fixed Google Drive Node infinite pagination loop
    - Fixed HTTP Request Node multipart/form-data file upload with binary streams
    - Fixed IMAP Node out-of-memory crash after connection reset on reconnect
    - Fixed Schedule Node to self-heal after missed triggers
    - Fixed If Node when fields are missing
    - Fixed MCP Client Node connections not closing after execution ends
    - Fixed Microsoft Teams Node blocking accidental approvals from Microsoft Preview Service
    - Fixed credential access checks in dynamic node parameter requests
    - Fixed Google Cloud Firestore Node empty array serialization
    - Fixed LinkedIn Node API version in request headers
    - Fixed OpenAI Node by replacing hardcoded models with dynamic list
    - Various other editor and core bug fixes and improvements


  Full release notes are found at https://github.com/n8n-io/n8n/releases
tagline: Build complex workflows, really fast
description: >-
  n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, 
  be available to self-host, and allow you to add your own custom functions, logic and apps. 
  n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.


  n8n (pronounced n-eight-n) helps you to connect any app with an API with any other, and manipulate its data with little or no code.


  Customizable: highly flexible workflows and the option to build custom nodes.


  Privacy-focused: self-host n8n for privacy and security.
