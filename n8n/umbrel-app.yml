name: n8n
version: "2.26.4"
releaseNotes: >-
  This release adds AI workflow-builder improvements, including faster AI Assistant workflow preview examples, inline sub-agent delegation, knowledge-base and MCP workflow tooling, and better handling for stopped Instance AI sandboxes.


  It also improves API key management, OIDC/OAuth setup, package import behavior, and workflow redaction controls, adds service-account auth for Google Cloud Storage, AWS Assume Role support for Bedrock nodes, and NVIDIA Nemotron nodes, and fixes issues across Postgres, Salesforce, Microsoft Entra, Slack, Discord, cURL import, file-path handling, and workflow execution flows.


  Full release notes can be found at https://github.com/n8n-io/n8n/releases/tag/n8n%402.26.4
tagline: Build complex workflows, really fast
description: >-
  n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, 
  be available to self-host, and allow you to add your own custom functions, logic and apps. 
  n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.


  n8n (pronounced n-eight-n) helps you to connect any app with an API with any other, and manipulate its data with little or no code.


  Customizable: highly flexible workflows and the option to build custom nodes.


  Privacy-focused: self-host n8n for privacy and security.
