name: n8n
version: "2.21.0"
releaseNotes: >-
  This release includes workflow editor, AI Builder, and core reliability improvements, plus fixes for several integrations:
    - Improved AI Builder behavior for archived workflows, planning context, and agent chat integrations
    - Added workflow structure validation and configurable S3 retry/error details
    - Updated Calendly Trigger webhook subscriptions to use API v2
    - Fixed Airtable attachment updates when typecast is enabled
    - Fixed project and workflow access checks, manual execution table sorting, and nested expression editing
    - Fixed issues in Gmail, Google Sheets, HubSpot, Postgres, Todoist, and other nodes


  Full release notes are found at https://github.com/n8n-io/n8n/releases/tag/n8n%402.21.0
tagline: Build complex workflows, really fast
description: >-
  n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, 
  be available to self-host, and allow you to add your own custom functions, logic and apps. 
  n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.


  n8n (pronounced n-eight-n) helps you to connect any app with an API with any other, and manipulate its data with little or no code.


  Customizable: highly flexible workflows and the option to build custom nodes.


  Privacy-focused: self-host n8n for privacy and security.
