manifestVersion: 1
id: n8n
category: automation
name: n8n
version: "2.10.3"
releaseNotes: >-
  This release includes various bug fixes and improvements:
    - Added unified Ask and Build AI chat experience for workflow creation
    - Added workflow builder session persistence across page refreshes
    - Added streaming support in canvas chat
    - Added execution data preview in the editor
    - Added support for discarding and renaming columns during CSV import
    - Added 'Create new tool' button to the tools selector
    - Improved external secrets management with support for multiple connected vaults
    - Improved Google OAuth button design and managed OAuth credential selection
    - Fixed grid alignment issues on Safari
    - Fixed auth mode dropdown always showing in credential modal
    - Fixed tags not being sent to backend
    - Fixed incorrect keyboard shortcut resolution on non-QWERTY layouts
    - Fixed AI Agent orphaned tool messages after buffer window slides
    - Replaced jsonpath with jsonpath-plus to resolve a security vulnerability


  Full release notes are found at https://github.com/n8n-io/n8n/releases
tagline: Build complex workflows, really fast
description: >-
  n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, 
  be available to self-host, and allow you to add your own custom functions, logic and apps. 
  n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.


  n8n (pronounced n-eight-n) helps you to connect any app with an API with any other, and manipulate its data with little or no code.


  Customizable: highly flexible workflows and the option to build custom nodes.


  Privacy-focused: self-host n8n for privacy and security.
