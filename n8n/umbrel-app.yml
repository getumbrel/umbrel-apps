name: n8n
version: "2.25.7"
releaseNotes: >-
  This release adds workflow and AI agent improvements, including a Knowledge Base for agents, scheduled agent tasks, better AI Assistant state recovery after restart, workflow export with credentials, and new project/folder actions.


  It also improves credential and API key management, adds n8n user authentication for Form Trigger workflows, supports custom OAuth scopes for Microsoft OneDrive, Outlook, and SharePoint nodes, and fixes issues across email, Salesforce, Postgres, LDAP, credential picker, markdown editor, and agent/workflow execution flows.


  Full release notes can be found at https://github.com/n8n-io/n8n/releases/tag/n8n%402.25.7
tagline: Build complex workflows, really fast
description: >-
  n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, 
  be available to self-host, and allow you to add your own custom functions, logic and apps. 
  n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.


  n8n (pronounced n-eight-n) helps you to connect any app with an API with any other, and manipulate its data with little or no code.


  Customizable: highly flexible workflows and the option to build custom nodes.


  Privacy-focused: self-host n8n for privacy and security.
