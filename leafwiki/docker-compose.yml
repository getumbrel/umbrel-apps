version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: leafwiki_web_1
      APP_PORT: 8080

  web:
    image: ghcr.io/perber/leafwiki:v0.11.4@sha256:9a7034aa8072a8e71dde8c31cb62326a9bfbdbd4246c5610194e80e243de397b
    restart: on-failure
    environment:
      LEAFWIKI_JWT_SECRET: ${APP_SEED}
      LEAFWIKI_ADMIN_PASSWORD: umbrel
      LEAFWIKI_ALLOW_INSECURE: "true"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
