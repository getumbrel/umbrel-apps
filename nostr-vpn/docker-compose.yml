version: "3.7"

services:
  server:
    image: ghcr.io/getumbrel/nostr-vpn:v0.3.4
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NVPN_DATA_DIR=/data