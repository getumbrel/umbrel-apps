manifestVersion: 1
id: nostr-vpn
category: networking
name: Nostr VPN
version: "v4.0.62"
tagline: Invite-only mesh VPN over Nostr
description: >-
  Nostr VPN turns your Umbrel into a private mesh VPN node for your own devices
  and trusted groups. Create invite-only networks, approve join requests, share
  QR invites, manage peers, and route traffic through trusted exit nodes without
  relying on a hosted VPN provider or a central control server.


  To connect a device, open Nostr VPN on your Umbrel and create an invite. Then import that
  invite in the Nostr VPN app or CLI on the device you want to connect. Once you
  accept the join request on your Umbrel, your devices can reach each other
  using their private Nostr VPN IPs.
developer: mmalmi and contributors
website: https://github.com/mmalmi/nostr-vpn
repo: https://github.com/mmalmi/nostr-vpn
support: https://github.com/mmalmi/nostr-vpn/issues
dependencies: []
port: 38180
path: ""
defaultUsername: ""
defaultPassword: ""
deterministicPassword: false
torOnly: false
gallery:
  - 1.webp
  - 2.webp
  - 3.webp
releaseNotes: >-
  Changes since v4.0.47:
    - Fixed first-run Umbrel setup so the admin network, local `.nvpn` name, device invites, and self device appear reliably while the daemon starts.
    - Improved direct peer connectivity: mesh/relay is now fallback transport while direct UDP keeps probing and can recover after hotspot or NAT changes.
    - Avoided stale private/hotspot endpoints and brief liveness timeouts leaving peers stuck on mesh.
    - Improved daemon liveness, rekey, and failover behavior under load, with clearer startup and network-refresh status.
submitter: mmalmi
submission: https://github.com/getumbrel/umbrel-apps/pull/5678
