manifestVersion: 1
id: onboardpi
category: utilities
name: OnBoardPi
version: "0.4.3"
tagline: Diagnóstico OBD2 para todos os carros via interface web
description: >-
  OnBoardPi é uma aplicação web de diagnóstico veicular OBD2. Monitore em
  tempo real RPM, velocidade, temperatura do motor, códigos de falha (DTC)
  e muito mais. Funciona com qualquer carro fabricado a partir de 1996
  usando um adaptador ELM327 USB ou Bluetooth.
