version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: onboardpi_web_1
      APP_PORT: 8080

  web:
    image: bgunson/onboardpi-web:latest
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/onboardpi/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_HOST: onboardpi_db_1
      POSTGRES_DB: onboardpi
      POSTGRES_PASSWORD: $APP_PASSWORD
      SETTINGS_DIR: /var/lib/onboardpi/data
    depends_on:
      - db

  db:
    image: timescale/timescaledb:latest-pg14
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/db:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_PASSWORD: $APP_PASSWORD
      POSTGRES_DB: onboardpi

  obd:
    image: bgunson/onboardpi-obd:latest
    restart: on-failure
    stop_grace_period: 1m
    privileged: true
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/onboardpi/data:ro
      - /dev:/dev
      - /etc/localtime:/etc/localtime:ro
    environment:
      SETTINGS_DIR: /var/lib/onboardpi/data
    depends_on:
      - web
