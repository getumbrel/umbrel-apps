version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: onboardpi_web_1
      APP_PORT: 8080

  web:
    image: bgunson/onboardpi-web:latest@sha256:6640957b5ae3f661e32cb35bfec094065a3e79ee6bf84105ff875d698f5448ed
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/onboardpi/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_HOST: onboardpi_db_1
      POSTGRES_DB: onboardpi
      POSTGRES_PASSWORD: $APP_PASSWORD
      SETTINGS_DIR: /var/lib/onboardpi/data
    depends_on:
      - db

  db:
    image: timescale/timescaledb:latest-pg14@sha256:0f5553d37abbe0f20bfe0a04dab5d1238955b5cda2711aba403090f95b6e51ff
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/db:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_PASSWORD: $APP_PASSWORD
      POSTGRES_DB: onboardpi

  obd:
    image: bgunson/onboardpi-obd:latest@sha256:b0553e63699680695a5f5e007ecdbddb04db3b9ca85493d92f2b8a69d6e3eedf
    restart: on-failure
    stop_grace_period: 1m
    privileged: true
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/onboardpi/data:ro
      - /dev:/dev
      - /etc/localtime:/etc/localtime:ro
    environment:
      SETTINGS_DIR: /var/lib/onboardpi/data
    depends_on:
      - web
