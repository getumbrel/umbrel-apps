releaseNotes: >-
  This release includes security and bug fixes for Forgejo 15:
    - Fixes a permission-cache issue on first pushed Git references
    - Tightens migration and mirroring host allow/deny checks, including LFS handling
    - Updates the Swift package registry metadata response
    - Improves API handling for comments from deleted users, missing task logs, and generic package HEAD requests
    - Updates Go and security-sensitive dependencies


  Full release notes are available at https://codeberg.org/forgejo/forgejo/releases/tag/v15.0.4
