releaseNotes: >-
  This release fixes an issue where internal SSH subprocesses could be stopped when an SSH connection closed.


  If you manually enabled Forgejo reverse proxy authentication on your Umbrel, review Forgejo's CVE-2026-20896 guidance for the required trusted-proxy configuration.


  Full release notes are available at https://codeberg.org/forgejo/forgejo/releases/tag/v15.0.5
